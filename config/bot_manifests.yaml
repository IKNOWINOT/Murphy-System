# Murphy System — bot shim manifests
#
# Each entry drives ShimCompiler to regenerate that bot's internal/ shims.
# All values default to the canonical bot_base values; override only what differs.
#
# Run:  python scripts/compile_shims.py [--dry-run] [--bot <name>]

