# Bandit security linting configuration for Murphy System
#
# Murphy System is a large-scale automation platform with 750+ modules.
# Many bandit rules produce false positives for this type of system.
# This file configures appropriate exclusions with documented justifications.
#
# Usage (in CI): bandit -c bandit.yaml -r src/ -ll -f txt

# Directories to exclude from scanning.
# - tests/: Test code uses assert statements, subprocess, and other patterns that
#            would produce false positives but are appropriate in test context.
# - bots/:  Bot implementations use subprocess and shell commands by design.
exclude_dirs:
  - tests
  - bots

# Rules to skip globally with justifications.
# Real HIGH/MEDIUM issues (B324 MD5, B701 jinja2 autoescape) are fixed in source.
skips:
  # B102 exec_used: Murphy REPL (murphy_repl.py) intentionally uses exec() to
  # evaluate user-supplied Python expressions in an interactive shell environment.
  # This is the intended and documented behaviour of the REPL component.
  - B102

  # B104 hardcoded_bind_all_interfaces: All internal API servers (compute_plane,
  # confidence_engine, execution_orchestrator, etc.) are designed to bind to
  # 0.0.0.0 so they are reachable within Docker/Kubernetes pod networks.
  # Network isolation is enforced at the infrastructure level, not in code.
  - B104

  # B108 hardcoded_tmp_directory: The automation platform uses /tmp for ephemeral
  # sandboxed compilation, test fixtures, and intermediary files. These paths are
  # intentional and are cleaned up after use; they do not hold sensitive data.
  - B108

  # B113 request_without_timeout: Bulk outbound requests in automation workflows
  # use indefinite timeouts where the caller controls retry/cancellation logic.
  # Adding per-call timeouts would break long-running automation pipelines.
  - B113

  # B310 blacklist (url open): URL-open calls in the platform are validated
  # against an allowlist at the application level before urllib.request.urlopen
  # is invoked. The file:/ scheme is explicitly rejected in the calling code.
  - B310

  # B614 pytorch_load: PyTorch model checkpoints are loaded from trusted local
  # paths generated by the training pipeline. weights_only=True is not used
  # because the neuro-symbolic models store non-tensor state in checkpoints.
  - B614

  # B615 huggingface_unsafe_download: HuggingFace models are downloaded by model
  # name from the Hub. Revision pinning is managed at the deployment layer via
  # environment variables and the MFM model registry, not in-code constants.
  - B615
