<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murphy — Workflow Canvas</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<style>
:root{
  --bg:#0a0f0a;--surface:#111811;--surface2:#161e16;--border:#1e2e1e;
  --teal:#00e5a0;--teal-dim:rgba(0,229,160,.12);--teal-glow:rgba(0,229,160,.3);
  --text:#e8f0e8;--text-dim:#6b8c6b;--danger:#ff4f4f;--warn:#f5a623;
  --node-trigger:#0d2b1a;--node-action:#0d1f2b;--node-logic:#1f1a0d;--node-gate:#2b0d0d;
  --radius:10px;--font:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
.brand{font-weight:700;font-size:1rem;color:var(--teal);letter-spacing:.04em;}
.nav-links{display:flex;gap:4px;}
.nav-link{padding:5px 12px;border-radius:6px;font-size:.85rem;color:var(--text-dim);transition:all .15s;}
.nav-link:hover,.nav-link.active{background:var(--teal-dim);color:var(--teal);}
.btn{padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .15s;}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-teal{background:var(--teal);color:#000;}
.btn-teal:hover{opacity:.85;}
.btn-sm{padding:4px 10px;font-size:.75rem;}
.nav-actions{display:flex;gap:6px;align-items:center;}

/* BODY LAYOUT */
.workspace{display:flex;flex:1;min-height:0;}

/* LEFT PANEL */
.left-panel{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.panel-section{padding:12px;}
.panel-title{font-size:.72rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.workflow-list{overflow-y:auto;flex:1;}
.workflow-item{padding:9px 12px;cursor:pointer;border-radius:7px;margin:2px 8px;font-size:.82rem;transition:all .15s;border:1px solid transparent;}
.workflow-item:hover{background:var(--teal-dim);border-color:var(--border);}
.workflow-item.selected{background:var(--teal-dim);border-color:var(--teal);color:var(--teal);}
.workflow-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.workflow-meta{font-size:.72rem;color:var(--text-dim);margin-top:2px;}
.palette-title{font-size:.72rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin:12px 12px 6px;}
.palette-nodes{padding:0 8px 12px;}
.palette-node{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:grab;font-size:.8rem;margin-bottom:5px;transition:all .15s;user-select:none;}
.palette-node:hover{border-color:var(--teal);background:var(--teal-dim);}
.palette-node:active{cursor:grabbing;}
.node-icon{font-size:1rem;width:20px;text-align:center;}

/* CANVAS AREA */
.canvas-area{flex:1;position:relative;overflow:hidden;background:
  radial-gradient(circle at 50% 50%, rgba(0,229,160,.03) 0%, transparent 70%),
  linear-gradient(var(--border) 1px, transparent 1px),
  linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:100% 100%, 30px 30px, 30px 30px;}
#canvas{width:100%;height:100%;position:relative;overflow:hidden;}
#svg-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}

/* NODES */
.wf-node{position:absolute;min-width:160px;max-width:220px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);cursor:move;z-index:10;user-select:none;transition:box-shadow .15s;}
.wf-node:hover,.wf-node.hovered{box-shadow:0 0 0 2px var(--teal-glow);}
.wf-node.selected{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow);}
.wf-node[data-type="trigger"]{background:var(--node-trigger);}
.wf-node[data-type="action"]{background:var(--node-action);}
.wf-node[data-type="logic"]{background:var(--node-logic);}
.wf-node[data-type="gate"]{background:var(--node-gate);}
.node-header{padding:8px 10px 6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.node-type-badge{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 6px;border-radius:4px;}
.badge-trigger{background:rgba(0,229,160,.2);color:var(--teal);}
.badge-action{background:rgba(88,166,255,.2);color:#58a6ff;}
.badge-logic{background:rgba(245,166,35,.2);color:var(--warn);}
.badge-gate{background:rgba(255,79,79,.2);color:var(--danger);}
.node-label{padding:8px 10px;font-size:.82rem;font-weight:600;color:var(--text);}
.node-port{position:absolute;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--border);cursor:crosshair;transition:all .15s;z-index:20;}
.node-port:hover{background:var(--teal);border-color:var(--teal);transform:scale(1.3);}
.node-port.output{right:-7px;top:50%;transform:translateY(-50%);}
.node-port.input{left:-7px;top:50%;transform:translateY(-50%);}
.node-port.output:hover{transform:translateY(-50%) scale(1.3);}
.node-port.input:hover{transform:translateY(-50%) scale(1.3);}

/* RIGHT INSPECTOR */
.inspector{width:260px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.inspector-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:.85rem;font-weight:600;}
.inspector-body{padding:14px;overflow-y:auto;flex:1;}
.field-group{margin-bottom:14px;}
.field-label{font-size:.75rem;color:var(--text-dim);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.field-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 10px;font-size:.82rem;font-family:var(--font);}
.field-input:focus{outline:none;border-color:var(--teal);}
textarea.field-input{resize:vertical;min-height:68px;}
.field-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 10px;font-size:.82rem;}
.field-select:focus{outline:none;border-color:var(--teal);}
.inspector-actions{padding:12px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.nl-edit-row{display:flex;gap:6px;}
.nl-edit-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:7px 9px;font-size:.78rem;font-family:var(--font);}
.nl-edit-input:focus{outline:none;border-color:var(--teal);}
.empty-inspector{color:var(--text-dim);font-size:.85rem;text-align:center;margin-top:40px;line-height:1.6;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
.wf-title-input{background:transparent;border:none;color:var(--text);font-size:.9rem;font-weight:600;width:220px;outline:none;font-family:var(--font);}
.wf-title-input::placeholder{color:var(--text-dim);}
.save-status{font-size:.75rem;color:var(--text-dim);margin-left:4px;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--teal);color:#000;padding:10px 18px;border-radius:9px;font-weight:600;font-size:.85rem;opacity:0;transform:translateY(8px);transition:all .2s;z-index:9999;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.err{background:var(--danger);color:#fff;}

/* LOADING */
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.no-workflows{color:var(--text-dim);font-size:.82rem;text-align:center;padding:20px 12px;line-height:1.6;}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/ui/landing" class="brand">⚡ Murphy</a>
  <div class="nav-links">
    <a href="/ui/dashboard" class="nav-link">Dashboard</a>
    <a href="/ui/automations" class="nav-link">Automations</a>
    <a href="/ui/workflow-canvas" class="nav-link active">Canvas</a>
    <a href="/ui/forge" class="nav-link">Forge</a>
  </div>
  <div class="nav-actions">
    <button class="btn btn-ghost" onclick="newWorkflow()">+ New</button>
    <button class="btn btn-teal" onclick="saveWorkflow()" id="saveBtn">Save</button>
    <button class="btn btn-ghost" onclick="location.href='/api/auth/logout'" style="margin-left:4px;">Sign Out</button>
  </div>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <input class="wf-title-input" id="wfTitle" placeholder="Untitled Workflow" value="Untitled Workflow">
  <div class="toolbar-sep"></div>
  <select class="field-select" id="wfStatus" style="width:auto;padding:4px 8px;font-size:.78rem;">
    <option value="idle">Idle</option>
    <option value="active">Active</option>
    <option value="paused">Paused</option>
  </select>
  <div class="toolbar-sep"></div>
  <button class="btn btn-ghost btn-sm" onclick="clearCanvas()">Clear</button>
  <button class="btn btn-ghost btn-sm" onclick="autoLayout()">Auto Layout</button>
  <span class="save-status" id="saveStatus"></span>
</div>

<div class="workspace">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="panel-section" style="border-bottom:1px solid var(--border);padding-bottom:0;">
      <div class="panel-title">Workflows</div>
    </div>
    <div class="workflow-list" id="workflowList">
      <div class="no-workflows"><span class="spinner"></span></div>
    </div>

    <div style="border-top:1px solid var(--border);">
      <div class="palette-title">Node Palette</div>
      <div class="palette-nodes">
        <div class="palette-node" draggable="true" data-ntype="trigger" data-nsubtype="schedule" ondragstart="paletteDrag(event)">
          <span class="node-icon">⏰</span> Schedule Trigger
        </div>
        <div class="palette-node" draggable="true" data-ntype="trigger" data-nsubtype="event" ondragstart="paletteDrag(event)">
          <span class="node-icon">⚡</span> Event Trigger
        </div>
        <div class="palette-node" draggable="true" data-ntype="action" data-nsubtype="generate" ondragstart="paletteDrag(event)">
          <span class="node-icon">✨</span> AI Generate
        </div>
        <div class="palette-node" draggable="true" data-ntype="action" data-nsubtype="send" ondragstart="paletteDrag(event)">
          <span class="node-icon">📤</span> Send / Notify
        </div>
        <div class="palette-node" draggable="true" data-ntype="action" data-nsubtype="fetch" ondragstart="paletteDrag(event)">
          <span class="node-icon">🔗</span> Fetch Data
        </div>
        <div class="palette-node" draggable="true" data-ntype="logic" data-nsubtype="condition" ondragstart="paletteDrag(event)">
          <span class="node-icon">🔀</span> Condition
        </div>
        <div class="palette-node" draggable="true" data-ntype="logic" data-nsubtype="loop" ondragstart="paletteDrag(event)">
          <span class="node-icon">🔁</span> Loop
        </div>
        <div class="palette-node" draggable="true" data-ntype="gate" data-nsubtype="hitl" ondragstart="paletteDrag(event)">
          <span class="node-icon">👁️</span> HITL Gate
        </div>
        <div class="palette-node" draggable="true" data-ntype="gate" data-nsubtype="harm" ondragstart="paletteDrag(event)">
          <span class="node-icon">🛡️</span> Harm Gate
        </div>
      </div>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area" id="canvasArea"
       ondragover="canvasDragOver(event)"
       ondrop="canvasDrop(event)">
    <div id="canvas">
      <svg id="svg-layer"></svg>
    </div>
  </div>

  <!-- INSPECTOR -->
  <div class="inspector">
    <div class="inspector-header">Inspector</div>
    <div class="inspector-body" id="inspectorBody">
      <div class="empty-inspector">Select a node to edit its properties</div>
    </div>
    <div class="inspector-actions" id="inspectorActions" style="display:none;">
      <button class="btn btn-ghost btn-sm" onclick="deleteSelectedNode()" style="color:var(--danger);border-color:var(--danger);">Delete Node</button>
      <div style="font-size:.72rem;color:var(--text-dim);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">NL Edit</div>
      <div class="nl-edit-row">
        <input class="nl-edit-input" id="nlEditInput" placeholder="e.g. add a delay before this">
        <button class="btn btn-ghost btn-sm" onclick="nlEditWorkflow()">→</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = 'founder_ad6b1fade355dc1c6dfa89db96d77608886bf63b01b4fb70';
const HEADERS = {'X-API-Key': API_KEY, 'Content-Type': 'application/json'};

// ── State ──────────────────────────────────────────────────────────────────
let _nodes = [];          // {id, type, subtype, label, x, y, data:{}}
let _edges = [];          // {id, from, to}
let _selectedId = null;
let _currentWfId = null;
let _draggingNode = null;
let _dragOffX = 0, _dragOffY = 0;
let _paletteType = null;
let _nodeCount = 0;
let _unsaved = false;

// ── Helpers ────────────────────────────────────────────────────────────────
function apiFetch(path, opts={}) {
  const h = {'Content-Type':'application/json'};
  if (opts.headers) Object.assign(h, opts.headers);
  const {headers: _h, ...rest} = opts;
  return fetch(path, {credentials:'same-origin', headers:h, ...rest}).then(r=>r.json());
}
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err?' err':'');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function setUnsaved(v) {
  _unsaved = v;
  document.getElementById('saveStatus').textContent = v ? '● unsaved' : '';
}
function nodeIcon(type, subtype) {
  const map = {
    trigger:{schedule:'⏰',event:'⚡',webhook:'🔔',default:'▶'},
    action:{generate:'✨',send:'📤',fetch:'🔗',log:'📋',email:'📧',slack:'💬',default:'⚙️'},
    logic:{condition:'🔀',loop:'🔁',delay:'⏱',default:'🔧'},
    gate:{hitl:'👁️',harm:'🛡️',approval:'✅',default:'🚧'}
  };
  return (map[type]||{})[subtype] || (map[type]||{}).default || '📦';
}
function badgeClass(type) {
  return {trigger:'badge-trigger',action:'badge-action',logic:'badge-logic',gate:'badge-gate'}[type]||'badge-action';
}

// ── Canvas render ──────────────────────────────────────────────────────────
function renderCanvas() {
  const canvas = document.getElementById('canvas');
  // Remove all nodes
  canvas.querySelectorAll('.wf-node').forEach(n=>n.remove());

  _nodes.forEach(node => {
    const el = document.createElement('div');
    el.className = 'wf-node' + (_selectedId===node.id?' selected':'');
    el.dataset.id = node.id;
    el.dataset.type = node.type;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    el.innerHTML = `
      <div class="node-port input" data-node="${node.id}" data-port="in"></div>
      <div class="node-header">
        <span class="node-type-badge ${badgeClass(node.type)}">${node.type}</span>
      </div>
      <div class="node-label">${nodeIcon(node.type,node.subtype)} ${node.label}</div>
      <div class="node-port output" data-node="${node.id}" data-port="out"></div>
    `;
    // Drag
    el.addEventListener('mousedown', onNodeMousedown);
    el.addEventListener('click', e=>{ e.stopPropagation(); selectNode(node.id); });
    canvas.appendChild(el);
  });

  renderEdges();
}

function renderEdges() {
  const svg = document.getElementById('svg-layer');
  svg.innerHTML = '';
  _edges.forEach(edge => {
    const fromNode = _nodes.find(n=>n.id===edge.from);
    const toNode = _nodes.find(n=>n.id===edge.to);
    if (!fromNode||!toNode) return;
    const x1 = fromNode.x + 160; const y1 = fromNode.y + 45;
    const x2 = toNode.x; const y2 = toNode.y + 45;
    const cx = (x1+x2)/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
    path.setAttribute('stroke','#00e5a0');
    path.setAttribute('stroke-width','2');
    path.setAttribute('fill','none');
    path.setAttribute('opacity','0.6');
    const marker = document.createElementNS('http://www.w3.org/2000/svg','circle');
    marker.setAttribute('cx',x2); marker.setAttribute('cy',y2);
    marker.setAttribute('r','4'); marker.setAttribute('fill','#00e5a0');
    svg.appendChild(path);
    svg.appendChild(marker);
  });
}

// ── Node dragging ──────────────────────────────────────────────────────────
function onNodeMousedown(e) {
  if (e.target.classList.contains('node-port')) return; // port click
  const el = e.currentTarget;
  _draggingNode = el.dataset.id;
  const rect = el.getBoundingClientRect();
  _dragOffX = e.clientX - rect.left;
  _dragOffY = e.clientY - rect.top;
  e.preventDefault();
}
document.addEventListener('mousemove', e => {
  if (!_draggingNode) return;
  const canvas = document.getElementById('canvas');
  const cr = canvas.getBoundingClientRect();
  const x = e.clientX - cr.left - _dragOffX;
  const y = e.clientY - cr.top - _dragOffY;
  const node = _nodes.find(n=>n.id===_draggingNode);
  if (node) { node.x=Math.max(0,x); node.y=Math.max(0,y); }
  const el = canvas.querySelector(`[data-id="${_draggingNode}"]`);
  if (el) { el.style.left=Math.max(0,x)+'px'; el.style.top=Math.max(0,y)+'px'; }
  renderEdges();
  setUnsaved(true);
});
document.addEventListener('mouseup', e => { _draggingNode=null; });

// Deselect on canvas click
document.getElementById('canvas').addEventListener('click', e => {
  if (e.target===document.getElementById('canvas')||e.target===document.getElementById('canvas-area')) {
    selectNode(null);
  }
});

// ── Selection & Inspector ──────────────────────────────────────────────────
function selectNode(id) {
  _selectedId = id;
  document.querySelectorAll('.wf-node').forEach(el=>{
    el.classList.toggle('selected', el.dataset.id===id);
  });
  const insp = document.getElementById('inspectorBody');
  const actions = document.getElementById('inspectorActions');
  if (!id) {
    insp.innerHTML = '<div class="empty-inspector">Select a node to edit its properties</div>';
    actions.style.display='none';
    return;
  }
  const node = _nodes.find(n=>n.id===id);
  if (!node) return;
  actions.style.display='flex';
  insp.innerHTML = `
    <div class="field-group">
      <div class="field-label">Label</div>
      <input class="field-input" id="fi-label" value="${escHtml(node.label)}" oninput="updateNodeField('label',this.value)">
    </div>
    <div class="field-group">
      <div class="field-label">Type</div>
      <select class="field-select" id="fi-type" onchange="updateNodeField('type',this.value)">
        ${['trigger','action','logic','gate'].map(t=>`<option ${node.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="field-group">
      <div class="field-label">Subtype</div>
      <input class="field-input" id="fi-subtype" value="${escHtml(node.subtype||'')}" oninput="updateNodeField('subtype',this.value)">
    </div>
    ${node.type==='trigger'?`
    <div class="field-group">
      <div class="field-label">Cron Schedule</div>
      <input class="field-input" id="fi-cron" value="${escHtml((node.data&&node.data.cron)||'')}" placeholder="e.g. 0 9 * * 1" oninput="updateNodeData('cron',this.value)">
      <div style="font-size:.7rem;color:var(--text-dim);margin-top:4px;">min hr dom mon dow — leave blank for on-demand</div>
    </div>`:''}
    ${node.type==='action'?`
    <div class="field-group">
      <div class="field-label">Config / Prompt</div>
      <textarea class="field-input" id="fi-prompt" oninput="updateNodeData('prompt',this.value)">${escHtml((node.data&&node.data.prompt)||'')}</textarea>
    </div>`:''}
    ${node.type==='logic'&&node.subtype==='condition'?`
    <div class="field-group">
      <div class="field-label">Condition Expression</div>
      <input class="field-input" id="fi-condition" value="${escHtml((node.data&&node.data.condition)||'')}" oninput="updateNodeData('condition',this.value)">
    </div>`:''}
    <div class="field-group">
      <div class="field-label">Node ID</div>
      <div style="font-size:.75rem;color:var(--text-dim);font-family:monospace;">${node.id}</div>
    </div>
  `;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateNodeField(field, val) {
  const node = _nodes.find(n=>n.id===_selectedId);
  if (!node) return;
  node[field] = val;
  // Re-render label in canvas
  const el = document.querySelector(`[data-id="${_selectedId}"] .node-label`);
  if (el && field==='label') el.textContent = nodeIcon(node.type,node.subtype)+' '+val;
  setUnsaved(true);
}
function updateNodeData(key, val) {
  const node = _nodes.find(n=>n.id===_selectedId);
  if (!node) return;
  node.data = node.data || {};
  node.data[key] = val;
  setUnsaved(true);
}

// ── Palette drag-drop ──────────────────────────────────────────────────────
let _paletteDragType=null, _paletteDragSubtype=null;
function paletteDrag(e) {
  _paletteDragType = e.currentTarget.dataset.ntype;
  _paletteDragSubtype = e.currentTarget.dataset.nsubtype;
  e.dataTransfer.effectAllowed='copy';
}
function canvasDragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='copy'; }
function canvasDrop(e) {
  e.preventDefault();
  if (!_paletteDragType) return;
  const cr = document.getElementById('canvasArea').getBoundingClientRect();
  const x = e.clientX - cr.left - 80;
  const y = e.clientY - cr.top - 30;
  addNode(_paletteDragType, _paletteDragSubtype, x, y);
  _paletteDragType=null;
}

// ── Node CRUD ──────────────────────────────────────────────────────────────
function addNode(type, subtype, x, y, label, data, id) {
  const node = {
    id: id || ('node_'+Date.now()+'_'+(++_nodeCount)),
    type, subtype,
    label: label || (subtype.charAt(0).toUpperCase()+subtype.slice(1).replace(/_/g,' ')),
    x: x||120, y: y||120,
    data: data||{}
  };
  _nodes.push(node);
  renderCanvas();
  selectNode(node.id);
  setUnsaved(true);
  // Auto-wire: connect to previous last node if type isn't trigger
  if (type!=='trigger' && _nodes.length>1) {
    const prev = _nodes[_nodes.length-2];
    _edges.push({id:'e_'+Date.now(), from:prev.id, to:node.id});
    renderEdges();
  }
  return node;
}
function deleteSelectedNode() {
  if (!_selectedId) return;
  _nodes = _nodes.filter(n=>n.id!==_selectedId);
  _edges = _edges.filter(e=>e.from!==_selectedId&&e.to!==_selectedId);
  selectNode(null);
  renderCanvas();
  setUnsaved(true);
  toast('Node deleted');
}

// ── Auto layout ──────────────────────────────────────────────────────────
function autoLayout() {
  let x=80;
  _nodes.forEach((n,i)=>{
    n.x = x;
    n.y = 160;
    x += 220;
  });
  renderCanvas();
  setUnsaved(true);
}

// ── Load workflow from blueprint ──────────────────────────────────────────
function loadWorkflow(item) {
  _currentWfId = item.workflow_id || item.id;
  document.getElementById('wfTitle').value = item.name || 'Untitled';
  _nodes=[];_edges=[];_nodeCount=0;

  const canvas_nodes = item.canvas_nodes || (item.data && item.data.canvas_nodes) || [];
  canvas_nodes.forEach(cn => {
    _nodes.push({
      id: cn.id || ('node_'+Date.now()+'_'+(++_nodeCount)),
      type: cn.type||'action',
      subtype: cn.subtype||'action',
      label: (cn.label||'').replace(/^[\u23f0\u26a1\u2728\u2764\ufe0f\ud83d\ude80\ud83d\udce4\ud83d\udd17\ud83d\udd00\ud83d\udd01\ud83d\udd04\ud83d\udc41\ufe0f\ud83d\udee1\ufe0f\u2705\ud83d\udea7\ud83d\udccb\ud83d\udce7\ud83d\udcac\u2699\ufe0f\ud83d\udce6\u25b6]\s*/, '').trim(),
      x: cn.x||120, y: cn.y||120,
      data: cn.data||{}
    });
  });

  // Auto-generate sequential edges
  _edges=[];
  for (let i=0;i<_nodes.length-1;i++) {
    _edges.push({id:'e_'+i, from:_nodes[i].id, to:_nodes[i+1].id});
  }

  renderCanvas();
  selectNode(null);
  setUnsaved(false);
  toast('Loaded: '+item.name);

  // Highlight selected in list
  document.querySelectorAll('.workflow-item').forEach(el=>{
    el.classList.toggle('selected', el.dataset.id===_currentWfId);
  });
}

// ── Save ──────────────────────────────────────────────────────────────────
async function saveWorkflow() {
  const name = document.getElementById('wfTitle').value.trim() || 'Untitled';
  const status = document.getElementById('wfStatus').value;
  const btn = document.getElementById('saveBtn');
  btn.textContent='Saving…';
  try {
    const payload = {
      id: _currentWfId,
      name,
      status,
      nodes: _nodes.map(n=>({
        id:n.id, type:n.type, subtype:n.subtype,
        label: nodeIcon(n.type,n.subtype)+' '+n.label,
        x:n.x, y:n.y, data:n.data
      })),
      connections: _edges
    };
    const r = await apiFetch('/api/canvas/workflows', {method:'POST', body:JSON.stringify(payload)});
    if (r.success) {
      _currentWfId = r.workflow&&r.workflow.id || _currentWfId;
      setUnsaved(false);
      toast('Saved ✓');
      loadWorkflowList();
    } else {
      toast(r.error||'Save failed', true);
    }
  } catch(e) { toast('Save error', true); }
  btn.textContent='Save';
}

// ── New workflow ──────────────────────────────────────────────────────────
function newWorkflow() {
  _currentWfId = null;
  _nodes=[];_edges=[];_nodeCount=0;
  document.getElementById('wfTitle').value='Untitled Workflow';
  document.getElementById('wfStatus').value='idle';
  renderCanvas(); selectNode(null); setUnsaved(false);
  document.querySelectorAll('.workflow-item').forEach(el=>el.classList.remove('selected'));
}
function clearCanvas() {
  _nodes=[];_edges=[];renderCanvas();selectNode(null);setUnsaved(true);
}

// ── NL workflow edit ──────────────────────────────────────────────────────
async function nlEditWorkflow() {
  const instr = document.getElementById('nlEditInput').value.trim();
  if (!instr) { toast('Enter an edit instruction', true); return; }
  if (!_currentWfId) { toast('Save the workflow first', true); return; }
  document.getElementById('nlEditInput').value='';
  toast('Applying NL edit…');
  try {
    const r = await apiFetch('/api/workflows/edit', {
      method:'POST',
      body:JSON.stringify({workflow_id:_currentWfId, instruction:instr})
    });
    if (r.success&&r.workflow) {
      loadWorkflow(r.workflow);
      toast('Edit applied!');
    } else {
      toast(r.error||'Edit failed',true);
    }
  } catch(e){toast('Error',true);}
}

// ── Load workflow list ─────────────────────────────────────────────────────
async function loadWorkflowList() {
  try {
    const r = await apiFetch('/api/canvas/workflows');
    const items = r.workflows || r.items || [];
    const listEl = document.getElementById('workflowList');
    if (items.length===0) {
      listEl.innerHTML='<div class="no-workflows">No workflows yet.<br>Create one from the Automations page or click + New above.</div>';
      return;
    }
    listEl.innerHTML = items.map(item => {
      const wid = item.id||item.workflow_id;
      const name = item.name||'Untitled';
      const nodeCount = (item.nodes||item.canvas_nodes||[]).length;
      return `<div class="workflow-item${_currentWfId===wid?' selected':''}" data-id="${wid}" onclick="loadWorkflowById('${wid}')">
        <div class="workflow-name">${escHtml(name)}</div>
        <div class="workflow-meta">${nodeCount} node${nodeCount!==1?'s':''} · ${item.status||'idle'}</div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('workflowList').innerHTML='<div class="no-workflows">Failed to load</div>';
  }
}

async function loadWorkflowById(id) {
  try {
    const r = await apiFetch('/api/canvas/workflows/'+id);
    if (r.success&&r.workflow) {
      // Map legacy format (nodes array) to canvas format
      const wf = r.workflow;
      wf.canvas_nodes = wf.nodes || [];
      loadWorkflow(wf);
    } else {
      toast('Failed to load workflow',true);
    }
  } catch(e){toast('Error',true);}
}

// ── Init ──────────────────────────────────────────────────────────────────
(async()=>{
  try {
    const r = await fetch('/api/auth/me',{credentials:'same-origin'});
    if (r.status===401){location.href='/ui/login';return;}
  } catch(e){}
  await loadWorkflowList();
  // Check for ?wf=id in URL
  const params = new URLSearchParams(location.search);
  if (params.get('wf')) {
    await loadWorkflowById(params.get('wf'));
  }
})();
</script>
