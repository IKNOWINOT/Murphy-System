<body style="--accent: #FFD166;">

<!-- Murphy error banner — shown automatically on 5xx fetch errors -->
<div id="murphy-error-banner" role="alert" aria-live="assertive" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#c0392b;color:#fff;padding:10px 16px;font-size:14px;align-items:center;gap:12px;">
  <span id="murphy-error-banner-msg" style="flex:1"></span>
  <button onclick="document.getElementById('murphy-error-banner').style.display='none'" aria-label="Dismiss" style="background:transparent;border:1px solid rgba(255,255,255,0.6);color:#fff;cursor:pointer;padding:2px 8px;border-radius:3px;font-size:13px;">✕</button>
</div>
<script>
function showMurphyError(msg) {
  var b = document.getElementById('murphy-error-banner');
  document.getElementById('murphy-error-banner-msg').textContent = msg || 'An unexpected error occurred.';
  b.style.display = 'flex';
}
(function() {
  var _origFetch = window.fetch;
  window.fetch = function() {
    return _origFetch.apply(this, arguments).then(function(resp) {
      if (resp.status >= 500) showMurphyError('Server error (' + resp.status + ') — ' + resp.url.split('?')[0]);
      return resp;
    });
  };
})();
</script>

<a class="murphy-skip-link" href="#wizard-content">Skip to content</a>

@keyframes mnPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(1.4)}}

<style>
@keyframes mnPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(1.4)}}

  <!-- Dynamic Content Area -->

<script src="/static/murphy-components.js"></script>
<script src="/static/murphy_auth.js"></script>
<script>
(function () {
  'use strict';

  var api = new MurphyAPI('/api');
  var theme = new MurphyTheme();
  theme.init();

  // ── State ──────────────────────────────────────────────
  var currentStep = 1;
  var chatHistory = [];
  var exchangeCount = 0;
  var mfgcGateSatisfaction = 0;
  var mfgcConfidence = 0;
  var mfgcReadyForPlan = false;
  var onboardingSessionId = 'onboarding-' + Date.now();
  var selectedModules = [];
  var selectedIntegrations = [];
  var credentials = {};
  var safetyLevel = 3;
  var recommendedTerminal = '/ui/dashboard';
  var userRole = ''; // 'founder_admin' | 'manager' | 'worker' | '' (unknown/not-yet-set)
  var librarianConfig = null;

  // ── Role-based dashboard access rules ─────────────────
  var ROLE_DASHBOARD_ACCESS = {
    'founder_admin': ['/ui/dashboard', '/ui/dashboard', '/ui/dashboard', '/ui/dashboard'],
    'owner':         ['/ui/dashboard', '/ui/dashboard', '/ui/dashboard', '/ui/dashboard'],
    'admin':         ['/ui/dashboard', '/ui/dashboard', '/ui/dashboard'],
    'manager':       ['/ui/dashboard', '/ui/dashboard'],
    'operator':      ['/ui/dashboard', '/ui/dashboard'],
    'worker':        ['/ui/dashboard'],
    'viewer':        ['/ui/dashboard'],
    '':              ['/ui/dashboard', '/ui/dashboard', '/ui/dashboard', '/ui/dashboard']
  };

  var ROLE_DEFAULT_TERMINAL = {
    'founder_admin': '/ui/dashboard',
    'owner':         '/ui/dashboard',
    'admin':         '/ui/dashboard',
    'manager':       '/ui/dashboard',
    'operator':      '/ui/dashboard',
    'worker':        '/ui/dashboard',
    'viewer':        '/ui/dashboard',
    '':              '/ui/dashboard'
  };

  // ── DOM refs ───────────────────────────────────────────
  var container = document.getElementById('step-container');
  var stepDots = document.querySelectorAll('.step-dot');

  // ── Safety level descriptions ──────────────────────────
  var safetyLabels = [
    '',
    'Always ask me first — Murphy will confirm every action before executing.',
    'Ask for important decisions — routine work proceeds, big calls need your OK.',
    'Handle routine tasks, ask for complex ones — a balanced mix of speed and control.',
    'Handle most things, alert me on changes — Murphy runs the show, you stay informed.',
    'Full automation — Murphy handles everything and sends you reports.'
  ];

  var safetyNames = [
    '',
    'Full HITL',
    'Important Decisions',
    'Balanced (Recommended)',
    'Mostly Autonomous',
    'Full Automation'
  ];

  // ── Helpers ────────────────────────────────────────────
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function (k) {
        if (k === 'className') { node.className = attrs[k]; }
        else if (k === 'textContent') { node.textContent = attrs[k]; }
        else if (k === 'innerHTML') { node.innerHTML = attrs[k]; }
        else if (k.slice(0, 2) === 'on') { node.addEventListener(k.slice(2).toLowerCase(), attrs[k]); }
        else { node.setAttribute(k, attrs[k]); }
      });
    }
    if (children) {
      children.forEach(function (c) {
        if (typeof c === 'string') { node.appendChild(document.createTextNode(c)); }
        else if (c) { node.appendChild(c); }
      });
    }
    return node;
  }

  function icon(name, size) {
    var s = size || 20;
    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', s);
    svg.setAttribute('height', s);
    svg.setAttribute('aria-hidden', 'true');
    var use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
    use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', 'static/murphy-icons.svg#icon-' + name);
    svg.appendChild(use);
    return svg;
  }

  function clearContainer() {
    container.innerHTML = '';
  }

  // ── Step dot updates ───────────────────────────────────
  function updateDots() {
    stepDots.forEach(function (dot) {
      var s = parseInt(dot.getAttribute('data-step'), 10);
      dot.classList.remove('step-dot-active', 'step-dot-done');
      if (s === currentStep) { dot.classList.add('step-dot-active'); }
      else if (s < currentStep) { dot.classList.add('step-dot-done'); }
    });
  }

  // ── Navigation buttons ─────────────────────────────────
  function navBar(opts) {
    var bar = el('div', { className: 'flex justify-between items-center', style: 'margin-top:1.5rem;' });
    if (opts.back) {
      var backBtn = el('button', {
        className: 'murphy-btn murphy-btn-ghost',
        textContent: '← Back',
        onClick: function () { goToStep(currentStep - 1); }
      });
      bar.appendChild(backBtn);
    } else {
      bar.appendChild(el('span'));
    }
    if (opts.next) {
      var nextBtn = el('button', {
        className: 'murphy-btn murphy-btn-primary',
        textContent: opts.nextLabel || 'Continue →',
        onClick: opts.next
      });
      if (opts.nextId) { nextBtn.id = opts.nextId; }
      if (opts.nextDisabled) { nextBtn.disabled = true; }
      bar.appendChild(nextBtn);
    }
    return bar;
  }

  // ── Go to step ─────────────────────────────────────────
  function goToStep(step) {
    if (step < 1 || step > 5) return;
    currentStep = step;
    updateDots();
    renderStep(step);
  }

  // ── Step router ────────────────────────────────────────
  function renderStep(step) {
    clearContainer();
    switch (step) {
      case 1: renderConversation(); break;
      case 2: renderPlan(); break;
      case 3: renderConnections(); break;
      case 4: renderSafety(); break;
      case 5: renderReady(); break;
    }
  }

  // ════════════════════════════════════════════════════════
  //  STEP 1 — The Conversation
  // ════════════════════════════════════════════════════════
  function renderConversation() {
    var wrapper = el('div', { className: 'flex flex-col', style: 'height:calc(100vh - 12rem);' });

    // Chat area
    var chatArea = el('div', { id: 'chat-area', className: 'flex-1', style: 'overflow-y:auto;padding-bottom:1rem;' });
    wrapper.appendChild(chatArea);

    // Render existing history
    chatHistory.forEach(function (msg) {
      chatArea.appendChild(chatBubble(msg.role, msg.content));
    });

    // Seed the greeting if first visit
    if (chatHistory.length === 0) {
      var greeting = "Hi! I'm Murphy's Librarian. Tell me about your business and what you'd like to automate — in your own words. No technical jargon needed.";
      chatHistory.push({ role: 'assistant', content: greeting });
      chatArea.appendChild(chatBubble('assistant', greeting));
    }

    // Input area
    var inputRow = el('div', { className: 'flex gap-2 items-end', style: 'margin-top:auto;' });
    var input = el('input', {
      type: 'text',
      className: 'murphy-input murphy-chat-input flex-1',
      placeholder: 'Tell Murphy about your business…',
      'aria-label': 'Chat message'
    });
    var sendBtn = el('button', {
      className: 'murphy-btn murphy-btn-primary murphy-btn-icon',
      'aria-label': 'Send message'
    });
    sendBtn.appendChild(icon('chat', 18));

    function sendMessage() {
      var text = input.value.trim();
      if (!text) return;
      input.value = '';

      chatHistory.push({ role: 'user', content: text });
      chatArea.appendChild(chatBubble('user', text));
      chatArea.scrollTop = chatArea.scrollHeight;

      // Send to MFGC (gate-aware chat)
      var typingEl = chatBubble('assistant', '…');
      typingEl.classList.add('murphy-animate-pulse');
      chatArea.appendChild(typingEl);
      chatArea.scrollTop = chatArea.scrollHeight;

      api.post('/onboarding/mfgc-chat', { session_id: onboardingSessionId, message: text })
        .then(function (res) {
          chatArea.removeChild(typingEl);
          var reply = (res.ok && res.data && (res.data.response || res.data.answer || res.data.reply_text || res.data.result || res.data.content || res.data.message))
            ? (res.data.response || res.data.answer || res.data.reply_text || res.data.result || res.data.content || res.data.message)
            : null;

          if (reply) {
            // Strip markdown formatting for cleaner display
            var cleanReply = reply
              .replace(/^#{1,3}\s*/gm, '')                        // remove ## headers
              .replace(/\*\*([^*]+)\*\*/g, '$1')                  // **bold** → plain
              .replace(/\*([^*]+)\*/g, '$1')                       // *italic* → plain
              .replace(/
{3,}/g, '

')                          // collapse blank lines
              .replace(/^\s*[-*]\s+/gm, '• ')                      // bullet points
              .trim();
            chatHistory.push({ role: 'assistant', content: cleanReply });
            chatArea.appendChild(chatBubble('assistant', cleanReply));

            // Update MFGC gate state
            if (res.data.gate_satisfaction !== undefined) {
              mfgcGateSatisfaction = res.data.gate_satisfaction;
            }
            if (res.data.confidence !== undefined) {
              mfgcConfidence = res.data.confidence;
            }
            if (res.data.ready_for_plan !== undefined) {
              mfgcReadyForPlan = !!res.data.ready_for_plan;
            }
            updateConfidenceBar();

            if (res.data.config) {
              librarianConfig = res.data.config;
              if (res.data.config.modules) selectedModules = res.data.config.modules;
              if (res.data.config.integrations) selectedIntegrations = res.data.config.integrations;
              if (res.data.config.recommended_terminal) recommendedTerminal = res.data.config.recommended_terminal;
              if (res.data.config.role) {
                var detectedRole = res.data.config.role;
                var roleChanged = detectedRole !== userRole;
                userRole = detectedRole;
                // Auto-set recommendedTerminal when role is first detected (unless manually overridden)
                if (roleChanged && !res.data.config.recommended_terminal) {
                  recommendedTerminal = ROLE_DEFAULT_TERMINAL[userRole] || '/ui/dashboard';
                }
              }
            }
          } else {
            var fallback = "Let me think about that. Can you tell me more about what you'd like to automate?";
            chatHistory.push({ role: 'assistant', content: fallback });
            chatArea.appendChild(chatBubble('assistant', fallback));
          }

          exchangeCount++;
          updateContinueVisibility();
          chatArea.scrollTop = chatArea.scrollHeight;
        })
        .catch(function () {
          chatArea.removeChild(typingEl);
          var errMsg = "I'm thinking... please send your message again in a moment.";
          chatHistory.push({ role: 'assistant', content: errMsg });
          chatArea.appendChild(chatBubble('assistant', errMsg));
          exchangeCount++;
          updateContinueVisibility();
          chatArea.scrollTop = chatArea.scrollHeight;
        });
    }

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { sendMessage(); }
    });
    sendBtn.addEventListener('click', sendMessage);

    inputRow.appendChild(input);
    inputRow.appendChild(sendBtn);
    wrapper.appendChild(inputRow);

    // Confidence progress bar (shows MFGC gate satisfaction)
    var confidenceBar = el('div', {
      id: 'confidence-bar-wrap',
      style: 'margin-top:.5rem;display:none;'
    });
    var confidenceLabel = el('div', {
      style: 'font-size:.75rem;color:var(--muted);margin-bottom:.2rem;'
    });
    confidenceLabel.textContent = 'Murphy confidence: 0% — start chatting to build context';
    var confidenceTrack = el('div', {
      style: 'height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;'
    });
    var confidenceFill = el('div', {
      id: 'confidence-fill',
      style: 'height:100%;width:0%;background:var(--teal,#00d4aa);border-radius:2px;transition:width .4s ease;'
    });
    confidenceTrack.appendChild(confidenceFill);
    confidenceBar.appendChild(confidenceLabel);
    confidenceBar.appendChild(confidenceTrack);
    wrapper.appendChild(confidenceBar);

    function updateConfidenceBar() {
      // Use confidence score (not gate_satisfaction which starts at 0)
      var confPct = Math.round(mfgcConfidence * 100);
      var gatePct = Math.round(mfgcGateSatisfaction * 100);
      var displayPct = Math.max(confPct, gatePct);
      // Each exchange also builds implicit confidence
      var impliedPct = Math.min(exchangeCount * 20, 80);
      displayPct = Math.max(displayPct, impliedPct);
      confidenceBar.style.display = 'block';
      var ready = displayPct >= 60 || mfgcReadyForPlan;
      confidenceLabel.textContent = ready
        ? 'Murphy confidence: ' + displayPct + '% ✓ Ready to continue!'
        : 'Murphy confidence: ' + displayPct + '% (answer a few more questions)';
      confidenceFill.style.width = Math.min(displayPct, 100) + '%';
      confidenceFill.style.background = ready ? 'var(--green,#00ff41)' : 'var(--teal,#00d4aa)';
    }

    // Continue button (shown when MFGC gates are ≥85% satisfied)
    var continueRow = el('div', {
      id: 'continue-row',
      className: 'flex justify-end',
      style: 'margin-top:1rem;display:none;'
    });
    var continueBtn = el('button', {
      className: 'murphy-btn murphy-btn-primary',
      textContent: 'Continue to Plan →',
      onClick: function () { goToStep(2); }
    });
    continueRow.appendChild(continueBtn);
    wrapper.appendChild(continueRow);

    container.appendChild(wrapper);

    function updateContinueVisibility() {
      var confPct = Math.round(mfgcConfidence * 100);
      var gatePct = Math.round(mfgcGateSatisfaction * 100);
      var impliedPct = exchangeCount * 20;
      var isReady = mfgcReadyForPlan
        || confPct >= 60
        || gatePct >= 60
        || impliedPct >= 60
        || exchangeCount >= 3;
      if (isReady) {
        continueRow.style.display = 'flex';
      }
    }
    updateContinueVisibility();

    // Auto-focus input
    input.focus();
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function chatBubble(role, text) {
    var bubbleClass = 'murphy-chat-bubble ' +
      (role === 'user' ? 'murphy-chat-bubble-user' : 'murphy-chat-bubble-assistant');
    var bubble = el('div', { className: bubbleClass });
    if (role === 'user') {
      bubble.textContent = text;
    } else {
      // Render assistant messages with markdown formatting
      if (typeof MurphyMarkdown !== 'undefined') {
        MurphyMarkdown.injectStyles();
        bubble.innerHTML = MurphyMarkdown.render(text);
      } else {
        bubble.textContent = text;
      }
    }
    return bubble;
  }

  // ════════════════════════════════════════════════════════
  //  STEP 2 — The Plan
  // ════════════════════════════════════════════════════════
  function renderPlan() {
    var heading = el('h1', {
      className: 'font-bold',
      textContent: "Here's what I'll set up for you",
      style: 'font-size:1.5rem;margin-bottom:1.5rem;'
    });
    container.appendChild(heading);

    // Fallback defaults if librarian didn't provide config
    if (selectedModules.length === 0) {
      selectedModules = [
        { id: 'task-engine', name: 'Task Engine', description: 'Core workflow and task management', enabled: true },
        { id: 'librarian', name: 'Librarian', description: 'AI assistant for knowledge and queries', enabled: true },
        { id: 'governance', name: 'Governance Gates', description: 'Approval and compliance controls', enabled: true }
      ];
    }
    if (selectedIntegrations.length === 0) {
      selectedIntegrations = [
        { id: 'email', name: 'Email (SMTP)', description: 'Send and receive email', enabled: true },
        { id: 'webhooks', name: 'Webhooks', description: 'Connect to external services', enabled: true }
      ];
    }

    // Modules section
    var modLabel = el('h2', {
      className: 'font-medium',
      textContent: 'Modules',
      style: 'font-size:1.1rem;margin-bottom:0.75rem;'
    });
    container.appendChild(modLabel);

    var modGrid = el('div', { className: 'grid gap-3', style: 'grid-template-columns:repeat(auto-fill,minmax(200px,1fr));margin-bottom:1.5rem;' });
    selectedModules.forEach(function (mod, idx) {
      modGrid.appendChild(planCard(mod, 'module', idx));
    });
    container.appendChild(modGrid);

    // Integrations section
    var intHeader = el('div', { className: 'flex justify-between items-center', style: 'margin-bottom:0.75rem;' });
    var intLabel = el('h2', {
      className: 'font-medium',
      textContent: 'Integrations',
      style: 'font-size:1.1rem;margin:0;'
    });
    intHeader.appendChild(intLabel);
    var browseAllBtn = el('button', {
      className: 'murphy-btn murphy-btn-secondary',
      textContent: '📋 Browse All Integrations',
      id: 'btn-browse-all-integrations',
      style: 'font-size:0.8rem;padding:0.3rem 0.75rem;'
    });
    browseAllBtn.addEventListener('click', function () { toggleFullCatalog(); });
    intHeader.appendChild(browseAllBtn);
    container.appendChild(intHeader);

    var intGrid = el('div', { className: 'grid gap-3', style: 'grid-template-columns:repeat(auto-fill,minmax(200px,1fr));margin-bottom:1rem;' });
    selectedIntegrations.forEach(function (integ, idx) {
      intGrid.appendChild(planCard(integ, 'integration', idx));
    });
    container.appendChild(intGrid);

    // Full catalog panel (hidden by default)
    var catalogPanel = el('div', {
      id: 'full-catalog-panel',
      style: 'display:none;margin-bottom:1.5rem;border:1px solid #30363d;border-radius:8px;padding:1rem;background:#0d1117;max-height:400px;overflow-y:auto;'
    });
    var catalogLoading = el('p', { textContent: 'Loading full catalog…', style: 'color:#8b949e;' });
    catalogPanel.appendChild(catalogLoading);
    container.appendChild(catalogPanel);

    // "Anything else?" input
    var extraRow = el('div', { className: 'flex gap-2', style: 'margin-bottom:1rem;' });
    var extraInput = el('input', {
      type: 'text',
      className: 'murphy-input flex-1',
      placeholder: 'Anything else you need?',
      'aria-label': 'Additional requests'
    });
    var extraBtn = el('button', {
      className: 'murphy-btn murphy-btn-secondary',
      textContent: 'Ask Librarian',
      onClick: function () {
        var q = extraInput.value.trim();
        if (!q) return;
        extraInput.value = '';
        api.post('/librarian/ask', { question: q, context: 'onboarding' })
          .then(function (res) {
            if (res.ok && res.data) {
              if (res.data.config && res.data.config.modules) {
                selectedModules = res.data.config.modules;
                goToStep(2);
              }
              if (res.data.config && res.data.config.integrations) {
                selectedIntegrations = res.data.config.integrations;
                goToStep(2);
              }
            }
          });
      }
    });
    extraRow.appendChild(extraInput);
    extraRow.appendChild(extraBtn);
    container.appendChild(extraRow);

    // Navigation
    container.appendChild(navBar({
      back: true,
      next: function () { goToStep(3); },
      nextLabel: 'Looks good! →'
    }));
  }

  var _catalogLoaded = false;
  function toggleFullCatalog() {
    var panel = document.getElementById('full-catalog-panel');
    if (!panel) return;
    var visible = panel.style.display !== 'none';
    if (visible) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    if (_catalogLoaded) return;

    // Fetch from both the core catalog and the universal adapter
    var base = window.location.origin;
    Promise.all([
      fetch(base + '/api/integrations').then(function (r) { return r.json(); }).catch(function () { return { integrations: [] }; }),
      fetch(base + '/api/universal-integrations/services').then(function (r) { return r.json(); }).catch(function () { return { services: [] }; })
    ]).then(function (results) {
      var core = results[0].integrations || [];
      var universal = (results[1].services || []).map(function (s) {
        return { id: s.name || s.id, name: s.name, type: s.category || 'other', description: s.description || '' };
      });

      // Merge and deduplicate by id/name
      var seen = {};
      var all = [];
      core.concat(universal).forEach(function (item) {
        var key = (item.id || item.name || '').toLowerCase();
        if (key && !seen[key]) { seen[key] = true; all.push(item); }
      });

      // Group by type/category
      var groups = {};
      all.forEach(function (item) {
        var cat = (item.type || item.category || 'other').toLowerCase();
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(item);
      });

      panel.innerHTML = '';
      var heading = el('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;' });
      heading.appendChild(el('h3', { textContent: 'All Available Integrations (' + all.length + ')', style: 'margin:0;font-size:1rem;color:#00D4AA;' }));
      var closeBtn = el('button', { textContent: '✕', className: 'murphy-btn murphy-btn-ghost', style: 'padding:0.2rem 0.5rem;font-size:0.9rem;' });
      closeBtn.addEventListener('click', function () { panel.style.display = 'none'; });
      heading.appendChild(closeBtn);
      panel.appendChild(heading);

      Object.keys(groups).sort().forEach(function (cat) {
        var catLabel = el('h4', { textContent: cat.charAt(0).toUpperCase() + cat.slice(1).replace(/_/g, ' '), style: 'font-size:0.85rem;color:#8b949e;margin:0.75rem 0 0.4rem;text-transform:uppercase;letter-spacing:0.05em;' });
        panel.appendChild(catLabel);

        var catGrid = el('div', { style: 'display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.5rem;' });
        groups[cat].forEach(function (item) {
          var isSelected = selectedIntegrations.some(function (si) {
            return si.id === item.id || si.name === item.name;
          });
          var btn = el('button', {
            className: 'murphy-btn ' + (isSelected ? 'murphy-btn-primary' : 'murphy-btn-ghost'),
            textContent: (item.icon ? item.icon + ' ' : '') + (item.name || item.id),
            title: item.description || '',
            style: 'font-size:0.8rem;padding:0.35rem 0.6rem;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;'
          });
          btn.addEventListener('click', function () {
            if (isSelected) return;
            selectedIntegrations.push({ id: item.id || item.name, name: item.name, description: item.description || '', enabled: true });
            _catalogLoaded = false;
            goToStep(2);
          });
          catGrid.appendChild(btn);
        });
        panel.appendChild(catGrid);
      });

      _catalogLoaded = true;
    });
  }

  function planCard(item, type, idx) {
    var card = el('div', {
      className: 'murphy-card',
      role: 'button',
      tabindex: '0',
      'aria-pressed': item.enabled !== false ? 'true' : 'false',
      style: item.enabled === false ? 'opacity:0.5;' : ''
    });

    var header = el('div', { className: 'murphy-card-header flex justify-between items-center' });
    var nameEl = el('span', { className: 'font-bold', textContent: item.name });
    var toggleEl = el('span', {
      textContent: item.enabled !== false ? '✓' : '○',
      style: 'cursor:pointer;font-size:1.2rem;'
    });
    header.appendChild(nameEl);
    header.appendChild(toggleEl);
    card.appendChild(header);

    if (item.description) {
      var body = el('div', { className: 'murphy-card-body' });
      body.appendChild(el('p', { textContent: item.description, style: 'font-size:0.85rem;' }));
      card.appendChild(body);
    }

    card.addEventListener('click', function () {
      var list = type === 'module' ? selectedModules : selectedIntegrations;
      list[idx].enabled = !(list[idx].enabled !== false);
      goToStep(2);
    });

    card.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
    });

    return card;
  }

  // ════════════════════════════════════════════════════════
  //  STEP 3 — Connections
  // ════════════════════════════════════════════════════════
  function renderConnections() {
    var heading = el('h1', {
      className: 'font-bold',
      textContent: "Let's connect your tools",
      style: 'font-size:1.5rem;margin-bottom:1.5rem;'
    });
    container.appendChild(heading);

    var activeIntegrations = selectedIntegrations.filter(function (i) { return i.enabled !== false; });

    if (activeIntegrations.length === 0) {
      var empty = el('div', { className: 'murphy-empty-state' });
      empty.appendChild(el('div', { className: 'murphy-empty-state-icon' }, [icon('check', 40)]));
      empty.appendChild(el('p', { className: 'murphy-empty-state-title', textContent: 'No credentials needed' }));
      empty.appendChild(el('p', { className: 'murphy-empty-state-message', textContent: "You're all set! No integrations require credentials." }));
      container.appendChild(empty);
    } else {
      activeIntegrations.forEach(function (integ) {
        container.appendChild(connectionCard(integ));
      });
    }

    container.appendChild(navBar({
      back: true,
      next: function () { goToStep(4); },
      nextLabel: 'Continue →'
    }));
  }

  function connectionCard(integ) {
    var card = el('div', { className: 'murphy-card', style: 'margin-bottom:1rem;' });

    var header = el('div', { className: 'murphy-card-header flex items-center gap-2' });
    header.appendChild(icon('plug', 20));
    header.appendChild(el('span', { className: 'font-bold', textContent: integ.name }));
    card.appendChild(header);

    var body = el('div', { className: 'murphy-card-body' });

    var hint = integ.credentialHint || ('API key or credentials for ' + integ.name);
    body.appendChild(el('p', { textContent: hint, style: 'font-size:0.85rem;margin-bottom:0.75rem;' }));

    // Password field with visibility toggle
    var fieldRow = el('div', { className: 'flex gap-2 items-center' });
    var field = el('input', {
      type: 'password',
      className: 'murphy-input flex-1',
      placeholder: 'Enter credentials…',
      'aria-label': integ.name + ' credentials',
      autocomplete: 'off'
    });

    var toggleVis = el('button', {
      className: 'murphy-btn murphy-btn-ghost murphy-btn-icon',
      'aria-label': 'Toggle visibility',
      onClick: function () {
        var isHidden = field.type === 'password';
        field.type = isHidden ? 'text' : 'password';
        toggleVis.innerHTML = '';
        toggleVis.appendChild(icon(isHidden ? 'unlock' : 'lock', 16));
      }
    });
    toggleVis.appendChild(icon('lock', 16));

    fieldRow.appendChild(field);
    fieldRow.appendChild(toggleVis);
    body.appendChild(fieldRow);

    // Save / Skip row
    var actionRow = el('div', { className: 'flex justify-between items-center', style: 'margin-top:0.75rem;' });

    var saveBtn = el('button', {
      className: 'murphy-btn murphy-btn-primary murphy-btn-sm',
      textContent: 'Save',
      onClick: function () {
        var val = field.value.trim();
        if (!val) return;
        saveBtn.classList.add('murphy-btn-loading');
        saveBtn.disabled = true;
        api.post('/credentials/store', { integration: integ.id, credential: val })
          .then(function (res) {
            saveBtn.classList.remove('murphy-btn-loading');
            saveBtn.disabled = false;
            if (res.ok) {
              credentials[integ.id] = true;
              savedLabel.textContent = '✓ Saved';
              savedLabel.style.display = 'inline';
              field.value = '';
              field.disabled = true;
            } else {
              savedLabel.textContent = 'Error saving — try again';
              savedLabel.style.display = 'inline';
            }
          })
          .catch(function () {
            saveBtn.classList.remove('murphy-btn-loading');
            saveBtn.disabled = false;
            savedLabel.textContent = 'Connection error (CORS/network) — try again';
            savedLabel.style.display = 'inline';
            showMurphyError('Connection error saving integrations — try again.');
          });
      }
    });

    var skipLink = el('button', {
      className: 'murphy-btn murphy-btn-ghost murphy-btn-sm',
      textContent: 'Skip for now',
      onClick: function () {
        card.style.opacity = '0.5';
        field.disabled = true;
        saveBtn.disabled = true;
        savedLabel.textContent = 'Skipped';
        savedLabel.style.display = 'inline';
      }
    });

    var savedLabel = el('span', {
      style: 'display:none;font-size:0.85rem;margin-left:0.5rem;'
    });

    actionRow.appendChild(el('div', { className: 'flex items-center gap-2' }, [saveBtn, savedLabel]));
    actionRow.appendChild(skipLink);
    body.appendChild(actionRow);

    card.appendChild(body);
    return card;
  }

  // ════════════════════════════════════════════════════════
  //  STEP 4 — Safety & Control
  // ════════════════════════════════════════════════════════
  function renderSafety() {
    var heading = el('h1', {
      className: 'font-bold',
      textContent: 'How much should Murphy handle?',
      style: 'font-size:1.5rem;margin-bottom:1.5rem;'
    });
    container.appendChild(heading);

    // Range slider
    var sliderCard = el('div', { className: 'murphy-card' });
    var sliderBody = el('div', { className: 'murphy-card-body' });

    var levelLabel = el('div', {
      id: 'safety-level-name',
      className: 'font-bold',
      textContent: safetyNames[safetyLevel],
      style: 'text-align:center;font-size:1.1rem;margin-bottom:1rem;'
    });
    sliderBody.appendChild(levelLabel);

    var slider = el('input', {
      type: 'range',
      min: '1',
      max: '5',
      value: String(safetyLevel),
      className: 'murphy-input',
      'aria-label': 'Automation level',
      'aria-valuemin': '1',
      'aria-valuemax': '5',
      'aria-valuenow': String(safetyLevel),
      style: 'width:100%;cursor:pointer;'
    });
    sliderBody.appendChild(slider);

    // Tick labels
    var ticks = el('div', { className: 'flex justify-between', style: 'font-size:0.75rem;margin-top:0.25rem;' });
    ticks.appendChild(el('span', { textContent: 'Ask me' }));
    ticks.appendChild(el('span', { textContent: 'Balanced' }));
    ticks.appendChild(el('span', { textContent: 'Automate' }));
    sliderBody.appendChild(ticks);

    var description = el('p', {
      id: 'safety-description',
      textContent: safetyLabels[safetyLevel],
      style: 'margin-top:1.25rem;font-size:0.9rem;text-align:center;'
    });
    sliderBody.appendChild(description);

    slider.addEventListener('input', function () {
      safetyLevel = parseInt(slider.value, 10);
      slider.setAttribute('aria-valuenow', String(safetyLevel));
      levelLabel.textContent = safetyNames[safetyLevel];
      description.textContent = safetyLabels[safetyLevel];
    });

    sliderCard.appendChild(sliderBody);
    container.appendChild(sliderCard);

    // Terminal / dashboard recommendation
    var termCard = el('div', { className: 'murphy-card', style: 'margin-top:1.5rem;' });
    var termBody = el('div', { className: 'murphy-card-body' });

    var allDashboards = [
      { value: '/ui/dashboard', label: 'Unified Dashboard', desc: 'Full overview of everything' },
      { value: '/ui/dashboard', label: 'Worker Dashboard', desc: 'Task-focused view' },
      { value: '/ui/dashboard', label: 'Manager Dashboard', desc: 'Team and project oversight' },
      { value: '/ui/dashboard', label: 'Admin Dashboard', desc: 'System configuration and control' }
    ];

    var allowedValues = ROLE_DASHBOARD_ACCESS[userRole] || ROLE_DASHBOARD_ACCESS[''];
    // Guard: ensure allowedValues is never empty (fall back to all dashboards)
    if (!allowedValues || allowedValues.length === 0) { allowedValues = ROLE_DASHBOARD_ACCESS['']; }
    var dashboards = allDashboards.filter(function (db) {
      return allowedValues.indexOf(db.value) > -1;
    });
    // Guard: if filtering produced no results, show all dashboards
    if (dashboards.length === 0) { dashboards = allDashboards.slice(); }

    // Ensure recommendedTerminal is within allowed set
    if (allowedValues.indexOf(recommendedTerminal) === -1) {
      recommendedTerminal = ROLE_DEFAULT_TERMINAL[userRole] || allowedValues[0] || '/ui/dashboard';
    }

    var recDash = dashboards.filter(function (db) { return db.value === recommendedTerminal; })[0]
      || dashboards[0];

    if (dashboards.length === 1) {
      termBody.appendChild(el('p', {
        className: 'font-medium',
        textContent: 'Based on your role, your dashboard is the ' + dashboards[0].label + '.',
        style: 'margin-bottom:1rem;'
      }));
      termBody.appendChild(el('p', {
        textContent: dashboards[0].label + ' — ' + dashboards[0].desc,
        style: 'font-size:0.9rem;'
      }));
      recommendedTerminal = dashboards[0].value;
    } else {
      var recLabel = recDash ? recDash.label : 'Unified Dashboard';
      termBody.appendChild(el('p', {
        className: 'font-medium',
        textContent: "Based on your role, I'd recommend the " + recLabel + " dashboard as your home base. You also have access to:",
        style: 'margin-bottom:1rem;'
      }));

      dashboards.forEach(function (db) {
        var radioRow = el('label', {
          className: 'flex items-center gap-2',
          style: 'cursor:pointer;padding:0.5rem 0;'
        });

        var radio = el('input', {
          type: 'radio',
          name: 'terminal-choice',
          value: db.value
        });
        if (db.value === recommendedTerminal) { radio.checked = true; }
        radio.addEventListener('change', function () {
          recommendedTerminal = db.value;
        });

        radioRow.appendChild(radio);
        radioRow.appendChild(el('div', {}, [
          el('span', { className: 'font-medium', textContent: db.label }),
          el('span', { textContent: ' — ' + db.desc, style: 'font-size:0.85rem;' })
        ]));
        termBody.appendChild(radioRow);
      });
    }

    termCard.appendChild(termBody);
    container.appendChild(termCard);

    container.appendChild(navBar({
      back: true,
      next: function () { goToStep(5); },
      nextLabel: 'Continue →'
    }));
  }

  // ════════════════════════════════════════════════════════
  //  STEP 5 — Ready!
  // ════════════════════════════════════════════════════════
  function renderReady() {
    var heading = el('h1', {
      className: 'font-bold',
      textContent: 'Murphy is ready!',
      style: 'font-size:1.5rem;margin-bottom:1.5rem;text-align:center;'
    });
    container.appendChild(heading);

    var readyIcon = el('div', { className: 'flex justify-center', style: 'margin-bottom:1.5rem;' });
    readyIcon.appendChild(icon('check', 56));
    container.appendChild(readyIcon);

    // Summary card
    var summary = el('div', { className: 'murphy-card' });
    var summaryBody = el('div', { className: 'murphy-card-body' });

    // Modules
    var enabledMods = selectedModules.filter(function (m) { return m.enabled !== false; });
    if (enabledMods.length) {
      summaryBody.appendChild(el('p', { className: 'font-bold', textContent: 'Modules', style: 'margin-bottom:0.25rem;' }));
      var modList = el('ul', { style: 'margin-bottom:1rem;padding-left:1.25rem;' });
      enabledMods.forEach(function (m) {
        modList.appendChild(el('li', { textContent: m.name }));
      });
      summaryBody.appendChild(modList);
    }

    // Integrations
    var enabledInts = selectedIntegrations.filter(function (i) { return i.enabled !== false; });
    if (enabledInts.length) {
      summaryBody.appendChild(el('p', { className: 'font-bold', textContent: 'Integrations', style: 'margin-bottom:0.25rem;' }));
      var intList = el('ul', { style: 'margin-bottom:1rem;padding-left:1.25rem;' });
      enabledInts.forEach(function (i) {
        var status = credentials[i.id] ? ' (credentials saved)' : ' (no credentials yet)';
        intList.appendChild(el('li', { textContent: i.name + status }));
      });
      summaryBody.appendChild(intList);
    }

    // Safety level
    summaryBody.appendChild(el('p', { className: 'font-bold', textContent: 'Automation Level', style: 'margin-bottom:0.25rem;' }));
    summaryBody.appendChild(el('p', { textContent: safetyNames[safetyLevel] + ' — ' + safetyLabels[safetyLevel], style: 'margin-bottom:1rem;font-size:0.9rem;' }));

    // Dashboard
    summaryBody.appendChild(el('p', { className: 'font-bold', textContent: 'Dashboard', style: 'margin-bottom:0.25rem;' }));
    var termLabel = recommendedTerminal.replace('terminal_', '').replace('.html', '');
    summaryBody.appendChild(el('p', { textContent: termLabel.charAt(0).toUpperCase() + termLabel.slice(1), style: 'font-size:0.9rem;' }));

    summary.appendChild(summaryBody);
    container.appendChild(summary);

    // Submit config and go
    var launchRow = el('div', { className: 'flex justify-center', style: 'margin-top:2rem;gap:1rem;flex-wrap:wrap;' });

    // Primary CTA: go to Production Wizard (first-time setup flow)
    var productionBtn = el('button', {
      className: 'murphy-btn murphy-btn-primary murphy-btn-lg',
      textContent: '🏭 Set Up Your First Production →',
      onClick: function () {
        productionBtn.classList.add('murphy-btn-loading');
        productionBtn.disabled = true;
        dashboardBtn.disabled = true;
        var config = {
          modules: enabledMods.map(function (m) { return m.id; }),
          integrations: enabledInts.map(function (i) { return i.id; }),
          safety_level: safetyLevel,
          terminal: recommendedTerminal,
          role: userRole,
          chat_history: chatHistory
        };
        api.post('/onboarding/wizard/generate-config', config)
          .then(function () {
            try { localStorage.setItem('murphy_onboarded', '1'); } catch(e) { console.warn('localStorage unavailable:', e.message); }
            try { sessionStorage.setItem('murphy_role', userRole); } catch(e) { console.warn('sessionStorage unavailable:', e.message); }
            window.location.href = '/ui/production-wizard';
          })
          .catch(function () {
            try { localStorage.setItem('murphy_onboarded', '1'); } catch(e) { console.warn('localStorage unavailable:', e.message); }
            try { sessionStorage.setItem('murphy_role', userRole); } catch(e) { console.warn('sessionStorage unavailable:', e.message); }
            window.location.href = '/ui/production-wizard';
          });
      }
    });
    launchRow.appendChild(productionBtn);

    // Secondary CTA: go straight to dashboard
    var dashboardBtn = el('button', {
      className: 'murphy-btn murphy-btn-secondary murphy-btn-lg',
      textContent: 'Skip to Dashboard →',
      onClick: function () {
        dashboardBtn.classList.add('murphy-btn-loading');
        dashboardBtn.disabled = true;
        productionBtn.disabled = true;
        var config = {
          modules: enabledMods.map(function (m) { return m.id; }),
          integrations: enabledInts.map(function (i) { return i.id; }),
          safety_level: safetyLevel,
          terminal: recommendedTerminal,
          role: userRole,
          chat_history: chatHistory
        };
        api.post('/onboarding/wizard/generate-config', config)
          .then(function () {
            try { localStorage.setItem('murphy_onboarded', '1'); } catch(e) { console.warn('localStorage unavailable:', e.message); }
            try { sessionStorage.setItem('murphy_role', userRole); } catch(e) { console.warn('sessionStorage unavailable:', e.message); }
            window.location.href = recommendedTerminal;
          })
          .catch(function () {
            try { localStorage.setItem('murphy_onboarded', '1'); } catch(e) { console.warn('localStorage unavailable:', e.message); }
            try { sessionStorage.setItem('murphy_role', userRole); } catch(e) { console.warn('sessionStorage unavailable:', e.message); }
            window.location.href = recommendedTerminal;
          });
      }
    });
    launchRow.appendChild(dashboardBtn);
    container.appendChild(launchRow);

    // Tip text
    container.appendChild(el('p', {
      textContent: 'The Production Wizard will help you create your first automated workflow — you can always access your dashboard later.',
      style: 'text-align:center;font-size:0.8rem;color:var(--text-muted);margin-top:0.75rem;'
    }));

    container.appendChild(navBar({ back: true }));
  }

  // ── Boot ───────────────────────────────────────────────
  window._murphyGoToStep = goToStep;  // expose for testing
  updateDots();
  renderStep(1);
})();
</script>

<script src="/static/murphy-session-context.js"></script>
<script src="/static/murphy-nav.js"></script>
</body>
</html>
