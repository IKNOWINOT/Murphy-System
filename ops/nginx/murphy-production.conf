# Murphy System — Nginx Production Vhost
# Copyright © 2020 Inoni Limited Liability Company | License: BSL-1.1
#
# Install:
#   sudo cp config/nginx/murphy-production.conf /etc/nginx/sites-available/murphy-production
#   sudo ln -sf /etc/nginx/sites-available/murphy-production \
#                /etc/nginx/sites-enabled/murphy-production
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (Let's Encrypt):
#   sudo certbot --nginx -d murphy.systems -d mail.murphy.systems
#
# What this config routes:
#   /                  → Murphy API :8000  (FastAPI app + static website HTML)
#   /api/              → Murphy API :8000  (REST API)
#   /ui/               → Murphy API :8000  (UI pages served by FastAPI)
#   /static/           → Murphy API :8000  (CSS/JS/assets)
#   /docs              → Murphy API :8000  (Swagger UI)
#   /metrics           → Murphy API :8000  (Prometheus scrape endpoint)
#   /grafana/          → Grafana    :3000  (dashboards — authenticated)
#   /mail/             → Roundcube  :8443  (webmail UI)
#   /health            → Murphy API :8000  (load-balancer probe, no logs)
# ---------------------------------------------------------------------------

# ── Upstream backends ───────────────────────────────────────────────────────
upstream murphy_api {
    # PATCH-OPT-1: Graceful deploy — wait up to 60s for upstream to come back
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# PATCH-OPT-5: murphy-edge (identity + auth + system) — lightweight gateway
upstream murphy_edge {
    server 127.0.0.1:8011 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

# PATCH-OPT-6: murphy-ops (vault + audit + sorting hat)
upstream murphy_ops {
    server 127.0.0.1:8003 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

# PATCH-OPT-7: murphy-robotics (household + picar + voice)
upstream murphy_robotics {
    server 127.0.0.1:8004 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream murphy_grafana {
    server 127.0.0.1:3000;
    keepalive 8;
}

upstream murphy_webmail {
    server 127.0.0.1:8444;
    keepalive 8;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name murphy.systems www.murphy.systems mail.murphy.systems;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }


    # Rate-limit demo/forge endpoints — PATCH-067
    location /api/demo/ {
        limit_req zone=murphy_demo burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://murphy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Rate-limit auth endpoints — PATCH-067
    location /api/auth/login {
        limit_req zone=murphy_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://murphy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name murphy.systems www.murphy.systems;

    # R383 tenant chat — routed to dedicated service on 8082
    # _R445_TENANT_API_EXCEPTIONS — these go to the main substrate, not legacy 8082
    location /verify/ {
        add_header X-Murphy-Loc "verify-443" always;
        limit_req zone=murphy_verify burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://murphy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/webhook/ {
        add_header X-Murphy-Loc "webhook-443" always;
        limit_req zone=murphy_webhook burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://murphy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/chat {
        add_header X-Murphy-Loc "chat-443" always;
        limit_req zone=murphy_chat burst=15 nodelay;
        limit_req_status 429;
        proxy_pass http://murphy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/tenant/check-slug { proxy_pass http://murphy_api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location ~ ^/api/tenant/by-slug/ { proxy_pass http://murphy_api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /api/tenant/claim-slug { proxy_pass http://murphy_api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /api/tenant/create { proxy_pass http://murphy_api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/tenant/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # R384 HITL service — port 8083
    location /api/hitl-v2/ {
        proxy_pass http://127.0.0.1:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # R387 chat-v2 — port 8084 (DeepInfra + Ollama router)
    # R604 — Agents visible surface (port 8092)
    location = /agents {
        proxy_pass http://127.0.0.1:8092/agents;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/agents {
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/chat-v2 {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # R615.11 spawn service — port 8095 (auth-gated chat→exec routing)
    # Requires X-API-Key matching MURPHY_FOUNDER_KEY. The if-block lets us
    # cleanly return 401 when the header is missing or wrong.
    # ── R23 / cap A.8 — signed-URL private file downloads ─────────
    location /api/files/ {
        proxy_pass         http://127.0.0.1:8095;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/r615/ {
        if ($http_x_api_key != "fc351cea4087fc48dc730939b3a5e46b8c4e559a37f5281abae437376610ebce") {
            return 401;
        }
        proxy_pass http://127.0.0.1:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }


    # R389 SMS service — port 8086
    location /api/sms/ {
        proxy_pass http://127.0.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Twilio-Signature $http_x_twilio_signature;
        proxy_read_timeout 30s;
    }

    # R395 Cascade demo + public queue + org (NO AUTH)
    location /api/public/cascade/ {
        proxy_pass http://127.0.0.1:8089;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }
    location = /api/public/queue {
        proxy_pass http://127.0.0.1:8089;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }
    location = /api/public/org {
        proxy_pass http://127.0.0.1:8089;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # SLICE-F (2026-06-07) — /api/public/stats lives on monolith :8000,
    # not Public Pulse :8088. Exact-match takes precedence over the
    # prefix block below.
    location = /api/public/stats {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # R394 Public Pulse — landing-page live system feed (NO AUTH)
    location /api/public/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        # Public — explicitly no auth required
    }

    # R391 Mesh State aggregator — port 8087
    location /api/mesh/ {
        proxy_pass http://127.0.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_read_timeout 15s;
    }

    # ── TLS (managed by certbot — do not edit manually) ─────────────────────
    # ssl_certificate     /etc/letsencrypt/live/murphy.systems/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/murphy.systems/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    #
    # Self-signed fallback (dev / first boot before certbot runs):
    ssl_certificate     /etc/letsencrypt/live/murphy.systems/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/murphy.systems/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"          always;  # PATCH-198: aligned with app middleware
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy   "same-origin" always;       # PATCH-198
    add_header Cross-Origin-Resource-Policy "same-site" always;         # PATCH-198
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;  # PATCH-198: expanded
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;  # PATCH-198: added preload
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com data:; frame-src 'self' https://js.stripe.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;  # PATCH-198: removed unsafe-eval, tightened

    client_max_body_size 50M;

    # ── Shared proxy headers ─────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection        "";

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    120s;

    # ── Health probe (no access logs — used by load balancers) ──────────────
    # PATCH-OPT-LIVE: route critical patch modules to dedicated services
    # All proxy_pass blocks include connection retry → monolith fallback for safety
    
    # ── PATCH-412 CapabilityCube → ops:8003
    location /api/cube/ {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── PATCH-405 Secrets Vault → ops:8003
    location /api/vault/ {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_read_timeout 30s;
    }
    location = /vault {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── PATCH-407 Security Audit → ops:8003
    location /api/audit/ {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location = /audit {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── PATCH-403 Sorting Hat → ops:8003
    location /api/client-solutions/ {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location = /healthz-ops {
        proxy_pass http://murphy_ops/healthz;
        access_log off;
    }

    # ── PATCH-408 Household + PiCar → robotics:8004
    location /api/household/ {
        proxy_pass http://murphy_robotics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location /api/picarx/ {
        proxy_pass http://murphy_robotics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location = /household {
        proxy_pass http://murphy_robotics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /picarx {
        proxy_pass http://murphy_robotics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── PATCH-406a Voice Telephony → robotics:8004
    location /api/phone/ {
        proxy_pass http://murphy_robotics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
    location = /phone {
        proxy_pass http://murphy_robotics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz-robotics {
        proxy_pass http://murphy_robotics/healthz;
        access_log off;
    }

    # PATCH-OPT-9-event-spine: PATCH-400 Event Spine → ops:8003
    # Note: /api/events/* is exclusive to PATCH-400; /api/hitl/* has many
    # other handlers in the monolith, so we route only the SPECIFIC paths
    # owned by patch400 (exact-match locations).
    location /api/events/ {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location = /api/hitl/route {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/hitl/decisions {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/api/hitl/decision/[^/]+$ {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/api/hitl/decision/[^/]+/(respond|label)$ {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/hitl/learn/by-pattern {
        proxy_pass http://murphy_ops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PATCH-OPT-8-identity: PATCH-410 Unified Identity → edge:8011
    location /api/identity/ {
        proxy_pass http://murphy_edge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # PATCH-439: PATCH-417/425/435/438 outbound mail queue → edge:8011
    # The monolith has a 'stub_v1' implementation that LIES about sending.
    # All real mail send + audit + autonomy logic lives on murphy-edge.
    location /api/mail/outbound/ {
        proxy_pass http://murphy_edge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location = /devices {
        proxy_pass http://murphy_edge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }



    # PATCH-OPT-5-routes: routes handled by murphy-edge (fast restart, low memory)
    location /api/system/ {
        proxy_pass http://murphy_edge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/internal/ {
        proxy_pass http://murphy_edge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/bus/ {
        proxy_pass http://murphy_edge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz-edge {
        proxy_pass http://murphy_edge/healthz;
        access_log off;
    }

    location = /health {
        proxy_pass http://murphy_api/api/health;
        access_log off;
    }

    # ── Prometheus metrics ───────────────────────────────────────────────────
    # Restrict to internal network — remove the allow/deny block if using
    # a Prometheus instance on a different host.
    location = /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
        proxy_pass http://murphy_api/metrics;
        access_log off;
    }

    # ── Grafana dashboards ───────────────────────────────────────────────────
    # GF_SERVER_SERVE_FROM_SUB_PATH=true means Grafana registers its routes
    # at /grafana/ internally.  Do NOT strip the prefix — proxy the full path.
    location /grafana/ {
        proxy_pass http://murphy_grafana;
        proxy_set_header Host $host;
    }

    # ── Roundcube webmail ────────────────────────────────────────────────────
    # Roundcube does not support subpath serving natively.  We strip /mail/
    # so Roundcube receives requests at root /.  Roundcube uses relative URLs
    # internally so page navigation works; set $config['base_url'] in
    # config/roundcube/config.inc.php if absolute redirects are needed.
    # Catch Roundcube post-login redirects that land on /?_task=*
    # and transparently proxy them through /mail/
    location ~ ^/\?_task= {
        return 301 /mail$request_uri;
    }

    location /mail/ {
        proxy_pass         http://murphy_webmail/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_buffering    off;

        # Rewrite Location headers from Roundcube (post-login redirect)
        proxy_redirect ~^(https?://[^/]+)?/\?(.*)$ /mail/?$2;

        # Rewrite session cookie path so browser sends it back correctly
        proxy_cookie_path / /mail/;

        # Rewrite root-relative URLs Roundcube generates back to /mail/ prefix
        sub_filter_once off;
        sub_filter_types text/html text/javascript application/javascript;
        sub_filter 'action="/?_task=' 'action="/mail/?_task=';
        sub_filter "/?_task="         "/mail/?_task=";
        sub_filter '"comm_path":"/'   '"comm_path":"/mail/';
        sub_filter "'comm_path':'/'"  "'comm_path':'/mail/'";
    }

    # ── Static assets (JS / CSS) — long-lived cache, fine because filenames
    #    should be versioned or cache-busted by the app

    location = /ui/billing {
        alias /opt/Murphy-System/static/billing.html;
        default_type text/html;
    }
    location = /ui/settings {
        alias /opt/Murphy-System/static/settings.html;
        default_type text/html;
    }
    location = /ui/account {
        alias /opt/Murphy-System/static/account.html;
        default_type text/html;
    }
    location = /tenant/billing {
        alias /opt/Murphy-System/static/billing.html;
        default_type text/html;
    }
    location = /tenant/settings {
        alias /opt/Murphy-System/static/settings.html;
        default_type text/html;
    }
    location = /tenant/account {
        alias /opt/Murphy-System/static/account.html;
        default_type text/html;
    }
    location = /static/_tenant_shared.css {
        alias /opt/Murphy-System/static/_tenant_shared.css;
        default_type text/css;
    }

    location /webmail/ {
        proxy_pass http://127.0.0.1:8444/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /status {
        alias /opt/Murphy-System/static/cyborg-status.html;
        default_type text/html;
    }

    location = /conductor {
        alias /opt/Murphy-System/static/conductor.html;
        default_type text/html;
    }

    location /api/conductor-proxy/ {
        proxy_pass http://127.0.0.1:8091/;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Superagent transition uploads (cap A.7) ──────────────────
    location /static/uploads/ {
        alias /opt/Murphy-System/static/uploads/;
        autoindex off;
        add_header X-Content-Type-Options nosniff;
        add_header Cache-Control "public, max-age=3600";
        location ~ \.(php|cgi|pl|py|sh)$ { return 403; }
    }

    location /static/ {
        proxy_pass         http://murphy_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long-lived cache for versioned static assets
        proxy_hide_header   Cache-Control;
        proxy_ignore_headers  Cache-Control;
        add_header         Cache-Control "public, max-age=3600" always;
        add_header         Vary "Accept-Encoding";
        gzip_static        on;
    }


    # ── SSE / long-poll endpoints — extended timeouts for multi-agent pipelines
    # PATCH-030: generate-deliverable can take 5-15 min; default 120s kills it
    location ~ ^/api/demo/(generate-deliverable|session) {
        proxy_pass http://murphy_api;

        proxy_read_timeout    900s;   # 15 min — enough for full swarm pipeline
        proxy_send_timeout    900s;
        proxy_connect_timeout  60s;

        # SSE requires chunked transfer and no buffering
        proxy_buffering           off;
        proxy_cache               off;
        chunked_transfer_encoding on;
        proxy_set_header Connection "";
        add_header X-Accel-Buffering "no";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Murphy API, website, and all UI pages ────────────────────────────────
    # Catches everything not matched above:
    #   /           → murphy_landing_page.html (served by FastAPI StaticFiles)
    #   /ui/*       → Murphy UI pages
    #   /api/*      → Murphy REST API
    #   /docs       → Swagger UI


    location /.well-known/matrix/client {
        add_header Content-Type application/json;
        add_header Access-Control-Allow-Origin "https://murphy.systems";  # PATCH-198: scoped CORS
        return 200 '{"m.homeserver":{"base_url":"https://murphy.systems"}}';
    }

    location /.well-known/matrix/server {
        add_header Content-Type application/json;
        return 200 '{"m.server":"murphy.systems:443"}';
    }

    location /.well-known/matrix/support {
        add_header Content-Type application/json;
        return 200 '{"contacts":[{"email_address":"cpost@murphy.systems","role":"m.role.admin"}],"support_page":"https://murphy.systems/docs"}';
    }


    # ── Matrix / Synapse — PATCH-154 ────────────────────────────
    location /_matrix/ {
        proxy_pass         http://127.0.0.1:18008;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 100M;
    }

    location /_synapse/ {
        proxy_pass         http://127.0.0.1:18008;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        client_max_body_size 100M;
    }

    # PATCH-215: Resume + Book generators need long timeouts for LLM calls (90-120s)
    location ~ ^/api/(resume|book)/ {
        proxy_pass http://murphy_api;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # PATCH-327/328: Murphy Client bare page routes → /ui/* handler
    # These are served by the FastAPI /ui/{page_name:path} wildcard handler.
    location = /guide    { return 301 /ui/guide;    }
    location = /start    { return 302 /ui/start; }
    location = /founder  { return 302 /ui/founder; }
    location = /download { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location = /app      { return 301 /ui/app;      }

    # R395 Mission Control page (static)
    location = /mission {
        alias /opt/Murphy-System/mission.html;
        default_type text/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        proxy_pass http://murphy_api;

        # PATCH-064: Ensure murphy_session cookie always has Secure flag
        # (belt-and-suspenders alongside secure=True in the app)
        proxy_cookie_flags murphy_session secure samesite=lax;

        # WebSocket support (for real-time features)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # PATCH-215: Bump default timeout — LLM endpoints can take 2min
        proxy_read_timeout 240s;
        proxy_send_timeout 240s;

        # Prevent browsers from serving a stale copy of HTML pages after a deploy.
        add_header Cache-Control "no-cache";
    }

    location /console-api/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /tos {
        alias /opt/Murphy-System/tos.html;
        default_type text/html;
        add_header Cache-Control "public, max-age=300";
    }

    location = /signup {
        alias /opt/Murphy-System/signup.html;
        default_type text/html;
        add_header Cache-Control "no-cache";
    }

    location = /ui/signup {
        return 301 /signup;
    }
}

# ── Mail subdomain (HTTPS) ──────────────────────────────────────────────────
# Redirects mail.murphy.systems → murphy.systems/mail/ for webmail access
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.murphy.systems;

    ssl_certificate     /etc/letsencrypt/live/murphy.systems/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/murphy.systems/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Roundcube served at root — no subpath stripping needed
    location / {
        proxy_pass         http://murphy_webmail/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}