user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

http {

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1.2 TLSv1.3; # PATCH-198: dropped TLS 1.0/1.1 — deprecated
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;

	##
	# Gzip Settings
	##

	gzip on;
	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 6;
	gzip_buffers 16 8k;
	gzip_http_version 1.1;
	gzip_min_length 1024;
	gzip_types
		text/plain
		text/css
		text/javascript
		application/javascript
		application/json
		application/xml
		text/xml
		image/svg+xml
		font/woff
		font/woff2
		application/font-woff
		application/font-woff2;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	# Murphy rate limiting — PATCH-067
	limit_req_zone $binary_remote_addr zone=murphy_demo:10m rate=10r/m;
	limit_req_zone $binary_remote_addr zone=murphy_login:10m rate=5r/m;
	limit_req_zone $binary_remote_addr zone=murphy_verify:10m rate=20r/m;
	limit_req_zone $binary_remote_addr zone=murphy_webhook:10m rate=60r/m;
	limit_req_zone $binary_remote_addr zone=murphy_chat:10m rate=30r/m;

	include /etc/nginx/sites-enabled/*;
}


