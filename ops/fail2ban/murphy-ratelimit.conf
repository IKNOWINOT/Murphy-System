# Ship 31z: auto-ban IPs that abuse rate limits.
# 10 hits of 429 in 5 minutes = 1-hour ban.
[murphy-ratelimit]
enabled  = true
filter   = nginx-ratelimit
logpath  = /var/log/nginx/access.log
maxretry = 10
findtime = 300
bantime  = 3600
action   = iptables-multiport[name=murphy-rl, port="http,https", protocol=tcp]
