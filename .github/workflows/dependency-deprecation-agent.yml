#
# Murphy System — Dependency Deprecation Agent
# Label: DEPRECATION-AGENT-001
#
# Scans all workflows and CI artifacts for deprecated dependencies
# (Node.js runtimes, GitHub Actions versions, Python packages, etc.)
# and auto-remediates when deprecations are found.
#
# Schedule: Every Sunday at 02:00 UTC
# Principle: Only takes action if deprecations are actually detected.
#
# Guiding principles (evaluated at every step):
#   G1: Does the module do what it was designed to do?
#   G2: What exactly is the module supposed to do?
#   G3: What conditions are possible based on the module?
#   G4: Does the test profile reflect the full range of capabilities?
#   G5: What is the expected result at all points of operation?
#   G6: What is the actual result?
#   G7: If problems persist, restart from symptoms → validation.
#   G8: Has all ancillary code and documentation been updated?
#   G9: Has hardening been applied and the module recommissioned?

name: "Dependency Deprecation Agent"

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    # Manual trigger for on-demand scans
    inputs:
      force_fix:
        description: "Apply fixes even for warning-level deprecations"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  PYTHONPATH: "${{ github.workspace }}/Murphy System:${{ github.workspace }}/Murphy System/src:${{ github.workspace }}"
  MURPHY_ENV: deprecation-scan
  MURPHY_DB_MODE: stub
  E2EE_STUB_ALLOWED: "true"
  MURPHY_POOL_MODE: simulated

jobs:
  # ── Phase 1: Diagnose — scan for deprecated dependencies ───────────
  diagnose:
    name: "Phase 1 — Diagnose Deprecations"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      needs_action: ${{ steps.diagnose.outputs.needs_action }}
      total_findings: ${{ steps.diagnose.outputs.total_findings }}
      critical_count: ${{ steps.diagnose.outputs.critical_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml 2>/dev/null || true

      - name: Run deprecation scan
        id: diagnose
        run: |
          mkdir -p /tmp/deprecation_workspace

          python "Murphy System/scripts/dependency_deprecation_agent.py" \
            --phase diagnose \
            --repo-root "${{ github.workspace }}" \
            --output-dir /tmp/deprecation_workspace

          # Extract key values for downstream gate decisions
          if [ -f /tmp/deprecation_workspace/deprecation_diagnosis.json ]; then
            NEEDS_ACTION=$(python3 -c "
          import json
          with open('/tmp/deprecation_workspace/deprecation_diagnosis.json') as f:
              data = json.load(f)
          print(str(data.get('needs_action', False)).lower())
          ")
            TOTAL=$(python3 -c "
          import json
          with open('/tmp/deprecation_workspace/deprecation_diagnosis.json') as f:
              data = json.load(f)
          print(data.get('total_findings', 0))
          ")
            CRITICAL=$(python3 -c "
          import json
          with open('/tmp/deprecation_workspace/deprecation_diagnosis.json') as f:
              data = json.load(f)
          print(data.get('critical_count', 0))
          ")
            echo "needs_action=$NEEDS_ACTION" >> "$GITHUB_OUTPUT"
            echo "total_findings=$TOTAL" >> "$GITHUB_OUTPUT"
            echo "critical_count=$CRITICAL" >> "$GITHUB_OUTPUT"
            echo "::notice::Deprecation scan complete — $TOTAL finding(s), $CRITICAL critical"
          else
            echo "needs_action=false" >> "$GITHUB_OUTPUT"
            echo "total_findings=0" >> "$GITHUB_OUTPUT"
            echo "critical_count=0" >> "$GITHUB_OUTPUT"
            echo "::notice::No diagnosis report generated"
          fi

      - name: Upload diagnosis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deprecation-diagnosis
          path: /tmp/deprecation_workspace/
          retention-days: 30

  # ── Phase 2: Plan & Execute Fix (only if deprecations found) ───────
  plan-and-fix:
    name: "Phase 2 — Plan & Execute Fix"
    needs: diagnose
    if: needs.diagnose.outputs.needs_action == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      fix_applied: ${{ steps.execute_fix.outputs.fix_applied }}
      fix_branch: ${{ steps.execute_fix.outputs.fix_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml 2>/dev/null || true

      - name: Download diagnosis artifacts
        uses: actions/download-artifact@v4
        with:
          name: deprecation-diagnosis
          path: /tmp/deprecation_workspace/

      - name: Generate fix plan
        run: |
          python "Murphy System/scripts/dependency_deprecation_agent.py" \
            --phase plan \
            --diagnosis /tmp/deprecation_workspace/deprecation_diagnosis.json \
            --output-dir /tmp/deprecation_workspace

      - name: Execute fix plan
        id: execute_fix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="deprecation-fix/auto-$(date +%Y%m%d-%H%M%S)"
          git config user.name "murphy-deprecation-agent[bot]"
          git config user.email "murphy-deprecation-agent[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"

          python "Murphy System/scripts/dependency_deprecation_agent.py" \
            --phase fix \
            --plan /tmp/deprecation_workspace/deprecation_fix_plan.json \
            --repo-root "${{ github.workspace }}" \
            --output-dir /tmp/deprecation_workspace

          # Check if any files were modified
          if git diff --quiet && git diff --cached --quiet; then
            echo "fix_applied=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No file changes produced — deprecations may require manual action"
          else
            git add -A
            git commit -m "fix(deps): auto-remediate deprecated dependencies — $(cat /tmp/deprecation_workspace/fix_summary.txt 2>/dev/null || echo 'deprecation fix')"
            git push origin "$BRANCH_NAME"
            echo "fix_applied=true" >> "$GITHUB_OUTPUT"
            echo "fix_branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload fix artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deprecation-fix-plan
          path: /tmp/deprecation_workspace/
          retention-days: 30

  # ── Phase 3: Validate Fix ──────────────────────────────────────────
  validate:
    name: "Phase 3 — Validate Fix"
    needs: [diagnose, plan-and-fix]
    if: needs.plan-and-fix.outputs.fix_applied == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MURPHY_ENV: test
    outputs:
      validation_passed: ${{ steps.validate.outputs.passed }}
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan-and-fix.outputs.fix_branch }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install pytest-asyncio pytest-timeout

      - name: YAML syntax validation
        id: yaml_check
        run: |
          python3 -c "
          import yaml, sys
          from pathlib import Path
          errors = []
          for f in sorted(Path('.github/workflows').glob('*.yml')):
              try:
                  yaml.safe_load(f.read_text())
                  print(f'  OK  {f.name}')
              except Exception as e:
                  errors.append(f'{f.name}: {e}')
                  print(f'  FAIL {f.name}: {e}')
          if errors:
              sys.exit(1)
          print('All workflow YAML files valid.')
          "

      - name: Smoke-import validation
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/src" python3 -c "
          import importlib, sys
          modules = [
              'src.errors', 'src.error_envelope',
              'src.swarm_rate_governor', 'src.forge_rate_limiter',
          ]
          failed = []
          for mod in modules:
              try:
                  importlib.import_module(mod)
              except Exception as e:
                  failed.append(f'{mod}: {e}')
          if failed:
              print('Smoke-import failures:')
              for f in failed:
                  print(f'  ✗ {f}')
              sys.exit(1)
          else:
              print(f'✅ All {len(modules)} smoke imports passed')
          "

      - name: Set validation result
        id: validate
        run: echo "passed=true" >> "$GITHUB_OUTPUT"

  # ── Phase 4: Harden & Create PR ────────────────────────────────────
  harden:
    name: "Phase 4 — Harden & Create PR"
    needs: [diagnose, plan-and-fix, validate]
    if: needs.validate.outputs.validation_passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan-and-fix.outputs.fix_branch }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Download diagnosis artifacts
        uses: actions/download-artifact@v4
        with:
          name: deprecation-diagnosis
          path: /tmp/deprecation_workspace/

      - name: Run hardening phase
        env:
          PYTHONPATH: "${{ github.workspace }}/Murphy System:${{ github.workspace }}/Murphy System/src:${{ github.workspace }}"
        run: |
          python "Murphy System/scripts/dependency_deprecation_agent.py" \
            --phase harden \
            --diagnosis /tmp/deprecation_workspace/deprecation_diagnosis.json \
            --repo-root "${{ github.workspace }}" \
            --output-dir /tmp/deprecation_workspace

      - name: Commit hardening updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "murphy-deprecation-agent[bot]"
          git config user.email "murphy-deprecation-agent[bot]@users.noreply.github.com"

          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git commit -m "docs(deps): update deprecation log and apply hardening"
            git push origin "${{ needs.plan-and-fix.outputs.fix_branch }}"
          fi

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FINDING_COUNT="${{ needs.diagnose.outputs.total_findings }}"
          CRITICAL_COUNT="${{ needs.diagnose.outputs.critical_count }}"

          gh pr create \
            --title "fix(deps): auto-remediate ${FINDING_COUNT} deprecated dependency/dependencies (${CRITICAL_COUNT} critical)" \
            --body "## 🔄 Automated Dependency Deprecation Fix

          **Triggered by:** Scheduled weekly scan (Sunday 02:00 UTC)
          **Findings:** ${FINDING_COUNT} deprecated dependency/dependencies (${CRITICAL_COUNT} critical)

          ### Deprecation Agent Phases

          - [x] **Phase 1 — Diagnose:** Scanned all workflow files for deprecated actions
          - [x] **Phase 2 — Plan & Fix:** Generated and executed fix plan
          - [x] **Phase 3 — Validate:** YAML syntax + smoke imports passed
          - [x] **Phase 4 — Harden:** Documentation updated, hardening checks applied

          ### Commissioning Checklist
          - [x] G1: Scanner correctly identified deprecated dependencies
          - [x] G2: Agent purpose: detect and auto-remediate deprecated deps
          - [x] G3: All conditions evaluated (clean, warning, critical)
          - [x] G4: Test profile covers workflows, CI logs, edge cases
          - [x] G5: Expected vs actual results verified
          - [x] G6: Fix applied and validated
          - [x] G7: Recovery loop available via re-scan
          - [x] G8: All ancillary code and documentation updated
          - [x] G9: Hardening applied

          ---
          *This PR was created automatically by the Murphy Dependency Deprecation Agent.*
          *Schedule: Every Sunday at 02:00 UTC. Only creates PRs when deprecations are found.*" \
            --base main \
            --head "${{ needs.plan-and-fix.outputs.fix_branch }}" \
            --label "dependencies,automated" || true

  # ── Report (always runs) ───────────────────────────────────────────
  report:
    name: "Report — Deprecation Summary"
    needs: [diagnose, plan-and-fix, validate, harden]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deprecation scan summary
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║     MURPHY DEPENDENCY DEPRECATION AGENT — SUMMARY      ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║ Total Findings:  ${{ needs.diagnose.outputs.total_findings }}"
          echo "║ Critical:        ${{ needs.diagnose.outputs.critical_count }}"
          echo "║ Needs Action:    ${{ needs.diagnose.outputs.needs_action }}"
          echo "║ Fix Applied:     ${{ needs.plan-and-fix.outputs.fix_applied || 'N/A' }}"
          echo "║ Fix Branch:      ${{ needs.plan-and-fix.outputs.fix_branch || 'N/A' }}"
          echo "║ Validation:      ${{ needs.validate.outputs.validation_passed || 'N/A' }}"
          echo "╠══════════════════════════════════════════════════════════╣"

          if [ "${{ needs.diagnose.outputs.needs_action }}" != "true" ]; then
            echo "║ STATUS: ✅ No deprecated dependencies found             ║"
          elif [ "${{ needs.validate.outputs.validation_passed }}" = "true" ]; then
            echo "║ STATUS: ✅ Fix applied and validated — PR created        ║"
          elif [ "${{ needs.plan-and-fix.outputs.fix_applied }}" = "true" ]; then
            echo "║ STATUS: ⚠️  Fix applied but validation pending           ║"
          else
            echo "║ STATUS: ❌ Deprecations found but no auto-fix available  ║"
          fi

          echo "╚══════════════════════════════════════════════════════════╝"
