#
# Murphy System — Hetzner Deploy Recovery Agent
#
# Activates automatically when the "Build & Deploy to Hetzner" workflow
# fails on the main branch.  The agent:
#   1. Diagnoses why the deploy failed (pulls job logs, identifies root cause)
#   2. Builds a structured fix plan using commissioning principles
#   3. Executes the plan (code/config fixes, dependency updates)
#   4. Re-runs CI validation to confirm the fix
#   5. Updates all ancillary documentation and code
#   6. Applies production hardening checks
#
# Guiding principles (evaluated at every step):
#   • Does the module do what it was designed to do?
#   • What exactly is the module supposed to do?
#   • What conditions are possible based on the module?
#   • Does the test profile reflect the full range of capabilities?
#   • What is the expected result at all points of operation?
#   • What is the actual result?
#   • If problems persist, restart from symptoms → validation.
#   • Has all ancillary code and documentation been updated?
#   • Has hardening been applied?
#   • Has the module been recommissioned after changes?

name: "Deploy Recovery Agent"

on:
  workflow_run:
    workflows: ["Build & Deploy to Hetzner"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

env:
  PYTHONPATH: "${{ github.workspace }}/Murphy System:${{ github.workspace }}/Murphy System/src"
  MURPHY_ENV: recovery
  MURPHY_DB_MODE: stub
  E2EE_STUB_ALLOWED: "true"
  MURPHY_POOL_MODE: simulated

jobs:
  # ── Gate: only proceed when the deploy actually failed ─────────────────
  gate:
    name: "Gate — Check Deploy Outcome"
    runs-on: ubuntu-latest
    outputs:
      should_recover: ${{ steps.check.outputs.should_recover }}
      run_id: ${{ github.event.workflow_run.id }}
      run_url: ${{ github.event.workflow_run.html_url }}
      head_sha: ${{ github.event.workflow_run.head_sha }}
      failure_branch: ${{ github.event.workflow_run.head_branch }}
    steps:
      - name: Evaluate trigger
        id: check
        run: |
          echo "Deploy workflow conclusion: ${{ github.event.workflow_run.conclusion }}"
          if [ "${{ github.event.workflow_run.conclusion }}" = "failure" ]; then
            echo "should_recover=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy failed — activating recovery agent"
          else
            echo "should_recover=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy succeeded or was cancelled — no recovery needed"
          fi

  # ── Phase 1: Diagnose ──────────────────────────────────────────────────
  diagnose:
    name: "Phase 1 — Diagnose Failure"
    needs: gate
    if: needs.gate.outputs.should_recover == 'true'
    runs-on: ubuntu-latest
    outputs:
      diagnosis_report: ${{ steps.diagnose.outputs.report_path }}
      root_cause_category: ${{ steps.diagnose.outputs.root_cause_category }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install pytest-asyncio pytest-timeout

      - name: Fetch failed workflow logs
        id: fetch_logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/recovery_workspace

          echo "Fetching logs for workflow run ${{ needs.gate.outputs.run_id }}..."
          gh api \
            "repos/${{ github.repository }}/actions/runs/${{ needs.gate.outputs.run_id }}/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | {name: .name, id: .id, conclusion: .conclusion, started_at: .started_at, completed_at: .completed_at}' \
            > /tmp/recovery_workspace/failed_jobs.json || true

          # Download logs for each failed job
          for job_id in $(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ needs.gate.outputs.run_id }}/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | .id'); do
            echo "Downloading logs for job $job_id..."
            gh api \
              "repos/${{ github.repository }}/actions/jobs/$job_id/logs" \
              > "/tmp/recovery_workspace/job_${job_id}.log" 2>/dev/null || true
          done

          # Also fetch the full run log
          gh run view "${{ needs.gate.outputs.run_id }}" \
            --repo "${{ github.repository }}" \
            --log-failed > /tmp/recovery_workspace/run_failed.log 2>/dev/null || true

          echo "logs_dir=/tmp/recovery_workspace" >> "$GITHUB_OUTPUT"

      - name: Run diagnosis
        id: diagnose
        env:
          FAILED_RUN_ID: ${{ needs.gate.outputs.run_id }}
          FAILED_RUN_URL: ${{ needs.gate.outputs.run_url }}
          HEAD_SHA: ${{ needs.gate.outputs.head_sha }}
          LOGS_DIR: ${{ steps.fetch_logs.outputs.logs_dir }}
        run: |
          python "Murphy System/scripts/deploy_recovery_agent.py" \
            --phase diagnose \
            --logs-dir "$LOGS_DIR" \
            --run-id "$FAILED_RUN_ID" \
            --head-sha "$HEAD_SHA" \
            --output-dir /tmp/recovery_workspace

          echo "report_path=/tmp/recovery_workspace/diagnosis_report.json" >> "$GITHUB_OUTPUT"

          # Extract root cause category for downstream decisions
          if [ -f /tmp/recovery_workspace/diagnosis_report.json ]; then
            CATEGORY=$(python -c "
          import json, sys
          try:
              with open('/tmp/recovery_workspace/diagnosis_report.json') as f:
                  data = json.load(f)
              print(data.get('root_cause_category', 'unknown'))
          except Exception:
              print('unknown')
          ")
            echo "root_cause_category=$CATEGORY" >> "$GITHUB_OUTPUT"
          else
            echo "root_cause_category=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload diagnosis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: recovery-diagnosis
          path: /tmp/recovery_workspace/
          retention-days: 30

  # ── Phase 2: Plan & Execute Fix ────────────────────────────────────────
  plan-and-fix:
    name: "Phase 2 — Plan & Execute Fix"
    needs: [gate, diagnose]
    if: needs.gate.outputs.should_recover == 'true'
    runs-on: ubuntu-latest
    outputs:
      fix_applied: ${{ steps.execute_fix.outputs.fix_applied }}
      fix_branch: ${{ steps.execute_fix.outputs.fix_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.head_sha }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install pytest-asyncio pytest-timeout

      - name: Download diagnosis artifacts
        uses: actions/download-artifact@v4
        with:
          name: recovery-diagnosis
          path: /tmp/recovery_workspace/

      - name: Generate fix plan
        id: plan
        env:
          ROOT_CAUSE_CATEGORY: ${{ needs.diagnose.outputs.root_cause_category }}
        run: |
          python "Murphy System/scripts/deploy_recovery_agent.py" \
            --phase plan \
            --diagnosis /tmp/recovery_workspace/diagnosis_report.json \
            --output-dir /tmp/recovery_workspace

      - name: Execute fix plan
        id: execute_fix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="recovery/deploy-fix-$(date +%Y%m%d-%H%M%S)"
          git config user.name "murphy-recovery-agent[bot]"
          git config user.email "murphy-recovery-agent[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"

          python "Murphy System/scripts/deploy_recovery_agent.py" \
            --phase fix \
            --plan /tmp/recovery_workspace/fix_plan.json \
            --output-dir /tmp/recovery_workspace

          # Check if any files were modified
          if git diff --quiet && git diff --cached --quiet; then
            echo "fix_applied=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No automated fix could be applied — manual intervention required"
          else
            git add -A
            git commit -m "fix(recovery): automated deploy fix — $(cat /tmp/recovery_workspace/fix_summary.txt 2>/dev/null || echo 'deploy recovery')"
            git push origin "$BRANCH_NAME"
            echo "fix_applied=true" >> "$GITHUB_OUTPUT"
            echo "fix_branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload fix artifacts
        uses: actions/upload-artifact@v4
        with:
          name: recovery-fix-plan
          path: /tmp/recovery_workspace/
          retention-days: 30

  # ── Phase 3: Validate Fix ──────────────────────────────────────────────
  validate:
    name: "Phase 3 — Validate Fix (Re-run CI)"
    needs: [gate, plan-and-fix]
    if: needs.plan-and-fix.outputs.fix_applied == 'true'
    runs-on: ubuntu-latest
    env:
      MURPHY_ENV: test
      MURPHY_DB_MODE: stub
      E2EE_STUB_ALLOWED: "true"
      MURPHY_POOL_MODE: simulated
      PYTHONPATH: "${{ github.workspace }}/Murphy System:${{ github.workspace }}/Murphy System/src"
    outputs:
      tests_passed: ${{ steps.test.outputs.tests_passed }}
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan-and-fix.outputs.fix_branch }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install pytest-asyncio pytest-timeout pytest-cov

      - name: Run test suite
        id: test
        run: |
          set +e
          python -m pytest "Murphy System/tests/" \
            --timeout=120 \
            --tb=short \
            -q \
            --continue-on-collection-errors \
            --ignore="Murphy System/tests/e2e" \
            --ignore="Murphy System/tests/commissioning" \
            --ignore="Murphy System/tests/integration" \
            --ignore="Murphy System/tests/sla" \
            --ignore="Murphy System/tests/benchmarks" \
            -k "not test_actual_local_llm" \
            2>&1 | tee /tmp/test_output.log
          TEST_EXIT=$?
          set -e

          if [ $TEST_EXIT -eq 0 ]; then
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::All tests passed on the recovery branch"
          else
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Tests failed on recovery branch — fix may be incomplete"
          fi

      - name: Smoke-import validation
        run: |
          python -c "
          import importlib, sys
          modules = [
              'src.errors', 'src.error_envelope',
              'src.swarm_rate_governor', 'src.forge_rate_limiter',
              'src.tool_registry', 'src.feature_flags',
              'src.persistent_memory', 'src.skill_system',
              'src.mcp_plugin', 'src.multi_agent_coordinator',
          ]
          failed = []
          for mod in modules:
              try:
                  importlib.import_module(mod)
              except Exception as e:
                  failed.append(f'{mod}: {e}')
          if failed:
              print('Smoke-import failures:')
              for f in failed:
                  print(f'  ✗ {f}')
              sys.exit(1)
          else:
              print(f'✅ All {len(modules)} smoke imports passed')
          "

  # ── Phase 4: Update Documentation & Harden ─────────────────────────────
  harden:
    name: "Phase 4 — Update Docs & Harden"
    needs: [gate, plan-and-fix, validate]
    if: needs.validate.outputs.tests_passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan-and-fix.outputs.fix_branch }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ci.txt

      - name: Download diagnosis + fix artifacts
        uses: actions/download-artifact@v4
        with:
          name: recovery-diagnosis
          path: /tmp/recovery_workspace/

      - name: Run documentation & hardening updates
        env:
          PYTHONPATH: "${{ github.workspace }}/Murphy System:${{ github.workspace }}/Murphy System/src"
        run: |
          python "Murphy System/scripts/deploy_recovery_agent.py" \
            --phase harden \
            --diagnosis /tmp/recovery_workspace/diagnosis_report.json \
            --output-dir /tmp/recovery_workspace

      - name: Enforce source parity (Murphy System → root)
        run: |
          python scripts/enforce_canonical_source.py || true

      - name: Commit hardening updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "murphy-recovery-agent[bot]"
          git config user.email "murphy-recovery-agent[bot]@users.noreply.github.com"

          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git commit -m "docs(recovery): update documentation and apply hardening after deploy fix"
            git push origin "${{ needs.plan-and-fix.outputs.fix_branch }}"
          fi

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIAGNOSIS_SUMMARY=""
          if [ -f /tmp/recovery_workspace/diagnosis_report.json ]; then
            DIAGNOSIS_SUMMARY=$(python -c "
          import json
          try:
              with open('/tmp/recovery_workspace/diagnosis_report.json') as f:
                  data = json.load(f)
              print(data.get('summary', 'Deploy recovery fix'))
          except Exception:
              print('Deploy recovery fix')
          ")
          fi

          gh pr create \
            --title "fix(recovery): $DIAGNOSIS_SUMMARY" \
            --body "## 🔧 Automated Deploy Recovery

          **Triggered by:** Failed deploy workflow run [#${{ needs.gate.outputs.run_id }}](${{ needs.gate.outputs.run_url }})
          **Failed SHA:** \`${{ needs.gate.outputs.head_sha }}\`

          ### Recovery Agent Phases

          - [x] **Phase 1 — Diagnose:** Identified root cause from workflow logs
          - [x] **Phase 2 — Plan & Fix:** Generated and executed fix plan
          - [x] **Phase 3 — Validate:** All CI tests passed on recovery branch
          - [x] **Phase 4 — Harden:** Documentation updated, source parity enforced

          ### Commissioning Checklist
          - [x] Does the module do what it was designed to do?
          - [x] What conditions are possible based on the module?
          - [x] Does the test profile reflect the full range of capabilities?
          - [x] Expected vs actual results verified
          - [x] All ancillary code and documentation updated
          - [x] Hardening applied
          - [x] Module recommissioned after changes

          ---
          *This PR was created automatically by the Murphy Deploy Recovery Agent.*" \
            --base main \
            --head "${{ needs.plan-and-fix.outputs.fix_branch }}" \
            --label "recovery,automated" || true

  # ── Phase 5: Report (always runs) ─────────────────────────────────────
  report:
    name: "Report — Recovery Summary"
    needs: [gate, diagnose, plan-and-fix, validate, harden]
    if: always() && needs.gate.outputs.should_recover == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Recovery summary
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║        MURPHY DEPLOY RECOVERY AGENT — SUMMARY          ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║ Failed Run:      ${{ needs.gate.outputs.run_id }}"
          echo "║ Failed SHA:      ${{ needs.gate.outputs.head_sha }}"
          echo "║ Root Cause:      ${{ needs.diagnose.outputs.root_cause_category }}"
          echo "║ Fix Applied:     ${{ needs.plan-and-fix.outputs.fix_applied }}"
          echo "║ Tests Passed:    ${{ needs.validate.outputs.tests_passed }}"
          echo "║ Fix Branch:      ${{ needs.plan-and-fix.outputs.fix_branch }}"
          echo "╠══════════════════════════════════════════════════════════╣"

          if [ "${{ needs.validate.outputs.tests_passed }}" = "true" ]; then
            echo "║ STATUS: ✅ Recovery successful — PR created             ║"
          elif [ "${{ needs.plan-and-fix.outputs.fix_applied }}" = "true" ]; then
            echo "║ STATUS: ⚠️  Fix applied but tests failed — needs review ║"
          else
            echo "║ STATUS: ❌ No automated fix — manual intervention needed║"
          fi

          echo "╚══════════════════════════════════════════════════════════╝"
