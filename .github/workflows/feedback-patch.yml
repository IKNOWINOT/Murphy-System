# Workflow: feedback-patch.yml
# Subsystem: Global Feedback System
# Design Label: GFB-007
# Purpose: Receive repository_dispatch events of type "feedback_patch_request"
#          from the global feedback system.  Create a GitHub Issue with the
#          remediation plan so the team can patch the problem.
# Status: Production

name: "Feedback Patch Pipeline"

on:
  repository_dispatch:
    types: [feedback_patch_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  issues: write

env:
  MURPHY_ENV: ci

jobs:
  create-patch-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Issue from feedback
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const payload = context.payload.client_payload;
            if (!payload || !payload.feedback_id) {
              core.setFailed('Missing client_payload or feedback_id');
              return;
            }

            const severity = payload.severity || 'medium';
            const subsystem = payload.affected_subsystem || 'unclassified';
            const rootCause = payload.root_cause || 'Under investigation';
            const feedbackId = payload.feedback_id;
            const planId = payload.remediation_plan_id || 'N/A';

            // Build steps table
            let stepsTable = '| # | Action | Guiding Q | Impact |\n';
            stepsTable += '|---|--------|-----------|--------|\n';
            if (payload.steps && Array.isArray(payload.steps)) {
              for (const step of payload.steps) {
                stepsTable += `| ${step.step_number} | ${step.action} | ${step.guiding_question} | ${step.estimated_impact} |\n`;
              }
            }

            // Guiding answers section
            let guidingSection = '';
            const meta = payload.metadata || {};
            const answers = meta.guiding_answers || {};
            for (const [q, a] of Object.entries(answers)) {
              guidingSection += `**${q}:** ${a}\n\n`;
            }

            const body = [
              '## Feedback Patch Request',
              '',
              `**Feedback ID:** \`${feedbackId}\``,
              `**Remediation Plan:** \`${planId}\``,
              `**Severity:** \`${severity}\``,
              `**Affected Subsystem:** \`${subsystem}\``,
              `**Page URL:** ${meta.page_url || 'N/A'}`,
              `**Component:** ${meta.component || 'N/A'}`,
              '',
              '---',
              '',
              '### Root Cause',
              rootCause,
              '',
              '### Description',
              payload.description || 'No description provided.',
              '',
              '---',
              '',
              '### Remediation Steps',
              stepsTable,
              '',
              '---',
              '',
              '### Guiding Principle Analysis',
              guidingSection || 'No guiding answers provided.',
              '',
              '---',
              '',
              '> Auto-generated by Murphy Global Feedback System (GFB-007).',
              '> Awaiting human approval before merge.',
            ].join('\n');

            // Build labels
            const labels = ['feedback-patch'];
            if (severity) labels.push(`severity:${severity}`);
            if (subsystem) labels.push(`subsystem:${subsystem}`);

            // Ensure labels exist (ignore errors for existing ones)
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: severity === 'critical' ? 'B60205' :
                         severity === 'high' ? 'D93F0B' :
                         severity === 'medium' ? 'FBCA04' : '0E8A16',
                });
              } catch (e) {
                // Label may already exist — that is fine
              }
            }

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Feedback Patch] ${payload.title || feedbackId}`,
              body: body,
              labels: labels,
            });

            core.info(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
            core.setOutput('issue_number', issue.data.number);
            core.setOutput('issue_url', issue.data.html_url);
