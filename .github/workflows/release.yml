# Release pipeline — Class S Roadmap, Item 19.
#
# On a tag push that matches `v*`, this workflow:
#   1. Builds the production container with the digest-pinned base image
#      (Class S Roadmap, Item 9).
#   2. Generates a CycloneDX SBOM for both the Python dependency tree and
#      the resulting OCI image.
#   3. Pushes the image to GitHub Container Registry (GHCR).
#   4. Signs the image and the SBOM with cosign keyless (Sigstore, GitHub
#      OIDC trust).
#   5. Attaches the SBOM and a sources-archive to the GitHub Release.
#
# The workflow is deliberately separate from `ci.yml` so that:
#   - PR builds never accidentally publish artifacts.
#   - The release path can be re-run independently if the publish step fails
#     after the build succeeded.
#
# References:
#   - docs/ROADMAP_TO_CLASS_S.md (item 19)
#   - ADR-0006 (audit ledger) — release artifacts are themselves audit-relevant
#   - SLSA build provenance — provided by GitHub Actions OIDC + cosign keyless

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3). Required for manual runs."
        required: true
        type: string

permissions:
  contents: write   # to attach assets to the GitHub Release
  packages: write   # to push to GHCR
  id-token: write   # to obtain the OIDC token cosign uses for keyless signing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags + history needed for changelog generation

      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.value }}
            type=raw,value=latest

      - name: Build and push container
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # OCI annotations for provenance traceability.
          provenance: true
          sbom: true

      # ---- SBOM generation ----------------------------------------------
      # We generate a Python-dependency SBOM via cyclonedx-bom (the canonical
      # tool for pip ecosystems) and an image SBOM via syft. The two cover
      # different scopes: the pip SBOM lists what we declared; the syft SBOM
      # lists what actually shipped in the layers.

      - name: Install SBOM tooling
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-bom

      - name: Generate Python dependency SBOM (CycloneDX)
        run: |
          # cyclonedx-py requires the requirements to be installed in the
          # environment OR a frozen requirements file. We use the locked
          # production requirements directly; if it is absent fall back to
          # the canonical murphy_1.0 pin file.
          if [ -f requirements.lock ]; then
            cyclonedx-py requirements --output-format json \
              --output-file sbom-python.cdx.json requirements.lock
          else
            cyclonedx-py requirements --output-format json \
              --output-file sbom-python.cdx.json requirements_murphy_1.0.txt
          fi

      - name: Install syft (image SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate image SBOM (CycloneDX)
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          syft "$IMAGE_REF" -o cyclonedx-json=sbom-image.cdx.json

      # ---- cosign keyless signing ---------------------------------------

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"

      - name: Attest SBOM to image
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom-image.cdx.json \
            --type cyclonedx \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"

      # ---- GitHub Release upload ----------------------------------------

      - name: Attach SBOMs to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Release ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            sbom-python.cdx.json
            sbom-image.cdx.json

      - name: Summary
        run: |
          {
            echo "## Release ${{ steps.tag.outputs.value }}"
            echo ""
            echo "* **Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}\`"
            echo "* **Tags:** ${{ steps.meta.outputs.tags }}"
            echo "* **Signed:** cosign keyless (GitHub OIDC)"
            echo "* **SBOMs:** sbom-python.cdx.json, sbom-image.cdx.json"
            echo ""
            echo "Verify with:"
            echo '```bash'
            echo "cosign verify \\"
            echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.+' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
