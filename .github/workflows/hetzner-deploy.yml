name: Build & Deploy to Hetzner
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MURPHY_ENV: test
      MURPHY_DB_MODE: stub
      E2EE_STUB_ALLOWED: "true"
      MURPHY_POOL_MODE: simulated
      PYTHONPATH: "${{ github.workspace }}/Murphy System:${{ github.workspace }}/Murphy System/src:${{ github.workspace }}/Murphy System/scripts:${{ github.workspace }}/Murphy System/bots"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install pytest-asyncio pytest-timeout
      - name: Run tests
        run: |
          python -m pytest "Murphy System/tests/" \
            --timeout=120 \
            --tb=short \
            -q \
            --continue-on-collection-errors \
            --ignore="Murphy System/tests/e2e" \
            --ignore="Murphy System/tests/commissioning" \
            --ignore="Murphy System/tests/integration" \
            --ignore="Murphy System/tests/sla" \
            --ignore="Murphy System/tests/benchmarks" \
            -m "not local_llm"

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check deploy secrets are configured
        id: check_secrets
        run: |
          if [ -z "${{ secrets.HETZNER_HOST }}" ] || [ -z "${{ secrets.HETZNER_SSH_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning title=Deploy Skipped::HETZNER_HOST or HETZNER_SSH_KEY secret not configured. Skipping deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Inject DEEPINFRA_API_KEY into server env
        if: steps.check_secrets.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: DEEPINFRA_API_KEY
          script: |
            set -e
            ENV_FILE="/etc/murphy-production/environment"
            mkdir -p /etc/murphy-production
            touch "$ENV_FILE"
            chmod 600 "$ENV_FILE"
            # Upsert DEEPINFRA_API_KEY — only if the secret is set
            if [ -n "${DEEPINFRA_API_KEY:-}" ]; then
              # Remove any existing DEEPINFRA_API_KEY line, then append the new value.
              # This avoids sed delimiter issues with special characters in the key.
              grep -v "^DEEPINFRA_API_KEY=" "$ENV_FILE" > "${ENV_FILE}.tmp" || true
              printf 'DEEPINFRA_API_KEY=%s\n' "${DEEPINFRA_API_KEY}" >> "${ENV_FILE}.tmp"
              mv "${ENV_FILE}.tmp" "$ENV_FILE"
              chmod 600 "$ENV_FILE"
              # Switch provider to deepinfra when the key is present
              if grep -q "^MURPHY_LLM_PROVIDER=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^MURPHY_LLM_PROVIDER=.*|MURPHY_LLM_PROVIDER=deepinfra|" "$ENV_FILE"
              else
                echo "MURPHY_LLM_PROVIDER=deepinfra" >> "$ENV_FILE"
              fi
              echo "✅ DEEPINFRA_API_KEY injected into $ENV_FILE"
            else
              echo "⚠️  DEEPINFRA_API_KEY secret not set — skipping injection"
            fi
        env:
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}

      - name: Deploy to Hetzner via SSH
        if: steps.check_secrets.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            # Pull the latest code (including the updated hetzner_load.sh),
            # then delegate the entire full-stack deployment to the script.
            # --skip-pull avoids a redundant second pull inside the script.
            cd /opt/Murphy-System
            git pull origin main
            bash scripts/hetzner_load.sh --skip-pull

      - name: Verify health
        if: steps.check_secrets.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            STATUS=$(curl -sf http://localhost:8000/api/health || echo "FAIL")
            if echo "$STATUS" | grep -q '"status"'; then
              echo "Health check passed"
            else
              echo "Health check failed: $STATUS"
              exit 1
            fi
