name: Build & Deploy to Hetzner
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MURPHY_ENV: test
      PYTHONPATH: "${{ github.workspace }}/Murphy System:${{ github.workspace }}/Murphy System/src"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r "Murphy System/requirements_murphy_1.0.txt"
      - run: pip install pytest pytest-asyncio pytest-timeout
      - run: python -m pytest "Murphy System/tests/" --timeout=300 -x -q --ignore="Murphy System/tests/e2e"

  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Murphy System
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/murphy-system:${{ github.sha }}
            ghcr.io/${{ github.repository }}/murphy-system:latest
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.HETZNER_KUBECONFIG }}" | base64 -d > ~/.kube/config
      - name: Rolling update
        run: |
          kubectl set image deployment/murphy-api \
            murphy-api=ghcr.io/${{ github.repository }}/murphy-system:${{ github.sha }} \
            -n murphy-system
          kubectl rollout status deployment/murphy-api -n murphy-system --timeout=300s
      - name: Verify health
        run: |
          ENDPOINT=$(kubectl get ingress murphy-api -n murphy-system -o jsonpath='{.spec.rules[0].host}')
          HEALTHY=false
          for i in 1 2 3 4 5; do
            sleep 15
            if curl -sf "https://${ENDPOINT}/api/health"; then
              echo "Health check passed on attempt ${i}"
              HEALTHY=true
              break
            fi
            echo "Attempt ${i}/5 failed, retrying..."
          done
          if [ "$HEALTHY" = "false" ]; then
            echo "::error::Health check failed after 5 attempts — rolling back"
            kubectl rollout undo deployment/murphy-api -n murphy-system
            kubectl rollout status deployment/murphy-api -n murphy-system --timeout=300s
            exit 1
          echo "Warning: health check failed after 5 attempts, verify manually"
      - name: Integration smoke tests
        run: |
          ENDPOINT=$(kubectl get ingress murphy-api -n murphy-system -o jsonpath='{.spec.rules[0].host}')
          BASE="https://${ENDPOINT}"
          PASS=0
          FAIL=0

          run_test() {
            local name="$1" url="$2" expected="$3"
            RESP=$(curl -sf -o /dev/null -w "%{http_code}" "$url" || echo "000")
            if [ "$RESP" = "$expected" ]; then
              echo "✅ ${name}: ${RESP}"
              PASS=$((PASS + 1))
            else
              echo "❌ ${name}: expected ${expected}, got ${RESP}"
              FAIL=$((FAIL + 1))
            fi
          }

          echo "Running integration smoke tests against ${BASE}..."
          run_test "Health" "${BASE}/api/health" "200"
          run_test "Status" "${BASE}/api/status" "200"
          run_test "Metrics" "${BASE}/metrics" "200"
          run_test "Info" "${BASE}/api/info" "200"
          run_test "Gates" "${BASE}/api/gates/status" "200"

          # Verify metrics content
          METRICS=$(curl -sf "${BASE}/metrics" || echo "")
          if echo "$METRICS" | grep -q "murphy_requests_total"; then
            echo "✅ Metrics content: murphy_requests_total found"
            PASS=$((PASS + 1))
          else
            echo "❌ Metrics content: murphy_requests_total not found"
            FAIL=$((FAIL + 1))
          fi

          # Verify health response structure
          HEALTH=$(curl -sf "${BASE}/api/health" || echo "{}")
          if echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'status' in d" 2>/dev/null; then
            echo "✅ Health JSON: has status field"
            PASS=$((PASS + 1))
          else
            echo "❌ Health JSON: missing status field"
            FAIL=$((FAIL + 1))
          fi

          echo ""
          echo "Results: ${PASS} passed, ${FAIL} failed"
          if [ "$FAIL" -gt 0 ]; then
            echo "⚠️ Some integration tests failed — review manually"
          fi
