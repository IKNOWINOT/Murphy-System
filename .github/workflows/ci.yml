name: Murphy System CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MURPHY_ENV: test
  MURPHY_DB_MODE: stub
  E2EE_STUB_ALLOWED: "true"
  MURPHY_POOL_MODE: simulated
  # Both src trees are discoverable: repo root takes precedence (newer modules)
  PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/src:${{ github.workspace }}/Murphy System:${{ github.workspace }}/murphy_system/src"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff (non-blocking)
        run: ruff check src/ --select E,F,W --ignore E501,W503
        continue-on-error: true

      - name: Syntax check core modules
        run: |
          python -m py_compile src/runtime/app.py
          python -m py_compile src/runtime/murphy_system_core.py
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi uvicorn pydantic pydantic-settings httpx \
            flask flask-cors \
            pytest pytest-cov pytest-asyncio pytest-timeout \
            cryptography PyJWT \
            networkx numpy \
            pyyaml python-dotenv \
            aiohttp
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --timeout=60 \
            --cov=src/runtime --cov=src/rosetta \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=0 \
            --ignore=tests/e2e \
            --ignore=tests/commissioning \
            --ignore=tests/integration \
            --ignore=tests/sla \
            --ignore=tests/benchmarks \
            --continue-on-collection-errors \
            -k "not test_actual_local_llm"
        continue-on-error: true

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run bandit on core paths (non-blocking)
        run: |
          bandit -r src/runtime/ src/rosetta/ \
            -c bandit.yaml \
            --severity-level medium \
            -f txt \
            || true
        continue-on-error: true

      - name: Run bandit on full src/ (non-blocking, informational)
        run: |
          bandit -r src/ \
            -c bandit.yaml \
            --severity-level high \
            -f txt \
            || true
        continue-on-error: true

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip-audit -r requirements_ci.txt --ignore-vuln GHSA-753j-mpmx-qq6g || true
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t murphy-system:${{ github.sha }} . 2>&1 | tail -20
        continue-on-error: true

      - name: Tag as latest
        run: docker tag murphy-system:${{ github.sha }} murphy-system:latest || true
        continue-on-error: true
