name: Murphy System CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC — runs integration / E2E / SLA tests
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger (e.g. after major merge or hotfix)

env:
  MURPHY_ENV: test
  MURPHY_DB_MODE: stub
  E2EE_STUB_ALLOWED: "true"
  MURPHY_POOL_MODE: simulated
  # PYTHONPATH is intentionally NOT set here.
  # pytest discovers src/ via pyproject.toml [tool.pytest.ini_options] pythonpath.
  # Runtime code uses `pip install -e .` (editable install).

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # Run from repo root — canonical source is root src/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff (non-blocking)
        run: ruff check src/ --select E,F,W --ignore E501,W503
        continue-on-error: true

      - name: Syntax check core modules
        run: |
          python -m py_compile src/runtime/app.py
          python -m py_compile src/runtime/murphy_system_core.py
        continue-on-error: true

  smoke-imports:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi uvicorn pydantic pydantic-settings httpx \
            flask flask-cors \
            pytest pytest-asyncio \
            cryptography PyJWT \
            networkx numpy \
            pyyaml python-dotenv \
            aiohttp

      - name: Smoke-test key module imports
        # Fails fast if a core module has a broken import.
        # PYTHONPATH set inline so this step is self-contained.
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/src" python - <<'EOF'
          import sys, importlib
          failures = []
          modules = [
              "src.runtime.app",
              "src.runtime.murphy_system_core",
              "src.rosetta.archive_classifier",
              "src.rosetta.global_aggregator",
              "src.rosetta_subsystem_wiring",
              "src.modular_runtime",
              "src.errors",
              "src.errors.codes",
              "src.errors.registry",
              "src.error_envelope",
              "src.swarm_rate_governor",
              "src.forge_rate_limiter",
              "src.global_feedback",
              "src.global_feedback.models",
              "src.global_feedback.remediation_engine",
              "src.global_feedback.dispatcher",
              "src.dependency_deprecation_scanner",
              "src.building_automation",
              "src.building_automation.models",
              "src.building_automation.hvac_control",
              "src.building_automation.lighting_control",
              "src.building_automation.occupancy_model",
              "src.building_automation.soo_engine",
              "src.energy_management",
              "src.energy_management.metering",
              "src.energy_management.demand_response",
              "src.energy_management.load_forecasting",
              "src.energy_management.renewable_integration",
              "src.energy_management.carbon_accounting",
              "src.energy_management.tariff_engine",
              "src.fdd",
              "src.fdd.rule_engine",
              "src.fdd.statistical_fdd",
              "src.fdd.alarm_manager",
          ]
          for mod in modules:
              try:
                  importlib.import_module(mod)
                  print(f"  OK  {mod}")
              except Exception as exc:
                  failures.append((mod, exc))
                  print(f"  FAIL {mod}: {exc}")
          if failures:
              print(f"\n{len(failures)} import(s) failed — see above.")
              sys.exit(1)
          print(f"\nAll {len(modules)} smoke imports passed.")
          EOF
        # Smoke import failures should block merges — broken imports must not
        # reach main undetected.

  tree-divergence-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new divergence between root and Murphy System/ trees
        # Fails when files of tracked types exist ONLY in Murphy System/ but not
        # at the repo root.  This prevents silent drift — the mirror must not
        # gain new files that haven't been promoted to the canonical root.
        # Covers .py, .html, .yaml, .yml, .md, .js, .ts, .sh, .bat, .css
        # across ALL directories (not just src/).
        # Also reports (warning only) files that exist only at root.
        run: |
          python - <<'EOF'
          import sys
          from pathlib import Path

          EXTENSIONS = {
              ".py", ".html", ".yaml", ".yml", ".md",
              ".js", ".ts", ".sh", ".bat", ".css",
          }
          SKIP_DIRS = {
              ".git", ".venv", "venv", "node_modules", "__pycache__",
              ".mypy_cache", ".pytest_cache", ".ruff_cache", "dist", "build",
          }

          root_dir = Path(".")
          mirror_dir = Path("Murphy System")

          if not mirror_dir.exists():
              print("Mirror tree Murphy System/ not found — nothing to check.")
              sys.exit(0)

          def collect_files(base: Path, skip_subdir: str | None = None) -> set[Path]:
              result = set()
              for p in base.rglob("*"):
                  if not p.is_file():
                      continue
                  if p.suffix not in EXTENSIONS:
                      continue
                  rel = p.relative_to(base)
                  # Skip unwanted directories
                  if any(
                      part in SKIP_DIRS or part.endswith(".egg-info")
                      for part in rel.parts[:-1]
                  ):
                      continue
                  # Skip a specific top-level subdirectory if requested
                  if skip_subdir and rel.parts and rel.parts[0] == skip_subdir:
                      continue
                  result.add(rel)
              return result

          # Collect from mirror (relative to Murphy System/)
          mirror_files = collect_files(mirror_dir)

          # Collect from root — skip the Murphy System/ subtree itself
          root_files = collect_files(root_dir, skip_subdir="Murphy System")

          only_in_mirror = mirror_files - root_files
          only_in_root = root_files - mirror_files

          if only_in_root:
              print(
                  f"INFO: {len(only_in_root)} file(s) exist only at root "
                  "(no Murphy System/ counterpart — may be legitimate root-only files):"
              )
              for f in sorted(only_in_root):
                  print(f"  {f}")
              print()

          if only_in_mirror:
              print("ERROR: The following files exist ONLY in the legacy")
              print("  Murphy System/ mirror and have NOT been promoted to")
              print("  the canonical root.  Please review and promote, or")
              print("  document why they should not be in root:")
              for f in sorted(only_in_mirror):
                  print(f"  {f}")
              sys.exit(1)
          else:
              print(
                  f"OK: No new divergence detected. "
                  f"root={len(root_files)} tracked files, "
                  f"mirror={len(mirror_files)} tracked files."
              )
          EOF

  test:
    # CI-SIMPLIFY: Single Python version matching production (Dockerfile: python:3.12-slim).
    # Rationale: Production and deployment (Hetzner) both target 3.12.  No version-guarded
    # code exists in the codebase.  Running 3 matrix versions tripled CI wall-time with
    # no additional production-readiness signal.  If multi-version coverage is needed
    # in the future, add a scheduled weekly matrix job instead of blocking every PR.
    runs-on: ubuntu-latest
    timeout-minutes: 75
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install pytest-cov pytest-asyncio pytest-timeout

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --timeout=60 \
            --cov=src/runtime --cov=src/rosetta \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=0 \
            --ignore=tests/e2e \
            --ignore=tests/commissioning \
            --ignore=tests/integration \
            --ignore=tests/sla \
            --ignore=tests/benchmarks \
            -k "not test_actual_local_llm"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  registry-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate module_registry.yaml is up to date
        run: python scripts/generate_module_registry.py --check

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run bandit on core paths (HIGH severity blocks)
        run: |
          bandit -r src/runtime/ src/rosetta/ \
            -c bandit.yaml \
            --severity-level high \
            -f txt

      - name: Run bandit on extended paths (non-blocking)
        run: |
          bandit -r src/ \
            -c bandit.yaml \
            --severity-level medium \
            -f txt \
            || true
        continue-on-error: true

      - name: Audit dependencies for known vulnerabilities
        # SEC-DEPS-001 / PROD-HARD-CI-004 (audit C7): Dependency audit is a
        # merge blocker. Previously wrapped in `|| echo "::warning::"` which
        # turned every CVE into a non-blocking warning — the comment claimed
        # "merge blocker" but the implementation contradicted it.
        run: pip-audit --requirement requirements_ci.txt --strict
        continue-on-error: false

      - name: Validate swarm rate governor import
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/src" python -c "from src.swarm_rate_governor import SwarmRateGovernor, TrafficClass; print('SwarmRateGovernor OK')"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t murphy-system:${{ github.sha }} . 2>&1 | tail -20
        continue-on-error: true

      - name: Tag as latest
        run: docker tag murphy-system:${{ github.sha }} murphy-system:latest || true
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Nightly integration / E2E / SLA test suite
  # ---------------------------------------------------------------------------
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install pytest-cov pytest-asyncio pytest-timeout

      - name: Run integration and E2E tests
        run: |
          python -m pytest tests/e2e tests/integration tests/sla \
            -v --tb=short --timeout=120 \
            --continue-on-collection-errors \
            -k "not test_actual_local_llm"
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # E2E tests — run on every PR and push (not just nightly)
  # Tests the hero flow, production server routes, auth/security plane, and
  # LLM pipeline without requiring a live server or API secrets.
  # ---------------------------------------------------------------------------
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      MURPHY_ENV: test
      MURPHY_DB_MODE: stub
      E2EE_STUB_ALLOWED: "true"
      MURPHY_POOL_MODE: simulated
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install E2E dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi httpx pydantic uvicorn pytest pytest-asyncio
          pip install -r requirements_core.txt
        continue-on-error: true

      - name: Run E2E hero-flow, auth, and production-server tests
        run: |
          python -m pytest \
            tests/e2e/test_hero_flow_e2e.py \
            tests/e2e/test_auth_e2e.py \
            tests/e2e/test_production_server_e2e.py \
            tests/e2e/test_completion_areas.py \
            tests/e2e/test_forge_user_flow.py \
            tests/e2e/test_llm_pipeline_e2e.py \
            -v --tb=short --timeout=60

  # ---------------------------------------------------------------------------
  # CI Hardening — MURPHY-CI-HARDENING-001
  # These checks BLOCK merge and BLOCK packaging on failure.
  # ---------------------------------------------------------------------------
  schema-and-code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic ruff pytest pytest-asyncio

      # CHECK 1: Stub detector — fail if any function in murphy/ has
      # pass-only body, TODO, or raise NotImplementedError
      - name: "CI-HARD-001: Stub detector"
        run: |
          echo "Scanning for stubs in murphy/ ..."
          python3 -c "
          import ast, sys, pathlib
          fails = []
          for f in pathlib.Path('murphy').rglob('*.py'):
              try:
                  tree = ast.parse(f.read_text())
              except SyntaxError:
                  continue
              for node in ast.walk(tree):
                  if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                      stmts = [s for s in node.body if not (isinstance(s, ast.Expr) and isinstance(getattr(s, 'value', None), ast.Constant))]
                      if len(stmts) == 1 and isinstance(stmts[0], ast.Pass):
                          fails.append(f'{f}:{node.lineno} {node.name}() — pass-only stub')
                      for s in stmts:
                          if isinstance(s, ast.Raise) and hasattr(s.exc, 'func') and getattr(s.exc.func, 'id', '') == 'NotImplementedError':
                              fails.append(f'{f}:{node.lineno} {node.name}() — NotImplementedError')
          if fails:
              for x in fails: print(f'STUB: {x}')
              sys.exit(1)
          print('✅ No stubs found in murphy/')
          "

      # CHECK 2: Silent failure detector — bare except:pass, empty catch
      - name: "CI-HARD-002: Silent failure detector"
        run: |
          python3 -c "
          import pathlib, re, sys
          fails = []
          for f in pathlib.Path('murphy').rglob('*.py'):
              lines = f.read_text().splitlines()
              for i, line in enumerate(lines):
                  if re.match(r'^\s*except\s*:\s*$', line):
                      if i+1 < len(lines) and re.match(r'^\s+pass\s*$', lines[i+1]):
                          fails.append(f'{f}:{i+1} — bare except:pass')
          for f in pathlib.Path('murphy').rglob('*.ts'):
              text = f.read_text()
              if re.search(r'catch\s*\([^)]*\)\s*\{\s*\}', text):
                  fails.append(f'{f} — empty catch block')
          if fails:
              for x in fails: print(f'SILENT: {x}')
              sys.exit(1)
          print('✅ No silent failures found')
          "

      # CHECK 3: Schema conformance — AgentOutput schema validates
      - name: "CI-HARD-003: Schema conformance check"
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}" python3 -c "
          from murphy.schemas.agent_output import AgentOutput, ContentType, RenderType
          AgentOutput(
              agent_id='ci', agent_name='CI', file_path='check',
              content_type=ContentType.PASS_FAIL, content='PASS',
              org_node_id='ci', rosetta_state_hash='ci-hash',
              render_type=RenderType.SYNTAX_HIGHLIGHT)
          print('✅ AgentOutput schema validates correctly')
          try:
              AgentOutput(agent_id='x', agent_name='x', file_path='x',
                  content_type=ContentType.CODE, content='x',
                  org_node_id='x', rosetta_state_hash='',
                  render_type=RenderType.SYNTAX_HIGHLIGHT)
              exit(1)
          except Exception: pass
          print('✅ Empty rosetta_state_hash correctly rejected')
          "

      # CHECK 4: HITL authority hardcoding check
      - name: "CI-HARD-004: HITL authority hardcoding check"
        run: |
          python3 -c "
          import pathlib, re, sys
          fails = []
          for f in pathlib.Path('murphy/agents').rglob('*.py'):
              for i, line in enumerate(f.read_text().splitlines(), 1):
                  if 'hitl_authority_node_id' in line and re.search(r'=\s*\"[a-z]', line):
                      if 'fallback' not in line and 'error-state' not in line:
                          fails.append(f'{f}:{i} — hardcoded authority')
          if fails:
              for x in fails: print(x)
              sys.exit(1)
          print('✅ No hardcoded HITL authority strings')
          "

      # CHECK 5: Rosetta state hash presence
      - name: "CI-HARD-005: Rosetta state hash presence"
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}" python3 -c "
          from murphy.rosetta.org_lookup import get_rosetta_state_hash
          h = get_rosetta_state_hash()
          assert h and len(h) == 64, f'Invalid hash: {h}'
          print(f'✅ Rosetta state hash: {h[:16]}...')
          "

      # CHECK 6: Full agent schema + integration test suite
      - name: "CI-HARD-006: Agent schema and integration tests"
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}" python -m pytest tests/test_agent_output_schema.py -v --tb=short
