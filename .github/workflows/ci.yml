name: Murphy System CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MURPHY_ENV: test
  MURPHY_DB_MODE: stub
  E2EE_STUB_ALLOWED: "true"
  MURPHY_POOL_MODE: simulated
  # PYTHONPATH is intentionally NOT set here.
  # pytest discovers src/ via pyproject.toml [tool.pytest.ini_options] pythonpath.
  # Runtime code uses `pip install -e .` (editable install).

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # Run from repo root — canonical source is root src/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff (non-blocking)
        run: ruff check src/ --select E,F,W --ignore E501,W503
        continue-on-error: true

      - name: Syntax check core modules
        run: |
          python -m py_compile src/runtime/app.py
          python -m py_compile src/runtime/murphy_system_core.py
        continue-on-error: true

  smoke-imports:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi uvicorn pydantic pydantic-settings httpx \
            flask flask-cors \
            pytest pytest-asyncio \
            cryptography PyJWT \
            networkx numpy \
            pyyaml python-dotenv \
            aiohttp

      - name: Smoke-test key module imports
        # Fails fast if a core module has a broken import.
        # PYTHONPATH set inline so this step is self-contained.
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/src" python - <<'EOF'
          import sys, importlib
          failures = []
          modules = [
              "src.runtime.app",
              "src.runtime.murphy_system_core",
              "src.rosetta.archive_classifier",
              "src.rosetta.global_aggregator",
              "src.rosetta_subsystem_wiring",
              "src.modular_runtime",
              "src.errors",
              "src.errors.codes",
              "src.errors.registry",
              "src.error_envelope",
              "src.swarm_rate_governor",
              "src.forge_rate_limiter",
          ]
          for mod in modules:
              try:
                  importlib.import_module(mod)
                  print(f"  OK  {mod}")
              except Exception as exc:
                  failures.append((mod, exc))
                  print(f"  FAIL {mod}: {exc}")
          if failures:
              print(f"\n{len(failures)} import(s) failed — see above.")
              sys.exit(1)
          print(f"\nAll {len(modules)} smoke imports passed.")
          EOF
        continue-on-error: true

  tree-divergence-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new divergence between src/ trees
        # Warns when files exist ONLY in Murphy System/src/ but not root src/.
        # This prevents silent drift — the legacy mirror must not gain new
        # modules that haven't been promoted to canonical root src/.
        run: |
          python - <<'EOF'
          import sys
          from pathlib import Path

          root_src = Path("src")
          mirror_src = Path("Murphy System/src")

          if not mirror_src.exists():
              print("Mirror tree Murphy System/src/ not found — nothing to check.")
              sys.exit(0)

          root_py = {p.relative_to(root_src) for p in root_src.rglob("*.py")}
          mirror_py = {p.relative_to(mirror_src) for p in mirror_src.rglob("*.py")}

          only_in_mirror = mirror_py - root_py
          if only_in_mirror:
              print("WARNING: The following .py files exist ONLY in the legacy")
              print("  Murphy System/src/ mirror and have NOT been promoted to")
              print("  the canonical root src/.  Please review and promote or")
              print("  document why they should not be in root src/:")
              for f in sorted(only_in_mirror):
                  print(f"  {f}")
              sys.exit(1)
          else:
              print("OK: No new divergence detected between src/ trees.")
          EOF
        continue-on-error: false

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi uvicorn pydantic pydantic-settings httpx \
            flask flask-cors \
            pytest pytest-cov pytest-asyncio pytest-timeout \
            cryptography PyJWT \
            networkx numpy \
            pyyaml python-dotenv \
            aiohttp

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --timeout=60 \
            --cov=src/runtime --cov=src/rosetta \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=0 \
            --ignore=tests/e2e \
            --ignore=tests/commissioning \
            --ignore=tests/integration \
            --ignore=tests/sla \
            --ignore=tests/benchmarks \
            --continue-on-collection-errors \
            -k "not test_actual_local_llm"

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  registry-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate module_registry.yaml is up to date
        run: python scripts/generate_module_registry.py --check
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run bandit on core paths (HIGH severity blocks)
        run: |
          bandit -r src/runtime/ src/rosetta/ \
            -c bandit.yaml \
            --severity-level high \
            -f txt

      - name: Run bandit on extended paths (non-blocking)
        run: |
          bandit -r src/ \
            -c bandit.yaml \
            --severity-level medium \
            -f txt \
            || true
        continue-on-error: true

      - name: Audit dependencies for known vulnerabilities
        run: |
          pip-audit --requirement requirements_ci.txt --strict 2>&1 || echo "::warning::pip-audit found issues — review advisory output above"
        continue-on-error: true

      - name: Validate swarm rate governor import
        run: |
          PYTHONPATH="${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}/src" python -c "from src.swarm_rate_governor import SwarmRateGovernor, TrafficClass; print('SwarmRateGovernor OK')"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t murphy-system:${{ github.sha }} . 2>&1 | tail -20
        continue-on-error: true

      - name: Tag as latest
        run: docker tag murphy-system:${{ github.sha }} murphy-system:latest || true
        continue-on-error: true
