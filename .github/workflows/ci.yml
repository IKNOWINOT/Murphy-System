name: Murphy System CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: "Murphy System"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_murphy_1.0.txt
          pip install pytest pytest-cov pytest-asyncio flake8 mypy

      - name: Lint with flake8
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --timeout=60 \
            --cov=src --cov-report=xml --cov-report=term-missing \
            --ignore=tests/e2e \
            --ignore=tests/test_integration.py \
            -x

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: "Murphy System/coverage.xml"
          flags: unittests

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: "Murphy System"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit

      - name: Run pip-audit
        run: pip-audit -r requirements_murphy_1.0.txt --exit-code 0

      - name: Run bandit security linting
        run: bandit -r src/ -f txt --exit-zero
