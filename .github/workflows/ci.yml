name: Murphy System CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MURPHY_ENV: test
  MURPHY_DB_MODE: stub
  E2EE_STUB_ALLOWED: "true"
  MURPHY_POOL_MODE: simulated
  # Both src trees are discoverable: repo root takes precedence (newer modules)
  PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/src:${{ github.workspace }}/Murphy System:${{ github.workspace }}/murphy_system/src"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff (non-blocking)
        run: ruff check src/ --select E,F,W --ignore E501,W503
        continue-on-error: true

      - name: Syntax check core modules
        run: |
          python -m py_compile src/runtime/app.py
          python -m py_compile src/runtime/murphy_system_core.py
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        # E-003: Optional package matrix testing
        optional-deps: ['none', 'ml']
        exclude:
          # Only test ML deps on Python 3.12 to save CI time
          - python-version: '3.10'
            optional-deps: 'ml'
          - python-version: '3.11'
            optional-deps: 'ml'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi uvicorn pydantic pydantic-settings httpx \
            flask flask-cors \
            pytest pytest-cov pytest-asyncio pytest-timeout \
            cryptography PyJWT \
            networkx numpy \
            pyyaml python-dotenv \
            aiohttp
        continue-on-error: true

      - name: Install optional ML dependencies
        if: matrix.optional-deps == 'ml'
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers sentencepiece
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --timeout=60 \
            --cov=src/runtime --cov=src/rosetta \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=0 \
            --ignore=tests/e2e \
            --ignore=tests/commissioning \
            --ignore=tests/integration \
            --ignore=tests/sla \
            --ignore=tests/benchmarks \
            --continue-on-collection-errors \
            -k "not test_actual_local_llm"
        continue-on-error: true

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.optional-deps == 'none'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      # C-003: Secret scanning with gitleaks
      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run bandit on core paths (non-blocking)
        run: |
          bandit -r src/runtime/ src/rosetta/ \
            -c bandit.yaml \
            --severity-level medium \
            -f txt \
            || true
        continue-on-error: true

      - name: Run bandit on full src/ (non-blocking, informational)
        run: |
          bandit -r src/ \
            -c bandit.yaml \
            --severity-level high \
            -f txt \
            || true
        continue-on-error: true

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip-audit -r requirements_ci.txt --ignore-vuln GHSA-753j-mpmx-qq6g || true
        continue-on-error: true

  # D-001: Test count verification
  test-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Count test functions
        run: |
          echo "=== TEST METRICS ==="
          echo "Test files: $(find tests/ -name 'test_*.py' | wc -l)"
          echo "Test functions: $(grep -r 'def test_' tests/ --include='*.py' | wc -l)"
          echo "Test classes: $(grep -r 'class Test' tests/ --include='*.py' | wc -l)"
          echo ""
          echo "=== CLAIMED vs ACTUAL ==="
          ACTUAL=$(grep -r 'def test_' tests/ --include='*.py' | wc -l)
          CLAIMED=24341
          echo "Claimed: $CLAIMED"
          echo "Actual: $ACTUAL"
          if [ "$ACTUAL" -lt "$CLAIMED" ]; then
            echo "⚠️ Test count lower than claimed ($ACTUAL < $CLAIMED)"
          else
            echo "✅ Test count verified ($ACTUAL >= $CLAIMED)"
          fi

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t murphy-system:${{ github.sha }} . 2>&1 | tail -20
        continue-on-error: true

      - name: Tag as latest
        run: docker tag murphy-system:${{ github.sha }} murphy-system:latest || true
        continue-on-error: true

      # C-007: Container image scanning with Trivy
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: murphy-system:${{ github.sha }}
          format: 'table'
          exit-code: '0'  # Don't fail on vulnerabilities
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      # C-006: SBOM generation
      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          image: murphy-system:${{ github.sha }}
          artifact-name: sbom-murphy-system.spdx.json
          output-file: ./sbom.spdx.json
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          if-no-files-found: ignore

      # E-005: Docker smoke test
      - name: Docker smoke test
        run: |
          echo "=== Starting Murphy System container ==="
          docker run -d --name murphy-smoke-test \
            -e MURPHY_ENV=test \
            -e MURPHY_DB_MODE=stub \
            -p 8000:8000 \
            murphy-system:${{ github.sha }}
          
          echo "=== Waiting for container to be healthy ==="
          for i in {1..30}; do
            if docker exec murphy-smoke-test curl -sf http://localhost:8000/api/health; then
              echo ""
              echo "✅ Health check passed!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          
          echo ""
          echo "=== Container logs ==="
          docker logs murphy-smoke-test --tail 50
          
          echo ""
          echo "=== Cleanup ==="
          docker stop murphy-smoke-test
          docker rm murphy-smoke-test
        continue-on-error: true
