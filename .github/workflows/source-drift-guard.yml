name: source-drift-guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  drift-check:
    name: Enforce canonical source parity (root ↔ Murphy System/)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for --changed-only git diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for file drift between root and Murphy System/
        run: python scripts/enforce_canonical_source.py

      - name: Check session-scoped drift (PR only)
        if: github.event_name == 'pull_request'
        run: python scripts/enforce_canonical_source.py --changed-only
