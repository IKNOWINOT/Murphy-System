name: source-drift-guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  drift-check:
    name: Enforce canonical source parity (root ↔ Murphy System/)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6  # NODE-24-FIX: upgraded from @v4 (Node 20) to @v6 (Node 24)

      - name: Set up Python
        uses: actions/setup-python@v6  # NODE-24-FIX: upgraded from @v5 (Node 20) to @v6 (Node 24)
        with:
          python-version: '3.11'

      - name: Check for file drift between root and Murphy System/
        run: python scripts/enforce_canonical_source.py
