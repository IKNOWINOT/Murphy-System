# Murphy System — Dependency Upgrade Agent
# Proactively checks for outdated/vulnerable dependencies, tests upgrades,
# and opens PRs or issues accordingly.

name: "Dependency Upgrade Agent"

on:
  schedule:
    # Weekly on Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/src:${{ github.workspace }}/Murphy System:${{ github.workspace }}/Murphy System/src"
  MURPHY_ENV: test
  MURPHY_DB_MODE: stub
  E2EE_STUB_ALLOWED: "true"
  MURPHY_POOL_MODE: simulated

jobs:
  # ── Phase 1: Scan ──────────────────────────────────────────────────────
  scan:
    name: "Phase 1 — Scan Dependencies"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      has_upgrades: ${{ steps.scan.outputs.has_upgrades }}
      has_vulnerabilities: ${{ steps.scan.outputs.has_vulnerabilities }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6  # NODE-24-FIX: upgraded from @v4 (Node 20) to @v6 (Node 24)

      - name: Set up Python 3.12
        uses: actions/setup-python@v6  # NODE-24-FIX: upgraded from @v5 (Node 20) to @v6 (Node 24)
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install pip-audit

      - name: Scan for upgrades and vulnerabilities
        id: scan
        run: |
          python "Murphy System/scripts/dependency_upgrade_agent.py" \
            --phase scan \
            --output-dir /tmp/dep_upgrade

          HAS_UPGRADES=$(python -c "
          import json
          try:
              with open('/tmp/dep_upgrade/scan_report.json') as f:
                  data = json.load(f)
              print('true' if data.get('outdated') else 'false')
          except Exception:
              print('false')
          ")
          HAS_VULNS=$(python -c "
          import json
          try:
              with open('/tmp/dep_upgrade/scan_report.json') as f:
                  data = json.load(f)
              print('true' if data.get('vulnerabilities') else 'false')
          except Exception:
              print('false')
          ")
          echo "has_upgrades=$HAS_UPGRADES" >> "$GITHUB_OUTPUT"
          echo "has_vulnerabilities=$HAS_VULNS" >> "$GITHUB_OUTPUT"

      - name: Upload scan report
        uses: actions/upload-artifact@v7  # NODE-24-FIX: upgraded from @v4 (Node 20) to @v7 (Node 24)
        with:
          name: dep-scan-report
          path: /tmp/dep_upgrade/
          retention-days: 14

  # ── Phase 2: Test Upgrades ─────────────────────────────────────────────
  test-upgrades:
    name: "Phase 2 — Test Upgraded Dependencies"
    needs: scan
    if: needs.scan.outputs.has_upgrades == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      tests_passed: ${{ steps.test.outputs.tests_passed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6  # NODE-24-FIX: upgraded from @v4 (Node 20) to @v6 (Node 24)
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6  # NODE-24-FIX: upgraded from @v5 (Node 20) to @v6 (Node 24)
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install pytest-asyncio pytest-timeout pip-audit

      - name: Download scan report
        uses: actions/download-artifact@v8  # NODE-24-FIX: upgraded from @v4 (Node 20) to @v8 (Node 24)
        with:
          name: dep-scan-report
          path: /tmp/dep_upgrade/

      - name: Apply upgrades and test
        id: test
        run: |
          python "Murphy System/scripts/dependency_upgrade_agent.py" \
            --phase upgrade \
            --scan /tmp/dep_upgrade/scan_report.json \
            --output-dir /tmp/dep_upgrade

          # Run test suite against upgraded dependencies
          set +e
          python -m pytest tests/ --timeout=60 --tb=short -q \
            --ignore=tests/e2e \
            --ignore=tests/commissioning \
            --ignore=tests/integration \
            --ignore=tests/sla \
            --ignore=tests/benchmarks \
            --continue-on-collection-errors \
            -k "not test_actual_local_llm" \
            2>&1 | tee /tmp/dep_upgrade/test_output.log
          TEST_EXIT=$?
          set -e

          if [ $TEST_EXIT -eq 0 ]; then
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v7  # NODE-24-FIX: upgraded from @v4 (Node 20) to @v7 (Node 24)
        with:
          name: dep-upgrade-test-results
          path: /tmp/dep_upgrade/
          retention-days: 14

  # ── Phase 3: Open PR or Issue ──────────────────────────────────────────
  create-pr:
    name: "Phase 3 — Create PR or Issue"
    needs: [scan, test-upgrades]
    if: always() && needs.scan.outputs.has_upgrades == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6  # NODE-24-FIX: upgraded from @v4 (Node 20) to @v6 (Node 24)
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6  # NODE-24-FIX: upgraded from @v5 (Node 20) to @v6 (Node 24)
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install pip-audit

      - name: Download scan report
        uses: actions/download-artifact@v8  # NODE-24-FIX: upgraded from @v4 (Node 20) to @v8 (Node 24)
        with:
          name: dep-scan-report
          path: /tmp/dep_upgrade/

      - name: Create PR or Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TESTS_PASSED: ${{ needs.test-upgrades.outputs.tests_passed }}
        run: |
          python "Murphy System/scripts/dependency_upgrade_agent.py" \
            --phase report \
            --scan /tmp/dep_upgrade/scan_report.json \
            --tests-passed "$TESTS_PASSED" \
            --output-dir /tmp/dep_upgrade

      - name: Summary
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║      DEPENDENCY UPGRADE AGENT — SUMMARY                ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║ Upgrades Available: ${{ needs.scan.outputs.has_upgrades }}"
          echo "║ Vulnerabilities:    ${{ needs.scan.outputs.has_vulnerabilities }}"
          echo "║ Tests Passed:       ${{ needs.test-upgrades.outputs.tests_passed }}"
          echo "╚══════════════════════════════════════════════════════════╝"
