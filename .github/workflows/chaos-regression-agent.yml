#
# Murphy System — Chaos Regression Agent
# Invokes ChaosResilienceLoop with SyntheticFailureGenerator and validates
# resilience scores remain above threshold.

name: "Chaos Regression Agent"

on:
  schedule:
    # Nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/src:${{ github.workspace }}/Murphy System:${{ github.workspace }}/Murphy System/src"
  MURPHY_ENV: test
  MURPHY_DB_MODE: stub
  E2EE_STUB_ALLOWED: "true"
  MURPHY_POOL_MODE: simulated
  CHAOS_SCORE_THRESHOLD: "0.70"

jobs:
  chaos-test:
    name: "Chaos Resilience Regression"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_ci.txt
          pip install pytest-asyncio pytest-timeout

      - name: Phase 1 — Validate chaos components
        run: |
          python -c "
          import importlib, sys
          modules = [
              'src.chaos_resilience_loop',
              'src.self_fix_loop',
              'src.murphy_immune_engine',
              'src.predictive_failure_engine',
              'src.self_healing_coordinator',
          ]
          failed = []
          for mod in modules:
              try:
                  importlib.import_module(mod)
                  print(f'  OK  {mod}')
              except Exception as e:
                  failed.append(f'{mod}: {e}')
                  print(f'  FAIL {mod}: {e}')
          if failed:
              print(f'\n{len(failed)} chaos component import(s) failed')
              sys.exit(1)
          print(f'\nAll {len(modules)} chaos component imports passed.')
          "

      - name: Phase 2 — Run chaos regression suite
        run: |
          python "Murphy System/scripts/chaos_regression_agent.py" \
            --phase run \
            --threshold "${{ env.CHAOS_SCORE_THRESHOLD }}" \
            --output-dir /tmp/chaos_results

      - name: Phase 3 — Score and gate
        id: gate
        run: |
          python "Murphy System/scripts/chaos_regression_agent.py" \
            --phase gate \
            --results /tmp/chaos_results/chaos_results.json \
            --threshold "${{ env.CHAOS_SCORE_THRESHOLD }}" \
            --output-dir /tmp/chaos_results

      - name: Upload chaos results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chaos-results-${{ github.run_number }}
          path: /tmp/chaos_results/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║      CHAOS REGRESSION AGENT — SUMMARY                  ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          if [ -f /tmp/chaos_results/chaos_results.json ]; then
            python -c "
          import json
          with open('/tmp/chaos_results/chaos_results.json') as f:
              data = json.load(f)
          score = data.get('overall_score', 0)
          threshold = float('${{ env.CHAOS_SCORE_THRESHOLD }}')
          print(f'  Resilience Score:  {score:.2f}')
          print(f'  Threshold:         {threshold:.2f}')
          print(f'  Experiments:       {data.get(\"experiments_run\", 0)}')
          print(f'  Recoveries:        {data.get(\"recoveries\", 0)}')
          print(f'  Failures:          {data.get(\"failures\", 0)}')
          status = '✅ PASSED' if score >= threshold else '❌ FAILED'
          print(f'  Gate:              {status}')
          "
          else
            echo "║ No results generated — check logs above                ║"
          fi
          echo "╚══════════════════════════════════════════════════════════╝"
