name: "Copilot Setup Steps"

on: push

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: "Murphy System"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-timeout httpx flake8

      - name: Configure environment
        working-directory: "Murphy System"
        env:
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
        run: |
          # Determine LLM provider: use DeepInfra when the secret is available,
          # otherwise fall back to the onboard local provider.
          if [ -n "${DEEPINFRA_API_KEY:-}" ]; then
            LLM_PROVIDER=deepinfra
          else
            LLM_PROVIDER=local
          fi

          # Write .env — values are quoted to handle special characters safely
          {
            echo "MURPHY_VERSION=1.0.0"
            echo "MURPHY_ENV=test"
            echo "MURPHY_PORT=8000"
            echo "MURPHY_LLM_PROVIDER=${LLM_PROVIDER}"
            printf 'DEEPINFRA_API_KEY=%s\n' "${DEEPINFRA_API_KEY:-}"
          } > .env

          # Create runtime directories the system expects
          mkdir -p logs data modules sessions repositories .murphy_persistence/images

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/Murphy System" >> "$GITHUB_ENV"

      - name: Set MURPHY_ENV
        run: echo "MURPHY_ENV=test" >> "$GITHUB_ENV"

      - name: Set DEEPINFRA_API_KEY
        env:
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
        run: |
          if [ -n "${DEEPINFRA_API_KEY:-}" ]; then
            echo "DEEPINFRA_API_KEY=${DEEPINFRA_API_KEY}" >> "$GITHUB_ENV"
            echo "✅ DEEPINFRA_API_KEY available — Swarm Forge will use DeepInfra LLM"
          else
            echo "⚠️  DEEPINFRA_API_KEY not set — Swarm Forge will use onboard LLM fallback"
          fi

      - name: Verify setup
        working-directory: "Murphy System"
        run: |
          python -c "import fastapi; print(f'FastAPI {fastapi.__version__}')"
          python -c "import pydantic; print(f'Pydantic {pydantic.__version__}')"
          python -c "import pytest; print(f'Pytest {pytest.__version__}')"
          echo "Setup verification complete"
