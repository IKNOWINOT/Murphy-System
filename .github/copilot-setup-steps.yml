name: "Copilot Setup Steps"

on: push

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: "Murphy System"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-timeout httpx flake8

      - name: Configure environment
        working-directory: "Murphy System"
        run: |
          # Create .env for local/test LLM provider (no API key needed)
          cat > .env <<'EOF'
          MURPHY_VERSION=1.0.0
          MURPHY_ENV=test
          MURPHY_PORT=8000
          MURPHY_LLM_PROVIDER=local
          EOF

          # Create runtime directories the system expects
          mkdir -p logs data modules sessions repositories .murphy_persistence/images

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/Murphy System" >> "$GITHUB_ENV"

      - name: Set MURPHY_ENV
        run: echo "MURPHY_ENV=test" >> "$GITHUB_ENV"

      - name: Verify setup
        working-directory: "Murphy System"
        run: |
          python -c "import fastapi; print(f'FastAPI {fastapi.__version__}')"
          python -c "import pydantic; print(f'Pydantic {pydantic.__version__}')"
          python -c "import pytest; print(f'Pytest {pytest.__version__}')"
          echo "Setup verification complete"
