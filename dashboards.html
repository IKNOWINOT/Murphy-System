<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboards — Murphy System</title>
  <link rel="icon" href="static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="static/murphy-design-system.css">
  <style>
    :root {
      --bg-base: #0C1017; --bg-surface: #131A24; --bg-elevated: #1A2332;
      --bg-input: #0F1620; --border-subtle: #1E2A3A; --border-default: #2A3A4E;
      --border-focus: #00D4AA; --text-primary: #E6ECF2; --text-secondary: #8899AA;
      --text-muted: #566778; --teal: #00D4AA; --teal-glow: rgba(0,212,170,0.12);
      --success: #22C55E; --warning: #FFA63E; --danger: #EF4444; --info: #3B9EFF;
      --font-ui: Inter, system-ui, -apple-system, sans-serif;
      --font-code: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Topbar ──────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(12,16,23,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-default);
      padding: 0 2rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--text-primary); font-weight: 700; font-size: 1rem;
    }
    .topbar-brand svg { flex-shrink: 0; }
    .topbar-title {
      font-size: 0.85rem; color: var(--text-secondary); font-weight: 500;
      padding-left: 12px; border-left: 1px solid var(--border-subtle);
    }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .topbar-status {
      font-size: 0.75rem; color: var(--text-muted);
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .app-layout {
      display: flex; height: calc(100vh - 56px);
    }
    .sidebar-slot { flex-shrink: 0; }
    .dash-sidebar {
      width: 280px; background: var(--bg-surface);
      border-right: 1px solid var(--border-subtle);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .dash-sidebar-header {
      padding: 16px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between;
    }
    .dash-sidebar-header h2 {
      font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .dash-list {
      flex: 1; overflow-y: auto; padding: 8px;
    }
    .dash-list-item {
      padding: 10px 12px; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.15s;
      margin-bottom: 2px;
    }
    .dash-list-item:hover { background: var(--bg-elevated); }
    .dash-list-item.active { background: var(--teal-glow); border: 1px solid rgba(0,212,170,0.25); }
    .dash-list-item .dash-name {
      font-size: 0.875rem; font-weight: 500; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;
    }
    .dash-list-item .dash-count {
      font-size: 0.7rem; color: var(--text-muted); background: var(--bg-input);
      padding: 2px 7px; border-radius: 10px; flex-shrink: 0;
    }

    /* ── Main area ───────────────────────────────────────────── */
    .main-area {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .dash-toolbar {
      padding: 12px 24px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: var(--bg-surface);
    }
    .dash-toolbar-left { display: flex; align-items: center; gap: 12px; }
    .dash-toolbar-left h1 {
      font-size: 1.1rem; font-weight: 700;
    }
    .dash-toolbar-left .dash-desc {
      font-size: 0.8rem; color: var(--text-muted); max-width: 400px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dash-toolbar-right { display: flex; align-items: center; gap: 8px; }
    .dash-content {
      flex: 1; overflow: auto; padding: 16px 24px;
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 6px;
      font-family: var(--font-ui); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: var(--teal); color: #0C1017; border-color: var(--teal);
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-ghost {
      background: transparent; color: var(--text-secondary); border-color: var(--border-default);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--bg-elevated); color: var(--text-primary); }
    .btn-danger {
      background: transparent; color: var(--danger); border-color: var(--danger);
    }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.1); }
    .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
    .btn-icon {
      padding: 6px; background: transparent; color: var(--text-muted);
      border: none; border-radius: 4px; cursor: pointer;
    }
    .btn-icon:hover { color: var(--text-primary); background: var(--bg-elevated); }

    /* ── Widget grid ─────────────────────────────────────────── */
    .widget-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .widget-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      display: flex; flex-direction: column;
      transition: border-color 0.15s;
      min-height: 200px;
    }
    .widget-card:hover { border-color: var(--border-default); }
    .widget-card-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between;
    }
    .widget-card-header-left { display: flex; align-items: center; gap: 8px; overflow: hidden; }
    .widget-title {
      font-size: 0.85rem; font-weight: 600; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .widget-type-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.03em; flex-shrink: 0;
    }
    .widget-type-chart    { background: rgba(59,158,255,0.15); color: var(--info); }
    .widget-type-number   { background: rgba(0,212,170,0.15); color: var(--teal); }
    .widget-type-table    { background: rgba(136,153,170,0.15); color: var(--text-secondary); }
    .widget-type-timeline { background: rgba(255,166,62,0.15); color: var(--warning); }
    .widget-type-battery  { background: rgba(34,197,94,0.15); color: var(--success); }
    .widget-type-calendar { background: rgba(239,68,68,0.15); color: var(--danger); }
    .widget-card-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
    .widget-card:hover .widget-card-actions { opacity: 1; }
    .widget-card-body {
      flex: 1; padding: 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.82rem;
    }

    /* ── Widget rendered content ─────────────────────────────── */
    .widget-render-chart {
      width: 100%; height: 100%; display: flex; align-items: flex-end; gap: 6px;
      padding: 8px 0;
    }
    .widget-bar {
      flex: 1; background: var(--info); border-radius: 3px 3px 0 0;
      min-height: 8px; transition: height 0.3s;
    }
    .widget-render-number {
      text-align: center;
    }
    .widget-render-number .big-number {
      font-size: 2.2rem; font-weight: 700; color: var(--teal);
      font-family: var(--font-code);
    }
    .widget-render-number .number-label {
      font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;
    }
    .widget-render-table {
      width: 100%; font-size: 0.78rem;
    }
    .widget-render-table th {
      text-align: left; padding: 4px 8px; font-size: 0.7rem;
      color: var(--text-muted); font-weight: 600; text-transform: uppercase;
      border-bottom: 1px solid var(--border-subtle);
    }
    .widget-render-table td {
      padding: 4px 8px; border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .widget-render-timeline {
      width: 100%; padding: 4px 0;
    }
    .timeline-row {
      display: flex; align-items: center; gap: 10px; padding: 4px 0;
      font-size: 0.78rem;
    }
    .timeline-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .timeline-label { color: var(--text-secondary); flex: 1; }
    .timeline-time { color: var(--text-muted); font-size: 0.7rem; }
    .widget-render-battery {
      text-align: center;
    }
    .battery-shell {
      display: inline-block; width: 64px; height: 100px;
      border: 2px solid var(--border-default); border-radius: 6px;
      position: relative; overflow: hidden;
    }
    .battery-cap {
      width: 24px; height: 6px; background: var(--border-default);
      border-radius: 2px 2px 0 0; margin: 0 auto 2px;
    }
    .battery-fill {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--success); transition: height 0.4s;
    }
    .battery-pct {
      font-size: 0.85rem; font-weight: 600; margin-top: 8px;
      font-family: var(--font-code); color: var(--text-secondary);
    }
    .widget-render-calendar {
      width: 100%;
    }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
    }
    .cal-header {
      font-size: 0.65rem; color: var(--text-muted); text-align: center;
      padding: 2px; font-weight: 600;
    }
    .cal-day {
      text-align: center; padding: 4px 2px; font-size: 0.72rem;
      color: var(--text-secondary); border-radius: 4px;
    }
    .cal-day.today { background: var(--teal-glow); color: var(--teal); font-weight: 700; }
    .cal-day.empty { color: transparent; }

    /* ── Permission badge ────────────────────────────────────── */
    .perm-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
    }
    .perm-public  { background: rgba(0,212,170,0.12); color: var(--teal); }
    .perm-private { background: rgba(136,153,170,0.12); color: var(--text-secondary); }
    .perm-shared  { background: rgba(59,158,255,0.12); color: var(--info); }

    /* ── Modal ───────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 500; display: none;
    }
    .modal-backdrop.open { display: flex; align-items: center; justify-content: center; }
    .modal {
      background: var(--bg-surface); border: 1px solid var(--border-default);
      border-radius: 12px; width: 440px; max-width: 90vw;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .modal-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 0.95rem; font-weight: 700; }
    .modal-body { padding: 20px; }
    .modal-footer {
      padding: 12px 20px; border-top: 1px solid var(--border-subtle);
      display: flex; justify-content: flex-end; gap: 8px;
    }

    /* ── Form elements ───────────────────────────────────────── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 6px;
    }
    .form-input, .form-select {
      width: 100%; background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border-subtle); padding: 9px 12px;
      border-radius: 6px; font-family: var(--font-ui); font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--border-focus); }
    .form-select { appearance: none; cursor: pointer; }

    /* ── Error banner ────────────────────────────────────────── */
    .error-banner {
      padding: 10px 24px; background: rgba(239,68,68,0.1);
      border-bottom: 1px solid var(--danger); color: var(--danger);
      font-size: 0.82rem; display: none; align-items: center; gap: 8px;
    }
    .error-banner.visible { display: flex; }
    .error-banner button {
      margin-left: auto; background: none; border: none;
      color: var(--danger); cursor: pointer; font-size: 1rem; padding: 0 4px;
    }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 64px 24px; text-align: center; color: var(--text-muted);
    }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-state h3 { font-size: 1rem; color: var(--text-secondary); margin-bottom: 6px; }
    .empty-state p { font-size: 0.82rem; margin-bottom: 16px; max-width: 320px; }

    /* ── Spinner ──────────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border-subtle); border-top-color: var(--teal);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay {
      display: flex; align-items: center; justify-content: center;
      padding: 48px; color: var(--text-muted); gap: 10px; font-size: 0.82rem;
    }

    /* ── Confirm dialog ──────────────────────────────────────── */
    .confirm-text { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; }

    /* ── Scrollbar ────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-default); }
  </style>
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────────────── -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="/" class="topbar-brand">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="var(--teal)"/>
          <text x="16" y="22" text-anchor="middle" fill="#0C1017" font-size="18" font-weight="700">M</text>
        </svg>
        <span>Murphy System</span>
      </a>
      <span class="topbar-title">Dashboards</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-status" id="refresh-status"></span>
    </div>
  </div>

  <!-- ── Error banner ────────────────────────────────────────── -->
  <div class="error-banner" id="error-banner" role="alert">
    <span id="error-message"></span>
    <button onclick="dismissError()" title="Dismiss" aria-label="Dismiss error">&times;</button>
  </div>

  <!-- ── App layout ──────────────────────────────────────────── -->
  <div class="app-layout">
    <murphy-sidebar active="DASHBOARDS"></murphy-sidebar>

    <!-- Dashboard list sidebar -->
    <div class="dash-sidebar">
      <div class="dash-sidebar-header">
        <h2>Dashboards</h2>
        <button class="btn btn-primary btn-sm" id="btn-new-dash" title="Create new dashboard" aria-label="Create new dashboard">+ New</button>
      </div>
      <div id="dash-list-loading" class="loading-overlay">
        <span class="spinner"></span> Loading dashboards…
      </div>
      <div class="dash-list" id="dash-list" role="list" aria-label="Dashboard list"></div>
    </div>

    <!-- Main area -->
    <div class="main-area">
      <!-- No dashboard selected -->
      <div id="no-dash-state" class="empty-state" style="flex:1;">
        <div class="empty-state-icon" aria-hidden="true">📊</div>
        <h3>Select a dashboard</h3>
        <p>Choose a dashboard from the sidebar or create a new one to get started.</p>
        <button class="btn btn-primary" id="btn-new-dash-empty">+ Create Dashboard</button>
      </div>

      <!-- Dashboard detail -->
      <div id="dash-detail" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
        <!-- Toolbar -->
        <div class="dash-toolbar">
          <div class="dash-toolbar-left">
            <h1 id="dash-title"></h1>
            <span class="dash-desc" id="dash-desc"></span>
          </div>
          <div class="dash-toolbar-right">
            <button class="btn btn-ghost btn-sm" id="btn-add-widget" title="Add widget">+ Widget</button>
            <button class="btn btn-ghost btn-sm" id="btn-edit-dash" title="Edit dashboard">✏️ Edit</button>
            <button class="btn btn-danger btn-sm" id="btn-delete-dash" title="Delete dashboard">🗑 Delete</button>
          </div>
        </div>

        <!-- Dashboard content -->
        <div class="dash-content" id="dash-content">
          <div id="dash-loading" class="loading-overlay">
            <span class="spinner"></span> Loading dashboard…
          </div>
          <div class="widget-grid" id="widget-grid"></div>
          <div id="no-widgets-state" class="empty-state" style="display:none;">
            <div class="empty-state-icon" aria-hidden="true">🧩</div>
            <h3>No widgets yet</h3>
            <p>Add widgets to visualize your data with charts, numbers, tables, and more.</p>
            <button class="btn btn-primary" id="btn-add-widget-empty">+ Add Widget</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal backdrop ──────────────────────────────────────── -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="btn-icon" onclick="closeModal()" aria-label="Close modal">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="static/murphy-components.js"></script>
  <script>
  (function () {
    'use strict';

    /* ── API helper ────────────────────────────────────────────── */
    function API(path, opts) {
      opts = opts || {};
      var headers = {'Content-Type':'application/json'};
      if (opts.headers) Object.keys(opts.headers).forEach(function(k){headers[k]=opts.headers[k];});
      return fetch(path, {
        method: opts.method || 'GET',
        credentials: 'same-origin',
        headers: headers,
        body: opts.body ? JSON.stringify(opts.body) : undefined
      }).then(function(r){
        if (!r.ok) {
          return r.json().then(function (d) {
            throw new Error(d.detail || d.error || 'Request failed (' + r.status + ')');
          }).catch(function (e) {
            if (e.message) throw e;
            throw new Error('Request failed (' + r.status + ')');
          });
        }
        return r.json();
      }).catch(function (e) {
        showError(e.message);
        throw e;
      });
    }

    /* ── State ─────────────────────────────────────────────────── */
    var dashboards = [];
    var activeDash = null;
    var activeDashId = null;
    var refreshTimer = null;
    var REFRESH_MS = 15000;

    /* ── DOM refs ──────────────────────────────────────────────── */
    var $dashList       = document.getElementById('dash-list');
    var $dashListLoad   = document.getElementById('dash-list-loading');
    var $noDashState    = document.getElementById('no-dash-state');
    var $dashDetail     = document.getElementById('dash-detail');
    var $dashTitle      = document.getElementById('dash-title');
    var $dashDesc       = document.getElementById('dash-desc');
    var $dashContent    = document.getElementById('dash-content');
    var $dashLoading    = document.getElementById('dash-loading');
    var $widgetGrid     = document.getElementById('widget-grid');
    var $noWidgetsState = document.getElementById('no-widgets-state');
    var $errorBanner    = document.getElementById('error-banner');
    var $errorMessage   = document.getElementById('error-message');
    var $refreshStatus  = document.getElementById('refresh-status');
    var $modalBackdrop  = document.getElementById('modal-backdrop');
    var $modalTitle     = document.getElementById('modal-title');
    var $modalBody      = document.getElementById('modal-body');
    var $modalFooter    = document.getElementById('modal-footer');

    /* ── Widget types ─────────────────────────────────────────── */
    var WIDGET_TYPES = ['chart','number','table','timeline','battery','calendar'];

    /* ── Utility ───────────────────────────────────────────────── */
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function escAttr(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function widgetCount(dash) {
      if (!dash) return 0;
      if (dash.widgets) return dash.widgets.length;
      if (typeof dash.widget_count === 'number') return dash.widget_count;
      return 0;
    }

    function widgetTypeClass(type) {
      if (WIDGET_TYPES.indexOf(type) !== -1) return 'widget-type-' + type;
      return 'widget-type-chart';
    }

    /* ── Error banner ────────────────────────────────────────── */
    function showError(msg) {
      $errorMessage.textContent = msg;
      $errorBanner.classList.add('visible');
    }
    window.dismissError = function () {
      $errorBanner.classList.remove('visible');
    };

    /* ── Refresh status ──────────────────────────────────────── */
    function updateRefreshStatus(loading) {
      $refreshStatus.textContent = loading
        ? 'Refreshing…'
        : 'Updated ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    /* ── Modal ───────────────────────────────────────────────── */
    function openModal(title, bodyHtml, footerHtml) {
      $modalTitle.textContent = title;
      $modalBody.innerHTML = bodyHtml;
      $modalFooter.innerHTML = footerHtml;
      $modalBackdrop.classList.add('open');
    }
    window.closeModal = function () {
      $modalBackdrop.classList.remove('open');
    };
    $modalBackdrop.addEventListener('click', function (e) {
      if (e.target === $modalBackdrop) closeModal();
    });

    /* ── Load dashboard list ─────────────────────────────────── */
    function loadDashboards(silent) {
      if (!silent) $dashListLoad.style.display = 'flex';
      return API('/api/dashboards').then(function (data) {
        dashboards = Array.isArray(data) ? data : [];
        renderDashList();
        if (!silent) $dashListLoad.style.display = 'none';
        return dashboards;
      }).catch(function () {
        dashboards = [];
        renderDashList();
        if (!silent) $dashListLoad.style.display = 'none';
      });
    }

    function renderDashList() {
      if (dashboards.length === 0) {
        $dashList.innerHTML = '<div class="empty-state" style="padding:32px 16px;">' +
          '<div class="empty-state-icon" aria-hidden="true">📊</div>' +
          '<p style="font-size:0.78rem;">No dashboards yet</p></div>';
        return;
      }
      var html = '';
      for (var i = 0; i < dashboards.length; i++) {
        var d = dashboards[i];
        var isActive = d.id === activeDashId;
        var count = widgetCount(d);
        html += '<div class="dash-list-item' + (isActive ? ' active' : '') + '" role="listitem" ' +
          'data-dash-id="' + escAttr(d.id) + '" tabindex="0" aria-label="' + escAttr(d.name) + '">' +
          '<span class="dash-name">' + esc(d.name) + '</span>' +
          '<span class="dash-count">' + count + ' widget' + (count !== 1 ? 's' : '') + '</span></div>';
      }
      $dashList.innerHTML = html;
    }

    $dashList.addEventListener('click', function (e) {
      var item = e.target.closest('.dash-list-item');
      if (!item) return;
      var id = item.getAttribute('data-dash-id');
      if (id) selectDash(id);
    });

    $dashList.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        var item = e.target.closest('.dash-list-item');
        if (item) {
          var id = item.getAttribute('data-dash-id');
          if (id) selectDash(id);
        }
      }
    });

    /* ── Select dashboard ────────────────────────────────────── */
    function selectDash(dashId) {
      activeDashId = dashId;
      renderDashList();
      $noDashState.style.display = 'none';
      $dashDetail.style.display = 'flex';
      loadDashDetail(dashId);
    }

    function loadDashDetail(dashId, silent) {
      if (!silent) {
        $dashLoading.style.display = 'flex';
        $widgetGrid.innerHTML = '';
        $noWidgetsState.style.display = 'none';
      }
      updateRefreshStatus(true);
      return API('/api/dashboards/' + encodeURIComponent(dashId) + '/render').then(function (dash) {
        activeDash = dash;
        $dashTitle.textContent = dash.name || 'Untitled Dashboard';
        $dashDesc.textContent = dash.description || '';
        renderWidgets(dash);
        if (!silent) $dashLoading.style.display = 'none';
        updateRefreshStatus(false);
      }).catch(function () {
        if (!silent) $dashLoading.style.display = 'none';
        updateRefreshStatus(false);
      });
    }

    /* ── Render widgets ──────────────────────────────────────── */
    function renderWidgets(dash) {
      var widgets = dash.widgets || [];
      if (widgets.length === 0) {
        $widgetGrid.innerHTML = '';
        $noWidgetsState.style.display = 'flex';
        return;
      }
      $noWidgetsState.style.display = 'none';

      var html = '';
      for (var i = 0; i < widgets.length; i++) {
        var w = widgets[i];
        var wtype = (w.widget_type || 'chart').toLowerCase();
        html += '<div class="widget-card" data-widget-id="' + escAttr(w.id) + '">';
        html += '<div class="widget-card-header">';
        html += '<div class="widget-card-header-left">';
        html += '<span class="widget-title">' + esc(w.title || 'Widget') + '</span>';
        html += '<span class="widget-type-badge ' + widgetTypeClass(wtype) + '">' + esc(wtype) + '</span>';
        html += '</div>';
        html += '<div class="widget-card-actions">';
        html += '<button class="btn-icon btn-edit-widget" data-widget-id="' + escAttr(w.id) + '" title="Edit widget">✏️</button>';
        html += '<button class="btn-icon btn-delete-widget" data-widget-id="' + escAttr(w.id) + '" title="Delete widget">🗑</button>';
        html += '</div></div>';
        html += '<div class="widget-card-body">';
        html += renderWidgetContent(w);
        html += '</div></div>';
      }
      $widgetGrid.innerHTML = html;
    }

    function renderWidgetContent(w) {
      var wtype = (w.widget_type || 'chart').toLowerCase();
      var rendered = w.rendered_html || w.rendered || null;

      if (wtype === 'chart') {
        return renderChartPlaceholder(w);
      }
      if (wtype === 'number') {
        return renderNumberPlaceholder(w);
      }
      if (wtype === 'table') {
        return renderTablePlaceholder(w);
      }
      if (wtype === 'timeline') {
        return renderTimelinePlaceholder(w);
      }
      if (wtype === 'battery') {
        return renderBatteryPlaceholder(w);
      }
      if (wtype === 'calendar') {
        return renderCalendarPlaceholder(w);
      }
      if (rendered) {
        return '<div>' + esc(String(rendered)) + '</div>';
      }
      return '<span style="color:var(--text-muted);">No data</span>';
    }

    function renderChartPlaceholder(w) {
      var data = (w.settings && w.settings.values) || [65, 40, 85, 55, 70, 90, 35, 60];
      var maxVal = 1;
      for (var i = 0; i < data.length; i++) { if (data[i] > maxVal) maxVal = data[i]; }
      var bars = '';
      for (var j = 0; j < data.length; j++) {
        var pct = Math.round((data[j] / maxVal) * 100);
        bars += '<div class="widget-bar" style="height:' + pct + '%;"></div>';
      }
      return '<div class="widget-render-chart">' + bars + '</div>';
    }

    function renderNumberPlaceholder(w) {
      var val = (w.settings && w.settings.value !== undefined) ? w.settings.value : '—';
      var label = (w.settings && w.settings.label) || w.title || '';
      return '<div class="widget-render-number">' +
        '<div class="big-number">' + esc(String(val)) + '</div>' +
        '<div class="number-label">' + esc(label) + '</div></div>';
    }

    function renderTablePlaceholder(w) {
      var rows = (w.settings && w.settings.rows) || [];
      var cols = (w.settings && w.settings.columns) || ['Name', 'Value', 'Status'];
      var html = '<table class="widget-render-table"><thead><tr>';
      for (var c = 0; c < cols.length; c++) {
        html += '<th>' + esc(cols[c]) + '</th>';
      }
      html += '</tr></thead><tbody>';
      if (rows.length === 0) {
        html += '<tr><td colspan="' + cols.length + '" style="text-align:center;color:var(--text-muted);padding:12px;">No data</td></tr>';
      }
      for (var r = 0; r < rows.length; r++) {
        html += '<tr>';
        var row = rows[r];
        for (var k = 0; k < cols.length; k++) {
          html += '<td>' + esc(row[k] !== undefined ? String(row[k]) : '') + '</td>';
        }
        html += '</tr>';
      }
      html += '</tbody></table>';
      return html;
    }

    function renderTimelinePlaceholder(w) {
      var items = (w.settings && w.settings.events) || [];
      if (items.length === 0) {
        items = [
          { label: 'Deployment started', time: '10:30 AM', color: 'var(--info)' },
          { label: 'Tests passed', time: '10:32 AM', color: 'var(--success)' },
          { label: 'Build complete', time: '10:35 AM', color: 'var(--teal)' }
        ];
      }
      var html = '<div class="widget-render-timeline">';
      for (var i = 0; i < items.length; i++) {
        var ev = items[i];
        html += '<div class="timeline-row">';
        html += '<div class="timeline-dot" style="background:' + (ev.color || 'var(--teal)') + ';"></div>';
        html += '<span class="timeline-label">' + esc(ev.label || '') + '</span>';
        html += '<span class="timeline-time">' + esc(ev.time || '') + '</span>';
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function renderBatteryPlaceholder(w) {
      var pct = (w.settings && w.settings.percent !== undefined) ? w.settings.percent : 72;
      pct = Math.max(0, Math.min(100, pct));
      var color = pct > 50 ? 'var(--success)' : pct > 20 ? 'var(--warning)' : 'var(--danger)';
      return '<div class="widget-render-battery">' +
        '<div class="battery-cap"></div>' +
        '<div class="battery-shell">' +
        '<div class="battery-fill" style="height:' + pct + '%;background:' + color + ';"></div>' +
        '</div>' +
        '<div class="battery-pct">' + pct + '%</div></div>';
    }

    function renderCalendarPlaceholder(w) {
      var now = new Date();
      var year = now.getFullYear();
      var month = now.getMonth();
      var today = now.getDate();
      var firstDay = new Date(year, month, 1).getDay();
      var daysInMonth = new Date(year, month + 1, 0).getDate();
      var dayLabels = ['Su','Mo','Tu','We','Th','Fr','Sa'];

      var html = '<div class="widget-render-calendar">';
      html += '<div style="text-align:center;font-size:0.78rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">';
      html += now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      html += '</div>';
      html += '<div class="cal-grid">';
      for (var h = 0; h < 7; h++) {
        html += '<div class="cal-header">' + dayLabels[h] + '</div>';
      }
      for (var blank = 0; blank < firstDay; blank++) {
        html += '<div class="cal-day empty">·</div>';
      }
      for (var d = 1; d <= daysInMonth; d++) {
        var cls = d === today ? ' today' : '';
        html += '<div class="cal-day' + cls + '">' + d + '</div>';
      }
      html += '</div></div>';
      return html;
    }

    /* ── Widget event delegation ─────────────────────────────── */
    $widgetGrid.addEventListener('click', function (e) {
      var target = e.target;

      var editBtn = target.closest('.btn-edit-widget');
      if (editBtn) {
        var wid = editBtn.getAttribute('data-widget-id');
        showEditWidgetModal(wid);
        return;
      }

      var delBtn = target.closest('.btn-delete-widget');
      if (delBtn) {
        var dwid = delBtn.getAttribute('data-widget-id');
        showConfirm('Delete Widget', 'Are you sure you want to delete this widget?', function () {
          API('/api/dashboards/' + encodeURIComponent(activeDashId) + '/widgets/' + encodeURIComponent(dwid), {
            method: 'DELETE'
          }).then(function () { closeModal(); loadDashDetail(activeDashId); loadDashboards(true); });
        });
        return;
      }
    });

    /* ── Create dashboard ────────────────────────────────────── */
    function showCreateDashModal() {
      openModal('Create Dashboard',
        '<div class="form-group">' +
          '<label class="form-label">Dashboard Name</label>' +
          '<input class="form-input" id="modal-dash-name" placeholder="My Dashboard" required autofocus>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Description (optional)</label>' +
          '<input class="form-input" id="modal-dash-desc" placeholder="What is this dashboard for?">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Permission</label>' +
          '<select class="form-select" id="modal-dash-perm">' +
            '<option value="private">Private</option>' +
            '<option value="shared">Shared</option>' +
            '<option value="public">Public</option>' +
          '</select>' +
        '</div>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" id="modal-create-dash-btn">Create Dashboard</button>'
      );
      document.getElementById('modal-create-dash-btn').addEventListener('click', function () {
        var name = document.getElementById('modal-dash-name').value.trim();
        if (!name) return;
        var desc = document.getElementById('modal-dash-desc').value.trim();
        var perm = document.getElementById('modal-dash-perm').value;
        this.disabled = true;
        this.textContent = 'Creating…';
        API('/api/dashboards', {
          method: 'POST',
          body: { name: name, description: desc, permission: perm }
        }).then(function (dash) {
          closeModal();
          loadDashboards().then(function () {
            if (dash && dash.id) selectDash(dash.id);
          });
        }).catch(function () {
          var btn = document.getElementById('modal-create-dash-btn');
          if (btn) { btn.disabled = false; btn.textContent = 'Create Dashboard'; }
        });
      });
    }

    document.getElementById('btn-new-dash').addEventListener('click', showCreateDashModal);
    document.getElementById('btn-new-dash-empty').addEventListener('click', showCreateDashModal);

    /* ── Edit dashboard ──────────────────────────────────────── */
    document.getElementById('btn-edit-dash').addEventListener('click', function () {
      if (!activeDash) return;
      openModal('Edit Dashboard',
        '<div class="form-group">' +
          '<label class="form-label">Dashboard Name</label>' +
          '<input class="form-input" id="modal-edit-name" value="' + escAttr(activeDash.name) + '">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Description</label>' +
          '<input class="form-input" id="modal-edit-desc" value="' + escAttr(activeDash.description || '') + '">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Permission</label>' +
          '<select class="form-select" id="modal-edit-perm">' +
            '<option value="private"' + (activeDash.permission === 'private' ? ' selected' : '') + '>Private</option>' +
            '<option value="shared"' + (activeDash.permission === 'shared' ? ' selected' : '') + '>Shared</option>' +
            '<option value="public"' + (activeDash.permission === 'public' ? ' selected' : '') + '>Public</option>' +
          '</select>' +
        '</div>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" id="modal-save-dash-btn">Save Changes</button>'
      );
      document.getElementById('modal-save-dash-btn').addEventListener('click', function () {
        var name = document.getElementById('modal-edit-name').value.trim();
        var desc = document.getElementById('modal-edit-desc').value.trim();
        var perm = document.getElementById('modal-edit-perm').value;
        if (!name) return;
        this.disabled = true;
        this.textContent = 'Saving…';
        API('/api/dashboards/' + encodeURIComponent(activeDashId), {
          method: 'PATCH',
          body: { name: name, description: desc, permission: perm }
        }).then(function () {
          closeModal();
          loadDashDetail(activeDashId);
          loadDashboards(true);
        });
      });
    });

    /* ── Delete dashboard ────────────────────────────────────── */
    document.getElementById('btn-delete-dash').addEventListener('click', function () {
      if (!activeDash) return;
      showConfirm('Delete Dashboard', 'Are you sure you want to delete "' + esc(activeDash.name) + '"? This cannot be undone.', function () {
        API('/api/dashboards/' + encodeURIComponent(activeDashId), { method: 'DELETE' }).then(function () {
          closeModal();
          activeDash = null;
          activeDashId = null;
          $dashDetail.style.display = 'none';
          $noDashState.style.display = 'flex';
          loadDashboards();
        });
      });
    });

    /* ── Add widget ──────────────────────────────────────────── */
    function showAddWidgetModal() {
      if (!activeDashId) return;
      var typeOpts = '';
      for (var t = 0; t < WIDGET_TYPES.length; t++) {
        typeOpts += '<option value="' + WIDGET_TYPES[t] + '">' + WIDGET_TYPES[t].charAt(0).toUpperCase() + WIDGET_TYPES[t].slice(1) + '</option>';
      }
      openModal('Add Widget',
        '<div class="form-group">' +
          '<label class="form-label">Widget Title</label>' +
          '<input class="form-input" id="modal-widget-title" placeholder="My Widget" required autofocus>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Widget Type</label>' +
          '<select class="form-select" id="modal-widget-type">' + typeOpts + '</select>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Data Source (optional)</label>' +
          '<input class="form-input" id="modal-widget-source" placeholder="e.g. metrics.cpu_usage">' +
        '</div>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" id="modal-add-widget-btn">Add Widget</button>'
      );
      document.getElementById('modal-add-widget-btn').addEventListener('click', function () {
        var title = document.getElementById('modal-widget-title').value.trim();
        if (!title) return;
        var wtype = document.getElementById('modal-widget-type').value;
        var source = document.getElementById('modal-widget-source').value.trim();
        var dataSources = source ? [source] : [];
        this.disabled = true;
        this.textContent = 'Adding…';
        API('/api/dashboards/' + encodeURIComponent(activeDashId) + '/widgets', {
          method: 'POST',
          body: { widget_type: wtype, title: title, data_sources: dataSources, settings: {}, position: {} }
        }).then(function () {
          closeModal();
          loadDashDetail(activeDashId);
          loadDashboards(true);
        }).catch(function () {
          var btn = document.getElementById('modal-add-widget-btn');
          if (btn) { btn.disabled = false; btn.textContent = 'Add Widget'; }
        });
      });
    }

    document.getElementById('btn-add-widget').addEventListener('click', showAddWidgetModal);
    document.getElementById('btn-add-widget-empty').addEventListener('click', showAddWidgetModal);

    /* ── Edit widget ─────────────────────────────────────────── */
    function showEditWidgetModal(widgetId) {
      var widget = null;
      if (activeDash && activeDash.widgets) {
        for (var i = 0; i < activeDash.widgets.length; i++) {
          if (activeDash.widgets[i].id === widgetId) { widget = activeDash.widgets[i]; break; }
        }
      }
      if (!widget) return;

      var typeOpts = '';
      for (var t = 0; t < WIDGET_TYPES.length; t++) {
        var sel = WIDGET_TYPES[t] === (widget.widget_type || '').toLowerCase() ? ' selected' : '';
        typeOpts += '<option value="' + WIDGET_TYPES[t] + '"' + sel + '>' + WIDGET_TYPES[t].charAt(0).toUpperCase() + WIDGET_TYPES[t].slice(1) + '</option>';
      }
      openModal('Edit Widget',
        '<div class="form-group">' +
          '<label class="form-label">Widget Title</label>' +
          '<input class="form-input" id="modal-ew-title" value="' + escAttr(widget.title) + '">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Widget Type</label>' +
          '<select class="form-select" id="modal-ew-type">' + typeOpts + '</select>' +
        '</div>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" id="modal-ew-save-btn">Save Changes</button>'
      );
      document.getElementById('modal-ew-save-btn').addEventListener('click', function () {
        var title = document.getElementById('modal-ew-title').value.trim();
        if (!title) return;
        this.disabled = true;
        this.textContent = 'Saving…';
        API('/api/dashboards/' + encodeURIComponent(activeDashId) + '/widgets/' + encodeURIComponent(widgetId), {
          method: 'PATCH',
          body: { title: title }
        }).then(function () {
          closeModal();
          loadDashDetail(activeDashId);
          loadDashboards(true);
        });
      });
    }

    /* ── Confirm dialog ──────────────────────────────────────── */
    function showConfirm(title, message, onConfirm) {
      openModal(title,
        '<p class="confirm-text">' + esc(message) + '</p>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-danger" id="modal-confirm-btn">Delete</button>'
      );
      document.getElementById('modal-confirm-btn').addEventListener('click', function () {
        this.disabled = true;
        this.textContent = 'Deleting…';
        onConfirm();
      });
    }

    /* ── Auto-refresh ────────────────────────────────────────── */
    function refreshAll() {
      loadDashboards(true);
      if (activeDashId) loadDashDetail(activeDashId, true);
    }

    function scheduleRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(refreshAll, REFRESH_MS);
    }

    /* ── Keyboard shortcuts ──────────────────────────────────── */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    /* ── Init ────────────────────────────────────────────────── */
    function init() {
      loadDashboards().then(function () {
        if (dashboards.length > 0) selectDash(dashboards[0].id);
      });
      scheduleRefresh();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  }());
  </script>
</body>
</html>
