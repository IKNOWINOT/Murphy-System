<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Murphy System — System Topology</title>
  <link rel="icon" href="static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="static/murphy-design-system.css">
<style>
  /* Neon terminal theme */
  .murphy-terminal, .murphy-output, pre, code {
    font-family: var(--font-code, 'JetBrains Mono', monospace);
  }
  textarea, input[type="text"] {
    font-family: var(--font-ui, Inter, system-ui, sans-serif);
    color: #00ff00;
    background: #0a0a0a;
  }
</style>
</head>
<body>
  <a href="#canvas-area" class="murphy-skip-link">Skip to topology</a>

  <!-- Topbar -->
  <header class="murphy-topbar" role="banner">
    <div>
      <a href="/ui/terminal-unified" title="Back to Hub">&larr;</a>
      <h1>System Topology</h1>
    </div>
    <div>
      <input type="text" class="murphy-input" placeholder="Search modules (Ctrl+K)…" id="search-input" aria-label="Search modules">
      <button class="murphy-btn murphy-btn-secondary" id="btn-refresh" title="Refresh topology">🔄 Refresh</button>
      <button class="murphy-btn murphy-btn-secondary" id="btn-auto-layout" title="Auto-layout">Auto Layout</button>
      <button class="murphy-btn murphy-btn-icon" id="btn-theme" title="Toggle theme">🌙</button>
    </div>
  </header>

  <!-- Split pane -->
  <div class="murphy-split-pane" id="split-pane">
    <div class="murphy-split-pane-top" id="canvas-area">
      <!-- Canvas -->
      <div class="murphy-canvas-container" id="canvas-container"></div>

      <!-- Live Automations Panel (right sidebar) -->
      <aside id="automations-panel" style="position:absolute;top:8px;right:8px;width:280px;max-height:calc(100% - 16px);overflow-y:auto;background:rgba(15,23,42,0.92);border:1px solid #334155;border-radius:8px;padding:12px;z-index:10;font-size:0.8rem;color:#e2e8f0;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-weight:700;color:#818cf8;letter-spacing:0.05em;">⚡ LIVE AUTOMATIONS</span>
          <span id="auto-count" style="background:#1e293b;border-radius:12px;padding:2px 8px;font-size:0.7rem;color:#94a3b8;">–</span>
        </div>
        <div id="automations-list" style="display:flex;flex-direction:column;gap:6px;">
          <div style="color:#64748b;font-size:0.75rem;text-align:center;padding:8px 0;">Loading…</div>
        </div>
      </aside>

      <!-- Detail panel (slides in from right when node clicked) -->
      <aside id="detail-panel" hidden aria-label="Module details">
        <div id="detail-header">
          <h3 id="detail-title">Module Details</h3>
          <button id="detail-close" class="murphy-btn murphy-btn-icon murphy-btn-sm" aria-label="Close details">&times;</button>
        </div>
        <div id="detail-body"></div>
      </aside>
    </div>

    <div class="murphy-split-pane-handle" id="split-handle" role="separator" aria-orientation="horizontal" tabindex="0"></div>

    <div class="murphy-split-pane-bottom" id="terminal-area"></div>
  </div>

  <script src="static/murphy-components.js"></script>
<script src="murphy_auth.js"></script>
  <script src="static/murphy-canvas.js"></script>
  <script>
    /* ------------------------------------------------------------------ */
    /*  Constants                                                         */
    /* ------------------------------------------------------------------ */

    var ACCENT = '#818CF8';
    var POLL_INTERVAL_MS = 10000;
    var SPLIT_DEFAULT_RATIO = 0.70;

    var TOPO_HEALTH_COLORS = {
      healthy:  '#34D399',
      degraded: '#FBBF24',
      error:    '#F87171',
      offline:  '#6B7280',
      unknown:  '#6B7280'
    };

    var DOMAIN_COLORS = {
      Security:     '#F87171',
      Confidence:   '#FBBF24',
      Learning:     '#34D399',
      Governance:   '#818CF8',
      Delivery:     '#38BDF8',
      Intelligence: '#A78BFA',
      Operations:   '#FB923C',
      Analytics:    '#2DD4BF'
    };

    var DEFAULT_MODULES = [
      { id: 'api_server',        name: 'API Server',        domain: 'Operations',   icon: '🌐', health: 'healthy', description: 'Core REST API gateway',              connections: ['auth_engine', 'mfgc_engine', 'librarian'] },
      { id: 'auth_engine',       name: 'Auth Engine',       domain: 'Security',     icon: '🔐', health: 'healthy', description: 'Authentication & authorization',      connections: ['credential_vault'] },
      { id: 'credential_vault',  name: 'Credential Vault',  domain: 'Security',     icon: '🔒', health: 'healthy', description: 'Encrypted credential storage',        connections: [] },
      { id: 'mfgc_engine',       name: 'MFGC Engine',       domain: 'Governance',   icon: '⬡',  health: 'healthy', description: 'Multi-Factor Governance Controller',  connections: ['confidence_engine'] },
      { id: 'confidence_engine', name: 'Confidence Engine',  domain: 'Confidence',   icon: '📊', health: 'healthy', description: 'Confidence scoring & validation',     connections: ['causality_engine'] },
      { id: 'causality_engine',  name: 'Causality Engine',   domain: 'Intelligence', icon: '🔬', health: 'healthy', description: 'Root-cause & causal analysis',        connections: [] },
      { id: 'librarian',         name: 'System Librarian',   domain: 'Intelligence', icon: '📚', health: 'healthy', description: 'Knowledge management assistant',      connections: [] },
      { id: 'wingman',           name: 'Wingman',            domain: 'Intelligence', icon: '🤖', health: 'healthy', description: 'AI co-pilot assistant',               connections: ['librarian'] },
      { id: 'workflow_engine',   name: 'Workflow Engine',    domain: 'Operations',   icon: '⚡', health: 'healthy', description: 'Task orchestration & scheduling',     connections: ['mfgc_engine', 'delivery_engine'] },
      { id: 'delivery_engine',   name: 'Delivery Engine',    domain: 'Delivery',     icon: '📦', health: 'healthy', description: 'Email, webhook & notification delivery', connections: [] },
      { id: 'hitl_manager',      name: 'HITL Manager',       domain: 'Governance',   icon: '🙋', health: 'healthy', description: 'Human-in-the-loop approval queue',    connections: ['workflow_engine'] },
      { id: 'agent_dashboard',   name: 'Agent Dashboard',    domain: 'Operations',   icon: '👥', health: 'healthy', description: 'Agent metrics & performance',         connections: ['workflow_engine'] },
      { id: 'heatmap_engine',    name: 'Heatmap Engine',     domain: 'Analytics',    icon: '🗺', health: 'healthy', description: 'Spatial analytics & activity heatmaps', connections: [] },
      { id: 'efficiency_engine', name: 'Efficiency Engine',  domain: 'Analytics',    icon: '📈', health: 'healthy', description: 'Resource utilization tracking',       connections: [] },
      { id: 'safety_monitor',    name: 'Safety Monitor',     domain: 'Security',     icon: '🛡', health: 'healthy', description: 'Runtime safety & anomaly detection',  connections: ['mfgc_engine'] },
      { id: 'integration_hub',   name: 'Integration Hub',    domain: 'Delivery',     icon: '🔌', health: 'healthy', description: 'Third-party integration router',      connections: ['delivery_engine'] }
    ];

    var GOVERNANCE_GATES = ['executive', 'operations', 'qa', 'hitl', 'compliance', 'budget'];

    /* ------------------------------------------------------------------ */
    /*  State                                                             */
    /* ------------------------------------------------------------------ */

    var pollTimerId = null;
    var currentModules = [];
    var selectedNodeId = null;

    /* ------------------------------------------------------------------ */
    /*  Component Initialization                                          */
    /* ------------------------------------------------------------------ */

    var api, health, theme, librarian, canvas, interaction, autoLayout, terminal;

    function initComponents() {
      api       = new MurphyAPI('/api');
      health    = new MurphyHealth(api);
      theme     = new MurphyTheme();
      librarian = new MurphyLibrarianChat(api);

      theme.init();
      health.start();
      librarian.setContext('system_visualizer');
    }

    function initCanvas() {
      canvas      = new MurphyCanvas(document.getElementById('canvas-container'), { showGrid: true, showMinimap: true });
      interaction = new MurphyCanvasInteraction(canvas);
      autoLayout  = new MurphyAutoLayout(canvas);
      canvas.render();
    }

    function initTerminal() {
      terminal = new MurphyTerminalPanel(document.getElementById('terminal-area'), {
        apiEndpoint: '/api/execute',
        prompt: 'system>'
      });
    }

    /* ------------------------------------------------------------------ */
    /*  Helpers                                                           */
    /* ------------------------------------------------------------------ */

    function getHealthColor(h) {
      return TOPO_HEALTH_COLORS[h] || TOPO_HEALTH_COLORS.unknown;
    }

    function getGateColor(gate) {
      return ACCENT;
    }

    function getDomainColor(domain) {
      return DOMAIN_COLORS[domain] || '#6B7280';
    }

    function parseModules(statusData, infoData) {
      var modules = [];
      var statusMap = {};
      var infoMap = {};

      if (statusData && statusData.modules) {
        statusData.modules.forEach(function(m) { statusMap[m.id] = m; });
      }
      if (infoData && infoData.modules) {
        infoData.modules.forEach(function(m) { infoMap[m.id] = m; });
      }

      var ids = Object.keys(statusMap).length > 0 ? Object.keys(statusMap) : Object.keys(infoMap);

      ids.forEach(function(id) {
        var s = statusMap[id] || {};
        var info = infoMap[id] || {};
        modules.push({
          id: id,
          name: s.name || info.name || id,
          domain: s.domain || info.domain || 'Operations',
          icon: s.icon || info.icon || '📦',
          health: s.health || s.status || 'unknown',
          description: s.description || info.description || '',
          connections: s.connections || info.connections || [],
          uptime: s.uptime || null,
          events: s.events || []
        });
      });

      return modules;
    }

    /* ------------------------------------------------------------------ */
    /*  Topology Loading                                                  */
    /* ------------------------------------------------------------------ */

    function buildTopologyFromModules(modules) {
      canvas.clear();
      currentModules = modules;

      modules.forEach(function(mod) {
        var node = new MurphyNode({
          id: mod.id,
          x: 0,
          y: 0,
          type: mod.domain === 'Governance' ? 'gate' : 'module',
          label: mod.name,
          icon: mod.icon || '📦',
          color: getHealthColor(mod.health),
          health: mod.health,
          data: {
            domain: mod.domain,
            description: mod.description,
            uptime: mod.uptime,
            events: mod.events,
            connections: mod.connections
          }
        });
        canvas.addNode(node);
      });

      modules.forEach(function(mod) {
        (mod.connections || []).forEach(function(targetId) {
          var hasTarget = modules.some(function(m) { return m.id === targetId; });
          if (!hasTarget) return;
          canvas.addEdge(new MurphyEdge({
            id: mod.id + '-' + targetId,
            sourceNodeId: mod.id,
            sourcePortId: 'out',
            targetNodeId: targetId,
            targetPortId: 'in',
            animated: true,
            color: '#2A3A4E'
          }));
        });
      });

      GOVERNANCE_GATES.forEach(function(gate) {
        var gateId = 'gate-' + gate;
        var exists = modules.some(function(m) { return m.id === gateId; });
        if (!exists) {
          canvas.addNode(new MurphyNode({
            id: gateId,
            x: 0,
            y: 0,
            type: 'gate',
            label: gate.charAt(0).toUpperCase() + gate.slice(1),
            icon: '⬡',
            color: getGateColor(gate),
            data: { domain: 'Governance', isGate: true }
          }));
        }
      });

      autoLayout.forceDirected({ iterations: 300 });
      canvas.fitView();
    }

    async function loadTopology() {
      try {
        var results = await Promise.all([
          api.get('/status'),
          api.get('/system/info')
        ]);
        var statusRes = results[0];
        var infoRes   = results[1];
        var modules   = parseModules(statusRes.data, infoRes.data);

        if (modules.length === 0) {
          throw new Error('No modules returned from API');
        }
        buildTopologyFromModules(modules);
      } catch (err) {
        console.warn('API unavailable, using default topology:', err.message || err);
        buildTopologyFromModules(DEFAULT_MODULES);
      }
    }

    /* ------------------------------------------------------------------ */
    /*  Live Polling                                                      */
    /* ------------------------------------------------------------------ */

    function startPolling() {
      if (pollTimerId) clearInterval(pollTimerId);
      pollTimerId = setInterval(pollStatus, POLL_INTERVAL_MS);
    }

    async function pollStatus() {
      try {
        var res = await api.get('/status');
        if (!res || !res.data || !res.data.modules) return;
        res.data.modules.forEach(function(m) {
          var node = canvas.getNode ? canvas.getNode(m.id) : null;
          if (node && node.setHealth) {
            node.setHealth(m.health || m.status || 'unknown');
          }
        });
        canvas.render();
      } catch (_) {
        /* polling failure is non-fatal */
      }
    }

    /* ------------------------------------------------------------------ */
    /*  Live Automations Panel                                             */
    /* ------------------------------------------------------------------ */

    var _autoList    = document.getElementById('automations-list');
    var _autoCount   = document.getElementById('auto-count');
    var _autoTimerId = null;
    var _STATUS_COLORS = {
      running:   '#22c55e',
      completed: '#818cf8',
      failed:    '#ef4444',
      queued:    '#f59e0b',
      scheduled: '#38bdf8',
    };

    function _renderAutomations(items) {
      _autoCount.textContent = items.length;
      if (!items.length) {
        _autoList.innerHTML = '<div style="color:#64748b;font-size:0.75rem;text-align:center;padding:8px 0;">No active automations</div>';
        return;
      }
      _autoList.innerHTML = items.map(function(a) {
        var status  = (a.status || 'unknown').toLowerCase();
        var color   = _STATUS_COLORS[status] || '#94a3b8';
        var elapsed = a.duration_ms ? (a.duration_ms / 1000).toFixed(1) + 's' : '';
        var pct     = typeof a.progress === 'number' ? a.progress : null;
        return '<div style="background:#0f172a;border:1px solid #1e293b;border-radius:6px;padding:8px 10px;">' +
          '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">' +
            '<span style="width:8px;height:8px;border-radius:50%;background:' + color + ';flex-shrink:0;"></span>' +
            '<span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;" title="' + (a.workflow_id || a.id || '') + '">' +
              (a.name || a.workflow_id || a.id || 'Automation') + '</span>' +
            '<span style="font-size:0.7rem;color:' + color + ';flex-shrink:0;">' + status + '</span>' +
          '</div>' +
          (pct !== null ? '<div style="background:#1e293b;border-radius:4px;height:4px;overflow:hidden;"><div style="background:' + color + ';width:' + Math.min(100, pct) + '%;height:100%;transition:width 0.3s;"></div></div>' : '') +
          '<div style="display:flex;justify-content:space-between;color:#64748b;font-size:0.7rem;margin-top:4px;">' +
            '<span>' + (a.step_label || (a.completed + '/' + a.total_steps + ' steps' || '')) + '</span>' +
            '<span>' + elapsed + '</span>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    async function pollAutomations() {
      try {
        // Primary: execution queue
        var res = await api.get('/automations/executions');
        var items = [];
        if (res && res.data) {
          items = Array.isArray(res.data) ? res.data :
                  (res.data.executions || res.data.items || []);
        }
        // Fallback: production queue
        if (!items.length) {
          var pq = await api.get('/production/queue');
          if (pq && pq.data) {
            items = (pq.data.queue || pq.data.items || []).map(function(i) {
              return { id: i.id, name: i.name || i.title || i.type, status: i.status || 'queued' };
            });
          }
        }
        _renderAutomations(items);
      } catch (_) {
        /* non-fatal */
      }
    }

    function startAutomationPolling() {
      pollAutomations();
      _autoTimerId = setInterval(pollAutomations, 5000);
    }

    /* ------------------------------------------------------------------ */
    /*  Detail Panel                                                      */
    /* ------------------------------------------------------------------ */

    var detailPanel  = document.getElementById('detail-panel');
    var detailTitle  = document.getElementById('detail-title');
    var detailBody   = document.getElementById('detail-body');
    var detailClose  = document.getElementById('detail-close');

    function showDetail(nodeId) {
      var mod = currentModules.find(function(m) { return m.id === nodeId; });
      if (!mod) {
        mod = { id: nodeId, name: nodeId, domain: 'Unknown', health: 'unknown', description: '', connections: [], events: [] };
      }

      selectedNodeId = nodeId;
      detailTitle.textContent = mod.name;

      var healthLabel = mod.health || 'unknown';
      var healthDot   = '<span style="color:' + getHealthColor(healthLabel) + '">●</span>';
      var domainBadge = '<span style="color:' + getDomainColor(mod.domain) + '">' + (mod.domain || 'N/A') + '</span>';

      var depsList = (mod.connections || []).map(function(c) { return '<li>' + c + '</li>'; }).join('') || '<li>None</li>';
      var eventsList = '';
      if (mod.events && mod.events.length > 0) {
        eventsList = mod.events.slice(0, 10).map(function(e) {
          return '<li>' + (typeof e === 'string' ? e : (e.message || JSON.stringify(e))) + '</li>';
        }).join('');
      } else {
        eventsList = '<li>No recent events</li>';
      }

      detailBody.innerHTML =
        '<dl>' +
          '<dt>Domain</dt><dd>' + domainBadge + '</dd>' +
          '<dt>Health</dt><dd>' + healthDot + ' ' + healthLabel + '</dd>' +
          (mod.uptime ? '<dt>Uptime</dt><dd>' + mod.uptime + '</dd>' : '') +
          '<dt>Description</dt><dd>' + (mod.description || 'No description available') + '</dd>' +
        '</dl>' +
        '<h4>Dependencies</h4><ul>' + depsList + '</ul>' +
        '<h4>Recent Events</h4><ul>' + eventsList + '</ul>';

      detailPanel.hidden = false;
      loadDetailEvents(nodeId);
    }

    async function loadDetailEvents(nodeId) {
      try {
        var res = await api.get('/agent-dashboard/events');
        if (!res || !res.data || !res.data.events) return;
        var relevant = res.data.events.filter(function(e) {
          return e.module === nodeId || e.source === nodeId;
        }).slice(0, 10);
        if (relevant.length > 0) {
          var container = detailBody.querySelector('ul:last-of-type');
          if (container) {
            container.innerHTML = relevant.map(function(e) {
              return '<li>' + (e.message || e.type || JSON.stringify(e)) + '</li>';
            }).join('');
          }
        }
      } catch (_) {
        /* non-fatal */
      }
    }

    function hideDetail() {
      detailPanel.hidden = true;
      selectedNodeId = null;
    }

    detailClose.addEventListener('click', hideDetail);

    /* ------------------------------------------------------------------ */
    /*  Search (Ctrl+K)                                                   */
    /* ------------------------------------------------------------------ */

    var searchInput = document.getElementById('search-input');

    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
      if (e.key === 'Escape') {
        searchInput.value = '';
        clearSearch();
        searchInput.blur();
        hideDetail();
      }
    });

    searchInput.addEventListener('input', function() {
      var query = searchInput.value.trim().toLowerCase();
      if (!query) {
        clearSearch();
        return;
      }
      highlightMatches(query);
    });

    searchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var query = searchInput.value.trim().toLowerCase();
        if (!query) return;
        var match = currentModules.find(function(m) {
          return m.id.toLowerCase().indexOf(query) !== -1 ||
                 m.name.toLowerCase().indexOf(query) !== -1 ||
                 (m.domain && m.domain.toLowerCase().indexOf(query) !== -1);
        });
        if (match && canvas.zoomToNode) {
          canvas.zoomToNode(match.id);
        }
      }
    });

    function highlightMatches(query) {
      currentModules.forEach(function(mod) {
        var isMatch = mod.id.toLowerCase().indexOf(query) !== -1 ||
                      mod.name.toLowerCase().indexOf(query) !== -1 ||
                      (mod.domain && mod.domain.toLowerCase().indexOf(query) !== -1);
        var node = canvas.getNode ? canvas.getNode(mod.id) : null;
        if (node) {
          if (node.setOpacity) {
            node.setOpacity(isMatch ? 1.0 : 0.2);
          }
          if (node.setHighlight) {
            node.setHighlight(isMatch);
          }
        }
      });
      canvas.render();
    }

    function clearSearch() {
      currentModules.forEach(function(mod) {
        var node = canvas.getNode ? canvas.getNode(mod.id) : null;
        if (node) {
          if (node.setOpacity) node.setOpacity(1.0);
          if (node.setHighlight) node.setHighlight(false);
        }
      });
      canvas.render();
    }

    /* ------------------------------------------------------------------ */
    /*  Split Pane Resize                                                 */
    /* ------------------------------------------------------------------ */

    (function initSplitPane() {
      var splitPane  = document.getElementById('split-pane');
      var handle     = document.getElementById('split-handle');
      var topPanel   = document.getElementById('canvas-area');
      var bottomPanel = document.getElementById('terminal-area');
      var isDragging = false;

      function applyRatio(ratio) {
        ratio = Math.max(0.2, Math.min(0.9, ratio));
        topPanel.style.flex    = '0 0 ' + (ratio * 100) + '%';
        bottomPanel.style.flex = '0 0 ' + ((1 - ratio) * 100) + '%';
      }

      applyRatio(SPLIT_DEFAULT_RATIO);

      handle.addEventListener('mousedown', function(e) {
        e.preventDefault();
        isDragging = true;
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
      });

      document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        var rect  = splitPane.getBoundingClientRect();
        var ratio = (e.clientY - rect.top) / rect.height;
        applyRatio(ratio);
      });

      document.addEventListener('mouseup', function() {
        if (!isDragging) return;
        isDragging = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        if (canvas && canvas.render) canvas.render();
      });

      handle.addEventListener('keydown', function(e) {
        var currentRatio = topPanel.getBoundingClientRect().height / splitPane.getBoundingClientRect().height;
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          applyRatio(currentRatio - 0.05);
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          applyRatio(currentRatio + 0.05);
        }
      });
    })();

    /* ------------------------------------------------------------------ */
    /*  Button Handlers                                                   */
    /* ------------------------------------------------------------------ */

    document.getElementById('btn-refresh').addEventListener('click', function() {
      loadTopology();
    });

    document.getElementById('btn-auto-layout').addEventListener('click', function() {
      if (autoLayout) {
        autoLayout.forceDirected({ iterations: 300 });
        canvas.fitView();
      }
    });

    document.getElementById('btn-theme').addEventListener('click', function() {
      if (theme && theme.toggle) {
        theme.toggle();
      }
    });

    /* ------------------------------------------------------------------ */
    /*  Canvas Node Selection                                             */
    /* ------------------------------------------------------------------ */

    function bindCanvasEvents() {
      if (!canvas || !canvas.on) return;

      canvas.on('node:click', function(e) {
        var nodeId = e.nodeId || (e.node && e.node.id);
        if (nodeId) {
          showDetail(nodeId);
        }
      });

      canvas.on('canvas:click', function() {
        hideDetail();
      });
    }

    /* ------------------------------------------------------------------ */
    /*  Startup                                                           */
    /* ------------------------------------------------------------------ */

    (async function main() {
      try {
        initComponents();
      } catch (err) {
        console.warn('Component init partial failure:', err);
      }
      try {
        initCanvas();
        bindCanvasEvents();
      } catch (err) {
        console.warn('Canvas init failure:', err);
      }
      try {
        initTerminal();
      } catch (err) {
        console.warn('Terminal init failure:', err);
      }

      await loadTopology();
      startPolling();
      startAutomationPolling();
    })();
  </script>
</body>
</html>
