<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murphy Console — talk to your system</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0a0e14;
  color: #c9d1d9;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: #0d1117;
  border-bottom: 1px solid #21262d;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 {
  font-size: 16px;
  font-weight: 600;
  color: #58a6ff;
  letter-spacing: -0.2px;
}
header h1 .dot {
  display: inline-block;
  width: 8px; height: 8px;
  background: #3fb950;
  border-radius: 50%;
  margin-right: 8px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.status-bar {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: #8b949e;
}
.status-pill {
  background: #161b22;
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid #21262d;
}

main {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

.msg {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 16px;
  line-height: 1.5;
  font-size: 14.5px;
  word-wrap: break-word;
  animation: fadeIn 0.2s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user {
  align-self: flex-end;
  background: #1f6feb;
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  align-self: flex-start;
  background: #161b22;
  border: 1px solid #21262d;
  border-bottom-left-radius: 4px;
}
.msg.system {
  align-self: center;
  background: transparent;
  color: #6e7681;
  font-size: 12px;
  font-style: italic;
  max-width: 100%;
}
.tool-block {
  margin-top: 10px;
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 8px;
  padding: 10px 12px;
  font-family: "SF Mono", Menlo, Monaco, monospace;
  font-size: 12px;
  color: #79c0ff;
}
.tool-block .tool-name {
  color: #d2a8ff;
  font-weight: 600;
  margin-bottom: 4px;
}
.tool-block pre {
  white-space: pre-wrap;
  word-break: break-word;
  color: #8b949e;
  max-height: 250px;
  overflow-y: auto;
  font-size: 11px;
  margin-top: 6px;
}

footer {
  background: #0d1117;
  border-top: 1px solid #21262d;
  padding: 14px 20px;
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.input-wrap {
  flex: 1;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 4px;
  transition: border 0.15s;
}
.input-wrap:focus-within { border-color: #58a6ff; }
textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: #c9d1d9;
  font-family: inherit;
  font-size: 14.5px;
  padding: 8px 12px;
  resize: none;
  max-height: 120px;
  outline: none;
  line-height: 1.4;
}
button {
  background: #1f6feb;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  height: 42px;
}
button:hover { background: #388bfd; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.icon {
  padding: 10px 12px;
  background: #21262d;
}
button.icon:hover { background: #30363d; }
button.icon.recording {
  background: #da3633;
  animation: recording 1.4s infinite;
}
@keyframes recording {
  0%, 100% { box-shadow: 0 0 0 0 rgba(218, 54, 51, 0.6); }
  50% { box-shadow: 0 0 0 8px rgba(218, 54, 51, 0); }
}
.toggle-row {
  display: flex;
  gap: 14px;
  margin-top: 8px;
  font-size: 12px;
  color: #6e7681;
}
.toggle-row label {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}
.hints {
  font-size: 11px;
  color: #6e7681;
  margin-top: 6px;
}
.hint-pill {
  display: inline-block;
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 10px;
  padding: 3px 8px;
  margin: 2px 4px 2px 0;
  cursor: pointer;
  font-size: 11px;
  color: #8b949e;
}
.hint-pill:hover { color: #58a6ff; border-color: #58a6ff; }
.thinking {
  align-self: flex-start;
  color: #6e7681;
  font-size: 13px;
  font-style: italic;
}
.thinking::after {
  content: '';
  animation: dots 1.4s infinite;
}
@keyframes dots {
  0%, 20% { content: '.'; }
  40% { content: '..'; }
  60%, 100% { content: '...'; }
}
</style>
</head>
<body>

<header>
  <h1><span class="dot"></span>Murphy Console</h1>
  <div class="status-bar">
    <span class="status-pill" id="status-mode">text mode</span>
    <span class="status-pill" id="status-tools">– tools</span>
    <span class="status-pill" id="status-session">no session</span>
  </div>
</header>

<main id="messages">
  <div class="msg system">
    Connected. I can run tools, read logs, query databases, restart services,
    send mail. Try: "system status" or "list open tickets" or "tail murphy logs".
  </div>
</main>

<footer>
  <div class="input-row">
    <button id="mic-btn" class="icon" title="Voice input (hold or click)">🎙</button>
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Talk to Murphy…"></textarea>
    </div>
    <button id="send-btn">Send</button>
  </div>
  <div class="toggle-row">
    <label><input type="checkbox" id="auto-exec" checked> auto-execute tools</label>
    <label><input type="checkbox" id="voice-out"> voice replies</label>
    <label><input type="checkbox" id="continuous"> continuous mic</label>
  </div>
  <div class="hints">
    <span class="hint-pill" data-msg="system status">system status</span>
    <span class="hint-pill" data-msg="list open tickets">list tickets</span>
    <span class="hint-pill" data-msg="tail murphy-production logs">murphy logs</span>
    <span class="hint-pill" data-msg="check service nginx">nginx status</span>
    <span class="hint-pill" data-msg="search events for grant">audit grants</span>
  </div>
</footer>

<script>
const $ = (s) => document.querySelector(s);
const messages = $("#messages");
const input = $("#input");
const sendBtn = $("#send-btn");
const micBtn = $("#mic-btn");
const autoExec = $("#auto-exec");
const voiceOut = $("#voice-out");
const continuous = $("#continuous");

let sessionId = null;
let recognizing = false;
let recognition = null;

// auto-grow textarea
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.onclick = sendMessage;

document.querySelectorAll(".hint-pill").forEach(p => {
  p.onclick = () => {
    input.value = p.dataset.msg;
    sendMessage();
  };
});

function addMessage(role, text, toolCalls) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  if (toolCalls && toolCalls.length) {
    toolCalls.forEach(tc => {
      const tb = document.createElement("div");
      tb.className = "tool-block";
      const name = document.createElement("div");
      name.className = "tool-name";
      name.textContent = "▶ " + tc.tool + "(" + JSON.stringify(tc.args || {}) + ")";
      tb.appendChild(name);
      const pre = document.createElement("pre");
      pre.textContent = JSON.stringify(tc.result, null, 2).slice(0, 2000);
      tb.appendChild(pre);
      div.appendChild(tb);
    });
  }
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function showThinking() {
  const div = document.createElement("div");
  div.className = "thinking";
  div.id = "thinking-indicator";
  div.textContent = "thinking";
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}
function clearThinking() {
  const t = $("#thinking-indicator");
  if (t) t.remove();
}

function speak(text) {
  if (!voiceOut.checked) return;
  if (!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(text.slice(0, 500));
  u.rate = 1.05;
  u.pitch = 1.0;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

async function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  input.style.height = "auto";
  addMessage("user", msg);
  showThinking();
  sendBtn.disabled = true;

  try {
    const r = await fetch("/api/console/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: msg,
        session_id: sessionId,
        auto_execute: autoExec.checked,
      }),
    });
    const data = await r.json();
    clearThinking();
    if (data.ok) {
      sessionId = data.session_id;
      $("#status-session").textContent = "sess " + sessionId.slice(-6);
      addMessage("assistant", data.response || "(no response)", data.tool_calls);
      speak(data.response || "");
    } else {
      addMessage("assistant", "Error: " + (data.error || "unknown"));
    }
  } catch (e) {
    clearThinking();
    addMessage("assistant", "Network error: " + e.message);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

// Voice input — Web Speech API
function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    micBtn.style.opacity = "0.3";
    micBtn.title = "voice not supported in this browser";
    return;
  }
  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = false;
  recognition.continuous = false;

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results)
      .map(r => r[0].transcript).join(" ");
    input.value = transcript;
    if (transcript.trim()) sendMessage();
  };
  recognition.onend = () => {
    recognizing = false;
    micBtn.classList.remove("recording");
    $("#status-mode").textContent = "text mode";
    if (continuous.checked) {
      setTimeout(() => { try { recognition.start(); recognizing = true; micBtn.classList.add("recording"); } catch (e) {} }, 500);
    }
  };
  recognition.onerror = (e) => {
    recognizing = false;
    micBtn.classList.remove("recording");
    console.warn("speech err:", e.error);
  };
}
initVoice();

micBtn.onclick = () => {
  if (!recognition) return;
  if (recognizing) {
    recognition.stop();
  } else {
    try {
      recognition.start();
      recognizing = true;
      micBtn.classList.add("recording");
      $("#status-mode").textContent = "listening…";
    } catch (e) {
      console.warn(e);
    }
  }
};

// Load tool count
fetch("/api/console/tools").then(r => r.json()).then(d => {
  if (d.ok) $("#status-tools").textContent = d.tools.length + " tools";
});

input.focus();
</script>

</body>
</html>
