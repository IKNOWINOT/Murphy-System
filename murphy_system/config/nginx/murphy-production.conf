# Murphy System — Nginx Production Vhost
# Copyright © 2020 Inoni Limited Liability Company | License: BSL-1.1
#
# Install:
#   sudo cp config/nginx/murphy-production.conf /etc/nginx/sites-available/murphy-production
#   sudo ln -sf /etc/nginx/sites-available/murphy-production \
#                /etc/nginx/sites-enabled/murphy-production
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (Let's Encrypt):
#   sudo certbot --nginx -d murphy.systems -d mail.murphy.systems
#
# What this config routes:
#   /                  → Murphy API :8000  (FastAPI app + static website HTML)
#   /api/              → Murphy API :8000  (REST API)
#   /ui/               → Murphy API :8000  (UI pages served by FastAPI)
#   /static/           → Murphy API :8000  (CSS/JS/assets)
#   /docs              → Murphy API :8000  (Swagger UI)
#   /metrics           → Murphy API :8000  (Prometheus scrape endpoint)
#   /grafana/          → Grafana    :3000  (dashboards — authenticated)
#   /mail/             → Roundcube  :8443  (webmail UI)
#   /health            → Murphy API :8000  (load-balancer probe, no logs)
# ---------------------------------------------------------------------------

# ── Upstream backends ───────────────────────────────────────────────────────
upstream murphy_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream murphy_grafana {
    server 127.0.0.1:3000;
    keepalive 8;
}

upstream murphy_webmail {
    server 127.0.0.1:8443;
    keepalive 8;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name murphy.systems www.murphy.systems mail.murphy.systems;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name murphy.systems www.murphy.systems;

    # ── TLS (managed by certbot — do not edit manually) ─────────────────────
    # ssl_certificate     /etc/letsencrypt/live/murphy.systems/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/murphy.systems/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    #
    # Self-signed fallback (dev / first boot before certbot runs):
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 50M;

    # ── Shared proxy headers ─────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection        "";

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    120s;

    # ── Health probe (no access logs — used by load balancers) ──────────────
    location = /health {
        proxy_pass http://murphy_api/api/health;
        access_log off;
    }

    # ── Prometheus metrics ───────────────────────────────────────────────────
    # Restrict to internal network — remove the allow/deny block if using
    # a Prometheus instance on a different host.
    location = /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
        proxy_pass http://murphy_api/metrics;
        access_log off;
    }

    # ── Grafana dashboards ───────────────────────────────────────────────────
    # GF_SERVER_SERVE_FROM_SUB_PATH=true means Grafana registers its routes
    # at /grafana/ internally.  Do NOT strip the prefix — proxy the full path.
    location /grafana/ {
        proxy_pass http://murphy_grafana;
        proxy_set_header Host $host;
    }

    # ── Roundcube webmail ────────────────────────────────────────────────────
    # Roundcube does not support subpath serving natively.  We strip /mail/
    # so Roundcube receives requests at root /.  Roundcube uses relative URLs
    # internally so page navigation works; set $config['base_url'] in
    # config/roundcube/config.inc.php if absolute redirects are needed.
    location /mail/ {
        proxy_pass http://murphy_webmail/;
        proxy_set_header Host $host;
    }

    # ── Static assets (JS / CSS) — long-lived cache, fine because filenames
    #    should be versioned or cache-busted by the app
    location /static/ {
        proxy_pass http://murphy_api;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # ── Murphy API, website, and all UI pages ────────────────────────────────
    # Catches everything not matched above:
    #   /           → murphy_landing_page.html (served by FastAPI StaticFiles)
    #   /ui/*       → Murphy UI pages
    #   /api/*      → Murphy REST API
    #   /docs       → Swagger UI
    location / {
        proxy_pass http://murphy_api;

        # WebSocket support (for real-time features)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Prevent browsers from serving a stale copy of HTML pages after a deploy.
        # ETags from the app still allow conditional GET (304 Not Modified) so
        # bandwidth is not wasted on unchanged content.
        add_header Cache-Control "no-cache";
    }
}

# ── Mail subdomain (HTTPS) ──────────────────────────────────────────────────
# Redirects mail.murphy.systems → murphy.systems/mail/ for webmail access
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.murphy.systems;

    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        return 301 https://murphy.systems/mail/;
    }
}
