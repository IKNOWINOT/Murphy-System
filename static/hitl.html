<style>

         margin:0; padding:2rem 1rem; }

  header { display:flex; align-items:baseline; justify-content:space-between;
           padding-bottom:1rem; border-bottom:1px solid rgba(0,212,170,.13); margin-bottom:1.5rem; }
  h1 { color:#00D4AA; font-weight:700; margin:0; font-size:1.8rem; }
  .sub { color:#7a9a8a; font-size:.85rem; }

  .empty .check { color:#00ff6a; font-size:2.5rem; margin-bottom:.5rem; }
  .item { background:#111a15; border:1px solid rgba(0,212,170,.13); border-radius:10px;
          padding:1rem 1.25rem; margin-bottom:1rem; }

  .badge.urgent { background:rgba(255,140,66,.15); color:#ff8c42; }
  .badge.crit { background:rgba(255,71,87,.15); color:#ff4757; }

<style>
/* _R474_DRILL */
.drill-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90;display:none}
.drill-overlay.open{display:block}
.drill-panel{position:fixed;top:0;right:0;bottom:0;width:min(720px,92vw);background:#0a0f0d;color:#dfe8e3;box-shadow:-2px 0 24px rgba(0,212,170,.18);z-index:100;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;padding:24px 28px;font:13px/1.5 -apple-system,sans-serif;border-left:1px solid #1f2826}
.drill-panel.open{transform:translateX(0)}
.drill-close{position:absolute;top:18px;right:24px;background:none;border:none;color:#888;font-size:24px;cursor:pointer;line-height:1}
.drill-close:hover{color:#FF6B6B}
.drill-h1{color:#00D4AA;font-size:14px;letter-spacing:.08em;text-transform:uppercase;margin:0 0 4px}
.drill-h2{color:#fff;font-size:15px;font-weight:600;margin:0 0 18px;line-height:1.3}
.drill-section{background:#101716;border:1px solid #1f2826;border-radius:6px;padding:14px 16px;margin:14px 0}
.drill-section h3{margin:0 0 10px;color:#00D4AA;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.drill-kv{display:grid;grid-template-columns:140px 1fr;gap:6px 14px;font-size:12px}
.drill-kv dt{color:#888}
.drill-kv dd{margin:0;color:#dfe8e3;word-break:break-word}
.drill-text{background:#000;border-left:3px solid #00D4AA;padding:10px 12px;border-radius:0 4px 4px 0;font:12px/1.55 ui-monospace,Menlo,monospace;white-space:pre-wrap;color:#cfd8d4;max-height:280px;overflow:auto}
.drill-text.template{border-left-color:#888}
.drill-text mark{background:rgba(0,212,170,.22);color:#00ffaa;padding:0 2px;border-radius:2px}
.drill-flag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;margin:0 4px 4px 0;letter-spacing:.04em}
.drill-flag.ok{background:rgba(0,212,170,.18);color:#00D4AA}
.drill-flag.warn{background:rgba(255,180,0,.18);color:#ffb400}
.drill-flag.err{background:rgba(255,107,107,.18);color:#FF6B6B}
.drill-actions{display:flex;gap:8px;margin-top:18px;padding-top:18px;border-top:1px solid #1f2826;position:sticky;bottom:0;background:#0a0f0d;padding-bottom:4px}
.drill-actions button{flex:1;padding:10px 14px;border:none;border-radius:5px;font-weight:600;cursor:pointer;font-size:13px}
.drill-actions .approve{background:#00D4AA;color:#080c0a}
.drill-actions .approve:hover{background:#00ff6a}

.drill-loading{text-align:center;padding:60px 20px;color:#888}
.drill-tab{padding:6px 0;cursor:pointer;color:#888;margin-right:18px;border-bottom:2px solid transparent;display:inline-block;font-size:12px}
.drill-tab.active{color:#00D4AA;border-bottom-color:#00D4AA}
.drill-tabs{border-bottom:1px solid #1f2826;margin:12px 0 14px}
.drill-tabpanel{display:none}
.drill-tabpanel.active{display:block}
.item .drill-btn{background:none;border:1px solid #1f2826;color:#888;padding:6px 10px;border-radius:4px;font-size:11px;cursor:pointer;margin-right:auto}
.item .drill-btn:hover{border-color:#00D4AA;color:#00D4AA}
.item .actions{gap:8px;align-items:center}

<body>
<div class="wrap">
<header>
  <a class="brand" href="/"><img src="/static/logo.svg" alt=""><strong>Murphy</strong> · HITL</a>
  <span class="sub" id="counter">loading…</span>
</header>

<div id="root"><div class="empty">loading…</div></div>
<div class="sub" style="text-align:center;margin-top:2rem;">
  Items older than 24h auto-expire nightly. Refreshes every 15 seconds.
</div>
</div>

<script>
async function fetchAll() {
  const [mail, jobs, incidents] = await Promise.all([
    fetch('/api/mail/outbound/queue?status=pending_review', {credentials:'include'})
      .then(r => r.ok ? r.json() : {queue:[]}).catch(() => ({queue:[]})),
    fetch('/api/hitl/queue?fresh=1', {credentials:'include'})
      .then(r => r.ok ? r.json() : {jobs:[]}).catch(() => ({jobs:[]})),
    // PATCH-HITL-UNIFY 2026-05-27: incident router writes to hitl.db.interventions.
    // We surface them via /api/incidents (status='open' = pending review).
    fetch('/api/incidents?status=open&limit=50', {credentials:'include'})
      .then(r => r.ok ? r.json() : {incidents:[]}).catch(() => ({incidents:[]})),
  ]);

  const items = [];
  for (const m of (mail.queue || mail.items || [])) {
    if (m.status && m.status !== 'pending_review') continue;
    items.push({
      kind:'email', id:m.queue_id || m.id, title:m.subject || '(no subject)',
      meta:(m.agent_role || 'agent') + ' → ' + (Array.isArray(m.to_addresses) ? m.to_addresses.join(', ') : m.to_addresses || ''),
      preview:(m.body || '').slice(0, 1000),
      urgency:m.urgency || 'normal', created_at:m.created_at,
      approve_url:'/api/mail/outbound/' + (m.queue_id || m.id) + '/approve',
      reject_url:'/api/mail/outbound/' + (m.queue_id || m.id) + '/reject',
    });
  }
  for (const j of (jobs.jobs || jobs.items || [])) {
    if (j.status && j.status !== 'open') continue;
    items.push({
      kind:'job', id:j.id, title:j.title || j.template_code,
      meta:[j.discipline, j.template_code, j.priority].filter(Boolean).join(' · '),
      preview:(j.notes || '(engineering deliverable — full payload in submitted_data)').slice(0,1000),
      urgency:j.priority || 'normal', created_at:j.created_at,
      approve_url:'/api/hitl/items/' + j.id + '/decide', approve_payload:{action:'approve'},
      reject_url:'/api/hitl/items/' + j.id + '/decide', reject_payload:{action:'reject',notes:'rejected via /hitl page'},
    });
  }
  for (const inc of (incidents.incidents || [])) {
    items.push({
      kind:'incident', id:inc.incident_id, title:inc.title || '(no title)',
      meta:[inc.source, inc.dept, 'sev:'+inc.severity].filter(Boolean).join(' · '),
      preview:(inc.title || '') + (inc.email_status==='sent' ? '\n\n[email sent to founder]' : '') +
              (inc.sms_status==='sent_via_gateway' ? '\n[SMS sent via gateway]' : '') +
              (inc.hitl_id ? '\n[HITL id: '+inc.hitl_id+']' : ''),
      urgency:inc.severity || 'normal', created_at:inc.created_at,
      approve_url:'/api/incidents/' + inc.incident_id + '/approve',
      reject_url:'/api/incidents/' + inc.incident_id + '/reject',
    });
  }
  items.sort((a,b) => (a.created_at < b.created_at ? 1 : -1));
  render(items);
}

function render(items) {
  document.getElementById('counter').textContent =
    items.length === 0 ? 'all clear' : (items.length + ' pending');
  const root = document.getElementById('root');
  if (items.length === 0) {
    root.innerHTML = '<div class="empty"><div class="check">✓</div>' +
      '<div>All clear. Murphy isn\'t waiting on any approval right now.</div>' +
      '<div class="sub" style="margin-top:.5rem;">Stale items (>24h) auto-expire nightly.</div></div>';
    return;
  }
  root.innerHTML = items.map(renderOne).join('');
  bindActions();
}

function renderOne(i) {
  const u = (i.urgency || '').toLowerCase();
  const bc = u==='critical' ? 'crit' : (u==='high'||u==='urgent') ? 'urgent' : '';
  const itemId = i.id || '';
  return '<div class="item" data-item-id="' + esc(itemId) + '">' +
    '<div class="item-head"><div>' +
      '<span class="badge ' + bc + '">' + i.kind + ' · ' + (i.urgency || 'normal') + '</span> ' +
      '<strong>' + esc(i.title) + '</strong>' +
    '</div><span class="meta">' + humanAge(i.created_at) + '</span></div>' +
    '<div class="meta">' + esc(i.meta) + '</div>' +
    '<div class="preview">' + esc(i.preview) + '</div>' +
    '<div class="actions">' +
      (itemId ? '<button class="drill-btn" data-drill-id="' + esc(itemId) + '">🔍 Drill down</button>' : '') +
      '<button class="approve" data-url="' + i.approve_url + '" data-payload=\'' +
        JSON.stringify(i.approve_payload || {}) + '\'>Approve</button>' +
      '<button class="reject" data-url="' + i.reject_url + '" data-payload=\'' +
        JSON.stringify(i.reject_payload || {reason:'founder rejected'}) + '\'>Reject</button>' +
    '</div></div>';
}

function bindActions() {
  document.querySelectorAll('button[data-drill-id]').forEach(b => {
    b.onclick = function() { openDrill(b.dataset.drillId); };
  });
  document.querySelectorAll('button[data-url]').forEach(b => {
      b.onclick = async function() {
        // _R488A — hardened click handler
        const url = b.dataset.url, payload = JSON.parse(b.dataset.payload || '{}');
        const wrap = b.closest('.item');
        const orig = b.textContent;
        b.disabled = true; b.textContent = '…';
        try {
          const r = await fetch(url, { method:'POST', credentials:'include',
            headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
          if (r.ok) {
            wrap.style.transition = 'opacity 0.3s';
            wrap.style.opacity = '0';
            wrap.style.pointerEvents = 'none';
            setTimeout(() => { if (wrap.parentNode) wrap.parentNode.removeChild(wrap); }, 350);
            setTimeout(fetchAll, 700);
          } else if (r.status === 401) {
            b.textContent = 'login needed'; b.disabled = false;
            setTimeout(() => { window.location.href = '/ui/login?next=' + encodeURIComponent(window.location.pathname); }, 1500);
          } else {
            let errText = 'failed ' + r.status;
            try { const ej = await r.json(); if (ej.error) errText = String(ej.error).slice(0,40); } catch(e){}
            b.textContent = errText; b.disabled = false;
            setTimeout(() => { b.textContent = orig; }, 4000);
          }
        } catch(e) {
          b.textContent = 'error'; b.disabled = false;
          setTimeout(() => { b.textContent = orig; }, 4000);
        }
      };
    });
}

function humanAge(iso) {
  if (!iso) return '';
  const mins = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const h = Math.floor(mins/60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h/24) + 'd ago';
}
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
fetchAll();
setInterval(fetchAll, 15000);

// _R474_DRILL — side panel logic
async function openDrill(itemId) {
  const panel = document.getElementById('drillPanel');
  const overlay = document.getElementById('drillOverlay');
  const body = document.getElementById('drillBody');
  body.innerHTML = '<div class="drill-loading">Loading drill-down for ' + esc(itemId) + '…</div>';
  panel.classList.add('open'); overlay.classList.add('open');
  panel.setAttribute('aria-hidden', 'false');
  try {
    const u = new URL(window.location.href);
    u.searchParams.set('focus', itemId);
    history.replaceState(null, '', u.toString());
  } catch(e) {}
  try {
      // _R488C — graceful 401 + render-error handling
      const r = await fetch('/api/hitl/items/' + encodeURIComponent(itemId) + '/drill', {credentials:'include'});
      if (r.status === 401) {
        body.innerHTML = '<div class="drill-loading">Session expired — <a href="/ui/login?next=' +
          encodeURIComponent(window.location.pathname + '?focus=' + itemId) +
          '" style="color:#00D4AA">log in</a> to view drill-down.</div>';
        return;
      }
      if (!r.ok) {
        body.innerHTML = '<div class="drill-loading">Failed to load (HTTP ' + r.status + ').</div>';
        return;
      }
      const data = await r.json();
      try {
        renderDrill(data, itemId);
      } catch(renderErr) {
        body.innerHTML = '<div class="drill-loading" style="color:#ff4757">Render error: ' + esc(String(renderErr)) +
          '<br><br><pre style="font-size:11px;color:#888;text-align:left;max-height:300px;overflow:auto">' +
          esc(JSON.stringify(data, null, 2).slice(0, 2000)) + '</pre></div>';
        console.error('renderDrill failed:', renderErr, data);
      }
    } catch(e) {
      body.innerHTML = '<div class="drill-loading">Error: ' + esc(String(e)) + '</div>';
    }
}

function closeDrill() {
  document.getElementById('drillPanel').classList.remove('open');
  document.getElementById('drillOverlay').classList.remove('open');
  document.getElementById('drillPanel').setAttribute('aria-hidden', 'true');
  try {
    const u = new URL(window.location.href);
    u.searchParams.delete('focus');
    history.replaceState(null, '', u.toString());
  } catch(e) {}
}

function renderDrill(data, itemId) {
  const item = data.item || {};
  const msg = data.message || {};
  const tpl = data.template || {};
  const fields = data.input_fields_excel || [];
  const source = data.source_document || {};
  const placeholders = data.highlight_spans || (data.lineage && data.lineage.placeholders_in_body) || [];
  const flags = [];
  if (item.status === 'open') flags.push({label:'awaiting approval', cls:'warn'});
  if (item.status === 'approved') flags.push({label:'approved', cls:'ok'});
  if (item.status === 'rejected') flags.push({label:'rejected', cls:'err'});
  if (placeholders.length > 0) flags.push({label:placeholders.length + ' template placeholders', cls:'ok'});
  if (!source.system || source.system === 'unknown') flags.push({label:'source unknown', cls:'warn'});
  if (msg.to && msg.to.includes('@')) flags.push({label:'recipient validated', cls:'ok'});

  let raw = msg.body || '';
  const inBody = placeholders.filter(p => p.in === 'body' && typeof p.start === 'number');
  inBody.sort((a,b) => a.start - b.start);
  let out = '', cursor = 0;
  inBody.forEach(m => {
    out += esc(raw.slice(cursor, m.start));
    out += '<mark title="' + esc(m.field) + '">' + esc(m.value || raw.slice(m.start, m.end)) + '</mark>';
    cursor = m.end;
  });
  out += esc(raw.slice(cursor));
  const bodyHtml = out || esc(raw);

  const html = '' +
    '<h2 class="drill-h1">' + esc(item.template_code || 'HITL ITEM') + '</h2>' +
    '<h3 class="drill-h2">' + esc(item.title || itemId) + '</h3>' +
    '<div>' + flags.map(f => '<span class="drill-flag ' + f.cls + '">' + esc(f.label) + '</span>').join('') + '</div>' +
    '<div class="drill-tabs">' +
      '<span class="drill-tab active" data-tab="message">Message</span>' +
      '<span class="drill-tab" data-tab="lineage">Lineage</span>' +
      '<span class="drill-tab" data-tab="fields">Input fields</span>' +
      '<span class="drill-tab" data-tab="source">Source</span>' +
      '<span class="drill-tab" data-tab="meta">Meta</span>' +
    '</div>' +
    '<div class="drill-tabpanel active" data-panel="message">' +
      '<div class="drill-section"><h3>To / From</h3>' +
      '<dl class="drill-kv">' +
      '<dt>To</dt><dd>' + esc(msg.to || '—') + '</dd>' +
      '<dt>From</dt><dd>' + esc(msg.from || '—') + '</dd>' +
      '<dt>Subject</dt><dd>' + esc(msg.subject || '—') + '</dd>' +
      '</dl></div>' +
      '<div class="drill-section"><h3>Body (substitutions highlighted)</h3>' +
      '<div class="drill-text">' + bodyHtml + '</div></div>' +
    '</div>' +
    '<div class="drill-tabpanel" data-panel="lineage">' +
      '<div class="drill-section"><h3>Template (' + esc(tpl.id || 'unknown') + ')</h3>' +
      '<div class="drill-text template">' + esc(tpl.raw || '—') + '</div></div>' +
      '<div class="drill-section"><h3>Filled output</h3>' +
      '<div class="drill-text">' + esc(tpl.filled || msg.full || '—') + '</div></div>' +
      '<div class="drill-section"><h3>Placeholder map (' + placeholders.length + ')</h3>' +
      (placeholders.length === 0 ? '<div style="color:#888">no placeholders</div>' :
        '<dl class="drill-kv">' + placeholders.map(p =>
          '<dt>{' + esc(p.field) + '}</dt><dd>→ "' + esc(p.value) + '" in ' + esc(p.in) + ' [' + p.start + '..' + p.end + ']</dd>'
        ).join('') + '</dl>') +
      '</div>' +
    '</div>' +
    '<div class="drill-tabpanel" data-panel="fields">' +
      '<div class="drill-section"><h3>Input fields (Excel-style)</h3>' +
      (fields.length === 0 ? '<div style="color:#888">no fields</div>' :
        '<dl class="drill-kv">' + fields.map(f =>
          '<dt>' + esc(f.field) + '</dt><dd>' + esc(f.value || '—') + ' <span style="color:#888;font-size:11px">(' + esc(f.source) + ')</span></dd>'
        ).join('') + '</dl>') +
      '</div>' +
    '</div>' +
    '<div class="drill-tabpanel" data-panel="source">' +
      '<div class="drill-section"><h3>Source document</h3>' +
      '<dl class="drill-kv">' +
      '<dt>System</dt><dd>' + esc(source.system || 'unknown') + '</dd>' +
      '<dt>Lead ID</dt><dd>' + esc(source.lead_id || '—') + '</dd>' +
      '<dt>URL</dt><dd>' + (source.source_url ? '<a href="' + esc(source.source_url) + '" target="_blank">' + esc(source.source_url) + '</a>' : '—') + '</dd>' +
      '<dt>Fetched at</dt><dd>' + esc(source.fetched_at || '—') + '</dd>' +
      '</dl>' +
      (source.raw_snippet ? '<div class="drill-text" style="margin-top:10px">' + esc(source.raw_snippet) + '</div>' : '') +
      '</div>' +
    '</div>' +
    '<div class="drill-tabpanel" data-panel="meta">' +
      '<div class="drill-section"><h3>Item metadata</h3>' +
      '<dl class="drill-kv">' +
      '<dt>ID</dt><dd>' + esc(item.id || itemId) + '</dd>' +
      '<dt>Status</dt><dd>' + esc(item.status || '—') + '</dd>' +
      '<dt>Template</dt><dd>' + esc(item.template_code || '—') + '</dd>' +
      '<dt>Created</dt><dd>' + esc(item.created_at || '—') + '</dd>' +
      '<dt>Discipline</dt><dd>' + esc(data.discipline || '—') + '</dd>' +
      '<dt>Phase</dt><dd>' + esc(data.phase || '—') + '</dd>' +
      '<dt>Submitted by</dt><dd>' + esc(data.submitted_by || '—') + '</dd>' +
      '</dl></div>' +
    '</div>' +
    '<div class="drill-actions">' +
      '<button class="approve" data-drill-approve="' + esc(itemId) + '">Approve &amp; send</button>' +
      '<button class="reject" data-drill-reject="' + esc(itemId) + '">Reject</button>' +
    '</div>';

  document.getElementById('drillBody').innerHTML = html;
  document.querySelectorAll('.drill-tab').forEach(t => {
    t.onclick = function() {
      document.querySelectorAll('.drill-tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.drill-tabpanel').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.querySelector('.drill-tabpanel[data-panel="' + t.dataset.tab + '"]').classList.add('active');
    };
  });
  const approveBtn = document.querySelector('[data-drill-approve]');
  if (approveBtn) approveBtn.onclick = async function() {
    approveBtn.disabled = true; approveBtn.textContent = '…';
    const r = await fetch('/api/hitl/items/bulk-approve', {method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify({ids:[itemId]})});
    if (r.ok) { closeDrill(); setTimeout(fetchAll, 500); }
    else { approveBtn.textContent = 'failed ' + r.status; approveBtn.disabled = false; }
  };
  const rejectBtn = document.querySelector('[data-drill-reject]');
  if (rejectBtn) rejectBtn.onclick = async function() {
    rejectBtn.disabled = true; rejectBtn.textContent = '…';
    const r = await fetch('/api/hitl/items/bulk-reject', {method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify({ids:[itemId], reason:'rejected via drill-down'})});
    if (r.ok) { closeDrill(); setTimeout(fetchAll, 500); }
    else { rejectBtn.textContent = 'failed ' + r.status; rejectBtn.disabled = false; }
  };
}

// _R488B — defensive close binding
  function _r488_bindClose() {
    const cb = document.getElementById('drillClose');
    const ov = document.getElementById('drillOverlay');
    if (cb) cb.onclick = closeDrill;
    if (ov) ov.onclick = closeDrill;
  }
  _r488_bindClose();
  try {
    const _r488_obs = new MutationObserver(_r488_bindClose);
    const _r488_panel = document.getElementById('drillPanel');
    if (_r488_panel) _r488_obs.observe(_r488_panel, {childList:true, subtree:true});
  } catch(e) { console.warn('R488 observer:', e); }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDrill();
  });

(function() {
  const u = new URL(window.location.href);
  const focus = u.searchParams.get('focus');
  if (focus) setTimeout(() => openDrill(focus), 800);
})();
