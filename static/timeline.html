<!DOCTYPE html>
<!-- PATCH-TIMELINE (2026-05-27): truth-grounded rolling automation paths.
     Unions 5 sources: rosetta_dispatch_log, cycle_log, work_items,
     incidents, patches. Required cols enforced: outcome_status, latency_ms,
     effect_artifact_url. Missing = "—" (visibly missing, not hidden). -->
<html><head>
<meta charset="utf-8">
<title>Murphy Timeline — Rolling Automation Paths</title>
<style>
  body { background:#080c0a; color:#cfd5d2; font:13px/1.4 ui-monospace, monospace; margin:0; padding:18px; }
  h1 { color:#00D4AA; font-size:16px; margin:0 0 12px; }
  .baseline { background:#0e1410; border:1px solid #1f2a26; border-radius:6px;
              padding:10px 14px; margin-bottom:14px; font-size:11px; color:#788079; }
  .baseline b { color:#cfd5d2; }
  table { width:100%; border-collapse:collapse; font-size:11.5px; }
  th { text-align:left; padding:6px 10px; background:#0e1410; color:#788079;
       border-bottom:1px solid #1f2a26; font-weight:500; }
  td { padding:5px 10px; border-bottom:1px solid #131a17; vertical-align:top; }
  tr:hover td { background:#0d1310; }
  .src-rosetta { color:#00D4AA; }
  .src-mind    { color:#7d9fff; }
  .src-work    { color:#c8a84b; }
  .src-incident{ color:#ff7676; }
  .src-patch   { color:#b886ff; }
  .ok { color:#7dd17a; }
  .err{ color:#ff7676; }
  .missing { color:#3a4540; }
  .filters { margin-bottom:10px; }
  .filters label { color:#788079; margin-right:14px; cursor:pointer; }
  .drill { color:#00D4AA; cursor:pointer; text-decoration:none; }
  .drill:hover { text-decoration:underline; }
  .detail { background:#0d1310; padding:8px 12px; color:#788079; font-size:10.5px; }
</style>
</head><body>
<h1>📜 Timeline — Rolling Automation Paths</h1>

<div class="baseline" id="baseline">Loading baseline noise floor…</div>

<div class="filters">
  <label><input type="checkbox" id="f-rosetta" checked> <span class="src-rosetta">rosetta</span></label>
  <label><input type="checkbox" id="f-mind" checked> <span class="src-mind">mind_cycle</span></label>
  <label><input type="checkbox" id="f-work" checked> <span class="src-work">swarm_work</span></label>
  <label><input type="checkbox" id="f-incident" checked> <span class="src-incident">incidents</span></label>
  <label><input type="checkbox" id="f-patch" checked> <span class="src-patch">patches</span></label>
</div>

<table id="tl">
  <thead><tr>
    <th style="width:165px">Timestamp (UTC)</th>
    <th style="width:90px">Source</th>
    <th>Trigger</th>
    <th style="width:110px">Outcome</th>
    <th style="width:80px">Latency</th>
    <th style="width:60px">Drill</th>
  </tr></thead>
  <tbody id="tl-body"><tr><td colspan="6">Loading…</td></tr></tbody>
</table>

<script>
async function fetchTimeline() {
  try {
    const r = await fetch('/api/timeline/feed?limit=200');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch(e) {
    return { rows: [], baseline: { error: e.message } };
  }
}
function row(r) {
  const src = r.source;
  const filterEl = document.getElementById('f-' + src);
  if (filterEl && !filterEl.checked) return '';
  const ok = (r.outcome_status||'').match(/complete|ok|applied|closed/i);
  const err = (r.outcome_status||'').match(/error|failed|red/i);
  const latCls = r.latency_ms ? (r.latency_ms > 5000 ? 'err' : 'ok') : 'missing';
  const lat = r.latency_ms ? r.latency_ms + 'ms' : '<span class="missing">—</span>';
  const out = r.outcome_status || '<span class="missing">—</span>';
  const outCls = ok ? 'ok' : err ? 'err' : '';
  return `<tr data-id="${r.id}">
    <td>${r.ts || '—'}</td>
    <td class="src-${src}">${src}</td>
    <td>${(r.trigger||'').slice(0,80)}</td>
    <td class="${outCls}">${out}</td>
    <td class="${latCls}">${lat}</td>
    <td><a class="drill" onclick="drill(this)">↗</a></td>
  </tr>`;
}
function drill(a) {
  const tr = a.closest('tr');
  const next = tr.nextElementSibling;
  if (next && next.classList.contains('detail-row')) { next.remove(); return; }
  const id = tr.getAttribute('data-id');
  const det = document.createElement('tr');
  det.className = 'detail-row';
  det.innerHTML = `<td colspan="6" class="detail">Loading drill-down for ${id}…</td>`;
  tr.after(det);
  fetch('/api/timeline/detail?id=' + encodeURIComponent(id))
    .then(r=>r.json()).then(d=>{
      det.querySelector('td').innerHTML = '<pre style="margin:0;white-space:pre-wrap;">' +
        JSON.stringify(d, null, 2).replace(/</g,'&lt;') + '</pre>';
    }).catch(e=>{
      det.querySelector('td').innerHTML = '<span class="err">drill-down failed: ' + e + '</span>';
    });
}
async function refresh() {
  const data = await fetchTimeline();
  const body = document.getElementById('tl-body');
  const rows = data.rows || [];
  body.innerHTML = rows.length
    ? rows.map(row).filter(Boolean).join('')
    : '<tr><td colspan="6" class="missing">No events yet. Once swarm dispatches happen, rows appear here.</td></tr>';
  const b = data.baseline || {};
  document.getElementById('baseline').innerHTML =
    'Baseline noise floor (last hour): ' +
    `<b>${b.deal_stuck||'?'}</b> deal_stuck warnings · ` +
    `<b>${b.postfix_denied||'?'}</b> postfix denied · ` +
    `<b>${b.llm_429||'?'}</b> LLM rate-limit fallbacks · ` +
    `Distinct context fingerprints: <b>${b.distinct_fp||0}/${b.rosetta_rows||0}</b>` +
    (b.error ? ' · <span class="err">err: ' + b.error + '</span>' : '');
  document.querySelectorAll('.filters input').forEach(el =>
    el.onchange = refresh);
}
refresh();
setInterval(refresh, 10000);
</script>
</body></html>
