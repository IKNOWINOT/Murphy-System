<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat with Murphy</title>
<style>
  :root {
    --bg:#080c0a; --bg2:#0f1614; --bg3:#15201d; --border:#1f2c28;
    --text:#d8e4e0; --text2:#7d8e88; --text3:#4a5651;
    --green:#00d4aa; --yellow:#d4b500; --red:#d44a4a;
    --me:#1a3530; --murphy:#15201d;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; height:100vh; display:flex; flex-direction:column; }
  header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--bg2); }
  header .brand { display:flex; align-items:center; gap:10px; font-weight:600; letter-spacing:0.5px; }
  header .dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); }
  header .audit { font-size:11px; color:var(--text2); font-family:ui-monospace,SF Mono,Menlo,monospace; }
  header a { color:var(--text2); text-decoration:none; font-size:12px; }
  header a:hover { color:var(--green); }
  #chat { flex:1; overflow-y:auto; padding:20px 0; }
  .wrap { max-width:780px; margin:0 auto; padding:0 20px; }
  .bubble { padding:10px 14px; border-radius:12px; margin-bottom:10px; max-width:75%; word-wrap:break-word; white-space:pre-wrap; }
  .me { background:var(--me); margin-left:auto; border-bottom-right-radius:2px; }
  .murphy { background:var(--murphy); border:1px solid var(--border); border-bottom-left-radius:2px; }
  .who { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .me .who { text-align:right; }
  footer { border-top:1px solid var(--border); padding:14px 20px; background:var(--bg2); }
  .inputrow { max-width:780px; margin:0 auto; display:flex; gap:10px; }
  #msg { flex:1; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:8px; font-size:14px; resize:none; min-height:40px; max-height:160px; font-family:inherit; }
  #msg:focus { outline:none; border-color:var(--green); }
  #send { background:var(--green); color:var(--bg); border:none; padding:10px 18px; border-radius:8px; cursor:pointer; font-weight:600; }
  #send:hover { background:#00b894; }
  #send:disabled { background:var(--text3); cursor:not-allowed; }
  .empty { color:var(--text3); text-align:center; padding:60px 20px; font-size:13px; line-height:1.7; }
  .typing { color:var(--text3); font-style:italic; font-size:12px; padding:4px 14px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot"></span>
    <span>Murphy</span>
  </div>
  <div class="audit" id="audit-line">loading state…</div>
  <a href="/os">← OS dashboard</a>
</header>

<div id="chat">
  <div class="wrap">
    <div class="empty" id="empty">
      Talk to Murphy.<br><br>
      <span style="color:var(--text2);">Ground truth is fetched live from <code>/api/self/audit</code> on every message.<br>
      Same voice across web, SMS, and voice channels.</span>
    </div>
  </div>
</div>

<footer>
  <div class="inputrow">
    <textarea id="msg" placeholder="Say something to Murphy…" rows="1"></textarea>
    <button id="send">Send</button>
  </div>
</footer>

<script>
const SESSION = 'corey_' + (localStorage.getItem('chat_sid') || (localStorage.setItem('chat_sid', Date.now()), localStorage.getItem('chat_sid')));
const chatEl = document.querySelector('#chat .wrap');
const emptyEl = document.getElementById('empty');
const msgEl = document.getElementById('msg');
const sendBtn = document.getElementById('send');
const auditLine = document.getElementById('audit-line');

function bubble(who, text, cls) {
  const div = document.createElement('div');
  div.innerHTML = '<div class="who">' + who + '</div><div class="bubble ' + cls + '">' + text.replace(/</g,'&lt;') + '</div>';
  div.className = (cls === 'me' ? 'right' : 'left');
  chatEl.appendChild(div);
  chatEl.parentElement.scrollTop = chatEl.parentElement.scrollHeight;
}

async function loadHistory() {
  try {
    const r = await fetch('/api/chat/history?session_id=' + SESSION);
    const d = await r.json();
    if (d.turns && d.turns.length) {
      emptyEl.style.display = 'none';
      d.turns.forEach(t => {
        bubble('Corey', t.u, 'me');
        bubble('Murphy', t.m, 'murphy');
      });
    }
  } catch(e) {}
}

async function loadAudit() {
  try {
    const r = await fetch('/api/self/audit');
    const d = await r.json();
    const c = d.checks || {};
    auditLine.textContent =
      (c.heartbeats_10min || 0) + ' beats · cycle ' +
      ((c.mind_cycle && c.mind_cycle.lifetime_cycle) || '?') + ' · ' +
      ((c.patcher_stats && c.patcher_stats.applied) || 0) + ' patches';
  } catch(e) { auditLine.textContent = 'audit unreachable'; }
}

async function send() {
  const text = msgEl.value.trim();
  if (!text) return;
  emptyEl.style.display = 'none';
  bubble('Corey', text, 'me');
  msgEl.value = '';
  sendBtn.disabled = true;

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'Murphy thinking…';
  chatEl.appendChild(typing);
  chatEl.parentElement.scrollTop = chatEl.parentElement.scrollHeight;

  try {
    const r = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: text, session_id: SESSION })
    });
    const d = await r.json();
    typing.remove();
    if (d.reply) {
      bubble('Murphy', d.reply, 'murphy');
      loadAudit();
    } else {
      bubble('Murphy', '[error: ' + (d.error || 'no reply') + ']', 'murphy');
    }
  } catch(e) {
    typing.remove();
    bubble('Murphy', '[connection error: ' + e.message + ']', 'murphy');
  } finally {
    sendBtn.disabled = false;
    msgEl.focus();
  }
}

sendBtn.addEventListener('click', send);
msgEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
msgEl.addEventListener('input', () => {
  msgEl.style.height = 'auto';
  msgEl.style.height = Math.min(msgEl.scrollHeight, 160) + 'px';
});

loadHistory();
loadAudit();
setInterval(loadAudit, 20000);
msgEl.focus();
</script>

</body>
</html>
