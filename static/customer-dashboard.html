<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Murphy account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/murphy-brand.css">
<style>
  .hero { display: flex; justify-content: space-between; align-items: end; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
  .hero h1 { line-height: 1.15; }
  .hero .sub { color: var(--text-dim); font-size: 14px; margin-top: 4px; }
  .tenant {
    background: linear-gradient(135deg, rgba(0,212,170,.08), rgba(0,255,106,.04));
    border: 1px solid var(--border-hi);
    padding: 28px; border-radius: var(--radius-lg);
    margin-bottom: 24px;
  }
  .tenant .name { font-size: 24px; font-weight: 700; letter-spacing: -0.015em; margin: 4px 0 8px; }
  .tenant .meta { color: var(--text-dim); font-size: 13px; margin-bottom: 18px; }
  .tenant .meta code { font-family: var(--font-code); font-size: 12px; color: var(--text); background: var(--elevated); padding: 2px 8px; border-radius: 4px; }
  .tenant .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .value-num { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; color: var(--teal); margin: 8px 0 4px; }
  .value-sm  { font-size: 22px; font-weight: 700; letter-spacing: -0.015em; color: var(--text); margin: 8px 0 4px; }
  .value-sub { color: var(--text-dim); font-size: 13px; }
  .empty-cta { margin-top: 18px; }
  details.drill { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0; margin-top: 16px; }
  details.drill > summary { cursor: pointer; padding: 14px 20px; font-weight: 600; font-size: 14px; color: var(--text); list-style: none; user-select: none; }
  details.drill > summary::-webkit-details-marker { display: none; }
  details.drill > summary::before { content: "▸"; display: inline-block; margin-right: 8px; transition: transform .15s; color: var(--text-dim); }
  details.drill[open] > summary::before { transform: rotate(90deg); }
  details.drill > .body { padding: 0 20px 18px; }
</style>
</head>
<body>
<header class="mu-topbar">
  <a class="mu-logo" href="/">murphy.systems</a>
  <nav>
    <a href="/pricing">Pricing</a>
    <a href="/docs">Docs</a>
    <a href="/contact">Contact</a>
    <a href="#" id="logout">Log out</a>
  </nav>
</header>

<div class="mu-wrap">
  <div id="content">
    <div class="mu-loading"><div class="mu-spinner"></div>Loading your account…</div>
  </div>
</div>

<script>
(async function() {
  const $ = (id) => document.getElementById(id);
  const fmtDate = (iso) => { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }); } catch { return iso; } };
  const fmtMoney = (n) => n==null ? '—' : '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });

  let me;
  try {
    const r = await fetch('/api/auth/me', { credentials:'include' });
    const j = await r.json();
    if (!j.success || !j.user) { window.location.href = '/login?next=/dashboard'; return; }
    me = j.user;
  } catch (e) {
    $('content').innerHTML = '<div class="mu-error">Couldn\'t load your session. <a href="/login">Sign in →</a></div>'; return;
  }

  let tenant = { has_tenant:false };
  try { tenant = await (await fetch('/api/account/tenant', { credentials:'include' })).json(); } catch {}

  if (tenant.has_tenant && tenant.onboarding_required && tenant.onboarding_url) {
    window.location.href = tenant.onboarding_url; return;
  }

  let sub = { ok:false }, history = { records: [] };
  try { sub = await (await fetch('/api/account/subscription', { credentials:'include' })).json(); } catch {}
  try { history = await (await fetch('/api/account/billing-history', { credentials:'include' })).json(); } catch {}

  const tier = (sub.ok && sub.tier) || me.tier || 'free';
  const statusText = (sub.ok && sub.subscription_status) || (tier === 'enterprise' ? 'active' : 'free');
  const dotClass = statusText === 'active' ? 'mu-dot-on' : statusText === 'pending' ? 'mu-dot-warn' : statusText === 'expired' ? 'mu-dot-err' : 'mu-dot-off';
  const paidUntil = sub.ok ? sub.subscription_paid_until : null;
  const interval = sub.ok ? sub.subscription_interval : null;
  const amount = sub.ok ? sub.subscription_amount_usd : null;

  let banner = '';
  if (!tenant.has_tenant && (tier === 'free' || !tier)) {
    banner = `
      <div class="mu-banner" style="margin-bottom:24px;">
        <div><strong>You don't have an operator tenant yet.</strong>
        <div class="mu-muted" style="margin-top:4px;font-size:13px;">Choose a plan to provision your AI operator and start automating your business.</div></div>
        <a href="/pricing" class="mu-btn mu-btn-primary">View plans →</a>
      </div>`;
  }

  let tenantCard = '';
  if (tenant.has_tenant && tenant.tenant) {
    const t = tenant.tenant;
    const cfg = t.config || {};
    tenantCard = `
      <div class="tenant">
        <div class="mu-label" style="color:var(--teal);">Your operator</div>
        <div class="name">${t.name || '—'}</div>
        <div class="meta">
          <span class="mu-dot mu-dot-on"></span>
          <code>${t.tenant_id}</code>
          &nbsp;·&nbsp; ${t.state || 'active'}
          &nbsp;·&nbsp; ${t.role || 'owner'}
          &nbsp;·&nbsp; provisioned ${fmtDate(t.created_at)}
        </div>
        <div class="actions">
          <a href="/app" class="mu-btn mu-btn-primary">Enter your operator →</a>
          <a href="/ui/onboarding" class="mu-btn">Update business profile</a>
        </div>
        <details class="drill">
          <summary>Tenant details</summary>
          <div class="body">
            <table class="mu-table">
              <tbody>
                <tr><td class="mu-muted" style="width:40%;">Tenant ID</td><td><code>${t.tenant_id}</code></td></tr>
                <tr><td class="mu-muted">Name</td><td>${t.name || '—'}</td></tr>
                <tr><td class="mu-muted">State</td><td>${t.state}</td></tr>
                <tr><td class="mu-muted">Your role</td><td>${t.role}</td></tr>
                <tr><td class="mu-muted">Created</td><td>${fmtDate(t.created_at)}</td></tr>
                <tr><td class="mu-muted">Provisioned via</td><td>${cfg.provisioned_via || '—'}</td></tr>
                <tr><td class="mu-muted">Plan</td><td>${cfg.tier || '—'} ${cfg.interval ? '· '+cfg.interval : ''}</td></tr>
                <tr><td class="mu-muted">Last payment</td><td><code>${cfg.payment_id || '—'}</code></td></tr>
              </tbody>
            </table>
          </div>
        </details>
      </div>`;
  }

  let historyHtml;
  if (!history.records || history.records.length === 0) {
    historyHtml = `<div class="mu-empty">No payments yet.<div class="empty-cta"><a href="/pricing" class="mu-btn mu-btn-primary">View plans</a></div></div>`;
  } else {
    historyHtml = `
      <table class="mu-table">
        <thead><tr><th>Date</th><th>Plan</th><th>Amount</th><th>Status</th><th>Payment ID</th></tr></thead>
        <tbody>
        ${history.records.map(r => `
          <tr>
            <td class="mu-muted">${fmtDate(r.created_at)}</td>
            <td>${(r.tier||'—')} <span class="mu-muted">(${r.interval||'—'})</span></td>
            <td>${fmtMoney(r.amount_usd)}</td>
            <td><span class="mu-dot ${r.status==='paid'?'mu-dot-on':r.status==='pending'?'mu-dot-warn':'mu-dot-off'}"></span>${r.status||'—'}</td>
            <td class="mono mu-muted" style="font-size:12px;">${r.payment_id||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  $('content').innerHTML = `
    <div class="hero">
      <div>
        <h1>Welcome, ${me.name || me.email}</h1>
        <div class="sub">${me.email} · ${me.role || 'member'}</div>
      </div>
      <span class="mu-pill mu-pill-teal">${tier}</span>
    </div>
    ${banner}
    ${tenantCard}
    <div class="mu-grid-2" style="margin-bottom:24px;">
      <div class="mu-card-lg">
        <div class="mu-label">Your plan</div>
        <div class="value-num" style="text-transform:capitalize;">${tier}</div>
        <div class="value-sub">
          <span class="mu-dot ${dotClass}"></span>${statusText}
          ${interval ? ' · billed '+interval : ''}
          ${amount ? ' · '+fmtMoney(amount) : ''}
        </div>
      </div>
      <div class="mu-card-lg">
        <div class="mu-label">Renews on</div>
        <div class="value-sm">${fmtDate(paidUntil)}</div>
        <div class="value-sub">${paidUntil ? 'next billing date' : tier === 'enterprise' ? 'no renewal · comp account' : 'no active subscription'}</div>
      </div>
    </div>
    <div class="mu-card-lg">
      <div class="mu-label">Billing history</div>
      <div style="margin-top:14px;">${historyHtml}</div>
    </div>`;

  document.getElementById('logout').addEventListener('click', async (e) => {
    e.preventDefault();
    try { await fetch('/api/auth/logout', { method:'POST', credentials:'include' }); } catch {}
    window.location.href = '/login';
  });
})();
</script>
</body>
</html>
