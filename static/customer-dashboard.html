<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Murphy Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --bg2: #131920; --bg3: #161b22; --bg4: #1c2128;
    --border: #21262d; --border2: #30363d;
    --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
    --cyan: #00d4ff; --green: #39d353; --red: #f85149;
    --amber: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 32px 24px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  .nav {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 24px; border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .logo { font-weight: 800; font-size: 18px; letter-spacing: -0.02em; color: var(--cyan); }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a {
    color: var(--text2); text-decoration: none; font-size: 14px; font-weight: 500;
    transition: color .15s;
  }
  .nav-links a:hover { color: var(--text); }
  .pill {
    background: var(--bg3); border: 1px solid var(--border2);
    padding: 4px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 1px;
  }

  h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
  .subtitle { color: var(--text2); margin-bottom: 32px; font-size: 15px; }

  .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px;
  }
  .card-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--text3); text-transform: uppercase; margin-bottom: 12px;
  }
  .card-value {
    font-size: 32px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--cyan); margin-bottom: 4px;
  }
  .card-sub { color: var(--text2); font-size: 13px; }

  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .status-active { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-pending { background: var(--amber); }
  .status-expired { background: var(--red); }
  .status-free { background: var(--text3); }

  .table {
    width: 100%; border-collapse: collapse;
  }
  .table th {
    text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--text3); text-transform: uppercase; padding: 12px 8px;
    border-bottom: 1px solid var(--border2);
  }
  .table td {
    padding: 14px 8px; font-size: 14px; border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .table td.muted { color: var(--text2); }
  .table tr:last-child td { border-bottom: none; }

  .btn {
    display: inline-block; padding: 10px 18px; border-radius: 8px;
    font-weight: 600; font-size: 13px; text-decoration: none;
    border: 1px solid var(--border2); background: var(--bg3); color: var(--text);
    cursor: pointer; transition: all .15s;
  }
  .btn:hover { background: var(--bg4); border-color: var(--cyan); }
  .btn-primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
  .btn-primary:hover { background: #1ae1ff; }

  .empty {
    padding: 60px 24px; text-align: center; color: var(--text3);
    border: 1px dashed var(--border2); border-radius: 12px;
  }

  .loading {
    text-align: center; padding: 80px; color: var(--text2);
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border2);
    border-top-color: var(--cyan); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: rgba(248, 81, 73, 0.1); border: 1px solid var(--red);
    padding: 16px; border-radius: 8px; color: var(--red); margin-bottom: 20px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="nav">
    <div class="logo">murphy.systems</div>
    <div class="nav-links">
      <a href="/pricing">Pricing</a>
      <a href="/docs">Docs</a>
      <a href="/static/murphy-os.html" class="pill">OS →</a>
      <a href="#" id="logout">Logout</a>
    </div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Loading your account…
    </div>
  </div>
</div>

<script>
(async function() {
  const $ = (id) => document.getElementById(id);
  const fmtDate = (iso) => {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    } catch { return iso; }
  };
  const fmtMoney = (n) => n === null || n === undefined ? '—' : '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  // 1. Who am I?
  let me;
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    const j = await r.json();
    if (!j.success || !j.user) {
      window.location.href = '/login?next=/dashboard';
      return;
    }
    me = j.user;
  } catch (e) {
    $('content').innerHTML = '<div class="error">Could not load your session. <a href="/login">Sign in →</a></div>';
    return;
  }

  // 2. Get the customer's subscription details
  let sub;
  try {
    const r = await fetch('/api/account/subscription', { credentials: 'include' });
    sub = await r.json();
  } catch (e) {
    sub = { ok: false, error: 'fetch_failed' };
  }

  // 3. Get billing history
  let history = { records: [] };
  try {
    const r = await fetch('/api/account/billing-history', { credentials: 'include' });
    history = await r.json();
  } catch (e) { /* non-fatal */ }

  // 4. Render
  const tier = (sub.ok && sub.tier) || me.tier || 'free';
  const statusText = (sub.ok && sub.subscription_status) || (tier === 'enterprise' ? 'active' : 'free');
  const statusClass = statusText === 'active' ? 'status-active' :
                       statusText === 'pending' ? 'status-pending' :
                       statusText === 'expired' ? 'status-expired' : 'status-free';
  const paidUntil = sub.ok ? sub.subscription_paid_until : null;
  const interval = sub.ok ? sub.subscription_interval : null;
  const amount = sub.ok ? sub.subscription_amount_usd : null;

  let historyHtml;
  if (!history.records || history.records.length === 0) {
    historyHtml = '<div class="empty">No payments yet.<br><br><a href="/pricing" class="btn btn-primary">View plans</a></div>';
  } else {
    historyHtml = `
      <table class="table">
        <thead><tr>
          <th>Date</th><th>Plan</th><th>Amount</th><th>Status</th><th>Payment ID</th>
        </tr></thead>
        <tbody>
        ${history.records.map(r => `
          <tr>
            <td class="muted">${fmtDate(r.created_at)}</td>
            <td>${(r.tier || '—')} <span class="muted">(${r.interval || '—'})</span></td>
            <td>${fmtMoney(r.amount_usd)}</td>
            <td><span class="status-dot ${r.status === 'paid' ? 'status-active' : r.status === 'pending' ? 'status-pending' : 'status-free'}"></span>${r.status || '—'}</td>
            <td class="muted" style="font-family: monospace; font-size: 12px;">${r.payment_id || '—'}</td>
          </tr>
        `).join('')}
        </tbody>
      </table>
    `;
  }

  $('content').innerHTML = `
    <h1>Welcome, ${me.name || me.email}</h1>
    <div class="subtitle">${me.email} · ${me.role || 'member'}</div>

    <div class="grid">
      <div class="card">
        <div class="card-label">Your plan</div>
        <div class="card-value" style="text-transform: capitalize;">${tier}</div>
        <div class="card-sub">
          <span class="status-dot ${statusClass}"></span>${statusText}
          ${interval ? ` · billed ${interval}` : ''}
          ${amount ? ` · ${fmtMoney(amount)}` : ''}
        </div>
      </div>
      <div class="card">
        <div class="card-label">Renews on</div>
        <div class="card-value" style="font-size: 22px;">${fmtDate(paidUntil)}</div>
        <div class="card-sub">${paidUntil ? 'next billing date' : tier === 'enterprise' ? 'no renewal — comp account' : 'no active subscription'}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom: 24px;">
      <div class="card-label">Quick actions</div>
      <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px;">
        <a href="/pricing" class="btn">Change plan</a>
        <a href="/static/murphy-os.html" class="btn">Open Murphy OS →</a>
        <a href="/docs" class="btn">Docs</a>
        ${me.role === 'owner' ? '<a href="/static/murphy-os.html" class="btn btn-primary">Founder console →</a>' : ''}
      </div>
    </div>

    <div class="card">
      <div class="card-label">Billing history</div>
      <div style="margin-top: 16px;">${historyHtml}</div>
    </div>
  `;

  $('logout').addEventListener('click', async (e) => {
    e.preventDefault();
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/login';
  });
})();
</script>
</body>
</html>
