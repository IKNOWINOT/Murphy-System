<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inbox — Murphy</title>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --txt:#c9d1d9;--muted:#8b949e;--teal:#00D4AA;--green:#56d364;
  --warn:#d29922;--red:#f85149;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);
     font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}
.bar{display:flex;align-items:center;gap:16px;padding:14px 20px;
     background:var(--bg2);border-bottom:1px solid var(--border)}
.bar .logo{color:var(--teal);font-weight:700;font-size:16px;text-decoration:none}
.bar a{color:var(--muted);text-decoration:none;font-size:13px}
.bar a:hover{color:var(--teal)}
.bar .spacer{flex:1}
.wrap{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 49px)}
.side{background:var(--bg2);border-right:1px solid var(--border);
      padding:20px;overflow-y:auto}
.side h3{font-size:11px;color:var(--muted);text-transform:uppercase;
         letter-spacing:1px;margin:24px 0 8px;font-weight:600}
.stat{display:flex;justify-content:space-between;padding:6px 8px;
      border-radius:4px;font-size:13px}
.stat:hover{background:var(--bg3)}
.stat.active{background:var(--teal);background:rgba(0,212,170,0.18);
             color:var(--teal)}
.stat .k{color:var(--txt)}
.stat .v{color:var(--muted);font-variant-numeric:tabular-nums}
.main{padding:0;overflow-y:auto}
.toolbar{display:flex;gap:10px;padding:16px 20px;background:var(--bg2);
         border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.toolbar input{flex:1;background:var(--bg);border:1px solid var(--border);
               color:var(--txt);padding:8px 12px;border-radius:6px;font:13px sans-serif}
.toolbar input:focus{outline:none;border-color:var(--teal)}
.toolbar select{background:var(--bg);border:1px solid var(--border);
                color:var(--txt);padding:8px;border-radius:6px;font:13px sans-serif}
.thead,.row{display:grid;grid-template-columns:96px 80px 130px 220px 1fr 80px;
            gap:12px;padding:10px 20px;align-items:center;font-size:13px}
.thead{background:var(--bg2);color:var(--muted);font-size:11px;
       text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);
       position:sticky;top:53px;z-index:4}
.row{border-bottom:1px solid var(--border);cursor:pointer}
.row:hover{background:var(--bg2)}
.row .when{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px}
.row .from{color:var(--txt);font-weight:500;overflow:hidden;
            text-overflow:ellipsis;white-space:nowrap}
.row .sub{color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;
      font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.p-direct{background:#1f3a4d;color:#79c0ff}
.p-cc{background:#2d2440;color:#d2a8ff}
.p-forward{background:#3d2914;color:var(--warn)}
.p-ambient{background:#1b3a2b;color:var(--green)}
.p-noise{background:#21262d;color:var(--muted)}
.p-inquiry{background:#1b3a2b;color:var(--green)}
.p-meeting{background:#3d2914;color:var(--warn)}
.p-other{background:#21262d;color:var(--muted)}
.domain{font-size:11px;color:var(--muted);font-style:italic}
.empty{padding:60px 20px;text-align:center;color:var(--muted)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;
          align-items:center;justify-content:center;z-index:100}
.modal-bg.show{display:flex}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:12px;
       max-width:760px;max-height:85vh;width:90%;overflow-y:auto;padding:24px}
.modal h2{color:var(--teal);margin-top:0;font-size:18px}
.modal .meta{display:grid;grid-template-columns:140px 1fr;gap:8px 16px;
             font-size:13px;margin:16px 0;padding:16px;
             background:var(--bg2);border-radius:6px}
.modal .meta .k{color:var(--muted);text-align:right}
.modal .meta .v{color:var(--txt);word-break:break-word}
.modal .body{background:var(--bg2);border-radius:6px;padding:16px;
             font-family:ui-monospace,SFMono-Regular,monospace;font-size:12px;
             white-space:pre-wrap;color:var(--txt);max-height:300px;overflow-y:auto}
.modal .close{float:right;background:transparent;border:0;color:var(--muted);
              cursor:pointer;font-size:24px;padding:0 8px}
.modal .close:hover{color:var(--red)}
.pagination{display:flex;justify-content:center;gap:10px;padding:20px;
            color:var(--muted);font-size:13px}
.pagination button{background:var(--bg2);border:1px solid var(--border);
                    color:var(--txt);padding:6px 14px;border-radius:6px;cursor:pointer}
.pagination button:hover{border-color:var(--teal);color:var(--teal)}
.pagination button:disabled{opacity:0.4;cursor:not-allowed}
@media(max-width:900px){
  .wrap{grid-template-columns:1fr}
  .side{display:none}
  .thead,.row{grid-template-columns:80px 70px 1fr 60px;gap:6px;font-size:12px}
  .thead .h-from,.row .from,.thead .h-dom,.row .domain{display:none}
}
</style></head><body>

<div class="bar">
  <a href="/" class="logo">⬢ Murphy</a>
  <a href="/tenant/inbox">Inbox</a>
  <a href="/tenant/dashboard">Dashboard</a>
  <span class="spacer"></span>
  <span id="user-pill" style="color:var(--muted);font-size:12px"></span>
</div>

<div class="wrap">
  <aside class="side">
    <h3>Surface (what was asked)</h3>
    <div id="filter-intent">
      <div class="stat" data-filter="" data-key="intent_class">
        <span class="k">All</span><span class="v" id="cnt-total">—</span>
      </div>
    </div>

    <h3>How it arrived</h3>
    <div id="filter-delivery">
      <div class="stat" data-filter="" data-key="delivery_mode">
        <span class="k">All</span><span class="v" id="cnt-delivery-all">—</span>
      </div>
    </div>

    <h3>Domain (auto-classified)</h3>
    <div id="filter-domain">
      <div class="stat"><span class="k">— loading —</span></div>
    </div>

    <h3>Recent activity</h3>
    <div class="stat">
      <span class="k">Last 7 days</span><span class="v" id="cnt-recent">—</span>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <input id="q" placeholder="Search subject / sender / preview..."
             autocomplete="off">
      <select id="size">
        <option value="50">50</option><option value="100">100</option>
        <option value="200">200</option>
      </select>
    </div>

    <div class="thead">
      <div>When</div>
      <div>Arrived</div>
      <div>Surface</div>
      <div class="h-from">From</div>
      <div>Subject</div>
      <div class="h-dom">Domain</div>
    </div>
    <div id="rows"></div>
    <div class="pagination">
      <button id="prev">‹ Prev</button>
      <span id="pageinfo">—</span>
      <button id="next">Next ›</button>
    </div>
  </main>
</div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="close" onclick="closeModal()">×</button>
    <h2 id="m-subject">—</h2>
    <div class="meta" id="m-meta"></div>
    <h3 style="font-size:12px;color:var(--muted);margin:16px 0 8px;
              text-transform:uppercase;letter-spacing:1px">Body preview</h3>
    <div class="body" id="m-body">—</div>
  </div>
</div>

<script>
let state = {limit:50, offset:0, delivery_mode:"", intent_class:"", search:""};
let total = 0;

function pillClass(prefix, val){
  const key = (val||"").toLowerCase().replace(/[^a-z]/g,"");
  return prefix + "-" + (key || "other");
}

async function loadStats(){
  const r = await fetch("/api/tenant/inbox/stats");
  const s = await r.json();
  document.getElementById("cnt-total").textContent = (s.total || 0).toLocaleString();
  document.getElementById("cnt-recent").textContent = (s.recent_count || 0).toLocaleString();
  document.getElementById("cnt-delivery-all").textContent = (s.total || 0).toLocaleString();
  document.getElementById("user-pill").textContent = "tenant: " + (s.tenant_id || "—");

  const delivBox = document.getElementById("filter-delivery");
  delivBox.innerHTML = '<div class="stat" data-filter="" data-key="delivery_mode"><span class="k">All</span><span class="v">'+(s.total||0).toLocaleString()+'</span></div>';
  for (const [k, v] of Object.entries(s.by_delivery || {})){
    delivBox.insertAdjacentHTML("beforeend",
      `<div class="stat" data-filter="${k}" data-key="delivery_mode">
        <span class="k">${k}</span><span class="v">${v.toLocaleString()}</span></div>`);
  }

  const intentBox = document.getElementById("filter-intent");
  intentBox.innerHTML = '<div class="stat active" data-filter="" data-key="intent_class"><span class="k">All</span><span class="v">'+(s.total||0).toLocaleString()+'</span></div>';
  for (const [k, v] of Object.entries(s.by_intent || {})){
    intentBox.insertAdjacentHTML("beforeend",
      `<div class="stat" data-filter="${k}" data-key="intent_class">
        <span class="k">${k}</span><span class="v">${v.toLocaleString()}</span></div>`);
  }

  const domBox = document.getElementById("filter-domain");
  domBox.innerHTML = "";
  for (const [k, v] of Object.entries(s.by_domain || {})){
    domBox.insertAdjacentHTML("beforeend",
      `<div class="stat"><span class="k">${k}</span><span class="v">${v.toLocaleString()}</span></div>`);
  }

  document.querySelectorAll(".stat[data-filter]").forEach(el => {
    el.addEventListener("click", () => {
      const key = el.dataset.key, val = el.dataset.filter;
      state[key] = val;
      state.offset = 0;
      document.querySelectorAll(`.stat[data-key="${key}"]`).forEach(s=>s.classList.remove("active"));
      el.classList.add("active");
      loadList();
    });
  });
}

async function loadList(){
  const url = "/api/tenant/inbox/list?" + new URLSearchParams({
    limit: state.limit, offset: state.offset,
    delivery_mode: state.delivery_mode,
    intent_class: state.intent_class,
    search: state.search,
  }).toString();
  const r = await fetch(url);
  const data = await r.json();
  total = data.total || 0;
  const rows = document.getElementById("rows");
  if (!data.items || data.items.length === 0){
    rows.innerHTML = '<div class="empty">No messages match your filters.</div>';
  } else {
    rows.innerHTML = data.items.map(it => {
      const when = (it.received_at||"").substring(5,16).replace("T"," ").replace(" ","\u00A0");
      const dp = pillClass("p", it.delivery_mode);
      const sp = pillClass("p", it.surface_raw || "other");
      return `<div class="row" onclick="openDetail(${it.id})">
        <div class="when">${when}</div>
        <div><span class="pill ${dp}">${it.delivery_mode||"direct"}</span></div>
        <div><span class="pill ${sp}">${it.surface||"—"}</span></div>
        <div class="from">${it.from||"—"}</div>
        <div class="sub">${escapeHtml(it.subject||"—")}</div>
        <div class="domain">${it.domain||"—"}</div>
      </div>`;
    }).join("");
  }
  const pageNum = Math.floor(state.offset / state.limit) + 1;
  const totalPages = Math.max(1, Math.ceil(total / state.limit));
  document.getElementById("pageinfo").textContent =
    `Page ${pageNum.toLocaleString()} of ${totalPages.toLocaleString()} · ${total.toLocaleString()} total`;
  document.getElementById("prev").disabled = state.offset <= 0;
  document.getElementById("next").disabled = state.offset + state.limit >= total;
}

function escapeHtml(s){
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;")
                .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function openDetail(id){
  const r = await fetch("/api/tenant/inbox/message/" + id);
  const d = await r.json();
  document.getElementById("m-subject").textContent = d.subject || "—";
  const meta = document.getElementById("m-meta");
  const ts = d.thread_situation || {};
  meta.innerHTML = `
    <div class="k">Received</div><div class="v">${d.received_at||"—"}</div>
    <div class="k">From</div><div class="v">${d.from_addr||"—"}</div>
    <div class="k">To</div><div class="v">${d.to_addr||"—"}</div>
    <div class="k">CC</div><div class="v">${d.cc_addrs||"<em style='color:#8b949e'>none</em>"}</div>
    <div class="k">Arrived as</div><div class="v">${d.delivery_mode_normalized||"direct"}</div>
    <div class="k">Surface</div><div class="v">${d.surface||"—"} (conf ${(d.intent_confidence||0).toFixed?d.intent_confidence.toFixed(2):"—"})</div>
    <div class="k">Domain</div><div class="v">${ts.vertical||"—"}</div>
    <div class="k">Role</div><div class="v">${ts.role||"—"}</div>
    <div class="k">Tenant</div><div class="v">${d.tenant_id||"—"}</div>
    <div class="k">Source</div><div class="v">${d.source_type||"—"}</div>
  `;
  document.getElementById("m-body").textContent = d.body_preview || "(no body captured)";
  document.getElementById("modal-bg").classList.add("show");
}
function closeModal(){ document.getElementById("modal-bg").classList.remove("show"); }

document.getElementById("q").addEventListener("input", () => {
  clearTimeout(window.__qt);
  window.__qt = setTimeout(() => {
    state.search = document.getElementById("q").value;
    state.offset = 0;
    loadList();
  }, 300);
});
document.getElementById("size").addEventListener("change", () => {
  state.limit = parseInt(document.getElementById("size").value);
  state.offset = 0;
  loadList();
});
document.getElementById("prev").onclick = () => {
  state.offset = Math.max(0, state.offset - state.limit); loadList();
};
document.getElementById("next").onclick = () => {
  state.offset += state.limit; loadList();
};
window.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

loadStats().then(loadList);
</script>
</body></html>
