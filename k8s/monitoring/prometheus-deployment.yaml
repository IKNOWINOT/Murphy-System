---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: murphy-system
  labels:
    app: murphy-system
    component: prometheus
    environment: production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: murphy-system
  labels:
    app: murphy-system
    component: prometheus
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: murphy-system
      component: prometheus
  template:
    metadata:
      labels:
        app: murphy-system
        component: prometheus
        environment: production
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: config
              mountPath: /etc/prometheus/rules/murphy-alerts.yml
              subPath: murphy-alerts.yml
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: murphy-system
  labels:
    app: murphy-system
    component: prometheus
    environment: production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: murphy-prometheus
  labels:
    app: murphy-system
    component: prometheus
    environment: production
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: murphy-prometheus
  labels:
    app: murphy-system
    component: prometheus
    environment: production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: murphy-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: murphy-system
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: murphy-system
  labels:
    app: murphy-system
    component: prometheus
    environment: production
spec:
  type: ClusterIP
  selector:
    app: murphy-system
    component: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      protocol: TCP
