#
# Provides a single-replica PostgreSQL 16 instance for Murphy System.
# Password is stored in the murphy-secrets Secret (POSTGRES_PASSWORD key).
# Data is persisted on a 10Gi ReadWriteOnce PVC.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: murphy-system
  labels:
    app: murphy-system
    component: postgres
    environment: production
data:
  POSTGRES_DB: "murphy_db"
  POSTGRES_USER: "murphy"
  PGDATA: "/var/lib/postgresql/data/pgdata"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: murphy-system
  labels:
    app: murphy-system
    component: postgres
    environment: production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: murphy-system
  labels:
    app: murphy-system
    component: postgres
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: murphy-system
      component: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: murphy-system
        component: postgres
        environment: production
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: PGDATA
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: PGDATA
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: murphy-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - murphy
                - -d
                - murphy_db
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - murphy
                - -d
                - murphy_db
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: murphy-system
  labels:
    app: murphy-system
    component: postgres
    environment: production
spec:
  type: ClusterIP
  selector:
    app: murphy-system
    component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
