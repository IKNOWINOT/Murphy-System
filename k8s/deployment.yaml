apiVersion: apps/v1
kind: Deployment
metadata:
  name: murphy-api
  namespace: murphy-system
  labels:
    app: murphy-system
    component: api
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: murphy-system
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  revisionHistoryLimit: 5
  template:
    metadata:
      labels:
        app: murphy-system
        component: api
        environment: production
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: murphy-api
          image: ghcr.io/iknowinot/murphy-system/murphy-system:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: murphy-config
            - secretRef:
                name: murphy-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 30
            initialDelaySeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 10
            initialDelaySeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: murphy-data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: murphy-system
              component: api
      volumes:
        - name: murphy-data
          persistentVolumeClaim:
            claimName: murphy-data
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
