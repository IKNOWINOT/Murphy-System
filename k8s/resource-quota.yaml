apiVersion: v1
kind: ResourceQuota
metadata:
  name: murphy-system-quota
  namespace: murphy-system
  labels:
    app: murphy-system
    component: resource-management
    component: governance
    environment: production
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
    pods: "20"
    persistentvolumeclaims: "5"
    services: "10"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    pods: "30"
    persistentvolumeclaims: "10"
    services: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: murphy-system-limits
  namespace: murphy-system
  labels:
    app: murphy-system
    component: governance
    environment: production
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2"
        memory: "4Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "4"
        memory: "8Gi"
