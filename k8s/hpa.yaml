apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: murphy-api
  namespace: murphy-system
  labels:
    app: murphy-system
    component: autoscaling
    environment: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: murphy-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
