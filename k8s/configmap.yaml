apiVersion: v1
kind: ConfigMap
metadata:
  name: murphy-config
  namespace: murphy-system
  labels:
    app: murphy-system
    component: config
    environment: production
data:
  MURPHY_ENV: "production"
  MURPHY_DATA_DIR: "/app/data"
  MURPHY_LOG_DIR: "/app/logs"
  MURPHY_CORS_ORIGINS: "https://murphy.example.com"
  LOG_LEVEL: "INFO"
  MURPHY_PORT: "8000"
  # MURPHY_CREDENTIAL_MASTER_KEY and MURPHY_REDIS_URL are injected from
  # murphy-secrets (Secret) — never store credentials in a ConfigMap.
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: "/app"
  REDIS_HOST: "murphy-redis"
  REDIS_PORT: "6379"
  MURPHY_BACKUP_DIR: "/backups"
  MURPHY_BACKUP_RETENTION_DAYS: "30"
  MURPHY_DB_MODE: "live"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "murphy_db"
