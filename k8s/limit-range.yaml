#
# Sets default resource requests/limits for containers and pods in the
# murphy-system namespace. Prevents unbounded resource consumption.
---
apiVersion: v1
kind: LimitRange
metadata:
  name: murphy-system-limits
  namespace: murphy-system
  labels:
    app: murphy-system
    component: governance
    environment: production
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2"
        memory: "4Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "4"
        memory: "8Gi"