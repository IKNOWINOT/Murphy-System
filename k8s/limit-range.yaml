apiVersion: v1
kind: LimitRange
metadata:
  name: murphy-default-limits
  namespace: murphy-system
  labels:
    app: murphy-system
    component: resource-management
    environment: production
spec:
  limits:
    - default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      type: Container
