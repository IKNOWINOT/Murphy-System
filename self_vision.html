<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Self Vision — Murphy System</title>
<link rel="stylesheet" href="/static/murphy-app-shell.css">
<style>
.sv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
@media(max-width:900px){ .sv-grid { grid-template-columns: 1fr; } }
.card { background: rgba(255,255,255,.04); border: 1px solid rgba(0,212,170,.2); border-radius: 12px; padding: 1.5rem; }
.card h3 { color: #00D4AA; margin: 0 0 1rem 0; font-size: .95rem; text-transform: uppercase; letter-spacing:.06em; }
.btn { padding: .55rem 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: .85rem; transition: all .2s; }
.btn-primary { background: #00D4AA; color: #0a0a0a; }
.btn-primary:hover { background: #00ffcc; }
.btn-danger  { background: rgba(255,80,80,.15); color: #ff5050; border: 1px solid rgba(255,80,80,.3); }
.btn-danger:hover { background: rgba(255,80,80,.3); }
.btn-warn    { background: rgba(255,200,0,.15); color: #ffc800; border: 1px solid rgba(255,200,0,.3); }
.btn:disabled { opacity:.4; cursor:not-allowed; }
.badge { display:inline-block; padding:.18rem .55rem; border-radius:20px; font-size:.72rem; font-weight:700; }
.badge-green  { background:rgba(0,212,170,.15); color:#00D4AA; border:1px solid rgba(0,212,170,.3); }
.badge-yellow { background:rgba(255,200,0,.15);  color:#ffc800; border:1px solid rgba(255,200,0,.3); }
.badge-red    { background:rgba(255,80,80,.15);   color:#ff5050; border:1px solid rgba(255,80,80,.3); }
.badge-blue   { background:rgba(100,180,255,.15); color:#64b4ff; border:1px solid rgba(100,180,255,.3); }
.badge-gray   { background:rgba(180,180,180,.1);  color:#999;    border:1px solid rgba(180,180,180,.2); }
.kpi-row { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.2rem; }
.kpi { background:rgba(0,0,0,.3); border:1px solid rgba(0,212,170,.15); border-radius:8px; padding:.7rem 1rem; min-width:90px; }
.kpi .val { font-size:1.6rem; font-weight:700; color:#00D4AA; line-height:1; }
.kpi .lbl { font-size:.7rem; color:#666; text-transform:uppercase; letter-spacing:.04em; margin-top:.2rem; }
.proposal-row { display:flex; flex-direction:column; gap:.4rem; padding:.9rem; border-bottom:1px solid rgba(255,255,255,.06); }
.proposal-row:last-child { border-bottom:none; }
.proposal-header { display:flex; justify-content:space-between; align-items:center; gap:.5rem; flex-wrap:wrap; }
.proposal-file { font-family:monospace; font-size:.8rem; color:#64b4ff; }
.proposal-issue { font-size:.9rem; color:#e0e0e0; margin:.25rem 0; }
.proposal-rationale { font-size:.78rem; color:#888; line-height:1.5; white-space:pre-wrap; }
.proposal-actions { display:flex; gap:.5rem; margin-top:.4rem; }
.proposal-list { max-height:520px; overflow-y:auto; }
.run-row { display:flex; justify-content:space-between; align-items:center; padding:.6rem 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:.82rem; color:#aaa; }
.run-row:last-child { border-bottom:none; }
.run-summary { font-size:.78rem; color:#666; margin-top:.2rem; }
.status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:.4rem; }
.dot-green  { background:#00D4AA; box-shadow:0 0 6px #00D4AA; }
.dot-yellow { background:#ffc800; }
.dot-red    { background:#ff5050; }
.dot-gray   { background:#555; }
.patch-viewer { background:#111; border:1px solid rgba(0,212,170,.2); border-radius:8px; padding:1rem; font-family:monospace; font-size:.75rem; color:#ccc; white-space:pre-wrap; max-height:300px; overflow:auto; display:none; margin-top:.5rem; }
.cycle-log { font-family:monospace; font-size:.78rem; color:#666; background:#0a0a0a; border-radius:8px; padding:1rem; max-height:180px; overflow-y:auto; }
.log-line  { margin:.1rem 0; }
.log-ok    { color:#00D4AA; }
.log-warn  { color:#ffc800; }
.log-err   { color:#ff5050; }
.log-info  { color:#888; }
#run-btn { font-size:1rem; padding:.75rem 2rem; }
#run-status { margin-left:1rem; font-size:.85rem; color:#888; }

/* PATCH-176: universal mobile responsive */
@media(max-width:768px){
  body{overflow-y:auto!important;overflow-x:hidden!important;height:auto!important;}
  /* Any flex layout becomes column */
  .shell,.app-layout,.layout,.forge-layout,.td-layout,.pt-layout,
  .page-layout,.main-layout,.content-layout{flex-direction:column!important;overflow:visible!important;}
  /* Hide any page-level sidebar (nav.js handles the shared one) */
  aside,.sidebar,.side-nav,.left-panel,.nav-panel{display:none!important;}
  /* Main content fills width */
  main,.main-area,.main-content,.forge-main,.page-main,
  .content-area,.right-panel{
    width:100%!important;max-width:100vw!important;padding:14px!important;
    overflow-x:hidden!important;min-width:0!important;
  }
  /* Collapse all grids */
  [class*="grid-"],[class*="-grid"],
  .panel-row,.stats-row,.compose-row,.metric-grid,
  .kpi-grid,.fw-grid,.tier-grid,.card-grid,.feature-grid,
  .two-col,.three-col,.four-col{
    grid-template-columns:1fr!important;
  }
  /* Tables scroll */
  .table-wrap,.table-container{overflow-x:auto!important;-webkit-overflow-scrolling:touch;}
  table{min-width:420px;}
  /* Flex rows become columns */
  .row,.header-row,.page-header,.controls,.form-row,.input-row,
  .filter-row,.action-row{flex-direction:column!important;align-items:flex-start!important;gap:8px!important;}
  /* iOS font zoom fix */
  input,select,textarea{font-size:16px!important;}
  /* Typography */
  h1{font-size:1.3rem!important;}h2{font-size:1.15rem!important;}
}
@media(max-width:480px){
  main,.main-area,.main-content,.page-main{padding:10px!important;}
  h1{font-size:1.1rem!important;}
  .stat-value,.kpi-value{font-size:1.4rem!important;}
}
</style>
  <script src="/static/murphy-nav.js"></script>
</head>
<body>
<div id="murphy-nav-root"></div>
<main class="main-content">
  <div class="page-header">
    <div>
      <h1 class="page-title">👁 Self-Vision Loop</h1>
      <p class="page-subtitle">Murphy sees itself, reads its own source, judges, and fixes — then verifies.</p>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <button class="btn btn-primary" id="run-btn" onclick="startRun()">▶ Run Vision Cycle</button>
      <span id="run-status">Idle</span>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-row" id="kpi-row">
    <div class="kpi"><div class="val" id="kpi-pages">—</div><div class="lbl">Pages Scanned</div></div>
    <div class="kpi"><div class="val" id="kpi-proposals">—</div><div class="lbl">Proposals</div></div>
    <div class="kpi"><div class="val" id="kpi-applied">—</div><div class="lbl">Applied</div></div>
    <div class="kpi"><div class="val" id="kpi-verified">—</div><div class="lbl">Verified</div></div>
    <div class="kpi"><div class="val" id="kpi-queued">—</div><div class="lbl">Queued</div></div>
    <div class="kpi"><div class="val" id="kpi-blocked">—</div><div class="lbl">Blocked</div></div>
  </div>

  <div class="sv-grid">
    <!-- Proposals panel -->
    <div class="card" style="grid-column:1/-1;">
      <h3>Fix Proposals</h3>
      <div id="proposal-list" class="proposal-list">
        <div style="color:#555;padding:1rem;text-align:center;">Run a vision cycle to generate proposals.</div>
      </div>
    </div>

    <!-- Cycle log -->
    <div class="card">
      <h3>Cycle Log</h3>
      <div class="cycle-log" id="cycle-log">
        <div class="log-line log-info">Waiting for run...</div>
      </div>
    </div>

    <!-- Run history -->
    <div class="card">
      <h3>Run History</h3>
      <div id="run-history" style="font-size:.82rem;">
        <div style="color:#555;">No past runs yet.</div>
      </div>
    </div>
  </div>
</main>


<script>
const API   = '';
let pollTimer = null;
let currentRunId = null;

async function apiPost(path, body={}) {
  const tok = localStorage.getItem('murphy_session') || '';
  const r = await fetch(API + path, {
    method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
    body: JSON.stringify(body)
  });
  return r.json();
}
async function apiGet(path) {
  const tok = localStorage.getItem('murphy_session') || '';
  const r = await fetch(API + path, { headers:{'Authorization':'Bearer '+tok} });
  return r.json();
}

function statusBadge(s) {
  const map = {
    pending:  '<span class="badge badge-yellow">QUEUED</span>',
    approved: '<span class="badge badge-blue">APPROVED</span>',
    applied:  '<span class="badge badge-blue">APPLIED</span>',
    verified: '<span class="badge badge-green">✓ VERIFIED</span>',
    blocked:  '<span class="badge badge-red">BLOCKED</span>',
    rejected: '<span class="badge badge-gray">REJECTED</span>',
    failed:   '<span class="badge badge-red">FAILED</span>',
  };
  return map[s] || `<span class="badge badge-gray">${s.toUpperCase()}</span>`;
}
function criticBadge(v) {
  if(v==='PASS')  return '<span class="badge badge-green">PASS</span>';
  if(v==='WARN')  return '<span class="badge badge-yellow">WARN</span>';
  if(v==='BLOCK') return '<span class="badge badge-red">BLOCK</span>';
  return '<span class="badge badge-gray">'+v+'</span>';
}
function dotFor(status) {
  if(status==='completed') return '<span class="status-dot dot-green"></span>';
  if(status==='running')   return '<span class="status-dot dot-yellow"></span>';
  if(status==='failed')    return '<span class="status-dot dot-red"></span>';
  return '<span class="status-dot dot-gray"></span>';
}

function renderProposals(proposals) {
  const el = document.getElementById('proposal-list');
  if(!proposals || !proposals.length) {
    el.innerHTML = '<div style="color:#555;padding:1rem;text-align:center;">No proposals generated — all pages healthy or no issues found.</div>';
    return;
  }
  el.innerHTML = proposals.map(p => `
    <div class="proposal-row" id="prop-${p.id}">
      <div class="proposal-header">
        <span class="proposal-file">${p.target_file||'unknown'}</span>
        <span style="display:flex;gap:.5rem;align-items:center;">
          ${criticBadge(p.critic_verdict||'pending')} ${statusBadge(p.status)}
          <span style="font-size:.75rem;color:#555;">conf: ${((p.confidence||0)*100).toFixed(0)}%</span>
        </span>
      </div>
      <div class="proposal-issue">${p.issue_summary||''}</div>
      <div class="proposal-rationale">${(p.rationale||'').slice(0,300)}${(p.rationale||'').length>300?'…':''}</div>
      ${p.verification_notes ? `<div style="font-size:.75rem;color:#00D4AA;margin-top:.2rem;">✓ ${p.verification_notes}</div>` : ''}
      ${p.critic_issues && p.critic_issues.length ? `<div style="font-size:.75rem;color:#ffc800;margin-top:.2rem;">⚠ ${p.critic_issues.join(' · ')}</div>` : ''}
      <div class="proposal-actions">
        ${p.patch_content ? `<button class="btn btn-warn" onclick="togglePatch('${p.id}')">📄 View Patch</button>` : ''}
        ${(p.status==='pending') ? `<button class="btn btn-primary" onclick="applyProposal('${p.id}')">✓ Apply</button>` : ''}
        ${(p.status==='pending') ? `<button class="btn btn-danger" onclick="rejectProposal('${p.id}')">✕ Reject</button>` : ''}
      </div>
      <div class="patch-viewer" id="patch-${p.id}">${escHtml(p.patch_content||'')}</div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function togglePatch(id) {
  const el = document.getElementById('patch-'+id);
  el.style.display = el.style.display==='none'||!el.style.display ? 'block' : 'none';
}

async function applyProposal(id) {
  log(`Applying proposal ${id}…`, 'info');
  const r = await apiPost(`/api/self/vision/proposals/${id}/apply`);
  log(r.success ? `✓ Applied ${id}` : `✗ ${r.error}`, r.success ? 'ok' : 'err');
  await loadProposals(currentRunId);
}
async function rejectProposal(id) {
  const r = await apiPost(`/api/self/vision/proposals/${id}/reject`);
  log(r.success ? `Rejected ${id}` : `Error: ${r.error}`, r.success ? 'warn' : 'err');
  await loadProposals(currentRunId);
}

function log(msg, type='info') {
  const el = document.getElementById('cycle-log');
  const cls = {ok:'log-ok', warn:'log-warn', err:'log-err', info:'log-info'}[type]||'log-info';
  const ts = new Date().toTimeString().slice(0,8);
  el.innerHTML += `<div class="log-line ${cls}">[${ts}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function startRun() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  document.getElementById('run-status').textContent = 'Starting…';
  log('Starting vision cycle…', 'info');

  const r = await apiPost('/api/self/vision/run', {
    triggered_by: 'founder',
    auto_apply: true
  });

  if(r.job_id) {
    currentRunId = r.job_id;
    log(`Run started — ID: ${r.job_id}`, 'ok');
    pollRun(r.job_id);
  } else if(r.error) {
    log('Error: ' + r.error, 'err');
    btn.disabled = false;
    document.getElementById('run-status').textContent = 'Error';
  } else {
    log('Unexpected response', 'warn');
    btn.disabled = false;
  }
}

function pollRun(jobId) {
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const s = await apiGet('/api/self/vision/status');
      const run = s.current_run || s.last_run;
      if(run) {
        document.getElementById('run-status').textContent =
          run.status === 'running' ? `Scanning (${run.pages_scanned} pages scanned)…` : run.status;

        // Update KPIs from last_run
        const lr = s.last_run || {};
        document.getElementById('kpi-pages').textContent     = lr.pages_scanned ?? '—';
        document.getElementById('kpi-proposals').textContent = lr.proposals_generated ?? '—';
        document.getElementById('kpi-applied').textContent   = lr.proposals_applied ?? '—';
        document.getElementById('kpi-verified').textContent  = (lr.proposals_applied ?? 0);
        document.getElementById('kpi-queued').textContent    = lr.proposals_queued ?? '—';
        document.getElementById('kpi-blocked').textContent   = lr.proposals_blocked ?? '—';

        if(run.status !== 'running') {
          clearInterval(pollTimer);
          document.getElementById('run-btn').disabled = false;
          log(`Cycle complete — ${lr.summary||''}`, 'ok');
          await loadProposals(jobId);
          await loadHistory();
        }
      }
    } catch(e) {
      log('Poll error: '+e, 'warn');
    }
  }, 3000);
}

async function loadProposals(runId) {
  const r = await apiGet('/api/self/vision/proposals' + (runId ? '?run_id='+runId : ''));
  renderProposals(r.proposals || r);
}

async function loadHistory() {
  const r = await apiGet('/api/self/vision/history');
  const runs = r.runs || r || [];
  const el = document.getElementById('run-history');
  if(!runs.length) { el.innerHTML='<div style="color:#555;">No past runs.</div>'; return; }
  el.innerHTML = runs.map(run => `
    <div class="run-row">
      <div>
        ${dotFor(run.status)}<span style="color:#ccc;">${(run.started_at||'').slice(0,16).replace('T',' ')}</span>
        <div class="run-summary">${run.summary||run.status}</div>
      </div>
      <div style="text-align:right;font-size:.78rem;color:#666;">
        ${run.proposals_generated||0} proposals<br>
        ${run.proposals_applied||0} applied
      </div>
    </div>
  `).join('');
}

async function loadStatus() {
  const s = await apiGet('/api/self/vision/status');
  const lr = s.last_run;
  if(lr) {
    document.getElementById('kpi-pages').textContent     = lr.pages_scanned ?? '—';
    document.getElementById('kpi-proposals').textContent = lr.proposals_generated ?? '—';
    document.getElementById('kpi-applied').textContent   = lr.proposals_applied ?? '—';
    document.getElementById('kpi-verified').textContent  = lr.proposals_applied ?? '—';
    document.getElementById('kpi-queued').textContent    = lr.proposals_queued ?? '—';
    document.getElementById('kpi-blocked').textContent   = lr.proposals_blocked ?? '—';
    document.getElementById('run-status').textContent    = lr.status || 'idle';
    if(lr.id) {
      currentRunId = lr.id;
      await loadProposals(lr.id);
    }
  }
}

// Init
window.addEventListener('DOMContentLoaded', async () => {
  await loadStatus();
  await loadHistory();
  log('Self-Vision engine ready.', 'ok');
});
</script>
</body>
</html>
