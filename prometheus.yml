global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "murphy-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["murphy-api:8000"]
        labels:
          environment: "production"
          service: "murphy-api"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
