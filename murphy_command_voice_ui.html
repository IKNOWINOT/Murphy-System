<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murphy Command Surface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --murphy-dark: #0a0e27;
            --murphy-teal: #0db4a3;
            --murphy-cyan: #00d9ff;
        }
        body {
            background: linear-gradient(135deg, var(--murphy-dark) 0%, #0f1433 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        .header {
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 2px solid var(--murphy-teal);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .main {
            display: flex;
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .panel {
            flex: 1;
            background: rgba(26, 31, 58, 0.6);
            border: 2px solid var(--murphy-gray, #1a1f3a);
            border-radius: 10px;
            padding: 1.5rem;
        }
        .title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--murphy-cyan);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }
        .btn {
            background: linear-gradient(135deg, var(--murphy-teal) 0%, var(--murphy-cyan) 100%);
            color: var(--murphy-dark);
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 1rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(13, 180, 163, 0.5);
        }
        textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(10, 14, 39, 0.8);
            border: 2px solid var(--murphy-gray, #1a1f3a);
            border-radius: 8px;
            color: #e0e0e0;
            font-family: inherit;
            min-height: 120px;
            margin-bottom: 1rem;
        }
        textarea:focus {
            outline: none;
            border-color: var(--murphy-teal);
        }
        .graph-item {
            background: rgba(26, 31, 58, 0.4);
            border-left: 3px solid var(--murphy-teal);
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .graph-item:hover {
            background: rgba(26, 31, 58, 0.6);
        }
        .output {
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid var(--murphy-gray, #1a1f3a);
            border-radius: 8px;
            padding: 1rem;
            min-height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', monospace;
            font-size: 0.85rem;
        }
        .log-line {
            margin-bottom: 0.5rem;
            display: flex;
            gap: 0.5rem;
        }
        .log-time {
            color: #7b5ba6;
            flex-shrink: 0;
            width: 60px;
        }
        .log-success { color: #44ff44; }
        .log-error { color: #ff4444; }
        .log-info { color: #00d9ff; }
        .status-light {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #44ff44;
            border-radius: 50%;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 style="color: var(--murphy-teal);">⚙️ Murphy Command Surface</h1>
            <div style="font-size: 0.75rem; color: var(--murphy-teal);">Multi-Graph Voice & Text Control</div>
        </div>
        <div style="text-align: right;">
            <span class="status-light"></span> System Ready
        </div>
    </div>

    <div class="main">
        <div class="panel" style="max-width: 400px;">
            <div class="title">🎤 Command Input</div>
            <button class="btn" onclick="toggleVoice()">🎙️ Voice Input</button>
            <textarea id="cmd" placeholder="Type your command...
Examples:
• Show system status
• Agent summary
• HITL queue
• Capacity metrics"></textarea>
            <button class="btn" onclick="execute()">Execute Command</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                <button class="btn" style="padding: 0.7rem; font-size: 0.85rem;" onclick="quick('status')">Status</button>
                <button class="btn" style="padding: 0.7rem; font-size: 0.85rem;" onclick="quick('agents')">Agents</button>
                <button class="btn" style="padding: 0.7rem; font-size: 0.85rem;" onclick="quick('hitl')">HITL</button>
                <button class="btn" style="padding: 0.7rem; font-size: 0.85rem;" onclick="quick('capacity')">Capacity</button>
            </div>
        </div>

        <div class="panel">
            <div class="title">📊 Graph State</div>
            <div id="graphs"></div>
        </div>

        <div class="panel" style="flex: 1.2;">
            <div class="title">📡 Execution Output</div>
            <div class="output" id="output"></div>
        </div>
    </div>

    <script>
        const graphs = ['Soul Graph', 'MFGC Gates', 'MSS Resolution', 'Rubix Evidence', 'Causality Gate', 'Emergence Cycle', 'Compliance Arch', 'Chain Engine'];
        
        function init() {
            const g = document.getElementById('graphs');
            graphs.forEach(name => {
                const item = document.createElement('div');
                item.className = 'graph-item';
                item.innerHTML = `<span class="status-light"></span><strong>${name}</strong>`;
                g.appendChild(item);
            });
            log('Murphy Command Surface ready. Awaiting command.', 'success');
        }

        function log(msg, type = 'info') {
            const out = document.getElementById('output');
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            const time = new Date().toLocaleTimeString();
            line.innerHTML = `<span class="log-time">[${time}]</span><span>${msg}</span>`;
            out.appendChild(line);
            out.scrollTop = out.scrollHeight;
        }

        function toggleVoice() {
            log('Voice input enabled (placeholder)', 'info');
        }

        function execute() {
            const cmd = document.getElementById('cmd').value;
            if (!cmd) return;
            log(`> ${cmd}`, 'info');
            // TODO: Wire to /api/command/execute
            document.getElementById('cmd').value = '';
        }

        function quick(type) {
            const cmds = {
                'status': 'What is the current system status across all graphs?',
                'agents': 'Show the status of all 9 swarm agents.',
                'hitl': 'How many HITL items are pending?',
                'capacity': 'Show server capacity metrics.'
            };
            document.getElementById('cmd').value = cmds[type];
            execute();
        }

        window.onload = init;
    </script>
</body>
</html>
