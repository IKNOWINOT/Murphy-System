<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murphy</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#080c0a;color:#e8efe8;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .header{background:#0d1410;border-bottom:1px solid #1a2620;padding:12px 18px;display:flex;align-items:center;gap:12px}
  .logo{width:28px;height:28px;border-radius:50%;background:#00d4aa;display:flex;align-items:center;justify-content:center;color:#080c0a;font-weight:bold;font-size:14px}
  .title{font-size:15px;font-weight:600}
  .sub{font-size:11px;color:#7a8c84;margin-left:auto}
  .dot{width:8px;height:8px;border-radius:50%;background:#00d4aa;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .chat{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
  .msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.45;word-wrap:break-word;animation:slide .25s ease-out}
  @keyframes slide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg-user{background:#1f3a30;color:#d6ebe2;align-self:flex-end;border-bottom-right-radius:4px}
  .msg-murphy{background:#11241c;color:#e8efe8;align-self:flex-start;border-bottom-left-radius:4px;border-left:2px solid #00d4aa}
  .msg-system{background:transparent;color:#7a8c84;font-size:12px;align-self:center;font-style:italic}
  .msg-typing{background:#11241c;color:#7a8c84;align-self:flex-start;border-left:2px solid #00d4aa;font-style:italic}
  .input-bar{background:#0d1410;border-top:1px solid #1a2620;padding:12px;display:flex;gap:8px;align-items:flex-end}
  #input{flex:1;background:#1a2620;border:1px solid #2a3a32;color:#e8efe8;padding:11px 14px;border-radius:22px;font-size:14px;font-family:inherit;resize:none;max-height:120px;min-height:42px;outline:none}
  #input:focus{border-color:#00d4aa}
  .btn{background:#00d4aa;color:#080c0a;border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .btn:hover{background:#00f5c2;transform:scale(1.05)}
  .btn:disabled{background:#2a3a32;color:#5a6a62;cursor:not-allowed;transform:none}
  .btn-mic.recording{background:#ff4444;animation:rec 1s infinite}
  @keyframes rec{0%,100%{box-shadow:0 0 0 0 rgba(255,68,68,.5)}50%{box-shadow:0 0 0 8px rgba(255,68,68,0)}}
  .status{font-size:11px;color:#7a8c84;padding:4px 12px;text-align:center;min-height:16px}
  .err{color:#ff6666}
</style>
</head>
<body>
<div class="header">
  <div class="logo">M</div>
  <div>
    <div class="title">Murphy</div>
    <div class="sub" id="hdr-status"><span class="dot"></span> online</div>
  </div>
</div>

<div class="chat" id="chat">
  <div class="msg msg-system">Murphy is listening. Type or hit the mic.</div>
</div>

<div class="status" id="status"></div>

<div class="input-bar">
  <textarea id="input" placeholder="Talk to Murphy…" rows="1" autocomplete="off"></textarea>
  <button class="btn btn-mic" id="mic-btn" title="Voice input" aria-label="Voice input">🎙</button>
  <button class="btn" id="send-btn" title="Send" aria-label="Send">↑</button>
</div>

<script>
const SESSION_ID = 'web_' + Math.random().toString(36).substring(2, 10);
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const statusEl = document.getElementById('status');

let recognition = null;
let recognizing = false;
let ttsEnabled = false;  // Will turn on after first user interaction

// ── auto-resize textarea ────────────────────────────────────────────
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// ── Enter to send, Shift+Enter for newline ──────────────────────────
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'msg msg-' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function setStatus(text, isErr = false) {
  statusEl.textContent = text;
  statusEl.className = 'status' + (isErr ? ' err' : '');
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  ttsEnabled = true;  // user interacted → audio is allowed

  const typing = addMessage('Murphy is thinking…', 'typing');
  setStatus('sending…');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, session_id: SESSION_ID})
    });
    const data = await res.json();
    typing.remove();
    if (data.reply || data.message) {
      const reply = data.reply || data.message;
      addMessage(reply, 'murphy');
      setStatus('');
      speak(reply);
    } else {
      addMessage('(empty response)', 'system');
      setStatus('empty reply', true);
    }
  } catch (e) {
    typing.remove();
    addMessage('Network error: ' + e.message, 'system');
    setStatus('network error', true);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

// ── Web Speech API: speech-to-text ──────────────────────────────────
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    micBtn.disabled = true;
    micBtn.title = 'Voice input not supported in this browser';
    return;
  }
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    recognizing = true;
    micBtn.classList.add('recording');
    setStatus('listening…');
  };
  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = 0; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    input.value = transcript;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  };
  recognition.onerror = (e) => {
    setStatus('mic error: ' + e.error, true);
    recognizing = false;
    micBtn.classList.remove('recording');
  };
  recognition.onend = () => {
    recognizing = false;
    micBtn.classList.remove('recording');
    setStatus('');
    // Auto-send if we captured something
    if (input.value.trim()) {
      setTimeout(sendMessage, 250);
    }
  };
}

micBtn.addEventListener('click', () => {
  if (!recognition) {
    setStatus('voice input unavailable in this browser', true);
    return;
  }
  ttsEnabled = true;
  if (recognizing) {
    recognition.stop();
  } else {
    try { recognition.start(); }
    catch (e) { setStatus('mic: ' + e.message, true); }
  }
});

// ── Browser TTS for Murphy's replies ────────────────────────────────
function speak(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.05;
    u.pitch = 0.95;
    // Prefer a male voice if available
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => /male|david|daniel|alex|fred/i.test(v.name) && v.lang.startsWith('en'))
                    || voices.find(v => v.lang === 'en-US')
                    || voices[0];
    if (preferred) u.voice = preferred;
    window.speechSynthesis.speak(u);
  } catch (e) { /* swallow */ }
}

// Some browsers load voices async
if (window.speechSynthesis && speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => {};
}

setupRecognition();
input.focus();
</script>
</body>
</html>
