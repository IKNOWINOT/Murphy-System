name: Murphy System CI/CD

on:
  push:
    branches: [main]
    paths:
      - "Murphy System/**"
  pull_request:
    branches: [main]
    paths:
      - "Murphy System/**"

env:
  MURPHY_ENV: test
  PYTHONPATH: ${{ github.workspace }}/Murphy System

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Murphy System"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check – Rosetta modules
        run: python -m py_compile src/rosetta/*.py

      - name: Syntax check – Robotics modules
        run: python -m py_compile src/robotics/*.py

      - name: Syntax check – Avatar modules
        run: python -m py_compile src/avatar/*.py

      - name: Syntax check – Event Backbone
        run: python -m py_compile src/event_backbone.py

      - name: Syntax check – Persistence Manager
        run: python -m py_compile src/persistence_manager.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: "Murphy System"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_rosetta.py \
            tests/test_robotics.py \
            tests/test_avatar.py \
            tests/test_security_hardening_phase1.py \
            tests/test_security_hardening_phase2.py \
            -v --tb=short

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Murphy System/tests/
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: "Murphy System"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t murphy-system:${{ github.sha }} .

      - name: Tag as latest
        run: docker tag murphy-system:${{ github.sha }} murphy-system:latest
