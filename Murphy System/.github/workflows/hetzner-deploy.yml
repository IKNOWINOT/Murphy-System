name: Build & Deploy to Hetzner
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MURPHY_ENV: test
      PYTHONPATH: "${{ github.workspace }}/Murphy System:${{ github.workspace }}/Murphy System/src"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate requirements are installable
        run: pip install --dry-run -r "Murphy System/requirements_murphy_1.0.txt"
      - name: Install dependencies
        run: pip install -r "Murphy System/requirements_murphy_1.0.txt"
      - name: Install test tools
        run: pip install pytest pytest-asyncio pytest-timeout
      - name: Run tests
        run: python -m pytest "Murphy System/tests/" --timeout=300 -x -q --ignore="Murphy System/tests/e2e"

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            # Pull the latest code (including the updated hetzner_load.sh),
            # then delegate the entire full-stack deployment to the script.
            # --skip-pull avoids a redundant second pull inside the script.
            cd /opt/Murphy-System
            git pull origin main
            bash scripts/hetzner_load.sh --skip-pull
