apiVersion: v1
kind: ResourceQuota
metadata:
  name: murphy-system-quota
  namespace: murphy-system
  labels:
    app: murphy-system
    component: resource-management
    environment: production
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
    pods: "20"
    persistentvolumeclaims: "5"
    services: "10"
