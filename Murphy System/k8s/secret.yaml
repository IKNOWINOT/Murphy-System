apiVersion: v1
kind: Secret
metadata:
  name: murphy-secrets
  namespace: murphy-system
  labels:
    app: murphy-system
    component: secrets
    environment: production
type: Opaque
data:
  # ⚠️ CRITICAL: Replace ALL placeholder values before deploying to production
  # Base64-encoded placeholder values — replace ALL values before deploying.
  # Encode a value with: echo -n "your-value" | base64
  # For production, use a secrets manager (e.g., Sealed Secrets, External Secrets Operator)
  # -----------------------------------------------------------------------

  # Database connection string
  # Example: postgresql://murphy:password@postgres:5432/murphy_db
  DATABASE_URL: Y2hhbmdlLW1lLWRhdGFiYXNlLXVybA==

  # Redis connection string
  # Example: redis://:password@redis:6379/0
  REDIS_URL: Y2hhbmdlLW1lLXJlZGlzLXVybA==

  # DeepInfra API key — obtain from https://console.deepinfra.com/
  DEEPINFRA_API_KEY: Y2hhbmdlLW1lLWdyb3EtYXBpLWtleQ==

  # JWT signing secret — generate with: openssl rand -hex 32
  MURPHY_JWT_SECRET: Y2hhbmdlLW1lLWp3dC1zZWNyZXQ=

  # Encryption key for at-rest data — generate with: openssl rand -hex 32
  ENCRYPTION_KEY: Y2hhbmdlLW1lLWVuY3J5cHRpb24ta2V5

  # GitHub personal access token (repo + packages scopes)
  GITHUB_TOKEN: Y2hhbmdlLW1lLWdpdGh1Yi10b2tlbg==

  # PayPal client credentials — obtain from https://developer.paypal.com/
  PAYPAL_CLIENT_ID: Y2hhbmdlLW1lLXBheXBhbC1jbGllbnQtaWQ=
  PAYPAL_CLIENT_SECRET: Y2hhbmdlLW1lLXBheXBhbC1jbGllbnQtc2VjcmV0

  # PayPal webhook signing secret — configure in the PayPal developer dashboard
  PAYPAL_WEBHOOK_SECRET: Y2hhbmdlLW1lLXBheXBhbC13ZWJob29rLXNlY3JldA==

  # Coinbase Commerce webhook shared secret — configure in Coinbase Commerce settings
  COINBASE_WEBHOOK_SECRET: Y2hhbmdlLW1lLWNvaW5iYXNlLXdlYmhvb2stc2VjcmV0

  # Stripe API key — obtain from https://dashboard.stripe.com/apikeys
  STRIPE_API_KEY: Y2hhbmdlLW1lLXN0cmlwZS1hcGkta2V5

  # Murphy API keys (comma-separated list of valid API keys)
  MURPHY_API_KEYS: Y2hhbmdlLW1lLWFwaS1rZXk=

  # Credential master key — generate with: openssl rand -hex 32
  MURPHY_CREDENTIAL_MASTER_KEY: Y2hhbmdlLW1lLWNyZWRlbnRpYWwtbWFzdGVyLWtleQ==

  # Redis password — generate with: openssl rand -hex 16
  REDIS_PASSWORD: Y2hhbmdlLW1lLXJlZGlzLXBhc3N3b3Jk

  # Redis connection URL — include the password
  # Example: redis://:password@murphy-redis:6379/0
  MURPHY_REDIS_URL: Y2hhbmdlLW1lLXJlZGlzLXVybA==

  # PostgreSQL password — used by the postgres container
  POSTGRES_PASSWORD: Y2hhbmdlLW1lLXBvc3RncmVzLXBhc3N3b3Jk
