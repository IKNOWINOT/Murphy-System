# Usage: kubectl apply -k "Murphy System/k8s/"
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: murphy-system

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - network-policy.yaml
  - pdb.yaml
  - redis.yaml
  - postgres.yaml
  - resource-quota.yaml
  - backup-cronjob.yaml

commonLabels:
  managed-by: kustomize
