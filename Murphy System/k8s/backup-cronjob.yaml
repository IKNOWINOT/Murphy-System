# Murphy System — Automated Backup CronJob
# Copyright © 2020 Inoni Limited Liability Company
# License: BSL-1.1
#
# Runs the BackupManager from backup_disaster_recovery.py on a daily schedule.
# Backs up Murphy data directory, config, and state to a PVC.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: murphy-backup
  namespace: murphy-system
  labels:
    app: murphy-system
    component: backup
    environment: production
spec:
  schedule: "0 2 * * *"  # Daily at 2:00 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800  # 30 min timeout
      template:
        metadata:
          labels:
            app: murphy-system
            component: backup
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
          containers:
            - name: backup
              image: ghcr.io/iknowinot/murphy-system/murphy-system:v1.0.0
              imagePullPolicy: IfNotPresent
              command:
                - python
                - -c
                - |
                  import os, sys
                  sys.path.insert(0, '/app/src')
                  os.environ.setdefault('MURPHY_ENV', 'production')
                  from backup_disaster_recovery import BackupManager, LocalStorageBackend, BackupType
                  from pathlib import Path
                  backend = LocalStorageBackend(Path('/backups'))
                  mgr = BackupManager(backend, project_root=Path('/app'))
                  manifest = mgr.create_backup(BackupType.FULL.value, metadata={'source': 'k8s-cronjob'})
                  print(f'Backup completed: {manifest.backup_id} ({manifest.size_bytes} bytes)')
                  # Cleanup old backups
                  mgr.cleanup_expired()
              envFrom:
                - configMapRef:
                    name: murphy-config
                - secretRef:
                    name: murphy-secrets
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              volumeMounts:
                - name: murphy-data
                  mountPath: /app/data
                  readOnly: true
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: murphy-data
              persistentVolumeClaim:
                claimName: murphy-data
            - name: backup-storage
              persistentVolumeClaim:
                claimName: murphy-backup-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: murphy-backup-storage
  namespace: murphy-system
  labels:
    app: murphy-system
    component: backup
    environment: production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
