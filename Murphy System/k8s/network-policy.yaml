apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: murphy-api
  namespace: murphy-system
  labels:
    app: murphy-system
    component: network-policy
    environment: production
spec:
  podSelector:
    matchLabels:
      app: murphy-system
      component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the ingress controller (ingress-nginx or kube-system)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8000
          protocol: TCP
    # Allow Prometheus scraping from the monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8000
          protocol: TCP
  egress:
    # Allow DNS resolution via kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow all outbound HTTPS (Groq, GitHub, PayPal, Coinbase, external APIs)
    - ports:
        - port: 443
          protocol: TCP
    # Allow all outbound HTTP (redirects and non-TLS endpoints)
    - ports:
        - port: 80
          protocol: TCP
    # Allow intra-namespace communication
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: murphy-system
    - to:
        - podSelector:
            matchLabels:
              app: murphy-system
              component: redis
      ports:
        - port: 6379
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: murphy-redis
  namespace: murphy-system
  labels:
    app: murphy-system
    component: network-policy
    environment: production
spec:
  podSelector:
    matchLabels:
      app: murphy-system
      component: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: murphy-system
              component: api
      ports:
        - port: 6379
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: murphy-system
              component: backup
      ports:
        - port: 6379
          protocol: TCP
  egress:
    - ports:
        - port: 53
          protocol: TCP
        - port: 53
          protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: murphy-backup
  namespace: murphy-system
  labels:
    app: murphy-system
    component: network-policy
    environment: production
spec:
  podSelector:
    matchLabels:
      app: murphy-system
      component: backup
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: TCP
        - port: 53
          protocol: UDP
    - to:
        - podSelector:
            matchLabels:
              app: murphy-system
              component: redis
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: murphy-system
              component: postgres
      ports:
        - port: 5432
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: murphy-postgres
  namespace: murphy-system
  labels:
    app: murphy-system
    component: network-policy
    environment: production
spec:
  podSelector:
    matchLabels:
      app: murphy-system
      component: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: murphy-system
              component: api
      ports:
        - port: 5432
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: murphy-system
              component: backup
      ports:
        - port: 5432
          protocol: TCP
  egress:
    - ports:
        - port: 53
          protocol: TCP
        - port: 53
          protocol: UDP
