<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murphy System — Welcome</title>
<link rel="icon" href="static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="static/murphy-design-system.css">
</head>
<body style="--accent: #FFD166;">

<a class="murphy-skip-link" href="#wizard-content">Skip to content</a>

<main id="wizard-content" role="main" style="max-width:680px;margin:0 auto;padding:2rem;">

  <!-- Murphy Logo -->
  <div class="flex justify-center" style="margin-bottom:1.5rem;">
    <svg width="48" height="48" aria-label="Murphy System logo">
      <use href="static/murphy-icons.svg#icon-workflow"></use>
    </svg>
  </div>

  <!-- Step Indicator Dots -->
  <nav aria-label="Onboarding progress" class="flex justify-center gap-2" style="margin-bottom:2rem;">
    <span class="step-dot" data-step="1" role="img" aria-label="Step 1: Conversation"></span>
    <span class="step-dot" data-step="2" role="img" aria-label="Step 2: Plan"></span>
    <span class="step-dot" data-step="3" role="img" aria-label="Step 3: Connections"></span>
    <span class="step-dot" data-step="4" role="img" aria-label="Step 4: Safety"></span>
    <span class="step-dot" data-step="5" role="img" aria-label="Step 5: Ready"></span>
  </nav>

  <!-- Dynamic Content Area -->
  <div id="step-container" aria-live="polite"></div>

</main>

<script src="static/murphy-components.js"></script>
<script>
(function () {
  'use strict';

  var api = new MurphyAPI('/api');
  var theme = new MurphyTheme();
  theme.init();

  // ── State ──────────────────────────────────────────────
  var currentStep = 1;
  var chatHistory = [];
  var exchangeCount = 0;
  var selectedModules = [];
  var selectedIntegrations = [];
  var credentials = {};
  var safetyLevel = 3;
  var recommendedTerminal = 'terminal_unified.html';
  var librarianConfig = null;

  // ── DOM refs ───────────────────────────────────────────
  var container = document.getElementById('step-container');
  var stepDots = document.querySelectorAll('.step-dot');

  // ── Safety level descriptions ──────────────────────────
  var safetyLabels = [
    '',
    'Always ask me first — Murphy will confirm every action before executing.',
    'Ask for important decisions — routine work proceeds, big calls need your OK.',
    'Handle routine tasks, ask for complex ones — a balanced mix of speed and control.',
    'Handle most things, alert me on changes — Murphy runs the show, you stay informed.',
    'Full automation — Murphy handles everything and sends you reports.'
  ];

  var safetyNames = [
    '',
    'Full HITL',
    'Important Decisions',
    'Balanced (Recommended)',
    'Mostly Autonomous',
    'Full Automation'
  ];

  // ── Helpers ────────────────────────────────────────────
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function (k) {
        if (k === 'className') { node.className = attrs[k]; }
        else if (k === 'textContent') { node.textContent = attrs[k]; }
        else if (k === 'innerHTML') { node.innerHTML = attrs[k]; }
        else if (k.slice(0, 2) === 'on') { node.addEventListener(k.slice(2).toLowerCase(), attrs[k]); }
        else { node.setAttribute(k, attrs[k]); }
      });
    }
    if (children) {
      children.forEach(function (c) {
        if (typeof c === 'string') { node.appendChild(document.createTextNode(c)); }
        else if (c) { node.appendChild(c); }
      });
    }
    return node;
  }

  function icon(name, size) {
    var s = size || 20;
    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', s);
    svg.setAttribute('height', s);
    svg.setAttribute('aria-hidden', 'true');
    var use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
    use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', 'static/murphy-icons.svg#icon-' + name);
    svg.appendChild(use);
    return svg;
  }

  function clearContainer() {
    container.innerHTML = '';
  }

  // ── Step dot updates ───────────────────────────────────
  function updateDots() {
    stepDots.forEach(function (dot) {
      var s = parseInt(dot.getAttribute('data-step'), 10);
      dot.classList.remove('step-dot-active', 'step-dot-done');
      if (s === currentStep) { dot.classList.add('step-dot-active'); }
      else if (s < currentStep) { dot.classList.add('step-dot-done'); }
    });
  }

  // ── Navigation buttons ─────────────────────────────────
  function navBar(opts) {
    var bar = el('div', { className: 'flex justify-between items-center', style: 'margin-top:1.5rem;' });
    if (opts.back) {
      var backBtn = el('button', {
        className: 'murphy-btn murphy-btn-ghost',
        textContent: '← Back',
        onClick: function () { goToStep(currentStep - 1); }
      });
      bar.appendChild(backBtn);
    } else {
      bar.appendChild(el('span'));
    }
    if (opts.next) {
      var nextBtn = el('button', {
        className: 'murphy-btn murphy-btn-primary',
        textContent: opts.nextLabel || 'Continue →',
        onClick: opts.next
      });
      if (opts.nextId) { nextBtn.id = opts.nextId; }
      if (opts.nextDisabled) { nextBtn.disabled = true; }
      bar.appendChild(nextBtn);
    }
    return bar;
  }

  // ── Go to step ─────────────────────────────────────────
  function goToStep(step) {
    if (step < 1 || step > 5) return;
    currentStep = step;
    updateDots();
    renderStep(step);
  }

  // ── Step router ────────────────────────────────────────
  function renderStep(step) {
    clearContainer();
    switch (step) {
      case 1: renderConversation(); break;
      case 2: renderPlan(); break;
      case 3: renderConnections(); break;
      case 4: renderSafety(); break;
      case 5: renderReady(); break;
    }
  }

  // ════════════════════════════════════════════════════════
  //  STEP 1 — The Conversation
  // ════════════════════════════════════════════════════════
  function renderConversation() {
    var wrapper = el('div', { className: 'flex flex-col', style: 'height:calc(100vh - 12rem);' });

    // Chat area
    var chatArea = el('div', { id: 'chat-area', className: 'flex-1', style: 'overflow-y:auto;padding-bottom:1rem;' });
    wrapper.appendChild(chatArea);

    // Render existing history
    chatHistory.forEach(function (msg) {
      chatArea.appendChild(chatBubble(msg.role, msg.content));
    });

    // Seed the greeting if first visit
    if (chatHistory.length === 0) {
      var greeting = "Hi! I'm Murphy's Librarian. Tell me about your business and what you'd like to automate — in your own words. No technical jargon needed.";
      chatHistory.push({ role: 'assistant', content: greeting });
      chatArea.appendChild(chatBubble('assistant', greeting));
    }

    // Input area
    var inputRow = el('div', { className: 'flex gap-2 items-end', style: 'margin-top:auto;' });
    var input = el('input', {
      type: 'text',
      className: 'murphy-input murphy-chat-input flex-1',
      placeholder: 'Tell Murphy about your business…',
      'aria-label': 'Chat message'
    });
    var sendBtn = el('button', {
      className: 'murphy-btn murphy-btn-primary murphy-btn-icon',
      'aria-label': 'Send message'
    });
    sendBtn.appendChild(icon('chat', 18));

    function sendMessage() {
      var text = input.value.trim();
      if (!text) return;
      input.value = '';

      chatHistory.push({ role: 'user', content: text });
      chatArea.appendChild(chatBubble('user', text));
      chatArea.scrollTop = chatArea.scrollHeight;

      // Send to Librarian
      var typingEl = chatBubble('assistant', '…');
      typingEl.classList.add('murphy-animate-pulse');
      chatArea.appendChild(typingEl);
      chatArea.scrollTop = chatArea.scrollHeight;

      api.post('/librarian/ask', { question: text, context: 'onboarding' })
        .then(function (res) {
          chatArea.removeChild(typingEl);
          var reply = (res.ok && res.data && (res.data.answer || res.data.response || res.data.message))
            ? (res.data.answer || res.data.response || res.data.message)
            : null;

          if (reply) {
            chatHistory.push({ role: 'assistant', content: reply });
            chatArea.appendChild(chatBubble('assistant', reply));

            if (res.data.config) {
              librarianConfig = res.data.config;
              if (res.data.config.modules) selectedModules = res.data.config.modules;
              if (res.data.config.integrations) selectedIntegrations = res.data.config.integrations;
              if (res.data.config.recommended_terminal) recommendedTerminal = res.data.config.recommended_terminal;
            }
          } else {
            var fallback = "I'm having trouble connecting right now, but you can continue and configure things manually.";
            chatHistory.push({ role: 'assistant', content: fallback });
            chatArea.appendChild(chatBubble('assistant', fallback));
          }

          exchangeCount++;
          updateContinueVisibility();
          chatArea.scrollTop = chatArea.scrollHeight;
        })
        .catch(function () {
          chatArea.removeChild(typingEl);
          var errMsg = "Sorry, I couldn't reach the server. You can keep chatting or continue to set things up manually.";
          chatHistory.push({ role: 'assistant', content: errMsg });
          chatArea.appendChild(chatBubble('assistant', errMsg));
          exchangeCount++;
          updateContinueVisibility();
          chatArea.scrollTop = chatArea.scrollHeight;
        });
    }

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { sendMessage(); }
    });
    sendBtn.addEventListener('click', sendMessage);

    inputRow.appendChild(input);
    inputRow.appendChild(sendBtn);
    wrapper.appendChild(inputRow);

    // Continue button (hidden until enough exchanges)
    var continueRow = el('div', {
      id: 'continue-row',
      className: 'flex justify-end',
      style: 'margin-top:1rem;display:none;'
    });
    var continueBtn = el('button', {
      className: 'murphy-btn murphy-btn-primary',
      textContent: 'Continue to Plan →',
      onClick: function () { goToStep(2); }
    });
    continueRow.appendChild(continueBtn);
    wrapper.appendChild(continueRow);

    container.appendChild(wrapper);

    function updateContinueVisibility() {
      if (exchangeCount >= 3) {
        continueRow.style.display = 'flex';
      }
    }
    updateContinueVisibility();

    // Auto-focus input
    input.focus();
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function chatBubble(role, text) {
    var bubbleClass = 'murphy-chat-bubble ' +
      (role === 'user' ? 'murphy-chat-bubble-user' : 'murphy-chat-bubble-assistant');
    var bubble = el('div', { className: bubbleClass });
    bubble.textContent = text;
    return bubble;
  }

  // ════════════════════════════════════════════════════════
  //  STEP 2 — The Plan
  // ════════════════════════════════════════════════════════
  function renderPlan() {
    var heading = el('h1', {
      className: 'font-bold',
      textContent: "Here's what I'll set up for you",
      style: 'font-size:1.5rem;margin-bottom:1.5rem;'
    });
    container.appendChild(heading);

    // Fallback defaults if librarian didn't provide config
    if (selectedModules.length === 0) {
      selectedModules = [
        { id: 'task-engine', name: 'Task Engine', description: 'Core workflow and task management', enabled: true },
        { id: 'librarian', name: 'Librarian', description: 'AI assistant for knowledge and queries', enabled: true },
        { id: 'governance', name: 'Governance Gates', description: 'Approval and compliance controls', enabled: true }
      ];
    }
    if (selectedIntegrations.length === 0) {
      selectedIntegrations = [
        { id: 'email', name: 'Email (SMTP)', description: 'Send and receive email', enabled: true },
        { id: 'webhooks', name: 'Webhooks', description: 'Connect to external services', enabled: true }
      ];
    }

    // Modules section
    var modLabel = el('h2', {
      className: 'font-medium',
      textContent: 'Modules',
      style: 'font-size:1.1rem;margin-bottom:0.75rem;'
    });
    container.appendChild(modLabel);

    var modGrid = el('div', { className: 'grid gap-3', style: 'grid-template-columns:repeat(auto-fill,minmax(200px,1fr));margin-bottom:1.5rem;' });
    selectedModules.forEach(function (mod, idx) {
      modGrid.appendChild(planCard(mod, 'module', idx));
    });
    container.appendChild(modGrid);

    // Integrations section
    var intLabel = el('h2', {
      className: 'font-medium',
      textContent: 'Integrations',
      style: 'font-size:1.1rem;margin-bottom:0.75rem;'
    });
    container.appendChild(intLabel);

    var intGrid = el('div', { className: 'grid gap-3', style: 'grid-template-columns:repeat(auto-fill,minmax(200px,1fr));margin-bottom:1.5rem;' });
    selectedIntegrations.forEach(function (integ, idx) {
      intGrid.appendChild(planCard(integ, 'integration', idx));
    });
    container.appendChild(intGrid);

    // "Anything else?" input
    var extraRow = el('div', { className: 'flex gap-2', style: 'margin-bottom:1rem;' });
    var extraInput = el('input', {
      type: 'text',
      className: 'murphy-input flex-1',
      placeholder: 'Anything else you need?',
      'aria-label': 'Additional requests'
    });
    var extraBtn = el('button', {
      className: 'murphy-btn murphy-btn-secondary',
      textContent: 'Ask Librarian',
      onClick: function () {
        var q = extraInput.value.trim();
        if (!q) return;
        extraInput.value = '';
        api.post('/librarian/ask', { question: q, context: 'onboarding' })
          .then(function (res) {
            if (res.ok && res.data) {
              if (res.data.config && res.data.config.modules) {
                selectedModules = res.data.config.modules;
                goToStep(2);
              }
              if (res.data.config && res.data.config.integrations) {
                selectedIntegrations = res.data.config.integrations;
                goToStep(2);
              }
            }
          });
      }
    });
    extraRow.appendChild(extraInput);
    extraRow.appendChild(extraBtn);
    container.appendChild(extraRow);

    // Navigation
    container.appendChild(navBar({
      back: true,
      next: function () { goToStep(3); },
      nextLabel: 'Looks good! →'
    }));
  }

  function planCard(item, type, idx) {
    var card = el('div', {
      className: 'murphy-card',
      role: 'button',
      tabindex: '0',
      'aria-pressed': item.enabled !== false ? 'true' : 'false',
      style: item.enabled === false ? 'opacity:0.5;' : ''
    });

    var header = el('div', { className: 'murphy-card-header flex justify-between items-center' });
    var nameEl = el('span', { className: 'font-bold', textContent: item.name });
    var toggleEl = el('span', {
      textContent: item.enabled !== false ? '✓' : '○',
      style: 'cursor:pointer;font-size:1.2rem;'
    });
    header.appendChild(nameEl);
    header.appendChild(toggleEl);
    card.appendChild(header);

    if (item.description) {
      var body = el('div', { className: 'murphy-card-body' });
      body.appendChild(el('p', { textContent: item.description, style: 'font-size:0.85rem;' }));
      card.appendChild(body);
    }

    card.addEventListener('click', function () {
      var list = type === 'module' ? selectedModules : selectedIntegrations;
      list[idx].enabled = !(list[idx].enabled !== false);
      goToStep(2);
    });

    card.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
    });

    return card;
  }

  // ════════════════════════════════════════════════════════
  //  STEP 3 — Connections
  // ════════════════════════════════════════════════════════
  function renderConnections() {
    var heading = el('h1', {
      className: 'font-bold',
      textContent: "Let's connect your tools",
      style: 'font-size:1.5rem;margin-bottom:1.5rem;'
    });
    container.appendChild(heading);

    var activeIntegrations = selectedIntegrations.filter(function (i) { return i.enabled !== false; });

    if (activeIntegrations.length === 0) {
      var empty = el('div', { className: 'murphy-empty-state' });
      empty.appendChild(el('div', { className: 'murphy-empty-state-icon' }, [icon('check', 40)]));
      empty.appendChild(el('p', { className: 'murphy-empty-state-title', textContent: 'No credentials needed' }));
      empty.appendChild(el('p', { className: 'murphy-empty-state-message', textContent: "You're all set! No integrations require credentials." }));
      container.appendChild(empty);
    } else {
      activeIntegrations.forEach(function (integ) {
        container.appendChild(connectionCard(integ));
      });
    }

    container.appendChild(navBar({
      back: true,
      next: function () { goToStep(4); },
      nextLabel: 'Continue →'
    }));
  }

  function connectionCard(integ) {
    var card = el('div', { className: 'murphy-card', style: 'margin-bottom:1rem;' });

    var header = el('div', { className: 'murphy-card-header flex items-center gap-2' });
    header.appendChild(icon('plug', 20));
    header.appendChild(el('span', { className: 'font-bold', textContent: integ.name }));
    card.appendChild(header);

    var body = el('div', { className: 'murphy-card-body' });

    var hint = integ.credentialHint || ('API key or credentials for ' + integ.name);
    body.appendChild(el('p', { textContent: hint, style: 'font-size:0.85rem;margin-bottom:0.75rem;' }));

    // Password field with visibility toggle
    var fieldRow = el('div', { className: 'flex gap-2 items-center' });
    var field = el('input', {
      type: 'password',
      className: 'murphy-input flex-1',
      placeholder: 'Enter credentials…',
      'aria-label': integ.name + ' credentials',
      autocomplete: 'off'
    });

    var toggleVis = el('button', {
      className: 'murphy-btn murphy-btn-ghost murphy-btn-icon',
      'aria-label': 'Toggle visibility',
      onClick: function () {
        var isHidden = field.type === 'password';
        field.type = isHidden ? 'text' : 'password';
        toggleVis.innerHTML = '';
        toggleVis.appendChild(icon(isHidden ? 'unlock' : 'lock', 16));
      }
    });
    toggleVis.appendChild(icon('lock', 16));

    fieldRow.appendChild(field);
    fieldRow.appendChild(toggleVis);
    body.appendChild(fieldRow);

    // Save / Skip row
    var actionRow = el('div', { className: 'flex justify-between items-center', style: 'margin-top:0.75rem;' });

    var saveBtn = el('button', {
      className: 'murphy-btn murphy-btn-primary murphy-btn-sm',
      textContent: 'Save',
      onClick: function () {
        var val = field.value.trim();
        if (!val) return;
        saveBtn.classList.add('murphy-btn-loading');
        saveBtn.disabled = true;
        api.post('/credentials/store', { integration: integ.id, credential: val })
          .then(function (res) {
            saveBtn.classList.remove('murphy-btn-loading');
            saveBtn.disabled = false;
            if (res.ok) {
              credentials[integ.id] = true;
              savedLabel.textContent = '✓ Saved';
              savedLabel.style.display = 'inline';
              field.value = '';
              field.disabled = true;
            } else {
              savedLabel.textContent = 'Error saving — try again';
              savedLabel.style.display = 'inline';
            }
          })
          .catch(function () {
            saveBtn.classList.remove('murphy-btn-loading');
            saveBtn.disabled = false;
            savedLabel.textContent = 'Connection error — try again';
            savedLabel.style.display = 'inline';
          });
      }
    });

    var skipLink = el('button', {
      className: 'murphy-btn murphy-btn-ghost murphy-btn-sm',
      textContent: 'Skip for now',
      onClick: function () {
        card.style.opacity = '0.5';
        field.disabled = true;
        saveBtn.disabled = true;
        savedLabel.textContent = 'Skipped';
        savedLabel.style.display = 'inline';
      }
    });

    var savedLabel = el('span', {
      style: 'display:none;font-size:0.85rem;margin-left:0.5rem;'
    });

    actionRow.appendChild(el('div', { className: 'flex items-center gap-2' }, [saveBtn, savedLabel]));
    actionRow.appendChild(skipLink);
    body.appendChild(actionRow);

    card.appendChild(body);
    return card;
  }

  // ════════════════════════════════════════════════════════
  //  STEP 4 — Safety & Control
  // ════════════════════════════════════════════════════════
  function renderSafety() {
    var heading = el('h1', {
      className: 'font-bold',
      textContent: 'How much should Murphy handle?',
      style: 'font-size:1.5rem;margin-bottom:1.5rem;'
    });
    container.appendChild(heading);

    // Range slider
    var sliderCard = el('div', { className: 'murphy-card' });
    var sliderBody = el('div', { className: 'murphy-card-body' });

    var levelLabel = el('div', {
      id: 'safety-level-name',
      className: 'font-bold',
      textContent: safetyNames[safetyLevel],
      style: 'text-align:center;font-size:1.1rem;margin-bottom:1rem;'
    });
    sliderBody.appendChild(levelLabel);

    var slider = el('input', {
      type: 'range',
      min: '1',
      max: '5',
      value: String(safetyLevel),
      className: 'murphy-input',
      'aria-label': 'Automation level',
      'aria-valuemin': '1',
      'aria-valuemax': '5',
      'aria-valuenow': String(safetyLevel),
      style: 'width:100%;cursor:pointer;'
    });
    sliderBody.appendChild(slider);

    // Tick labels
    var ticks = el('div', { className: 'flex justify-between', style: 'font-size:0.75rem;margin-top:0.25rem;' });
    ticks.appendChild(el('span', { textContent: 'Ask me' }));
    ticks.appendChild(el('span', { textContent: 'Balanced' }));
    ticks.appendChild(el('span', { textContent: 'Automate' }));
    sliderBody.appendChild(ticks);

    var description = el('p', {
      id: 'safety-description',
      textContent: safetyLabels[safetyLevel],
      style: 'margin-top:1.25rem;font-size:0.9rem;text-align:center;'
    });
    sliderBody.appendChild(description);

    slider.addEventListener('input', function () {
      safetyLevel = parseInt(slider.value, 10);
      slider.setAttribute('aria-valuenow', String(safetyLevel));
      levelLabel.textContent = safetyNames[safetyLevel];
      description.textContent = safetyLabels[safetyLevel];
    });

    sliderCard.appendChild(sliderBody);
    container.appendChild(sliderCard);

    // Terminal / dashboard recommendation
    var termCard = el('div', { className: 'murphy-card', style: 'margin-top:1.5rem;' });
    var termBody = el('div', { className: 'murphy-card-body' });

    var recText = recommendedTerminal.indexOf('worker') > -1 ? 'Worker'
      : recommendedTerminal.indexOf('manager') > -1 ? 'Manager'
      : recommendedTerminal.indexOf('admin') > -1 ? 'Admin'
      : 'Unified';

    termBody.appendChild(el('p', {
      className: 'font-medium',
      textContent: "Based on our conversation, I'd recommend the " + recText + " dashboard as your home base.",
      style: 'margin-bottom:1rem;'
    }));

    var dashboards = [
      { value: 'terminal_unified.html', label: 'Unified Dashboard', desc: 'Full overview of everything' },
      { value: 'terminal_worker.html', label: 'Worker Dashboard', desc: 'Task-focused view' },
      { value: 'terminal_manager.html', label: 'Manager Dashboard', desc: 'Team and project oversight' },
      { value: 'terminal_admin.html', label: 'Admin Dashboard', desc: 'System configuration and control' }
    ];

    dashboards.forEach(function (db) {
      var radioRow = el('label', {
        className: 'flex items-center gap-2',
        style: 'cursor:pointer;padding:0.5rem 0;'
      });

      var radio = el('input', {
        type: 'radio',
        name: 'terminal-choice',
        value: db.value
      });
      if (db.value === recommendedTerminal) { radio.checked = true; }
      radio.addEventListener('change', function () {
        recommendedTerminal = db.value;
      });

      radioRow.appendChild(radio);
      radioRow.appendChild(el('div', {}, [
        el('span', { className: 'font-medium', textContent: db.label }),
        el('span', { textContent: ' — ' + db.desc, style: 'font-size:0.85rem;' })
      ]));
      termBody.appendChild(radioRow);
    });

    termCard.appendChild(termBody);
    container.appendChild(termCard);

    container.appendChild(navBar({
      back: true,
      next: function () { goToStep(5); },
      nextLabel: 'Continue →'
    }));
  }

  // ════════════════════════════════════════════════════════
  //  STEP 5 — Ready!
  // ════════════════════════════════════════════════════════
  function renderReady() {
    var heading = el('h1', {
      className: 'font-bold',
      textContent: 'Murphy is ready!',
      style: 'font-size:1.5rem;margin-bottom:1.5rem;text-align:center;'
    });
    container.appendChild(heading);

    var readyIcon = el('div', { className: 'flex justify-center', style: 'margin-bottom:1.5rem;' });
    readyIcon.appendChild(icon('check', 56));
    container.appendChild(readyIcon);

    // Summary card
    var summary = el('div', { className: 'murphy-card' });
    var summaryBody = el('div', { className: 'murphy-card-body' });

    // Modules
    var enabledMods = selectedModules.filter(function (m) { return m.enabled !== false; });
    if (enabledMods.length) {
      summaryBody.appendChild(el('p', { className: 'font-bold', textContent: 'Modules', style: 'margin-bottom:0.25rem;' }));
      var modList = el('ul', { style: 'margin-bottom:1rem;padding-left:1.25rem;' });
      enabledMods.forEach(function (m) {
        modList.appendChild(el('li', { textContent: m.name }));
      });
      summaryBody.appendChild(modList);
    }

    // Integrations
    var enabledInts = selectedIntegrations.filter(function (i) { return i.enabled !== false; });
    if (enabledInts.length) {
      summaryBody.appendChild(el('p', { className: 'font-bold', textContent: 'Integrations', style: 'margin-bottom:0.25rem;' }));
      var intList = el('ul', { style: 'margin-bottom:1rem;padding-left:1.25rem;' });
      enabledInts.forEach(function (i) {
        var status = credentials[i.id] ? ' (credentials saved)' : ' (no credentials yet)';
        intList.appendChild(el('li', { textContent: i.name + status }));
      });
      summaryBody.appendChild(intList);
    }

    // Safety level
    summaryBody.appendChild(el('p', { className: 'font-bold', textContent: 'Automation Level', style: 'margin-bottom:0.25rem;' }));
    summaryBody.appendChild(el('p', { textContent: safetyNames[safetyLevel] + ' — ' + safetyLabels[safetyLevel], style: 'margin-bottom:1rem;font-size:0.9rem;' }));

    // Dashboard
    summaryBody.appendChild(el('p', { className: 'font-bold', textContent: 'Dashboard', style: 'margin-bottom:0.25rem;' }));
    var termLabel = recommendedTerminal.replace('terminal_', '').replace('.html', '');
    summaryBody.appendChild(el('p', { textContent: termLabel.charAt(0).toUpperCase() + termLabel.slice(1), style: 'font-size:0.9rem;' }));

    summary.appendChild(summaryBody);
    container.appendChild(summary);

    // Submit config and go
    var launchRow = el('div', { className: 'flex justify-center', style: 'margin-top:2rem;' });
    var launchBtn = el('button', {
      className: 'murphy-btn murphy-btn-primary murphy-btn-lg',
      textContent: 'Go to your dashboard →',
      onClick: function () {
        launchBtn.classList.add('murphy-btn-loading');
        launchBtn.disabled = true;
        var config = {
          modules: enabledMods.map(function (m) { return m.id; }),
          integrations: enabledInts.map(function (i) { return i.id; }),
          safety_level: safetyLevel,
          terminal: recommendedTerminal,
          chat_history: chatHistory
        };
        api.post('/onboarding/wizard/generate-config', config)
          .then(function () {
            window.location.href = recommendedTerminal;
          })
          .catch(function () {
            window.location.href = recommendedTerminal;
          });
      }
    });
    launchRow.appendChild(launchBtn);
    container.appendChild(launchRow);

    container.appendChild(navBar({ back: true }));
  }

  // ── Boot ───────────────────────────────────────────────
  updateDots();
  renderStep(1);
})();
</script>

</body>
</html>
