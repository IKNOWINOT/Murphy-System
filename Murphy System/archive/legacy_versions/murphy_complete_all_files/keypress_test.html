<!DOCTYPE html>
<html>
<head>
    <title>Key Press Test</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #00ff41; 
            font-family: 'Courier New', monospace; 
            padding: 20px; 
        }
        #log {
            background: #000;
            border: 1px solid #333;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        input {
            background: #000;
            color: #00ff41;
            border: 1px solid #333;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            width: 300px;
        }
        .log-entry { margin: 2px 0; }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <h1>Key Press Event Test</h1>
    <p>Type in the input box below. Every key press will be logged.</p>
    
    <input type="text" id="test-input" placeholder="Type here...">
    
    <h3>Event Log:</h3>
    <div id="log"></div>
    
    <script>
        console.log('=== KEY PRESS TEST - SCRIPT STARTED ===');
        
        const testInput = document.getElementById('test-input');
        const logDiv = document.getElementById('log');
        
        function addLog(message) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        addLog('Script loaded successfully');
        addLog('testInput element:', testInput);
        
        if (testInput) {
            addLog('Adding keydown event listener...');
            
            testInput.addEventListener('keydown', function(event) {
                addLog(`KEYDOWN: "${event.key}" (keyCode: ${event.keyCode})`);
                
                if (event.key === 'Enter') {
                    addLog('✓ ENTER KEY DETECTED! Command would execute here.');
                }
            });
            
            testInput.addEventListener('keyup', function(event) {
                addLog(`KEYUP: "${event.key}"`);
            });
            
            testInput.addEventListener('keypress', function(event) {
                addLog(`KEYPRESS: "${event.key}" (charCode: ${event.charCode})`);
            });
            
            testInput.addEventListener('input', function(event) {
                addLog(`INPUT: value changed to "${testInput.value}"`);
            });
            
            addLog('All event listeners added successfully');
            testInput.focus();
            addLog('Input focused');
        } else {
            addLog('ERROR: Could not find test-input element!');
        }
        
        addLog('Setup complete. Type in the input box to test.');
    </script>
</body>
</html>
