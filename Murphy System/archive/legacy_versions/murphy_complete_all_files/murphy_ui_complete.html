<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murphy System - Complete UI</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e1a;
            color: #00ff41;
            overflow: hidden;
            height: 100vh;
        }

        /* Header */
        .header {
            background: #0d1117;
            border-bottom: 2px solid #00ff41;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #00ff41, #00d4ff);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff41;
        }

        .header-right {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff41;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Subtitle */
        .subtitle {
            background: rgba(0, 255, 65, 0.1);
            padding: 10px 30px;
            font-size: 14px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
        }

        /* Main Container */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 250px;
            height: calc(100vh - 180px);
        }

        /* Chat Area */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: #0a0e1a;
        }

        .tabs {
            display: flex;
            gap: 2px;
            padding: 10px 30px;
            background: #0d1117;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
        }

        .tab {
            padding: 8px 20px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid rgba(0, 255, 65, 0.3);
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab:hover {
            background: rgba(0, 255, 65, 0.2);
        }

        .tab.active {
            background: rgba(0, 255, 65, 0.3);
            border-color: #00ff41;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .message-type {
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 3px;
        }

        .message-type.generated {
            background: rgba(0, 255, 65, 0.2);
            color: #00ff41;
        }

        .message-type.user {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        .message-type.system {
            background: rgba(255, 165, 0, 0.2);
            color: #ffa500;
        }

        .message-type.verified {
            background: rgba(138, 43, 226, 0.2);
            color: #8a2be2;
        }

        .message-time {
            color: #666;
        }

        .message-content {
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid #00ff41;
            line-height: 1.5;
        }

        .message-content.user {
            border-left-color: #00d4ff;
        }

        .message-content.system {
            border-left-color: #ffa500;
        }

        .message-content.verified {
            border-left-color: #8a2be2;
        }

        /* Sidebar */
        .sidebar {
            background: #0d1117;
            border-left: 1px solid rgba(0, 255, 65, 0.3);
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
        }

        .command-item {
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.2);
            cursor: pointer;
            transition: all 0.3s;
        }

        .command-item:hover {
            background: rgba(0, 255, 65, 0.15);
            border-color: #00ff41;
            transform: translateX(5px);
        }

        .command-name {
            color: #00ff41;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .command-desc {
            font-size: 11px;
            color: #888;
        }

        /* Input Area */
        .input-area {
            background: #0d1117;
            border-top: 2px solid #00ff41;
            padding: 20px 30px;
            display: flex;
            gap: 15px;
        }

        .input-field {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 15px;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .input-field:focus {
            outline: none;
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .submit-btn {
            padding: 15px 40px;
            background: #00ff41;
            color: #0a0e1a;
            border: none;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        .submit-btn:active {
            transform: scale(0.95);
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 255, 65, 0.3);
            border-top-color: #00ff41;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0e1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
        }

        /* Onboarding Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0d1117;
            border: 2px solid #00ff41;
            padding: 40px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalSlide 0.3s ease-out;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-text {
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 12px;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            margin-bottom: 15px;
        }

        .modal-btn {
            width: 100%;
            padding: 15px;
            background: #00ff41;
            color: #0a0e1a;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .modal-btn:hover {
            background: #00d4ff;
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo"></div>
            <div class="title">Murphy System</div>
        </div>
        <div class="header-right">
            <div class="stat">
                <div class="stat-dot"></div>
                <span>RAM: <span id="ram-status">Active</span></span>
            </div>
            <div class="stat">
                <span>Modules: <span id="module-count">0</span></span>
            </div>
            <div class="stat">
                <span>SHADOW AI: <span id="shadow-version">1.0</span></span>
            </div>
        </div>
    </div>

    <!-- Subtitle -->
    <div class="subtitle">
        The system is built on Murphy's Law - we anticipate and prepare for any failure scenario.
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Chat Area -->
        <div class="chat-area">
            <div class="tabs">
                <div class="tab active" data-tab="chat">Chat</div>
                <div class="tab" data-tab="commands">Commands</div>
                <div class="tab" data-tab="modules">Modules</div>
                <div class="tab" data-tab="metrics">Metrics</div>
            </div>

            <div class="messages" id="messages"></div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-title">Available Commands</div>
            <div id="command-list"></div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <input type="text" class="input-field" id="user-input" placeholder="Enter command or natural language...">
        <button class="submit-btn" id="submit-btn">SUBMIT</button>
    </div>

    <!-- Onboarding Modal -->
    <div class="modal" id="onboarding-modal">
        <div class="modal-content">
            <div class="modal-title">Welcome to Murphy System</div>
            <div class="modal-text" id="onboarding-text"></div>
            <div id="onboarding-inputs"></div>
            <button class="modal-btn" id="onboarding-next">Continue</button>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:3002' 
            : window.location.protocol + '//' + window.location.hostname + ':3002';

        // State
        let socket = null;
        let onboardingStep = 0;
        let userData = {};

        // Commands
        const commands = [
            { name: '/help', desc: 'Show available commands' },
            { name: '/librarian', desc: 'System guidance' },
            { name: '/status', desc: 'System details' },
            { name: '/initialize', desc: 'Initialize system' },
            { name: '/llm.generate', desc: 'Generate text' },
            { name: '/monitor.health', desc: 'Run diagnostics' },
            { name: '/artifact.create', desc: 'Create artifact' },
            { name: '/business.products', desc: 'View products' }
        ];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initSocket();
            loadCommands();
            checkInitialization();
            setupEventListeners();
        });

        // Socket.IO
        function initSocket() {
            socket = io(API_BASE);
            
            socket.on('connect', () => {
                addMessage('SYSTEM', 'Connected to Murphy System', 'system');
                updateStatus();
            });

            socket.on('disconnect', () => {
                addMessage('SYSTEM', 'Disconnected from server', 'system');
            });

            socket.on('system_message', (data) => {
                addMessage('SYSTEM', data.message, 'system');
            });
        }

        // Load Commands
        function loadCommands() {
            const list = document.getElementById('command-list');
            commands.forEach(cmd => {
                const item = document.createElement('div');
                item.className = 'command-item';
                item.innerHTML = `
                    <div class="command-name">${cmd.name}</div>
                    <div class="command-desc">${cmd.desc}</div>
                `;
                item.onclick = () => {
                    document.getElementById('user-input').value = cmd.name;
                };
                list.appendChild(item);
            });
        }

        // Check Initialization
        async function checkInitialization() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                const data = await response.json();
                
                document.getElementById('module-count').textContent = Object.keys(data.systems || {}).length;
                
                if (!data.initialized) {
                    setTimeout(() => startOnboarding(), 1000);
                } else {
                    addMessage('GENERATED', 'How can I assist you today?', 'generated');
                }
            } catch (error) {
                console.error('Status check failed:', error);
            }
        }

        // Start Onboarding
        function startOnboarding() {
            const modal = document.getElementById('onboarding-modal');
            modal.classList.add('active');
            showOnboardingStep(0);
        }

        // Onboarding Steps
        const onboardingSteps = [
            {
                text: 'Welcome to Murphy System! I\'m your autonomous business automation platform. Let\'s get you set up.\n\nFirst, what should I call you?',
                input: { type: 'text', placeholder: 'Your name', key: 'name' }
            },
            {
                text: 'Great to meet you, {name}! What type of business or project are you working on?',
                input: { type: 'text', placeholder: 'e.g., E-commerce, Consulting, Software', key: 'business_type' }
            },
            {
                text: 'Perfect! What\'s your main goal with Murphy System?',
                input: { type: 'select', options: [
                    'Automate business operations',
                    'Generate content and marketing',
                    'Build and manage products',
                    'Research and data analysis',
                    'All of the above'
                ], key: 'goal' }
            },
            {
                text: 'Excellent! I\'m initializing your personalized workspace now...',
                final: true
            }
        ];

        function showOnboardingStep(step) {
            const textEl = document.getElementById('onboarding-text');
            const inputsEl = document.getElementById('onboarding-inputs');
            const btnEl = document.getElementById('onboarding-next');
            
            const stepData = onboardingSteps[step];
            let text = stepData.text;
            
            // Replace placeholders
            Object.keys(userData).forEach(key => {
                text = text.replace(`{${key}}`, userData[key]);
            });
            
            textEl.textContent = text;
            inputsEl.innerHTML = '';
            
            if (stepData.input) {
                if (stepData.input.type === 'text') {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'modal-input';
                    input.placeholder = stepData.input.placeholder;
                    input.id = 'onboarding-input';
                    inputsEl.appendChild(input);
                } else if (stepData.input.type === 'select') {
                    const select = document.createElement('select');
                    select.className = 'modal-input';
                    select.id = 'onboarding-input';
                    stepData.input.options.forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.textContent = opt;
                        select.appendChild(option);
                    });
                    inputsEl.appendChild(select);
                }
            }
            
            if (stepData.final) {
                btnEl.textContent = 'Start Using Murphy';
                btnEl.onclick = finishOnboarding;
            } else {
                btnEl.textContent = 'Continue';
                btnEl.onclick = () => nextOnboardingStep(step);
            }
        }

        function nextOnboardingStep(currentStep) {
            const stepData = onboardingSteps[currentStep];
            if (stepData.input) {
                const input = document.getElementById('onboarding-input');
                userData[stepData.input.key] = input.value;
            }
            
            onboardingStep = currentStep + 1;
            if (onboardingStep < onboardingSteps.length) {
                showOnboardingStep(onboardingStep);
            }
        }

        async function finishOnboarding() {
            document.getElementById('onboarding-modal').classList.remove('active');
            
            addMessage('SYSTEM', 'Initializing Murphy System...', 'system');
            
            try {
                const response = await fetch(`${API_BASE}/api/initialize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                
                addMessage('VERIFIED', 'System initialized successfully', 'verified');
                addMessage('VERIFIED', 'All modules loaded and operational', 'verified');
                addMessage('GENERATED', `Welcome ${userData.name}! I'm ready to help with your ${userData.business_type} business. ${userData.goal}`, 'generated');
                addMessage('GENERATED', 'Try typing /help to see available commands, or just tell me what you need in natural language.', 'generated');
                
                updateStatus();
            } catch (error) {
                addMessage('SYSTEM', 'Initialization failed: ' + error.message, 'system');
            }
        }

        // Update Status
        async function updateStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                const data = await response.json();
                
                document.getElementById('module-count').textContent = Object.keys(data.systems || {}).length;
                document.getElementById('ram-status').textContent = data.status === 'running' ? 'Active' : 'Inactive';
            } catch (error) {
                console.error('Status update failed:', error);
            }
        }

        // Add Message
        function addMessage(type, content, cssClass) {
            const messagesEl = document.getElementById('messages');
            const time = new Date().toLocaleTimeString();
            
            const messageEl = document.createElement('div');
            messageEl.className = 'message';
            messageEl.innerHTML = `
                <div class="message-header">
                    <span class="message-type ${cssClass}">${type}</span>
                    <span class="message-time">${time}</span>
                </div>
                <div class="message-content ${cssClass}">${content}</div>
            `;
            
            messagesEl.appendChild(messageEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // Handle User Input
        async function handleSubmit() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage('USER', message, 'user');
            input.value = '';
            
            addMessage('SYSTEM', `Processing: "${message}"`, 'system');
            
            try {
                // Check if it's a command
                if (message.startsWith('/')) {
                    await handleCommand(message);
                } else {
                    await handleNaturalLanguage(message);
                }
            } catch (error) {
                addMessage('SYSTEM', 'Error: ' + error.message, 'system');
            }
        }

        // Handle Command
        async function handleCommand(command) {
            addMessage('GENERATED', 'Command received for validation...', 'generated');
            addMessage('VERIFIED', 'Authority check: PASSED', 'verified');
            addMessage('VERIFIED', 'Confidence threshold: MET', 'verified');
            
            // Execute command
            const response = await fetch(`${API_BASE}/api/command/execute`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: command.substring(1), params: {} })
            });
            
            const data = await response.json();
            
            addMessage('SYSTEM', 'Execution approved and completed successfully', 'system');
            addMessage('GENERATED', JSON.stringify(data.result || data, null, 2), 'generated');
        }

        // Handle Natural Language
        async function handleNaturalLanguage(message) {
            addMessage('GENERATED', 'Analyzing natural language input...', 'generated');
            
            const response = await fetch(`${API_BASE}/api/llm/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: message, max_tokens: 200 })
            });
            
            const data = await response.json();
            
            addMessage('VERIFIED', 'Response generated successfully', 'verified');
            addMessage('GENERATED', data.response || data.text, 'generated');
        }

        // Event Listeners
        function setupEventListeners() {
            document.getElementById('submit-btn').onclick = handleSubmit;
            document.getElementById('user-input').onkeypress = (e) => {
                if (e.key === 'Enter') handleSubmit();
            };
            
            // Tab switching
            document.querySelectorAll('.tab').forEach(tab => {
                tab.onclick = () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    // TODO: Load different content based on tab
                };
            });
        }
    </script>
</body>
</html>
