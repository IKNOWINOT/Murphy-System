apiVersion: apps/v1
kind: Deployment
metadata:
  name: murphy-api
  namespace: murphy-system
  labels:
    app: murphy-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: murphy-api
  template:
    metadata:
      labels:
        app: murphy-api
        version: v1
    spec:
      containers:
      - name: murphy-api
        image: murphy-system:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: MURPHY_ENV
          value: "production"
        - name: MURPHY_DATA_DIR
          value: "/app/data"
        - name: MURPHY_LOG_DIR
          value: "/app/logs"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: murphy-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: murphy-secrets
              key: redis-url
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: murphy-data
          mountPath: /app/data
        - name: murphy-logs
          mountPath: /app/logs
      volumes:
      - name: murphy-data
        persistentVolumeClaim:
          claimName: murphy-data-pvc
      - name: murphy-logs
        persistentVolumeClaim:
          claimName: murphy-logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: murphy-api-service
  namespace: murphy-system
  labels:
    app: murphy-api
spec:
  type: LoadBalancer
  selector:
    app: murphy-api
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: murphy-data-pvc
  namespace: murphy-system
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: murphy-logs-pvc
  namespace: murphy-system
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: murphy-api-hpa
  namespace: murphy-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: murphy-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80