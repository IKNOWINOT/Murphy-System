# Murphy System Alert Rules

groups:
  - name: murphy_api_alerts
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: rate(murphy_api_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      # Low accuracy
      - alert: LowModelAccuracy
        expr: murphy_model_accuracy < 0.7
        for: 10m
        labels:
          severity: warning
          component: shadow_agent
        annotations:
          summary: "Model accuracy below threshold"
          description: "Model accuracy is {{ $value | humanizePercentage }} (threshold: 70%)"

      # High response time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(murphy_api_request_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API response time"
          description: "95th percentile response time is {{ $value }}s (threshold: 1s)"

      # Service down
      - alert: ServiceDown
        expr: up{job="murphy-api"} == 0
        for: 2m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "Murphy API service is down"
          description: "Murphy API has been down for more than 2 minutes"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (murphy_memory_usage_bytes / murphy_memory_limit_bytes) > 0.9
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }} (threshold: 90%)"

      # High CPU usage
      - alert: HighCPUUsage
        expr: rate(murphy_cpu_usage_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }} (threshold: 80%)"

  - name: murphy_data_alerts
    interval: 60s
    rules:
      # Low data quality
      - alert: LowDataQuality
        expr: murphy_data_quality_score < 0.5
        for: 15m
        labels:
          severity: warning
          component: data
        annotations:
          summary: "Low training data quality"
          description: "Data quality score is {{ $value }} (threshold: 0.5)"

      # Insufficient training data
      - alert: InsufficientTrainingData
        expr: murphy_training_examples_total < 100
        for: 1h
        labels:
          severity: info
          component: data
        annotations:
          summary: "Insufficient training data"
          description: "Only {{ $value }} training examples available (minimum: 100)"

  - name: murphy_deployment_alerts
    interval: 60s
    rules:
      # Failed deployments
      - alert: DeploymentFailed
        expr: murphy_deployment_status{status="failed"} > 0
        for: 1m
        labels:
          severity: critical
          component: deployment
        annotations:
          summary: "Deployment failed"
          description: "Deployment has failed. Check logs for details."

      # Rollback occurred
      - alert: RollbackOccurred
        expr: increase(murphy_rollback_total[5m]) > 0
        labels:
          severity: warning
          component: deployment
        annotations:
          summary: "Deployment rollback occurred"
          description: "A deployment rollback has occurred. Investigate the cause."

  - name: murphy_business_alerts
    interval: 300s
    rules:
      # Low shadow agent usage
      - alert: LowShadowAgentUsage
        expr: rate(murphy_shadow_agent_predictions_total[1h]) / rate(murphy_total_predictions_total[1h]) < 0.1
        for: 30m
        labels:
          severity: info
          component: shadow_agent
        annotations:
          summary: "Low shadow agent usage"
          description: "Shadow agent is handling only {{ $value | humanizePercentage }} of predictions"

      # High fallback rate
      - alert: HighFallbackRate
        expr: rate(murphy_fallback_to_murphy_gate_total[1h]) / rate(murphy_shadow_agent_predictions_total[1h]) > 0.5
        for: 30m
        labels:
          severity: warning
          component: shadow_agent
        annotations:
          summary: "High fallback rate to Murphy Gate"
          description: "{{ $value | humanizePercentage }} of predictions are falling back to Murphy Gate"