<!DOCTYPE html>
<html>
<head>
    <title>Terminal Test</title>
    <style>
        body { background: #1a1a1a; color: #fff; padding: 20px; font-family: monospace; }
        #terminal { border: 1px solid #333; padding: 10px; height: 200px; overflow-y: auto; }
        #terminal-input { background: #000; color: #fff; border: none; width: 100%; padding: 10px; font-family: monospace; }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <h1>Terminal Test</h1>
    <div id="terminal"></div>
    <input type="text" id="terminal-input" placeholder="Type here and press Enter">
    
    <script>
        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function() {
            const terminalInput = document.getElementById('terminal-input');
            const terminal = document.getElementById('terminal');
            
            console.log('Script loaded');
            console.log('Terminal input:', terminalInput);
            
            if (!terminalInput) {
                console.error('Terminal input not found!');
                return;
            }
            
            terminalInput.addEventListener('keydown', function(event) {
                console.log('Key pressed:', event.key);
                if (event.key === 'Enter') {
                    const command = terminalInput.value.trim();
                    console.log('Command:', command);
                    if (command) {
                        const div = document.createElement('div');
                        div.textContent = 'Command: ' + command;
                        div.style.color = '#00ff00';
                        div.style.padding = '5px';
                        terminal.appendChild(div);
                        terminal.scrollTop = terminal.scrollHeight;
                        terminalInput.value = '';
                    }
                }
            });
            
            terminalInput.focus();
            console.log('Setup complete');
        });
    </script>
</body>
</html>
