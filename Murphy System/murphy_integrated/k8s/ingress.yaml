apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: murphy-api
  namespace: murphy-system
  labels:
    app: murphy-system
    component: ingress
    environment: production
spec:
  tls:
    - hosts:
        - murphy.example.com
      secretName: murphy-tls
  rules:
    - host: murphy.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: murphy-api
                port:
                  number: 80
