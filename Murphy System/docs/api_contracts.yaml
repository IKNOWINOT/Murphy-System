openapi: "3.1.0"
info:
  title: Murphy System Control API
  version: "1.0.0"
  description: >
    Formal interface contracts for the Murphy System control plane.
    All endpoints operate on the canonical 25-dimensional state vector
    and support the full observe → update → control cycle.
  contact:
    name: Murphy System
  license:
    name: MIT

servers:
  - url: /api/v1
    description: Murphy System v1 API

# ------------------------------------------------------------------ #
# Reusable schemas
# ------------------------------------------------------------------ #
components:
  schemas:

    CanonicalStateVector:
      type: object
      description: >
        The 25-dimensional canonical state vector X(t) for the Murphy System.
      properties:
        confidence:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
        authority:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
        murphy_index:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
        phase_index:
          type: integer
          minimum: 0
          maximum: 6
          default: 0
        complexity:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
        domain_depth:
          type: integer
          minimum: 0
          default: 0
        gate_count:
          type: integer
          minimum: 0
          default: 0
        active_constraints:
          type: integer
          minimum: 0
          default: 0
        artifact_count:
          type: integer
          minimum: 0
          default: 0
        uncertainty_data:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
        uncertainty_authority:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
        uncertainty_information:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
        uncertainty_resources:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
        uncertainty_disagreement:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
        uptime_seconds:
          type: number
          format: float
          minimum: 0.0
          default: 0.0
        active_tasks:
          type: integer
          minimum: 0
          default: 0
        cpu_usage_percent:
          type: number
          format: float
          minimum: 0.0
          default: 0.0
        response_latency:
          type: number
          format: float
          minimum: 0.0
          default: 0.0
          description: System response time in seconds.
        domain_coverage:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
          description: Fraction of domain knowledge acquired.
        constraint_violation_count:
          type: integer
          minimum: 0
          default: 0
          description: Number of active constraint violations.
        delegation_depth:
          type: integer
          minimum: 0
          default: 0
          description: Current maximum depth in the delegation graph.
        feedback_recency:
          type: number
          format: float
          minimum: 0.0
          default: 0.0
          description: Seconds since last feedback signal.
        observation_staleness:
          type: number
          format: float
          minimum: 0.0
          default: 0.0
          description: Seconds since last observation update.
        llm_confidence_aggregate:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
          description: Weighted average LLM output confidence.
        escalation_pending_count:
          type: integer
          minimum: 0
          default: 0
          description: Number of pending escalation requests.
        schema_version:
          type: string
          default: "1.0.0"
        timestamp:
          type: string
          format: date-time
        session_id:
          type: string
          nullable: true
        domain:
          type: string
          default: general

    ObservationVector:
      type: object
      description: >
        Observation data from a single channel: z_t = h(x_t) + v_t.
      required:
        - channel
        - values
      properties:
        channel:
          type: string
          enum:
            - inquisitory
            - document_parser
            - ticket_ingest
            - message_pipe
            - signal_interpreter
            - confidence_calc
            - gate_check
            - sensor_telemetry
        values:
          type: object
          description: Map of dimension name → observed value.
          additionalProperties:
            type: number
            format: float
        timestamp:
          type: string
          format: date-time
          nullable: true

    ControlVector:
      type: object
      description: >
        Control action u_t computed by the control law.
      required:
        - dimension_deltas
      properties:
        dimension_deltas:
          type: array
          description: Per-dimension control signal (one float per state dimension).
          items:
            type: number
            format: float
          minItems: 25
          maxItems: 25
        timestamp:
          type: string
          format: date-time

    Constraint:
      type: object
      description: A formal constraint on the state vector.
      required:
        - constraint_id
        - description
        - jurisdiction
      properties:
        constraint_id:
          type: string
        description:
          type: string
        jurisdiction:
          type: string
        dimension:
          type: string
          nullable: true
        bound_type:
          type: string
          enum: [upper, lower, equality]
          nullable: true
        bound_value:
          type: number
          format: float
          nullable: true
        active:
          type: boolean
          default: true

    Actor:
      type: object
      description: Canonical actor identity.
      required:
        - actor_id
        - name
        - kind
      properties:
        actor_id:
          type: string
        name:
          type: string
        kind:
          type: string
          enum: [human, bot, llm_expert, system]
        role:
          type: string
          default: ""
        description:
          type: string
          default: ""
        active:
          type: boolean
          default: true
        metadata:
          type: object
          additionalProperties: true

    HealthStatus:
      type: object
      description: System health and entropy metrics.
      required:
        - status
        - entropy
        - uptime_seconds
      properties:
        status:
          type: string
          enum: [healthy, degraded, critical]
        entropy:
          type: number
          format: float
          description: Current Shannon entropy of the state vector (bits).
        uptime_seconds:
          type: number
          format: float
        active_tasks:
          type: integer
        drift_alerts:
          type: array
          items:
            type: object
            properties:
              alert_type:
                type: string
              dimension:
                type: string
                nullable: true
              severity:
                type: string
              recommended_action:
                type: string
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Invalid request payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

# ------------------------------------------------------------------ #
# Paths
# ------------------------------------------------------------------ #
paths:

  /state:
    get:
      operationId: getState
      summary: Get current state vector
      description: Returns the current 25-dimensional canonical state vector X(t).
      tags: [State]
      responses:
        "200":
          description: Current state vector.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CanonicalStateVector'
        "500":
          $ref: '#/components/responses/InternalError'

    post:
      operationId: updateState
      summary: Update state vector
      description: >
        Directly update one or more dimensions of the state vector.
        Dimensions not provided retain their current values.
      tags: [State]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CanonicalStateVector'
      responses:
        "200":
          description: Updated state vector.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CanonicalStateVector'
        "400":
          $ref: '#/components/responses/BadRequest'
        "500":
          $ref: '#/components/responses/InternalError'

  /observe:
    post:
      operationId: postObservation
      summary: Submit an observation vector
      description: >
        Ingest an observation z_t = h(x_t) + v_t from the specified channel
        and perform a Kalman update to the state.
      tags: [Observation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObservationVector'
      responses:
        "200":
          description: State after the Kalman update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CanonicalStateVector'
        "400":
          $ref: '#/components/responses/BadRequest'
        "500":
          $ref: '#/components/responses/InternalError'

  /control:
    get:
      operationId: getControlVector
      summary: Get current control vector
      description: Returns the most recently computed control vector u_t.
      tags: [Control]
      responses:
        "200":
          description: Current control vector.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlVector'
        "500":
          $ref: '#/components/responses/InternalError'

    post:
      operationId: computeControlAction
      summary: Compute control action
      description: >
        Compute u_t = K(x_t, x_target) using the configured control law
        given the target state provided in the request body.
      tags: [Control]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CanonicalStateVector'
      responses:
        "200":
          description: Computed control vector.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlVector'
        "400":
          $ref: '#/components/responses/BadRequest'
        "500":
          $ref: '#/components/responses/InternalError'

  /constraints:
    get:
      operationId: listConstraints
      summary: List all constraints
      description: Returns all registered constraints.
      tags: [Constraints]
      parameters:
        - name: jurisdiction
          in: query
          required: false
          schema:
            type: string
          description: Filter constraints by jurisdiction.
        - name: active_only
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: List of constraints.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Constraint'
        "500":
          $ref: '#/components/responses/InternalError'

    post:
      operationId: addConstraint
      summary: Add a constraint
      description: Register a new constraint in the system.
      tags: [Constraints]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Constraint'
      responses:
        "201":
          description: Constraint created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Constraint'
        "400":
          $ref: '#/components/responses/BadRequest'
        "500":
          $ref: '#/components/responses/InternalError'

  /constraints/{jurisdiction}:
    get:
      operationId: getConstraintsByJurisdiction
      summary: Get constraints by jurisdiction
      description: Returns all constraints for the specified jurisdiction.
      tags: [Constraints]
      parameters:
        - name: jurisdiction
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Constraints for the jurisdiction.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Constraint'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'

  /actors:
    get:
      operationId: listActors
      summary: Get actor registry
      description: Returns all registered actors.
      tags: [Actors]
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [human, bot, llm_expert, system]
          description: Filter by actor kind.
        - name: active_only
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: List of actors.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Actor'
        "500":
          $ref: '#/components/responses/InternalError'

    post:
      operationId: registerActor
      summary: Register a new actor
      description: Add a new actor to the registry.
      tags: [Actors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Actor'
      responses:
        "201":
          description: Actor registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actor'
        "400":
          $ref: '#/components/responses/BadRequest'
        "500":
          $ref: '#/components/responses/InternalError'

  /health:
    get:
      operationId: getHealth
      summary: Get system health and entropy metrics
      description: >
        Returns the current system health status, entropy, and any active
        drift alerts.
      tags: [Health]
      responses:
        "200":
          description: System health status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        "500":
          $ref: '#/components/responses/InternalError'

tags:
  - name: State
    description: State vector operations — observe, update, and query X(t).
  - name: Observation
    description: Ingest observation vectors and apply Kalman updates.
  - name: Control
    description: Compute and retrieve control actions u_t.
  - name: Constraints
    description: Manage formal constraints on the state vector.
  - name: Actors
    description: Actor registry — registration, lookup, and authority management.
  - name: Health
    description: System health, entropy metrics, and drift alerts.
