<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murphy System - Backend Integrated Runtime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #00ff41;
            overflow: hidden;
            height: 100vh;
        }

        /* Header with LLM Controls */
        .header {
            background: #1a1f3a;
            border-bottom: 2px solid #00ff41;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            color: #00ff41;
        }

        .llm-controls {
            display: flex;
            gap: 15px;
        }

        .llm-indicator {
            padding: 5px 15px;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }

        .llm-indicator.active {
            background: #00ff41;
            color: #0a0e27;
            border-color: #00ff41;
            box-shadow: 0 0 10px #00ff41;
        }

        .llm-indicator.inactive {
            background: #1a1f3a;
            color: #666;
        }

        /* Main Layout */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* State Tree Sidebar */
        .state-tree {
            width: 300px;
            background: #0f1420;
            border-right: 2px solid #00ff41;
            overflow-y: auto;
            padding: 15px;
        }

        .state-tree h3 {
            color: #00ff41;
            margin-bottom: 15px;
            font-size: 14px;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 5px;
        }

        .state-node {
            margin: 8px 0;
            padding: 8px;
            background: #1a1f3a;
            border-left: 3px solid #00ff41;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
        }

        .state-node:hover {
            background: #252b45;
            transform: translateX(5px);
        }

        .state-node.active {
            background: #00ff41;
            color: #0a0e27;
            font-weight: bold;
        }

        .state-node.child {
            margin-left: 20px;
            border-left-color: #0088ff;
        }

        .state-node.grandchild {
            margin-left: 40px;
            border-left-color: #ff00ff;
        }

        .state-confidence {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 3px;
        }

        /* Terminal Area */
        .terminal-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0e27;
        }

        .terminal {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
        }

        .terminal-line {
            margin: 4px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            margin-right: 8px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 11px;
        }

        .tag-system { background: #00ff41; color: #0a0e27; }
        .tag-llm { background: #0088ff; color: white; }
        .tag-swarm { background: #ff00ff; color: white; }
        .tag-gate { background: #ff4444; color: white; }
        .tag-artifact { background: #ffaa00; color: #0a0e27; }
        .tag-phase { background: #00ffff; color: #0a0e27; }
        .tag-constraint { background: #ff6600; color: white; }

        .prompt {
            color: #00ff41;
            font-weight: bold;
        }

        /* Input Area */
        .input-area {
            padding: 15px 20px;
            background: #1a1f3a;
            border-top: 2px solid #00ff41;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            background: #0a0e27;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .input-area button {
            background: #00ff41;
            color: #0a0e27;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        .input-area button:hover {
            background: #00cc33;
            transform: scale(1.05);
        }

        /* Right Sidebar */
        .right-sidebar {
            width: 280px;
            background: #0f1420;
            border-left: 2px solid #00ff41;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar-section {
            margin-bottom: 20px;
        }

        .sidebar-section h4 {
            color: #00ff41;
            font-size: 12px;
            margin-bottom: 10px;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 5px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 11px;
        }

        .metric-value {
            color: #00ff41;
            font-weight: bold;
        }

        .swarm-item, .artifact-item, .gate-item {
            background: #1a1f3a;
            padding: 8px;
            margin: 5px 0;
            border-left: 3px solid #00ff41;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .swarm-item:hover, .artifact-item:hover, .gate-item:hover {
            background: #252b45;
            transform: translateX(3px);
        }

        .swarm-creative { border-left-color: #ff00ff; }
        .swarm-analytical { border-left-color: #0088ff; }
        .swarm-hybrid { border-left-color: #00ffff; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1f3a;
            border: 2px solid #00ff41;
            padding: 30px;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 8px;
        }

        .modal-content h2 {
            color: #00ff41;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .modal-section {
            margin: 15px 0;
            padding: 10px;
            background: #0a0e27;
            border-left: 3px solid #00ff41;
        }

        .modal-section h3 {
            color: #00ff41;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            background: #00ff41;
            color: #0a0e27;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        .modal-btn:hover {
            background: #00cc33;
            transform: scale(1.05);
        }

        .modal-btn.secondary {
            background: #1a1f3a;
            color: #00ff41;
            border: 1px solid #00ff41;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #ff4444;
        }

        /* Phase Indicator */
        .phase-indicator {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }

        .phase-step {
            flex: 1;
            padding: 5px;
            background: #1a1f3a;
            text-align: center;
            font-size: 10px;
            border: 1px solid #444;
        }

        .phase-step.active {
            background: #00ff41;
            color: #0a0e27;
            font-weight: bold;
        }

        .phase-step.complete {
            background: #00cc33;
            color: #0a0e27;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0e27;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 4px;
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <!-- Header with LLM Controls -->
    <div class="header">
        <h1>MURPHY SYSTEM - BACKEND INTEGRATED RUNTIME</h1>
        <div class="llm-controls">
            <div class="llm-indicator inactive" id="llm-groq" onclick="toggleLLM('groq')">
                GROQ
            </div>
            <div class="llm-indicator inactive" id="llm-aristotle" onclick="toggleLLM('aristotle')">
                ARISTOTLE
            </div>
            <div class="llm-indicator inactive" id="llm-onboard" onclick="toggleLLM('onboard')">
                ONBOARD
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- State Tree Sidebar -->
        <div class="state-tree">
            <h3>STATE EVOLUTION TREE</h3>
            <div id="state-tree-content"></div>
        </div>

        <!-- Terminal Container -->
        <div class="terminal-container">
            <div class="terminal" id="terminal"></div>
            <div class="input-area">
                <input type="text" id="command-input" placeholder="murphy> enter command (type 'help' for commands)" />
                <button onclick="executeCommand()">EXECUTE</button>
                <button onclick="initializeSystem()">INITIALIZE</button>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="right-sidebar">
            <!-- Phase Indicator -->
            <div class="sidebar-section">
                <h4>MFGC PHASES</h4>
                <div class="phase-indicator" id="phase-indicator"></div>
            </div>

            <!-- Metrics -->
            <div class="sidebar-section">
                <h4>SYSTEM METRICS</h4>
                <div class="metric">
                    <span>States Generated:</span>
                    <span class="metric-value" id="metric-states">0</span>
                </div>
                <div class="metric">
                    <span>Artifacts Created:</span>
                    <span class="metric-value" id="metric-artifacts">0</span>
                </div>
                <div class="metric">
                    <span>Gates Active:</span>
                    <span class="metric-value" id="metric-gates">0</span>
                </div>
                <div class="metric">
                    <span>Confidence:</span>
                    <span class="metric-value" id="metric-confidence">0.00</span>
                </div>
                <div class="metric">
                    <span>Murphy Index:</span>
                    <span class="metric-value" id="metric-murphy">0.00</span>
                </div>
            </div>

            <!-- Active Swarms -->
            <div class="sidebar-section">
                <h4>ACTIVE SWARMS</h4>
                <div id="swarms-list"></div>
            </div>

            <!-- Artifacts -->
            <div class="sidebar-section">
                <h4>GENERATED ARTIFACTS</h4>
                <div id="artifacts-list"></div>
            </div>

            <!-- Active Gates -->
            <div class="sidebar-section">
                <h4>ACTIVE GATES</h4>
                <div id="gates-list"></div>
            </div>

            <!-- Constraints -->
            <div class="sidebar-section">
                <h4>CONSTRAINTS</h4>
                <div id="constraints-list"></div>
            </div>
        </div>
    </div>

    <!-- Modal for State Details -->
    <div class="modal" id="state-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">State Details</h2>
            <div id="modal-body"></div>
            <div class="modal-actions">
                <button class="modal-btn" onclick="evolveState()">EVOLVE STATE</button>
                <button class="modal-btn" onclick="regenerateState()">REGENERATE</button>
                <button class="modal-btn secondary" onclick="rollbackState()">ROLLBACK</button>
                <button class="modal-btn secondary" onclick="closeModal()">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        // ===== MURPHY SYSTEM BACKEND INTEGRATION =====
        
        // Phase definitions from mfgc_core.py
        const PHASES = {
            EXPAND: { name: 'EXPAND', threshold: 0.3, weights: [0.9, 0.1] },
            TYPE: { name: 'TYPE', threshold: 0.5, weights: [0.8, 0.2] },
            ENUMERATE: { name: 'ENUMERATE', threshold: 0.6, weights: [0.7, 0.3] },
            CONSTRAIN: { name: 'CONSTRAIN', threshold: 0.65, weights: [0.5, 0.5] },
            COLLAPSE: { name: 'COLLAPSE', threshold: 0.7, weights: [0.3, 0.7] },
            BIND: { name: 'BIND', threshold: 0.75, weights: [0.2, 0.8] },
            EXECUTE: { name: 'EXECUTE', threshold: 0.85, weights: [0.1, 0.9] }
        };

        // Swarm types from advanced_swarm_system.py
        const SWARM_TYPES = {
            CREATIVE: 'creative',
            ANALYTICAL: 'analytical',
            HYBRID: 'hybrid',
            ADVERSARIAL: 'adversarial',
            SYNTHESIS: 'synthesis',
            OPTIMIZATION: 'optimization'
        };

        // Constraint types from constraint_system.py
        const CONSTRAINT_TYPES = {
            BUDGET: 'budget',
            REGULATORY: 'regulatory',
            ARCHITECTURAL: 'architectural',
            PERFORMANCE: 'performance',
            SECURITY: 'security',
            TIME: 'time',
            RESOURCE: 'resource',
            BUSINESS: 'business'
        };

        // Gate library from gate_builder.py
        const GATE_LIBRARY = {
            data_loss: { name: 'Data Loss Prevention', severity: 0.8 },
            security_breach: { name: 'Security Gate', severity: 0.9 },
            invalid_input: { name: 'Input Validation', severity: 0.7 },
            system_overload: { name: 'Load Balancing', severity: 0.6 },
            data_corruption: { name: 'Data Integrity', severity: 0.8 },
            unauthorized_action: { name: 'Authorization', severity: 0.9 },
            performance_degradation: { name: 'Performance', severity: 0.5 },
            compliance_violation: { name: 'Compliance', severity: 0.9 },
            resource_exhaustion: { name: 'Resource', severity: 0.7 },
            dependency_failure: { name: 'Dependency', severity: 0.6 }
        };

        // System State
        let systemState = {
            initialized: false,
            currentPhase: 'EXPAND',
            confidence: 0.0,
            murphyIndex: 0.0,
            states: [],
            artifacts: [],
            gates: [],
            swarms: [],
            constraints: [],
            llms: {
                groq: false,
                aristotle: false,
                onboard: false
            },
            selectedState: null,
            stateCounter: 0,
            artifactCounter: 0
        };

        // Initialize phase indicator
        function initPhaseIndicator() {
            const container = document.getElementById('phase-indicator');
            Object.keys(PHASES).forEach(phase => {
                const div = document.createElement('div');
                div.className = 'phase-step';
                div.id = `phase-${phase}`;
                div.textContent = phase.substring(0, 3);
                container.appendChild(div);
            });
        }

        // Update phase indicator
        function updatePhaseIndicator() {
            Object.keys(PHASES).forEach(phase => {
                const elem = document.getElementById(`phase-${phase}`);
                if (phase === systemState.currentPhase) {
                    elem.className = 'phase-step active';
                } else if (Object.keys(PHASES).indexOf(phase) < Object.keys(PHASES).indexOf(systemState.currentPhase)) {
                    elem.className = 'phase-step complete';
                } else {
                    elem.className = 'phase-step';
                }
            });
        }

        // Terminal output
        function terminalOutput(tag, message) {
            const terminal = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = 'terminal-line';
            
            const tagSpan = document.createElement('span');
            tagSpan.className = `tag tag-${tag}`;
            tagSpan.textContent = tag.toUpperCase();
            
            line.appendChild(tagSpan);
            line.appendChild(document.createTextNode(message));
            
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Toggle LLM
        function toggleLLM(llm) {
            systemState.llms[llm] = !systemState.llms[llm];
            const elem = document.getElementById(`llm-${llm}`);
            
            if (systemState.llms[llm]) {
                elem.className = 'llm-indicator active';
                terminalOutput('llm', `${llm.toUpperCase()} activated - ready for inference`);
            } else {
                elem.className = 'llm-indicator inactive';
                terminalOutput('llm', `${llm.toUpperCase()} deactivated`);
            }
        }

        // Create state
        function createState(name, description, parentId = null, swarmType = null) {
            const state = {
                id: `STATE-${systemState.stateCounter++}`,
                name: name,
                description: description,
                parentId: parentId,
                children: [],
                confidence: Math.random() * 0.3 + 0.5,
                swarmType: swarmType || SWARM_TYPES.HYBRID,
                phase: systemState.currentPhase,
                artifacts: [],
                gates: [],
                timestamp: new Date().toISOString()
            };
            
            systemState.states.push(state);
            
            if (parentId) {
                const parent = systemState.states.find(s => s.id === parentId);
                if (parent) {
                    parent.children.push(state.id);
                }
            }
            
            updateMetrics();
            renderStateTree();
            
            return state;
        }

        // Create artifact
        function createArtifact(name, type, stateId, content) {
            const artifact = {
                id: `ARTIFACT-${systemState.artifactCounter++}`,
                name: name,
                type: type,
                stateId: stateId,
                content: content,
                confidence: Math.random() * 0.2 + 0.7,
                timestamp: new Date().toISOString()
            };
            
            systemState.artifacts.push(artifact);
            
            const state = systemState.states.find(s => s.id === stateId);
            if (state) {
                state.artifacts.push(artifact.id);
            }
            
            updateMetrics();
            renderArtifacts();
            
            return artifact;
        }

        // Create gate
        function createGate(gateKey, stateId) {
            const gateTemplate = GATE_LIBRARY[gateKey];
            const gate = {
                id: `GATE-${systemState.gates.length}`,
                key: gateKey,
                name: gateTemplate.name,
                severity: gateTemplate.severity,
                stateId: stateId,
                active: true,
                timestamp: new Date().toISOString()
            };
            
            systemState.gates.push(gate);
            
            const state = systemState.states.find(s => s.id === stateId);
            if (state) {
                state.gates.push(gate.id);
            }
            
            updateMetrics();
            renderGates();
            
            return gate;
        }

        // Create swarm
        function createSwarm(type, stateId, purpose) {
            const swarm = {
                id: `SWARM-${systemState.swarms.length}`,
                type: type,
                stateId: stateId,
                purpose: purpose,
                progress: 0,
                active: true,
                timestamp: new Date().toISOString()
            };
            
            systemState.swarms.push(swarm);
            renderSwarms();
            
            // Simulate swarm progress
            const interval = setInterval(() => {
                swarm.progress += Math.random() * 20;
                if (swarm.progress >= 100) {
                    swarm.progress = 100;
                    swarm.active = false;
                    clearInterval(interval);
                    terminalOutput('swarm', `${type.toUpperCase()} swarm completed for ${stateId}`);
                    
                    // Generate artifact when swarm completes
                    const artifact = createArtifact(
                        `${type} Analysis`,
                        'analysis',
                        stateId,
                        `Generated by ${type} swarm`
                    );
                    terminalOutput('artifact', `Created ${artifact.id}: ${artifact.name}`);
                }
                renderSwarms();
            }, 1000);
            
            return swarm;
        }

        // Create constraint
        function createConstraint(type, name, value) {
            const constraint = {
                id: `CONSTRAINT-${systemState.constraints.length}`,
                type: type,
                name: name,
                value: value,
                active: true,
                timestamp: new Date().toISOString()
            };
            
            systemState.constraints.push(constraint);
            renderConstraints();
            
            return constraint;
        }

        // Advance phase
        function advancePhase() {
            const phases = Object.keys(PHASES);
            const currentIndex = phases.indexOf(systemState.currentPhase);
            
            if (currentIndex < phases.length - 1) {
                const nextPhase = phases[currentIndex + 1];
                const threshold = PHASES[nextPhase].threshold;
                
                if (systemState.confidence >= threshold) {
                    systemState.currentPhase = nextPhase;
                    terminalOutput('phase', `Advanced to ${nextPhase} phase (confidence: ${systemState.confidence.toFixed(2)})`);
                    updatePhaseIndicator();
                    return true;
                } else {
                    terminalOutput('phase', `Cannot advance to ${nextPhase} - confidence ${systemState.confidence.toFixed(2)} < ${threshold}`);
                    return false;
                }
            }
            return false;
        }

        // Update metrics
        function updateMetrics() {
            document.getElementById('metric-states').textContent = systemState.states.length;
            document.getElementById('metric-artifacts').textContent = systemState.artifacts.length;
            document.getElementById('metric-gates').textContent = systemState.gates.filter(g => g.active).length;
            document.getElementById('metric-confidence').textContent = systemState.confidence.toFixed(2);
            document.getElementById('metric-murphy').textContent = systemState.murphyIndex.toFixed(2);
        }

        // Render state tree
        function renderStateTree() {
            const container = document.getElementById('state-tree-content');
            container.innerHTML = '';
            
            const rootStates = systemState.states.filter(s => !s.parentId);
            
            rootStates.forEach(state => {
                renderStateNode(state, container, 0);
            });
        }

        function renderStateNode(state, container, depth) {
            const div = document.createElement('div');
            div.className = `state-node ${depth === 1 ? 'child' : depth === 2 ? 'grandchild' : ''}`;
            div.onclick = () => showStateModal(state.id);
            
            div.innerHTML = `
                <div>${state.id}: ${state.name}</div>
                <div class="state-confidence">Confidence: ${state.confidence.toFixed(2)} | ${state.swarmType}</div>
            `;
            
            container.appendChild(div);
            
            // Render children
            state.children.forEach(childId => {
                const child = systemState.states.find(s => s.id === childId);
                if (child) {
                    renderStateNode(child, container, depth + 1);
                }
            });
        }

        // Render swarms
        function renderSwarms() {
            const container = document.getElementById('swarms-list');
            container.innerHTML = '';
            
            const activeSwarms = systemState.swarms.filter(s => s.active);
            
            if (activeSwarms.length === 0) {
                container.innerHTML = '<div style="font-size: 11px; opacity: 0.5;">No active swarms</div>';
                return;
            }
            
            activeSwarms.forEach(swarm => {
                const div = document.createElement('div');
                div.className = `swarm-item swarm-${swarm.type}`;
                div.innerHTML = `
                    <div>${swarm.type.toUpperCase()}</div>
                    <div style="font-size: 10px; opacity: 0.7;">${swarm.purpose}</div>
                    <div style="font-size: 10px; margin-top: 3px;">Progress: ${swarm.progress.toFixed(0)}%</div>
                `;
                container.appendChild(div);
            });
        }

        // Render artifacts
        function renderArtifacts() {
            const container = document.getElementById('artifacts-list');
            container.innerHTML = '';
            
            if (systemState.artifacts.length === 0) {
                container.innerHTML = '<div style="font-size: 11px; opacity: 0.5;">No artifacts yet</div>';
                return;
            }
            
            systemState.artifacts.slice(-5).reverse().forEach(artifact => {
                const div = document.createElement('div');
                div.className = 'artifact-item';
                div.onclick = () => showArtifactModal(artifact.id);
                div.innerHTML = `
                    <div>${artifact.id}</div>
                    <div style="font-size: 10px; opacity: 0.7;">${artifact.name}</div>
                    <div style="font-size: 10px; margin-top: 3px;">Confidence: ${artifact.confidence.toFixed(2)}</div>
                `;
                container.appendChild(div);
            });
        }

        // Render gates
        function renderGates() {
            const container = document.getElementById('gates-list');
            container.innerHTML = '';
            
            const activeGates = systemState.gates.filter(g => g.active);
            
            if (activeGates.length === 0) {
                container.innerHTML = '<div style="font-size: 11px; opacity: 0.5;">No active gates</div>';
                return;
            }
            
            activeGates.forEach(gate => {
                const div = document.createElement('div');
                div.className = 'gate-item';
                div.innerHTML = `
                    <div>${gate.name}</div>
                    <div style="font-size: 10px; opacity: 0.7;">Severity: ${gate.severity.toFixed(2)}</div>
                `;
                container.appendChild(div);
            });
        }

        // Render constraints
        function renderConstraints() {
            const container = document.getElementById('constraints-list');
            container.innerHTML = '';
            
            if (systemState.constraints.length === 0) {
                container.innerHTML = '<div style="font-size: 11px; opacity: 0.5;">No constraints</div>';
                return;
            }
            
            systemState.constraints.forEach(constraint => {
                const div = document.createElement('div');
                div.className = 'gate-item';
                div.innerHTML = `
                    <div>${constraint.name}</div>
                    <div style="font-size: 10px; opacity: 0.7;">${constraint.type}: ${constraint.value}</div>
                `;
                container.appendChild(div);
            });
        }

        // Show state modal
        function showStateModal(stateId) {
            const state = systemState.states.find(s => s.id === stateId);
            if (!state) return;
            
            systemState.selectedState = stateId;
            
            const modal = document.getElementById('state-modal');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            
            title.textContent = `${state.id}: ${state.name}`;
            
            body.innerHTML = `
                <div class="modal-section">
                    <h3>State Information</h3>
                    <div><strong>Description:</strong> ${state.description}</div>
                    <div><strong>Phase:</strong> ${state.phase}</div>
                    <div><strong>Confidence:</strong> ${state.confidence.toFixed(2)}</div>
                    <div><strong>Swarm Type:</strong> ${state.swarmType}</div>
                    <div><strong>Created:</strong> ${new Date(state.timestamp).toLocaleString()}</div>
                </div>
                
                <div class="modal-section">
                    <h3>Artifacts (${state.artifacts.length})</h3>
                    ${state.artifacts.length > 0 ? state.artifacts.map(aid => {
                        const artifact = systemState.artifacts.find(a => a.id === aid);
                        return `<div>• ${artifact.name} (${artifact.confidence.toFixed(2)})</div>`;
                    }).join('') : '<div>No artifacts yet</div>'}
                </div>
                
                <div class="modal-section">
                    <h3>Gates (${state.gates.length})</h3>
                    ${state.gates.length > 0 ? state.gates.map(gid => {
                        const gate = systemState.gates.find(g => g.id === gid);
                        return `<div>• ${gate.name} (severity: ${gate.severity.toFixed(2)})</div>`;
                    }).join('') : '<div>No gates yet</div>'}
                </div>
                
                <div class="modal-section">
                    <h3>Children (${state.children.length})</h3>
                    ${state.children.length > 0 ? state.children.map(cid => {
                        const child = systemState.states.find(s => s.id === cid);
                        return `<div>• ${child.id}: ${child.name}</div>`;
                    }).join('') : '<div>No children yet</div>'}
                </div>
            `;
            
            modal.className = 'modal active';
        }

        // Close modal
        function closeModal() {
            document.getElementById('state-modal').className = 'modal';
            systemState.selectedState = null;
        }

        // Evolve state
        function evolveState() {
            if (!systemState.selectedState) return;
            
            const parent = systemState.states.find(s => s.id === systemState.selectedState);
            if (!parent) return;
            
            // Create child state
            const childState = createState(
                `Evolution of ${parent.name}`,
                `Evolved from ${parent.id} with enhanced capabilities`,
                parent.id,
                SWARM_TYPES.HYBRID
            );
            
            terminalOutput('system', `Evolved ${parent.id} → ${childState.id}`);
            
            // Create swarm for new state
            createSwarm(SWARM_TYPES.HYBRID, childState.id, 'Analyze evolved state');
            
            // Create gate for new state
            createGate('invalid_input', childState.id);
            
            closeModal();
        }

        // Regenerate state
        function regenerateState() {
            if (!systemState.selectedState) return;
            
            const state = systemState.states.find(s => s.id === systemState.selectedState);
            if (!state) return;
            
            // Update confidence
            state.confidence = Math.random() * 0.3 + 0.6;
            
            terminalOutput('system', `Regenerated ${state.id} with new confidence: ${state.confidence.toFixed(2)}`);
            
            // Create new swarm
            createSwarm(SWARM_TYPES.CREATIVE, state.id, 'Regenerate with creative approach');
            
            closeModal();
            renderStateTree();
        }

        // Rollback state
        function rollbackState() {
            if (!systemState.selectedState) return;
            
            const state = systemState.states.find(s => s.id === systemState.selectedState);
            if (!state || !state.parentId) {
                terminalOutput('system', 'Cannot rollback - no parent state');
                return;
            }
            
            const parent = systemState.states.find(s => s.id === state.parentId);
            
            terminalOutput('system', `Rolled back ${state.id} → ${parent.id}`);
            
            closeModal();
            showStateModal(parent.id);
        }

        // Execute command
        function executeCommand() {
            const input = document.getElementById('command-input');
            const command = input.value.trim().toLowerCase();
            input.value = '';
            
            if (!command) return;
            
            terminalOutput('system', `murphy> ${command}`);
            
            if (command === 'help') {
                terminalOutput('system', 'Available commands:');
                terminalOutput('system', '  help - Show this help');
                terminalOutput('system', '  status - Show system status');
                terminalOutput('system', '  evolve <state-id> - Evolve a state');
                terminalOutput('system', '  regenerate <state-id> - Regenerate a state');
                terminalOutput('system', '  advance - Advance to next phase');
                terminalOutput('system', '  create-constraint <type> <name> <value> - Create constraint');
            } else if (command === 'status') {
                terminalOutput('system', `Phase: ${systemState.currentPhase}`);
                terminalOutput('system', `Confidence: ${systemState.confidence.toFixed(2)}`);
                terminalOutput('system', `States: ${systemState.states.length}`);
                terminalOutput('system', `Artifacts: ${systemState.artifacts.length}`);
                terminalOutput('system', `Active Gates: ${systemState.gates.filter(g => g.active).length}`);
            } else if (command === 'advance') {
                advancePhase();
            } else if (command.startsWith('evolve ')) {
                const stateId = command.split(' ')[1];
                systemState.selectedState = stateId;
                evolveState();
            } else if (command.startsWith('regenerate ')) {
                const stateId = command.split(' ')[1];
                systemState.selectedState = stateId;
                regenerateState();
            } else if (command.startsWith('create-constraint ')) {
                const parts = command.split(' ');
                if (parts.length >= 4) {
                    const type = parts[1];
                    const name = parts[2];
                    const value = parts.slice(3).join(' ');
                    createConstraint(type, name, value);
                    terminalOutput('constraint', `Created ${type} constraint: ${name} = ${value}`);
                }
            } else {
                terminalOutput('system', `Unknown command: ${command}`);
            }
        }

        // Initialize system
        function initializeSystem() {
            if (systemState.initialized) {
                terminalOutput('system', 'System already initialized');
                return;
            }
            
            terminalOutput('system', '=== MURPHY SYSTEM INITIALIZATION ===');
            terminalOutput('system', 'Backend integration: ACTIVE');
            terminalOutput('system', 'Loading MFGC core...');
            
            // Activate LLMs
            setTimeout(() => {
                toggleLLM('groq');
                setTimeout(() => {
                    toggleLLM('aristotle');
                    setTimeout(() => {
                        toggleLLM('onboard');
                        
                        // Create root state
                        setTimeout(() => {
                            terminalOutput('system', 'Creating root state...');
                            const root = createState(
                                'System Initialization',
                                'Root state for Murphy System runtime',
                                null,
                                SWARM_TYPES.ANALYTICAL
                            );
                            
                            // Create initial constraints
                            createConstraint(CONSTRAINT_TYPES.BUDGET, 'Project Budget', '$100,000');
                            createConstraint(CONSTRAINT_TYPES.TIME, 'Timeline', '6 months');
                            createConstraint(CONSTRAINT_TYPES.SECURITY, 'Security Level', 'High');
                            
                            terminalOutput('constraint', 'Loaded 3 initial constraints');
                            
                            // Create initial gates
                            createGate('security_breach', root.id);
                            createGate('invalid_input', root.id);
                            createGate('resource_exhaustion', root.id);
                            
                            terminalOutput('gate', 'Activated 3 safety gates');
                            
                            // Create initial swarms
                            createSwarm(SWARM_TYPES.ANALYTICAL, root.id, 'Analyze system requirements');
                            createSwarm(SWARM_TYPES.CREATIVE, root.id, 'Generate innovative solutions');
                            
                            terminalOutput('swarm', 'Launched 2 swarms');
                            
                            // Create child states
                            setTimeout(() => {
                                const states = [
                                    'Requirements Analysis',
                                    'Architecture Design',
                                    'Implementation Planning',
                                    'Testing Strategy',
                                    'Deployment Plan'
                                ];
                                
                                states.forEach((name, i) => {
                                    setTimeout(() => {
                                        const state = createState(name, `${name} for the system`, root.id, SWARM_TYPES.HYBRID);
                                        terminalOutput('system', `Created ${state.id}: ${name}`);
                                        
                                        // Create swarm for each state
                                        createSwarm(
                                            i % 2 === 0 ? SWARM_TYPES.ANALYTICAL : SWARM_TYPES.CREATIVE,
                                            state.id,
                                            `Process ${name}`
                                        );
                                    }, i * 500);
                                });
                                
                                setTimeout(() => {
                                    systemState.confidence = 0.65;
                                    systemState.murphyIndex = 0.15;
                                    updateMetrics();
                                    
                                    terminalOutput('system', '=== INITIALIZATION COMPLETE ===');
                                    terminalOutput('system', 'System ready for operation');
                                    terminalOutput('system', 'Click any state to view details and evolve');
                                    
                                    systemState.initialized = true;
                                }, 3000);
                            }, 1000);
                        }, 500);
                    }, 500);
                }, 500);
            }, 500);
        }

        // Handle enter key
        document.getElementById('command-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                executeCommand();
            }
        });

        // Initialize on load
        window.onload = () => {
            initPhaseIndicator();
            updatePhaseIndicator();
            updateMetrics();
            renderStateTree();
            renderSwarms();
            renderArtifacts();
            renderGates();
            renderConstraints();
            
            terminalOutput('system', 'Murphy System Backend Integrated Runtime v1.0');
            terminalOutput('system', 'Type "help" for available commands');
            terminalOutput('system', 'Click INITIALIZE to start the system');
        };
    </script>
</body>
</html>
