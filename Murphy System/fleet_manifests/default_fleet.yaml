#
# This manifest declares Murphy's default bot fleet using the declarative
# fleet model.  The FleetReconciler reads this file and continuously
# converges actual state to match the declarations below.
#
# Format reference: see docs/DECLARATIVE_FLEET_MANAGER.md

fleet_id: "murphy_default_fleet"
version: "1.0"
description: "Murphy System default five-bot fleet with roles, capabilities, heartbeat policies, and supervision topology."
created_at: "2026-01-01T00:00:00+00:00"
updated_at: "2026-03-08T00:00:00+00:00"

# ── Global policies ───────────────────────────────────────────────────────────
global_policies:
  default_heartbeat_interval_seconds: 30
  circuit_breaker_threshold: 5
  circuit_breaker_timeout_seconds: 60

# ── Bot declarations ──────────────────────────────────────────────────────────
bots:

  - bot_id: "orchestrator_001"
    name: "Fleet Orchestrator"
    role: "orchestrator"
    enabled: true
    replicas: 1
    capabilities:
      - coordinate_tasks
      - manage_workflow
      - optimize_resources
      - handle_conflicts
    heartbeat_policy:
      interval_seconds: 15
      max_missed: 3
      recovery_strategy: restart
    governance:
      authority_band: "executive"
      max_resource_limits:
        cpu_percent: 20
        memory_mb: 512
      required_approvals: []
    dependencies: []

  - bot_id: "expert_001"
    name: "Architecture Expert"
    role: "expert"
    enabled: true
    replicas: 1
    capabilities:
      - analyze_requirements
      - generate_solutions
      - validate_design
      - provide_recommendations
    heartbeat_policy:
      interval_seconds: 30
      max_missed: 3
      recovery_strategy: restart
    governance:
      authority_band: "operational"
      max_resource_limits:
        cpu_percent: 30
        memory_mb: 1024
      required_approvals: []
    dependencies:
      - orchestrator_001

  - bot_id: "validator_001"
    name: "Security Validator"
    role: "validator"
    enabled: true
    replicas: 1
    capabilities:
      - validate_constraints
      - check_gates
      - verify_compliance
      - audit_system
    heartbeat_policy:
      interval_seconds: 20
      max_missed: 2
      recovery_strategy: alert
    governance:
      authority_band: "operational"
      max_resource_limits:
        cpu_percent: 15
        memory_mb: 256
      required_approvals: []
    dependencies:
      - orchestrator_001

  - bot_id: "monitor_001"
    name: "Performance Monitor"
    role: "monitor"
    enabled: true
    replicas: 1
    capabilities:
      - monitor_performance
      - track_metrics
      - alert_anomalies
      - generate_reports
    heartbeat_policy:
      interval_seconds: 10
      max_missed: 5
      recovery_strategy: restart
    governance:
      authority_band: "observer"
      max_resource_limits:
        cpu_percent: 10
        memory_mb: 256
      required_approvals: []
    dependencies:
      - orchestrator_001

  - bot_id: "auditor_001"
    name: "Compliance Auditor"
    role: "auditor"
    enabled: true
    replicas: 1
    capabilities:
      - audit_productivity
      - detect_gaps
      - generate_contracts
      - monitor_compliance
    heartbeat_policy:
      interval_seconds: 60
      max_missed: 3
      recovery_strategy: escalate
    governance:
      authority_band: "governance"
      max_resource_limits:
        cpu_percent: 10
        memory_mb: 256
      required_approvals:
        - governance_kernel
    dependencies:
      - orchestrator_001
      - validator_001

# ── Supervision topology ─────────────────────────────────────────────────────
# Maps supervisor bot_ids to lists of child bot_ids.
# The FleetReconciler wires this into the SupervisionTree.
supervision_topology:
  orchestrator_001:
    - expert_001
    - validator_001
    - monitor_001
    - auditor_001
