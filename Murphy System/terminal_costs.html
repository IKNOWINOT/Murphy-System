<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murphy System — Finance Terminal</title>
<link rel="icon" href="static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="static/murphy-design-system.css">
<style>
  /* Neon terminal theme */
  .murphy-terminal, .murphy-output, pre, code {
    font-family: var(--font-code, 'JetBrains Mono', monospace);
  }
  textarea, input[type="text"] {
    font-family: var(--font-ui, Inter, system-ui, sans-serif);
    color: #00ff00;
    background: #0a0a0a;
  }
</style>
</head>
<body style="--accent: #FF6B6B;">

<!-- Skip link for accessibility -->
<a href="#content" class="murphy-skip-link">Skip to content</a>

<!-- ============================================================
     SIDEBAR
     ============================================================ -->
<nav class="murphy-sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
  <div class="murphy-sidebar-logo">
    <svg width="24" height="24"><use href="static/murphy-icons.svg#icon-dollar-sign"></use></svg>
    <span>Finance</span>
  </div>

  <div class="murphy-sidebar-nav" id="sidebar-nav">
    <!-- Overview -->
    <div class="murphy-sidebar-section" aria-label="Overview">Overview</div>
    <a href="#dashboard" class="murphy-sidebar-item" data-view="dashboard" aria-label="Dashboard">
      <svg width="18" height="18"><use href="static/murphy-icons.svg#icon-dashboard"></use></svg>
      <span>Dashboard</span>
    </a>
    <a href="#status" class="murphy-sidebar-item" data-view="status" aria-label="System Status">
      <svg width="18" height="18"><use href="static/murphy-icons.svg#icon-activity"></use></svg>
      <span>Status</span>
    </a>

    <!-- Budget -->
    <div class="murphy-sidebar-section" aria-label="Budget">Budget</div>
    <a href="#efficiency" class="murphy-sidebar-item" data-view="efficiency" aria-label="Efficiency">
      <svg width="18" height="18"><use href="static/murphy-icons.svg#icon-chart"></use></svg>
      <span>Efficiency</span>
    </a>
    <a href="#supply" class="murphy-sidebar-item" data-view="supply" aria-label="Supply Chain">
      <svg width="18" height="18"><use href="static/murphy-icons.svg#icon-globe"></use></svg>
      <span>Supply Chain</span>
    </a>
    <a href="#costs" class="murphy-sidebar-item" data-view="costs" aria-label="Costs">
      <svg width="18" height="18"><use href="static/murphy-icons.svg#icon-dollar-sign"></use></svg>
      <span>Costs</span>
    </a>

    <!-- Governance -->
    <div class="murphy-sidebar-section" aria-label="Governance">Governance</div>
    <a href="#gates" class="murphy-sidebar-item" data-view="gates" aria-label="Gates MFGC">
      <svg width="18" height="18"><use href="static/murphy-icons.svg#icon-shield"></use></svg>
      <span>Gates (MFGC)</span>
    </a>

    <!-- Intelligence -->
    <div class="murphy-sidebar-section" aria-label="Intelligence">Intelligence</div>
    <a href="#librarian" class="murphy-sidebar-item" data-view="librarian" aria-label="Librarian">
      <svg width="18" height="18"><use href="static/murphy-icons.svg#icon-search"></use></svg>
      <span>Librarian</span>
    </a>

    <!-- External Links -->
    <div class="murphy-sidebar-section" aria-label="External Links">External Links</div>
    <a href="/ui/workflow-canvas" class="murphy-sidebar-item" target="_blank" rel="noopener" aria-label="Workflow Canvas (opens in new tab)">
      <svg width="18" height="18"><use href="static/murphy-icons.svg#icon-topology"></use></svg>
      <span>Workflow Canvas</span>
    </a>
    <a href="/ui/system-visualizer" class="murphy-sidebar-item" target="_blank" rel="noopener" aria-label="System Topology (opens in new tab)">
      <svg width="18" height="18"><use href="static/murphy-icons.svg#icon-code"></use></svg>
      <span>System Topology</span>
    </a>
  </div>

  <div class="murphy-sidebar-footer">
    <span class="text-xs text-muted">Murphy System v2</span>
  </div>
</nav>

<!-- ============================================================
     TOPBAR
     ============================================================ -->
<header class="murphy-topbar" role="banner" aria-label="Top bar">
  <div class="murphy-topbar-left">
    <button class="murphy-btn murphy-btn-icon" id="btn-sidebar-toggle" aria-label="Toggle sidebar" title="Toggle sidebar">
      <svg width="18" height="18"><use href="static/murphy-icons.svg#icon-menu"></use></svg>
    </button>
    <h1 class="murphy-topbar-title">Finance Terminal</h1>
  </div>
  <div class="murphy-topbar-right">
    <div class="relative" id="topbar-search-wrapper">
      <input type="search" class="murphy-input" id="topbar-search" placeholder="Search… (Ctrl+K)" aria-label="Search" autocomplete="off">
    </div>
    <button class="murphy-btn murphy-btn-icon" id="btn-theme-toggle" aria-label="Toggle theme" title="Toggle theme">
      <svg width="18" height="18" id="theme-icon"><use href="static/murphy-icons.svg#icon-moon"></use></svg>
    </button>
    <button class="murphy-btn murphy-btn-icon" id="btn-notifications" aria-label="Notifications" title="Notifications">
      <svg width="18" height="18"><use href="static/murphy-icons.svg#icon-bell"></use></svg>
    </button>
  </div>
</header>

<!-- ============================================================
     MAIN CONTENT AREA
     ============================================================ -->
<main id="content" role="main" aria-label="Main content" aria-live="polite"
      style="margin-left: var(--sidebar-width); margin-top: var(--topbar-height); padding: var(--space-5); min-height: calc(100vh - var(--topbar-height)); transition: margin-left 0.2s ease;">
</main>

<!-- ============================================================
     JAVASCRIPT
     ============================================================ -->
<script src="static/murphy-components.js"></script>
<script src="murphy_auth.js"></script>
<script>
(function () {
  'use strict';

  /* ===========================================================
     1. SHARED COMPONENT INITIALIZATION
     =========================================================== */
  var api       = new MurphyAPI('/api');
  var health    = new MurphyHealth(api);
  var theme     = new MurphyTheme();
  var keyboard  = new MurphyKeyboard();
  var jargon    = new MurphyJargon();
  var librarian = new MurphyLibrarianChat(api);
  var toast     = new MurphyToast();

  theme.init();
  keyboard.init();
  jargon.init();
  health.start(15000);

  /* ===========================================================
     2. HELPERS — HTML generation utilities
     =========================================================== */
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }

  function icon(name, size) {
    size = size || 18;
    return '<svg width="' + size + '" height="' + size + '"><use href="static/murphy-icons.svg#icon-' + esc(name) + '"></use></svg>';
  }

  function badge(text, variant) {
    variant = variant || 'neutral';
    return '<span class="murphy-badge murphy-badge-' + esc(variant) + '">' + esc(text) + '</span>';
  }

  function skeletonCards(n) {
    var h = '';
    for (var i = 0; i < (n || 4); i++) {
      h += '<div class="murphy-skeleton-card murphy-skeleton"></div>';
    }
    return '<div class="grid gap-4" style="grid-template-columns:repeat(auto-fill,minmax(240px,1fr));">' + h + '</div>';
  }

  function skeletonRows(n) {
    var h = '';
    for (var i = 0; i < (n || 6); i++) {
      h += '<div class="murphy-skeleton murphy-skeleton-text"></div>';
    }
    return '<div class="flex flex-col gap-3 p-4">' + h + '</div>';
  }

  function emptyState(title, msg) {
    return '<div class="murphy-empty-state">' +
      '<div class="murphy-empty-state-icon">' + icon('search', 48) + '</div>' +
      '<div class="murphy-empty-state-title">' + esc(title) + '</div>' +
      '<div class="murphy-empty-state-message">' + esc(msg) + '</div>' +
      '</div>';
  }

  function errorCard(message, retryHash) {
    var rh = esc(retryHash || '');
    return '<div class="murphy-card">' +
      '<div class="murphy-card-body flex flex-col items-center gap-4 p-6">' +
      '<div class="text-danger text-lg font-bold">' + icon('alert', 32) + ' Error</div>' +
      '<p class="text-secondary text-sm">' + esc(message) + '</p>' +
      '<button class="murphy-btn murphy-btn-primary" onclick="location.hash=\'' + rh + '\';navigate(\'' + rh.replace('#', '') + '\');">Retry</button>' +
      '</div></div>';
  }

  function statCard(label, value, trendDir, trendText) {
    var tc = trendDir === 'up' ? 'murphy-stat-card-trend-up' : (trendDir === 'down' ? 'murphy-stat-card-trend-down' : '');
    var th = trendText ? '<div class="murphy-stat-card-trend ' + tc + '">' + esc(trendText) + '</div>' : '';
    return '<div class="murphy-stat-card">' +
      '<div class="murphy-stat-card-label">' + esc(label) + '</div>' +
      '<div class="murphy-stat-card-value">' + esc(value) + '</div>' +
      th +
      '</div>';
  }

  function gateIndicator(name, state, cssClass) {
    var oc = (state === 'open' || state === true) ? 'open' : 'closed';
    return '<div class="murphy-gate-indicator murphy-gate-indicator-' + esc(cssClass) + ' murphy-gate-indicator-' + oc + '" title="' + esc(name) + ': ' + oc + '">' +
      '<div class="murphy-gate-indicator-hex">' + esc(name.charAt(0)) + '</div>' +
      '<span class="text-xs">' + esc(name) + '</span>' +
      '</div>';
  }

  function tableHTML(columns, rows) {
    var h = '<div class="murphy-table murphy-table-striped"><div class="murphy-table-header">';
    columns.forEach(function (c) { h += '<div>' + esc(c.label) + '</div>'; });
    h += '</div>';
    if (!rows || rows.length === 0) {
      h += '<div class="p-6 text-center text-muted text-sm">No data available</div>';
    } else {
      rows.forEach(function (row) {
        h += '<div class="murphy-table-row">';
        columns.forEach(function (c) {
          var val = row[c.key];
          h += '<div>' + (c.render ? c.render(val, row) : esc(val)) + '</div>';
        });
        h += '</div>';
      });
    }
    h += '</div>';
    return h;
  }

  function sectionHeader(title, subtitle) {
    return '<div class="flex items-center justify-between mb-4">' +
      '<div>' +
      '<h2 class="text-xl font-bold">' + esc(title) + '</h2>' +
      (subtitle ? '<p class="text-sm text-secondary">' + esc(subtitle) + '</p>' : '') +
      '</div></div>';
  }

  function cardWrap(headerHtml, bodyHtml, footerHtml) {
    var h = '<div class="murphy-card">';
    if (headerHtml) h += '<div class="murphy-card-header">' + headerHtml + '</div>';
    h += '<div class="murphy-card-body">' + bodyHtml + '</div>';
    if (footerHtml) h += '<div class="murphy-card-footer">' + footerHtml + '</div>';
    h += '</div>';
    return h;
  }

  /* ===========================================================
     3. SIDEBAR TOGGLE & MOBILE HANDLING
     =========================================================== */
  var sidebar   = document.getElementById('sidebar');
  var contentEl = document.getElementById('content');

  document.getElementById('btn-sidebar-toggle').addEventListener('click', function () {
    if (window.innerWidth <= 640) {
      sidebar.classList.toggle('murphy-sidebar-open');
    } else {
      sidebar.classList.toggle('murphy-sidebar-collapsed');
      contentEl.style.marginLeft = sidebar.classList.contains('murphy-sidebar-collapsed')
        ? '56px'
        : 'var(--sidebar-width)';
    }
  });

  sidebar.addEventListener('click', function (e) {
    if (e.target.closest('.murphy-sidebar-item') && window.innerWidth <= 640) {
      sidebar.classList.remove('murphy-sidebar-open');
    }
  });

  /* ===========================================================
     4. THEME TOGGLE
     =========================================================== */
  var themeIcon = document.getElementById('theme-icon');

  function updateThemeIcon() {
    var useEl = themeIcon.querySelector('use');
    useEl.setAttribute('href', 'static/murphy-icons.svg#icon-' + (theme.get() === 'dark' ? 'moon' : 'sun'));
  }

  theme.onChange(updateThemeIcon);
  updateThemeIcon();

  document.getElementById('btn-theme-toggle').addEventListener('click', function () {
    theme.toggle();
  });

  /* ===========================================================
     5. KEYBOARD SHORTCUTS
     =========================================================== */
  keyboard.register('ctrl+k', function () {
    document.getElementById('topbar-search').focus();
  }, 'Focus search');

  keyboard.register('ctrl+/', function () {
    keyboard.showHelp();
  }, 'Show keyboard shortcuts');

  keyboard.register('ctrl+b', function () {
    document.getElementById('btn-sidebar-toggle').click();
  }, 'Toggle sidebar');

  /* ===========================================================
     6. TOPBAR SEARCH — sidebar navigation filter
     =========================================================== */
  var searchInput = document.getElementById('topbar-search');

  searchInput.addEventListener('input', function () {
    var q = this.value.trim().toLowerCase();
    sidebar.querySelectorAll('.murphy-sidebar-item[data-view]').forEach(function (item) {
      item.style.display = (!q || (item.textContent || '').toLowerCase().indexOf(q) !== -1) ? '' : 'none';
    });
  });

  searchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      this.value = '';
      this.dispatchEvent(new Event('input'));
      this.blur();
    }
    if (e.key === 'Enter') {
      var visible = sidebar.querySelectorAll('.murphy-sidebar-item[data-view]:not([style*="display: none"])');
      if (visible.length === 1) {
        visible[0].click();
        this.value = '';
        this.dispatchEvent(new Event('input'));
        this.blur();
      }
    }
  });

  /* ===========================================================
     7. HASH ROUTER
     =========================================================== */
  var currentView = '';

  var views = {
    dashboard:  renderDashboard,
    status:     renderStatus,
    efficiency: renderEfficiency,
    supply:     renderSupply,
    costs:      renderCosts,
    gates:      renderGates,
    librarian:  renderLibrarian
  };

  /* Exposed on window so the retry button can call it */
  window.navigate = navigate;

  function navigate(hash) {
    hash = hash || 'dashboard';
    if (!views[hash]) hash = 'dashboard';
    currentView = hash;

    sidebar.querySelectorAll('.murphy-sidebar-item').forEach(function (el) {
      el.classList.toggle('murphy-sidebar-item-active', el.getAttribute('data-view') === hash);
    });

    librarian.setContext('terminal_costs#' + hash);
    views[hash]();
    setTimeout(function () { jargon.autoScan(); }, 200);
  }

  window.addEventListener('hashchange', function () {
    navigate(location.hash.slice(1));
  });

  /* ===========================================================
     8. VIEW: DASHBOARD
     =========================================================== */
  async function renderDashboard() {
    contentEl.innerHTML = sectionHeader('Dashboard', 'System overview and quick actions') + skeletonCards(4);
    try {
      var res   = await api.get('/status');
      var gRes  = await api.get('/mfgc/state');
      var data  = (res && res.data)  || res  || {};
      var gates = (gRes && gRes.data) || gRes || {};

      var activeWf  = data.active_workflows  != null ? data.active_workflows : '\u2014';
      var hitlPend  = data.hitl_pending      != null ? data.hitl_pending     : '\u2014';
      var healthPct = data.health            != null ? data.health + '%'     : '\u2014';
      var agentCnt  = data.active_agents     != null ? data.active_agents    : '\u2014';

      var html = sectionHeader('Dashboard', 'System overview and quick actions');

      html += '<div class="grid gap-4 mb-6" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr));">';
      html += statCard('Active Workflows', activeWf);
      html += statCard('HITL Pending', hitlPend, hitlPend > 5 ? 'up' : null, hitlPend > 5 ? 'Attention' : '');
      html += statCard('System Health', healthPct);
      html += statCard('Active Agents', agentCnt);
      html += '</div>';

      var gateNames = [
        { key: 'executive',  label: 'Executive',  css: 'executive'  },
        { key: 'operations', label: 'Operations', css: 'operations' },
        { key: 'qa',         label: 'QA',         css: 'qa'         },
        { key: 'hitl',       label: 'HITL',       css: 'hitl'       },
        { key: 'compliance', label: 'Compliance', css: 'compliance' },
        { key: 'budget',     label: 'Budget',     css: 'budget'     }
      ];

      html += '<div class="murphy-card mb-6"><div class="murphy-card-header">MFGC Gate Status</div>';
      html += '<div class="murphy-card-body"><div class="flex flex-wrap gap-4">';
      gateNames.forEach(function (g) {
        var s = gates[g.key] || gates[g.label] || 'closed';
        html += gateIndicator(g.label, s, g.css);
      });
      html += '</div></div></div>';

      var events = data.recent_events || data.events || [];
      if (events.length) {
        html += cardWrap('Recent Activity',
          '<div class="flex flex-col gap-2">' +
          events.slice(0, 10).map(function (ev) {
            var ts = ev.timestamp || ev.time || '';
            return '<div class="flex items-center gap-3 py-1 text-sm">' +
              '<span class="text-muted text-xs" style="min-width:100px;">' + esc(ts) + '</span>' +
              '<span>' + esc(ev.message || ev.description || ev.event || JSON.stringify(ev)) + '</span>' +
              '</div>';
          }).join('') +
          '</div>'
        );
      }

      html += '<div class="flex flex-wrap gap-3 mt-6">';
      html += '<a href="#costs" class="murphy-btn murphy-btn-primary">' + icon('dollar-sign') + ' View Costs</a>';
      html += '<a href="#efficiency" class="murphy-btn murphy-btn-secondary">' + icon('chart') + ' Efficiency</a>';
      html += '<a href="#supply" class="murphy-btn murphy-btn-secondary">' + icon('globe') + ' Supply Chain</a>';
      html += '</div>';

      contentEl.innerHTML = html;
    } catch (e) {
      contentEl.innerHTML = sectionHeader('Dashboard') + errorCard(e.message, '#dashboard');
    }
  }

  /* ===========================================================
     9. VIEW: STATUS
     =========================================================== */
  async function renderStatus() {
    contentEl.innerHTML = sectionHeader('System Status') + skeletonRows(6);
    try {
      var res  = await api.get('/status');
      var hRes = await api.get('/health');
      var data  = (res  && res.data)  || res  || {};
      var hData = (hRes && hRes.data) || hRes || {};

      var html = sectionHeader('System Status', 'Health and module information');

      html += '<div class="grid gap-4 mb-6" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr));">';
      html += statCard('Overall Health', (hData.health || data.health || '\u2014') + '%');
      html += statCard('Uptime', hData.uptime || data.uptime || '\u2014');
      html += statCard('API Latency', (hData.latency_ms || data.latency_ms || '\u2014') + ' ms');
      html += '</div>';

      var modules = data.modules || hData.modules || [];
      if (modules.length) {
        html += cardWrap('Modules', tableHTML(
          [
            { key: 'name', label: 'Module' },
            { key: 'status', label: 'Status', render: function (v) { return badge(v || 'unknown', v === 'running' || v === 'healthy' ? 'success' : (v === 'error' ? 'danger' : 'warning')); } },
            { key: 'version', label: 'Version' }
          ],
          modules
        ));
      } else {
        html += emptyState('No Modules', 'Module status data is not available.');
      }

      contentEl.innerHTML = html;
    } catch (e) {
      contentEl.innerHTML = sectionHeader('System Status') + errorCard(e.message, '#status');
    }
  }

  /* ===========================================================
     10. VIEW: EFFICIENCY
     =========================================================== */
  async function renderEfficiency() {
    contentEl.innerHTML = sectionHeader('Efficiency') + skeletonCards(4);
    try {
      var res  = await api.get('/efficiency/metrics');
      var data = (res && res.data) || res || {};
      var html = sectionHeader('Efficiency', 'Performance metrics');

      html += '<div class="grid gap-4 mb-6" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr));">';
      html += statCard('Throughput', data.throughput || '\u2014');
      html += statCard('Avg Latency', (data.avg_latency || data.latency || '\u2014') + ' ms');
      html += statCard('Error Rate', (data.error_rate || '\u2014') + '%');
      html += statCard('Utilization', (data.utilization || '\u2014') + '%');
      html += '</div>';

      var breakdown = data.breakdown || data.details || [];
      if (breakdown.length) {
        html += cardWrap('Metric Breakdown', tableHTML(
          [
            { key: 'metric', label: 'Metric' },
            { key: 'value',  label: 'Value' },
            { key: 'trend',  label: 'Trend', render: function (v) { return badge(v || 'stable', v === 'up' || v === 'improving' ? 'success' : (v === 'down' || v === 'degrading' ? 'danger' : 'neutral')); } }
          ],
          breakdown
        ));
      }
      contentEl.innerHTML = html;
    } catch (e) {
      contentEl.innerHTML = sectionHeader('Efficiency') + errorCard(e.message, '#efficiency');
    }
  }

  /* ===========================================================
     11. VIEW: SUPPLY
     =========================================================== */
  async function renderSupply() {
    contentEl.innerHTML = sectionHeader('Supply') + skeletonRows(6);
    try {
      var res   = await api.get('/supply/status');
      var data  = (res && res.data) || res || {};
      var items = data.items || data.resources || (Array.isArray(data) ? data : []);
      var html  = sectionHeader('Supply', 'Supply chain status');

      html += '<div class="grid gap-4 mb-6" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr));">';
      html += statCard('Total Resources', data.total || items.length);
      html += statCard('Available', data.available || '\u2014');
      html += statCard('Pending', data.pending || '\u2014');
      html += '</div>';

      if (!items.length) {
        html += emptyState('No Supply Data', 'Supply chain data is not available.');
      } else {
        html += tableHTML(
          [
            { key: 'name',     label: 'Resource' },
            { key: 'status',   label: 'Status', render: function (v) { return badge(v || 'unknown', v === 'available' ? 'success' : (v === 'low' ? 'warning' : 'neutral')); } },
            { key: 'quantity', label: 'Quantity' },
            { key: 'updated',  label: 'Updated' }
          ],
          items
        );
      }
      contentEl.innerHTML = html;
    } catch (e) {
      contentEl.innerHTML = sectionHeader('Supply') + errorCard(e.message, '#supply');
    }
  }

  /* ===========================================================
     12. VIEW: COSTS
     =========================================================== */
  async function renderCosts() {
    contentEl.innerHTML = sectionHeader('Costs') + skeletonCards(4);
    try {
      var res   = await api.get('/efficiency/costs');
      var data  = (res && res.data) || res || {};
      var items = data.items || data.line_items || (Array.isArray(data) ? data : []);
      var html  = sectionHeader('Costs', 'Budget and spending overview');

      html += '<div class="grid gap-4 mb-6" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr));">';
      html += statCard('Total Spend', data.total || data.total_spend || '\u2014');
      html += statCard('Budget', data.budget || '\u2014');
      html += statCard('Remaining', data.remaining || '\u2014');
      html += '</div>';

      if (items.length) {
        html += cardWrap('Cost Breakdown', tableHTML(
          [
            { key: 'category', label: 'Category' },
            { key: 'amount',   label: 'Amount' },
            { key: 'percent',  label: '% of Total' }
          ],
          items
        ));
      }
      contentEl.innerHTML = html;
    } catch (e) {
      contentEl.innerHTML = sectionHeader('Costs') + errorCard(e.message, '#costs');
    }
  }

  /* ===========================================================
     13. VIEW: GATES (MFGC)
     =========================================================== */
  async function renderGates() {
    contentEl.innerHTML = sectionHeader('Gates (MFGC)') + skeletonCards(6);
    try {
      var res  = await api.get('/mfgc/state');
      var data = (res && res.data) || res || {};
      var html = sectionHeader('Gates (MFGC)', 'Murphy Flow Gate Controller \u2014 6 governance gates');

      var gateList = [
        { key: 'executive',  label: 'Executive',  css: 'executive',  desc: 'Strategic decision authority' },
        { key: 'operations', label: 'Operations', css: 'operations', desc: 'Operational readiness' },
        { key: 'qa',         label: 'QA',         css: 'qa',         desc: 'Quality assurance checks' },
        { key: 'hitl',       label: 'HITL',       css: 'hitl',       desc: 'Human-in-the-loop approval' },
        { key: 'compliance', label: 'Compliance', css: 'compliance', desc: 'Regulatory compliance' },
        { key: 'budget',     label: 'Budget',     css: 'budget',     desc: 'Budget authorization' }
      ];

      html += '<div class="grid gap-4 mb-6" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr));">';
      gateList.forEach(function (g) {
        var s = data[g.key] || data[g.label] || 'closed';
        var isOpen = s === 'open' || s === true;
        html += '<div class="murphy-card">' +
          '<div class="murphy-card-body flex items-center gap-4">' +
          gateIndicator(g.label, s, g.css) +
          '<div class="flex-1">' +
          '<div class="font-bold">' + esc(g.label) + ' ' + badge(isOpen ? 'Open' : 'Closed', isOpen ? 'success' : 'danger') + '</div>' +
          '<p class="text-sm text-secondary mt-1">' + esc(g.desc) + '</p>' +
          '</div></div></div>';
      });
      html += '</div>';
      contentEl.innerHTML = html;
    } catch (e) {
      contentEl.innerHTML = sectionHeader('Gates (MFGC)') + errorCard(e.message, '#gates');
    }
  }

  /* ===========================================================
     14. VIEW: LIBRARIAN
     =========================================================== */
  async function renderLibrarian() {
    var html = sectionHeader('Librarian', 'Knowledge base search');
    html += '<div class="murphy-card mb-4"><div class="murphy-card-body">';
    html += '<label class="murphy-label" for="lib-query">Ask the Librarian</label>';
    html += '<div class="flex gap-3">';
    html += '<input type="text" class="murphy-input flex-1" id="lib-query" placeholder="Ask a question\u2026" autocomplete="off">';
    html += '<button class="murphy-btn murphy-btn-primary" id="lib-ask">' + icon('search') + ' Ask</button>';
    html += '</div></div></div>';
    html += '<div id="lib-results"></div>';
    contentEl.innerHTML = html;

    var queryInput = document.getElementById('lib-query');
    var resultsEl  = document.getElementById('lib-results');
    var askBtn     = document.getElementById('lib-ask');

    async function doAsk() {
      var q = queryInput.value.trim();
      if (!q) return;
      resultsEl.innerHTML = skeletonRows(4);
      askBtn.classList.add('murphy-btn-loading');
      try {
        var res = await api.post('/librarian/ask', { question: q });
        var d = (res && res.data) || res || {};
        var answer = d.answer || d.response || JSON.stringify(d, null, 2);
        resultsEl.innerHTML = cardWrap('Answer', '<div class="text-sm" style="white-space:pre-wrap;">' + esc(answer) + '</div>');
      } catch (e) {
        resultsEl.innerHTML = errorCard(e.message, '#librarian');
      }
      askBtn.classList.remove('murphy-btn-loading');
    }

    askBtn.addEventListener('click', doAsk);
    queryInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') doAsk(); });
    queryInput.focus();
  }

  /* ===========================================================
     15. BOOT — initial navigation
     =========================================================== */
  navigate(location.hash.slice(1) || 'dashboard');

})();
</script>
</body>
</html>
