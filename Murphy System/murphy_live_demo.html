<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murphy System - Live Backend Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #00ff41;
            overflow: hidden;
            height: 100vh;
        }

        .header {
            background: #1a1f3a;
            border-bottom: 2px solid #00ff41;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            color: #00ff41;
        }

        .status-badge {
            padding: 5px 15px;
            background: #00ff41;
            color: #0a0e27;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        .terminal-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0e27;
        }

        .terminal {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
        }

        .terminal-line {
            margin: 4px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            margin-right: 8px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 11px;
        }

        .tag-system { background: #00ff41; color: #0a0e27; }
        .tag-api { background: #0088ff; color: white; }
        .tag-success { background: #00cc33; color: white; }
        .tag-error { background: #ff4444; color: white; }

        .input-area {
            padding: 15px 20px;
            background: #1a1f3a;
            border-top: 2px solid #00ff41;
            display: flex;
            gap: 10px;
        }

        .input-area button {
            background: #00ff41;
            color: #0a0e27;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        .input-area button:hover {
            background: #00cc33;
            transform: scale(1.05);
        }

        .input-area button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0e27;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 4px;
        }

        .loading {
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="header">
        <h1>MURPHY SYSTEM - LIVE BACKEND DEMO</h1>
        <div class="status-badge" id="status">CONNECTING...</div>
    </div>

    <div class="main-container">
        <div class="terminal-container">
            <div class="terminal" id="terminal"></div>
            <div class="input-area">
                <button onclick="testConnection()" id="testBtn">TEST CONNECTION</button>
                <button onclick="initializeSystem()" id="initBtn" disabled>INITIALIZE SYSTEM</button>
                <button onclick="getStatus()" id="statusBtn" disabled>GET STATUS</button>
                <button onclick="createState()" id="createBtn" disabled>CREATE STATE</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://8888-2509dbb6-36a8-444b-bbd2-843aec2ed137.sandbox-service.public.prod.myninja.ai/api';
        let connected = false;

        function terminalOutput(tag, message) {
            const terminal = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = 'terminal-line';
            
            const tagSpan = document.createElement('span');
            tagSpan.className = `tag tag-${tag}`;
            tagSpan.textContent = tag.toUpperCase();
            
            line.appendChild(tagSpan);
            line.appendChild(document.createTextNode(message));
            
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function testConnection() {
            terminalOutput('system', 'Testing connection to Murphy System backend...');
            
            try {
                const response = await fetch(`${API_BASE}/status`);
                const data = await response.json();
                
                connected = true;
                document.getElementById('status').textContent = 'CONNECTED';
                document.getElementById('status').style.background = '#00ff41';
                
                terminalOutput('success', 'Connection successful!');
                terminalOutput('api', `Backend status: ${JSON.stringify(data, null, 2)}`);
                
                // Enable buttons
                document.getElementById('initBtn').disabled = false;
                document.getElementById('statusBtn').disabled = false;
                document.getElementById('createBtn').disabled = false;
                
            } catch (error) {
                terminalOutput('error', `Connection failed: ${error.message}`);
                document.getElementById('status').textContent = 'DISCONNECTED';
                document.getElementById('status').style.background = '#ff4444';
            }
        }

        async function initializeSystem() {
            if (!connected) {
                terminalOutput('error', 'Not connected to backend');
                return;
            }

            terminalOutput('system', 'Initializing Murphy System...');
            document.getElementById('initBtn').disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/initialize`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                terminalOutput('success', 'System initialized successfully!');
                terminalOutput('api', `Root state: ${data.root_state.id}`);
                terminalOutput('api', `States: ${data.status.states_count}`);
                terminalOutput('api', `Artifacts: ${data.status.artifacts_count}`);
                terminalOutput('api', `Gates: ${data.status.gates_count}`);
                terminalOutput('api', `Swarms: ${data.status.swarms_count}`);
                
            } catch (error) {
                terminalOutput('error', `Initialization failed: ${error.message}`);
                document.getElementById('initBtn').disabled = false;
            }
        }

        async function getStatus() {
            if (!connected) {
                terminalOutput('error', 'Not connected to backend');
                return;
            }

            terminalOutput('system', 'Fetching system status...');
            
            try {
                const response = await fetch(`${API_BASE}/status`);
                const data = await response.json();
                
                terminalOutput('success', 'Status retrieved:');
                terminalOutput('api', `Phase: ${data.phase}`);
                terminalOutput('api', `Confidence: ${data.confidence.toFixed(2)}`);
                terminalOutput('api', `Murphy Index: ${data.murphy_index.toFixed(2)}`);
                terminalOutput('api', `States: ${data.states_count}`);
                terminalOutput('api', `Artifacts: ${data.artifacts_count}`);
                terminalOutput('api', `Active Gates: ${data.gates_count}`);
                terminalOutput('api', `Active Swarms: ${data.swarms_count}`);
                terminalOutput('api', `Constraints: ${data.constraints_count}`);
                
            } catch (error) {
                terminalOutput('error', `Failed to get status: ${error.message}`);
            }
        }

        async function createState() {
            if (!connected) {
                terminalOutput('error', 'Not connected to backend');
                return;
            }

            terminalOutput('system', 'Creating new state...');
            
            try {
                // First get current states
                const statesResponse = await fetch(`${API_BASE}/states`);
                const states = await statesResponse.json();
                
                if (states.length === 0) {
                    terminalOutput('error', 'No states found. Initialize system first.');
                    return;
                }

                // Evolve the first state
                const response = await fetch(`${API_BASE}/states/${states[0].id}/evolve`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                terminalOutput('success', 'State created successfully!');
                terminalOutput('api', `Parent: ${data.parent.id}`);
                terminalOutput('api', `Child: ${data.child.id} - ${data.child.name}`);
                terminalOutput('api', `Confidence: ${data.child.confidence.toFixed(2)}`);
                
            } catch (error) {
                terminalOutput('error', `Failed to create state: ${error.message}`);
            }
        }

        // Auto-test connection on load
        window.onload = () => {
            terminalOutput('system', 'Murphy System Live Backend Demo');
            terminalOutput('system', 'Backend URL: ' + API_BASE);
            terminalOutput('system', 'Click TEST CONNECTION to begin');
            terminalOutput('system', '');
            
            // Auto-test after 1 second
            setTimeout(testConnection, 1000);
        };
    </script>
</body>
</html>
