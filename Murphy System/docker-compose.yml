services:
  # ── Murphy API (main application) ──────────────────────────────────────
  murphy-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: murphy-api
    restart: unless-stopped
    ports:
      - "${MURPHY_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      MURPHY_ENV: ${MURPHY_ENV:-development}
      MURPHY_PORT: "8000"
      MURPHY_DB_MODE: live
      DATABASE_URL: postgresql://${POSTGRES_USER:-murphy}:${POSTGRES_PASSWORD:-murphy}@postgres:5432/${POSTGRES_DB:-murphy}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - murphy-data:/app/data
      - murphy-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: murphy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-murphy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-murphy}
      POSTGRES_DB: ${POSTGRES_DB:-murphy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-murphy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: murphy-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus (metrics) ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: murphy-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus-data:/prometheus
    # Provide your own prometheus.yml via a bind mount, e.g.:
    #   ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  # ── Grafana (dashboards) ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: murphy-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  murphy-data:
  murphy-logs:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
