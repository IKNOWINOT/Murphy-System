<!DOCTYPE html>
<html>
<head>
    <title>Button Click Test</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #00ff41; 
            font-family: 'Courier New', monospace; 
            padding: 20px; 
        }
        #log {
            background: #000;
            border: 1px solid #333;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        input {
            background: #000;
            color: #00ff41;
            border: 1px solid #333;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            width: 300px;
            margin-bottom: 10px;
        }
        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            margin-left: 10px;
        }
        button:hover {
            background: #00cc33;
        }
        .log-entry { margin: 2px 0; }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <h1>Button Click Test</h1>
    <p>Type in the input box and click the button to execute.</p>
    
    <input type="text" id="test-input" placeholder="Type here...">
    <button id="execute-btn">EXECUTE</button>
    
    <h3>Event Log:</h3>
    <div id="log"></div>
    
    <script>
        console.log('=== BUTTON TEST - SCRIPT STARTED ===');
        
        const testInput = document.getElementById('test-input');
        const executeBtn = document.getElementById('execute-btn');
        const logDiv = document.getElementById('log');
        
        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            if (type === 'success') {
                entry.style.color = '#00ff41';
            } else if (type === 'error') {
                entry.style.color = '#ff3333';
            } else if (type === 'warning') {
                entry.style.color = '#ffcc00';
            } else {
                entry.style.color = '#fff';
            }
            
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        addLog('Script loaded successfully');
        addLog('testInput element:', testInput ? 'FOUND' : 'NOT FOUND');
        addLog('executeBtn element:', executeBtn ? 'FOUND' : 'NOT FOUND');
        
        // Button click handler
        if (executeBtn) {
            addLog('Adding button click event listener...');
            
            executeBtn.addEventListener('click', function(event) {
                addLog('Button clicked!', 'success');
                
                const command = testInput.value.trim();
                addLog(`Command: "${command}"`, 'info');
                
                if (command) {
                    addLog(`Executing command: ${command}`, 'success');
                    
                    // Simulate command processing
                    if (command.toLowerCase() === 'test') {
                        addLog('✓ Test command executed successfully!', 'success');
                    } else if (command.toLowerCase() === 'clear') {
                        logDiv.innerHTML = '';
                        addLog('Terminal cleared', 'info');
                    } else if (command.toLowerCase() === 'echo') {
                        addLog('Echo functionality working', 'info');
                    } else {
                        addLog(`Unknown command: ${command}`, 'warning');
                    }
                    
                    testInput.value = '';
                    addLog('Input cleared', 'info');
                } else {
                    addLog('No command entered', 'warning');
                }
                
                addLog('Command execution complete', 'info');
            });
            
            addLog('Button click listener added successfully');
        } else {
            addLog('ERROR: Could not find execute button!', 'error');
        }
        
        // Also try keyboard Enter as a fallback
        if (testInput) {
            addLog('Adding Enter key listener to input...');
            
            testInput.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    addLog('Enter key pressed - triggering button click', 'info');
                    executeBtn.click();
                }
            });
            
            addLog('Enter key listener added');
        }
        
        testInput.focus();
        addLog('Setup complete. Type and click EXECUTE or press Enter.', 'success');
    </script>
</body>
</html>
