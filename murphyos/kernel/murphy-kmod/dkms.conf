# DKMS configuration for murphy_kmod
#
# Install:
#   sudo cp -r murphyos/kernel/murphy-kmod /usr/src/murphy_kmod-1.0.0
#   sudo dkms add murphy_kmod/1.0.0
#   sudo dkms build murphy_kmod/1.0.0
#   sudo dkms install murphy_kmod/1.0.0

PACKAGE_NAME="murphy_kmod"
PACKAGE_VERSION="1.0.0"

# Source files are in the package root
BUILT_MODULE_NAME[0]="murphy_kmod"
DEST_MODULE_LOCATION[0]="/extra"

AUTOINSTALL="yes"
REMAKE_INITRD="no"

# Clean command
CLEAN="make clean"

# Build command
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
