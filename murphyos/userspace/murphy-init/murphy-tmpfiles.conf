# murphy-tmpfiles.conf — tmpfiles.d(5) configuration for Murphy System
# © 2020 Inoni Limited Liability Company | Creator: Corey Post | License: BSL 1.1
#
# Installed to: /usr/lib/tmpfiles.d/murphy.conf
#
# Creates the transient /run/murphy directory at every boot and ensures
# the persistent /murphy directory tree exists with correct ownership.
#
# Apply manually:  systemd-tmpfiles --create murphy.conf

# Type  Path                      Mode  User    Group   Age  Argument
# --- Transient runtime directory (recreated each boot) ---
d     /run/murphy                 0750  murphy  murphy  -    -

# --- Persistent directory tree ---
d     /murphy                     0755  root    murphy  -    -
d     /murphy/runtime             0755  murphy  murphy  -    -
d     /murphy/engines             0755  murphy  murphy  -    -
d     /murphy/persistence         0750  murphy  murphy  -    -
d     /murphy/logs                0750  murphy  murphy  -    -
d     /murphy/swarm               0750  murphy  murphy  -    -
d     /murphy/telemetry           0750  murphy  murphy  -    -
d     /murphy/knowledge           0750  murphy  murphy  -    -
d     /murphy/sessions            0755  murphy  murphy  -    -
