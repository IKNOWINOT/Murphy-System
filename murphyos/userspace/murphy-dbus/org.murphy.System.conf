<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  org.murphy.System.conf — D-Bus system bus policy for Murphy System
  © 2020 Inoni Limited Liability Company | Creator: Corey Post | License: BSL 1.1

  Installed to: /etc/dbus-1/system.d/org.murphy.System.conf

  Grants the murphy user ownership of all Murphy bus names and allows
  any user to call methods / read properties.  The privileged
  org.murphy.HITL.Approve method is restricted to root; all other
  callers must go through Polkit (see org.murphy.policy).
-->
<busconfig>

  <!-- ── ownership: only the murphy user may claim these names ── -->
  <policy user="murphy">
    <allow own="org.murphy.System"/>
    <allow own="org.murphy.ControlPlane"/>
    <allow own="org.murphy.Confidence"/>
    <allow own="org.murphy.HITL"/>
    <allow own="org.murphy.Swarm"/>
    <allow own="org.murphy.Forge"/>
  </policy>

  <!-- ── default: any user may call methods and read properties ── -->
  <policy context="default">
    <allow send_destination="org.murphy.System"/>
    <allow send_destination="org.murphy.ControlPlane"/>
    <allow send_destination="org.murphy.Confidence"/>
    <allow send_destination="org.murphy.HITL"/>
    <allow send_destination="org.murphy.Swarm"/>
    <allow send_destination="org.murphy.Forge"/>

    <allow receive_sender="org.murphy.System"/>
    <allow receive_sender="org.murphy.ControlPlane"/>
    <allow receive_sender="org.murphy.Confidence"/>
    <allow receive_sender="org.murphy.HITL"/>
    <allow receive_sender="org.murphy.Swarm"/>
    <allow receive_sender="org.murphy.Forge"/>

    <!-- Deny HITL Approve to non-root — require Polkit escalation -->
    <deny send_destination="org.murphy.HITL"
          send_interface="org.murphy.HITL"
          send_member="Approve"
          send_type="method_call"/>
  </policy>

  <!-- ── root may always call HITL.Approve directly ── -->
  <policy user="root">
    <allow send_destination="org.murphy.HITL"
           send_interface="org.murphy.HITL"
           send_member="Approve"
           send_type="method_call"/>
  </policy>

  <!-- ── the murphy service user also needs to send to itself ── -->
  <policy user="murphy">
    <allow send_destination="org.murphy.HITL"
           send_interface="org.murphy.HITL"
           send_member="Approve"
           send_type="method_call"/>
  </policy>

</busconfig>
