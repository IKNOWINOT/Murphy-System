# URL of the Murphy runtime API
murphy_url=http://localhost:8000

# Safety level: standard | paranoid
#   standard — session tracking only; authentication always passes through
#   paranoid — low-confidence actions (e.g. sudo) require HITL approval
safety_level=standard

# HTTP request timeout in seconds
timeout=5
