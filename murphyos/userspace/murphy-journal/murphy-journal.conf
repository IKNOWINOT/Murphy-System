# journald namespace configuration for MurphyOS
# Install: cp murphy-journal.conf /etc/systemd/journald@murphy.conf.d/murphy.conf
#          systemctl restart systemd-journald@murphy

[Journal]
Storage=persistent
Compress=yes
MaxRetentionSec=90day
MaxFileSec=1day
RateLimitIntervalSec=5s
RateLimitBurst=1000
