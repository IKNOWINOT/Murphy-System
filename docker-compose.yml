# Murphy System 1.0 - Docker Compose (local development)
#
# Usage:
#   cp .env.example .env   # edit with your keys
#   docker compose up -d
#
# ⚠️  PRODUCTION SECURITY NOTES:
#   - POSTGRES_PASSWORD must be set in .env (no default — compose will fail without it)
#   - GRAFANA_ADMIN_USER / GRAFANA_ADMIN_PASSWORD must be set in .env
#   - Set REDIS_PASSWORD in .env for authenticated Redis access
#   - Do NOT expose ports 5432, 6379, 9090 to the public internet
#   - Use a reverse proxy (nginx/Traefik) with TLS in front of port 8000
#   - See DEPLOYMENT_GUIDE.md for the full production hardening checklist
#
# Copyright © 2020 Inoni Limited Liability Company
# License: BSL-1.1

services:
  # ── Murphy API (main application) ──────────────────────────────────────
  murphy-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: murphy-api
    restart: unless-stopped
    ports:
      - "${MURPHY_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      MURPHY_ENV: ${MURPHY_ENV:-development}
      MURPHY_PORT: "8000"
      MURPHY_DB_MODE: live
      DATABASE_URL: postgresql://${POSTGRES_USER:-murphy}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-murphy}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - murphy-data:/app/data
      - murphy-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: murphy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-murphy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-murphy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-murphy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: murphy-redis
    restart: unless-stopped
    command: >
      sh -c '
      if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$$REDIS_PASSWORD"
      else
        redis-server
      fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus (metrics) ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: murphy-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"

  # ── Grafana (dashboards) ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: murphy-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER must be set in .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  # ── Mail Server (docker-mailserver) ──────────────────────────────────
  murphy-mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:14
    container_name: murphy-mailserver
    hostname: ${MURPHY_MAIL_HOSTNAME:-mail.murphy.systems}
    domainname: ${MURPHY_MAIL_DOMAIN:-murphy.systems}
    restart: unless-stopped
    ports:
      - "25:25"     # SMTP
      - "143:143"   # IMAP
      - "465:465"   # SMTPS
      - "587:587"   # Submission
      - "993:993"   # IMAPS
    environment:
      OVERRIDE_HOSTNAME: ${MURPHY_MAIL_HOSTNAME:-mail.murphy.systems}
      DOMAINNAME: ${MURPHY_MAIL_DOMAIN:-murphy.systems}
      ENABLE_SPAMASSASSIN: "1"
      SPAMASSASSIN_SPAM_TO_JUNK: "1"
      ENABLE_CLAMAV: "1"
      ENABLE_FAIL2BAN: "1"
      ENABLE_POSTGREY: "0"
      ENABLE_SASLAUTHD: "0"
      ONE_DIR: "1"
      DMS_DEBUG: "0"
      SSL_TYPE: "self-signed"
      PERMIT_DOCKER: "host"
      POSTMASTER_ADDRESS: postmaster@${MURPHY_MAIL_DOMAIN:-murphy.systems}
      POSTFIX_INET_PROTOCOLS: "ipv4"
      ENABLE_IMAP: "1"
      ENABLE_POP3: "0"
      DOVECOT_INET_PROTOCOLS: "ipv4"
      DOVECOT_MAILBOX_FORMAT: "maildir"
      QUOTA_STORAGE_SIZE: "5G"
      ENABLE_MANAGESIEVE: "1"
    volumes:
      - mailserver-data:/var/mail
      - mailserver-state:/var/mail-state
      - mailserver-logs:/var/log/mail
      - ./config/mail:/tmp/docker-mailserver:ro
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "ss", "-lntp", "|", "grep", ":25"]
      interval: 60s
      timeout: 10s
      start_period: 120s
      retries: 3

  # ── Roundcube Webmail ─────────────────────────────────────────────────
  murphy-webmail:
    image: roundcube/roundcubemail:1.6.13-apache
    container_name: murphy-webmail
    restart: unless-stopped
    ports:
      - "${MURPHY_WEBMAIL_PORT:-8443}:80"
    environment:
      ROUNDCUBEMAIL_DEFAULT_HOST: murphy-mailserver
      ROUNDCUBEMAIL_DEFAULT_PORT: "143"
      ROUNDCUBEMAIL_SMTP_SERVER: murphy-mailserver
      ROUNDCUBEMAIL_SMTP_PORT: "587"
      ROUNDCUBEMAIL_SKIN: elastic
      ROUNDCUBEMAIL_DB_TYPE: sqlite
      ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE: "50M"
    volumes:
      - roundcube-data:/var/roundcube/db
      - ./config/roundcube/config.inc.php:/var/roundcube/config/config.inc.php:ro
    depends_on:
      - murphy-mailserver

volumes:
  murphy-data:
  murphy-logs:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  mailserver-data:
  mailserver-state:
  mailserver-logs:
  roundcube-data:
