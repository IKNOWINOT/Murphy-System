# Murphy System 1.0 - Docker Compose (local development)
#
# Usage:
#   cp .env.example .env   # edit with your keys
#   docker compose up -d
#
# ⚠️  PRODUCTION SECURITY NOTES:
#   - POSTGRES_PASSWORD must be set in .env (no default — compose will fail without it)
#   - GRAFANA_ADMIN_USER / GRAFANA_ADMIN_PASSWORD must be set in .env
#   - Set REDIS_PASSWORD in .env for authenticated Redis access
#   - Do NOT expose ports 5432, 6379, 9090 to the public internet
#   - Use a reverse proxy (nginx/Traefik) with TLS in front of port 8000
#   - See DEPLOYMENT_GUIDE.md for the full production hardening checklist
#
# Copyright © 2020 Inoni Limited Liability Company
# License: BSL-1.1

services:
  # ── Murphy API (main application) ──────────────────────────────────────
  murphy-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: murphy-api
    restart: unless-stopped
    ports:
      - "${MURPHY_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      MURPHY_ENV: ${MURPHY_ENV:?MURPHY_ENV must be set in .env}  # SEC-COMPOSE-001
      MURPHY_PORT: "8000"
      MURPHY_DB_MODE: live
      MURPHY_LLM_PROVIDER: ${MURPHY_LLM_PROVIDER:-local}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-murphy}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-murphy}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/0}  # SEC-DOCKER-002
    volumes:
      - murphy-data:/app/data
      - murphy-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: murphy-postgres
    restart: unless-stopped
    # SEC-DOCKER-005: No privilege escalation.
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-murphy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-murphy}
    # SEC-DOCKER-001: Expose only to Docker network, not host.
    # Uncomment 'ports' below for local debugging if needed.
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-murphy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: murphy-redis
    restart: unless-stopped
    # SEC-DOCKER-004: Read-only root filesystem.
    read_only: true
    # SEC-DOCKER-005: No privilege escalation.
    security_opt:
      - no-new-privileges:true
    # SEC-DOCKER-002: Redis always requires a password.
    command: >
      sh -c 'redis-server --requirepass "$$REDIS_PASSWORD"'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    # SEC-DOCKER-001: Expose only to Docker network.
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus (metrics) ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: murphy-prometheus
    restart: unless-stopped
    # SEC-DOCKER-004: Read-only root filesystem.
    read_only: true
    # SEC-DOCKER-005: No privilege escalation.
    security_opt:
      - no-new-privileges:true
    # SEC-DOCKER-001: Expose only to Docker network.
    # ports:
    #   - "${PROMETHEUS_PORT:-9090}:9090"
    expose:
      - "9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      # SEC-DOCKER-003: Lifecycle API disabled — prevents remote shutdown.
      - "--web.enable-lifecycle=false"

  # ── Grafana (dashboards) ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: murphy-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER must be set in .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  murphy-data:
  murphy-logs:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

  # ── Integration Testing: Protocol Simulators ──────────────────────────
