<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Murphy System</title>
  <link rel="icon" href="static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="static/murphy-design-system.css">
  <style>
    :root {
      --bg-base: #0C1017; --bg-surface: #131A24; --bg-elevated: #1A2332;
      --bg-input: #0F1620; --border-subtle: #1E2A3A; --border-default: #2A3A4E;
      --border-focus: #00D4AA; --text-primary: #E6ECF2; --text-secondary: #8899AA;
      --text-muted: #566778; --teal: #00D4AA; --teal-glow: rgba(0,212,170,0.12);
      --success: #22C55E; --warning: #FFA63E; --danger: #EF4444; --info: #3B9EFF;
      --font-ui: Inter, system-ui, -apple-system, sans-serif;
      --font-code: 'JetBrains Mono', monospace;
      --critical: #FF6B35;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Topbar ──────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(12,16,23,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-default);
      padding: 0 2rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--text-primary); font-weight: 700; font-size: 1rem;
    }
    .topbar-brand svg { flex-shrink: 0; }
    .topbar-title {
      font-size: 0.85rem; color: var(--text-secondary); font-weight: 500;
      padding-left: 12px; border-left: 1px solid var(--border-subtle);
    }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .topbar-status {
      font-size: 0.75rem; color: var(--text-muted);
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .app-layout {
      display: flex; height: calc(100vh - 56px);
    }
    .sidebar-slot { flex-shrink: 0; }

    /* ── Portfolio sidebar ────────────────────────────────────── */
    .portfolio-sidebar {
      width: 280px; background: var(--bg-surface);
      border-right: 1px solid var(--border-subtle);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-section {
      border-bottom: 1px solid var(--border-subtle);
    }
    .sidebar-section-header {
      padding: 14px 16px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-section-header h2 {
      font-size: 0.78rem; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .sidebar-section-body {
      padding: 0 16px 14px;
    }
    .sidebar-list {
      flex: 1; overflow-y: auto; padding: 0;
    }
    .sidebar-list-item {
      padding: 8px 12px; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.15s;
      margin-bottom: 2px; font-size: 0.82rem;
    }
    .sidebar-list-item:hover { background: var(--bg-elevated); }
    .sidebar-list-item.active { background: var(--teal-glow); border: 1px solid rgba(0,212,170,0.25); }
    .sidebar-list-item .item-label {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px;
      color: var(--text-primary); font-weight: 500;
    }
    .sidebar-list-item .item-meta {
      font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0;
    }
    .sidebar-empty {
      padding: 12px 0; color: var(--text-muted); font-size: 0.78rem; text-align: center;
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 6px;
      font-family: var(--font-ui); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: var(--teal); color: #0C1017; border-color: var(--teal);
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-ghost {
      background: transparent; color: var(--text-secondary); border-color: var(--border-default);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--bg-elevated); color: var(--text-primary); }
    .btn-danger {
      background: transparent; color: var(--danger); border-color: var(--danger);
    }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.1); }
    .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
    .btn-icon {
      padding: 6px; background: transparent; color: var(--text-muted);
      border: none; border-radius: 4px; cursor: pointer;
    }
    .btn-icon:hover { color: var(--text-primary); background: var(--bg-elevated); }

    /* ── Main area ───────────────────────────────────────────── */
    .main-area {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .gantt-toolbar {
      padding: 12px 24px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: var(--bg-surface);
    }
    .gantt-toolbar-left { display: flex; align-items: center; gap: 12px; }
    .gantt-toolbar-left h1 { font-size: 1.1rem; font-weight: 700; }
    .gantt-toolbar-right { display: flex; align-items: center; gap: 8px; }

    /* ── Gantt Container ─────────────────────────────────────── */
    .gantt-wrapper {
      flex: 1; overflow: auto; position: relative;
    }
    .gantt-chart {
      display: flex; min-width: 100%; min-height: 100%;
    }
    .gantt-labels {
      min-width: 220px; width: 220px; flex-shrink: 0;
      background: var(--bg-surface); border-right: 1px solid var(--border-subtle);
      position: sticky; left: 0; z-index: 10;
    }
    .gantt-labels-header {
      height: 48px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; padding: 0 16px;
      font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      background: var(--bg-surface);
    }
    .gantt-label-row {
      height: 40px; display: flex; align-items: center; padding: 0 16px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.82rem; cursor: pointer; transition: background 0.15s;
      gap: 8px;
    }
    .gantt-label-row:hover { background: var(--bg-elevated); }
    .gantt-label-row.critical { color: var(--critical); font-weight: 600; }
    .gantt-label-name {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .gantt-label-progress {
      font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0; min-width: 32px; text-align: right;
    }
    .gantt-label-actions {
      display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0;
    }
    .gantt-label-row:hover .gantt-label-actions { opacity: 1; }

    /* ── Timeline area ───────────────────────────────────────── */
    .gantt-timeline {
      flex: 1; position: relative; min-width: 600px;
    }
    .gantt-timeline-header {
      height: 48px; border-bottom: 1px solid var(--border-subtle);
      display: flex; position: sticky; top: 0; z-index: 5;
      background: var(--bg-base);
    }
    .gantt-date-cell {
      flex: 1; min-width: 40px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem; color: var(--text-muted); font-weight: 500;
      border-right: 1px solid var(--border-subtle);
      user-select: none;
    }
    .gantt-date-cell.today {
      color: var(--teal); font-weight: 700;
      background: rgba(0,212,170,0.06);
    }
    .gantt-timeline-body {
      position: relative;
    }
    .gantt-row {
      height: 40px; display: flex; position: relative;
      border-bottom: 1px solid var(--border-subtle);
    }
    .gantt-row:hover { background: rgba(26,35,50,0.5); }
    .gantt-grid-line {
      position: absolute; top: 0; bottom: 0; width: 1px;
      background: var(--border-subtle); pointer-events: none;
    }
    .gantt-today-line {
      position: absolute; top: 0; bottom: 0; width: 2px;
      background: var(--teal); opacity: 0.5; z-index: 3; pointer-events: none;
    }

    /* ── Gantt bars ──────────────────────────────────────────── */
    .gantt-bar {
      position: absolute; height: 24px; top: 8px;
      border-radius: 4px; cursor: pointer;
      display: flex; align-items: center; padding: 0 8px;
      font-size: 0.7rem; font-weight: 500; color: #fff;
      transition: opacity 0.15s; z-index: 2;
      overflow: hidden; white-space: nowrap;
      min-width: 4px;
    }
    .gantt-bar:hover { opacity: 0.85; }
    .gantt-bar.critical {
      box-shadow: 0 0 0 2px var(--critical), 0 0 8px rgba(255,107,53,0.3);
    }
    .gantt-bar-progress {
      position: absolute; left: 0; top: 0; bottom: 0;
      border-radius: 4px; opacity: 0.35;
      background: rgba(255,255,255,0.3);
      pointer-events: none;
    }
    .gantt-bar-label {
      position: relative; z-index: 1;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    /* ── Dependencies (SVG arrows) ───────────────────────────── */
    .gantt-dependencies {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }
    .gantt-dep-line {
      fill: none; stroke: var(--text-muted); stroke-width: 1.5;
      marker-end: url(#arrowhead);
    }
    .gantt-dep-line.critical {
      stroke: var(--critical); stroke-width: 2;
    }

    /* ── Milestones ──────────────────────────────────────────── */
    .gantt-milestone {
      position: absolute; width: 16px; height: 16px; top: 12px;
      transform: rotate(45deg); cursor: pointer;
      background: var(--warning); border: 2px solid var(--bg-base);
      z-index: 4; transition: opacity 0.15s;
    }
    .gantt-milestone:hover { opacity: 0.8; }
    .gantt-milestone-row {
      height: 40px; position: relative;
      border-bottom: 1px solid var(--border-subtle);
    }
    .gantt-milestone-label {
      height: 40px; display: flex; align-items: center; padding: 0 16px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.82rem; gap: 8px; color: var(--warning);
    }
    .gantt-milestone-label .diamond {
      display: inline-block; width: 10px; height: 10px;
      transform: rotate(45deg); background: var(--warning); flex-shrink: 0;
    }
    .gantt-milestone-actions {
      display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; margin-left: auto; flex-shrink: 0;
    }
    .gantt-milestone-label:hover .gantt-milestone-actions { opacity: 1; }

    /* ── Modal ───────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 500; display: none;
    }
    .modal-backdrop.open { display: flex; align-items: center; justify-content: center; }
    .modal {
      background: var(--bg-surface); border: 1px solid var(--border-default);
      border-radius: 12px; width: 480px; max-width: 90vw;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .modal-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 0.95rem; font-weight: 700; }
    .modal-body { padding: 20px; }
    .modal-footer {
      padding: 12px 20px; border-top: 1px solid var(--border-subtle);
      display: flex; justify-content: flex-end; gap: 8px;
    }

    /* ── Form elements ───────────────────────────────────────── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border-subtle); padding: 9px 12px;
      border-radius: 6px; font-family: var(--font-ui); font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    .form-input:focus { outline: none; border-color: var(--border-focus); }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    /* ── Error banner ────────────────────────────────────────── */
    .error-banner {
      padding: 10px 24px; background: rgba(239,68,68,0.1);
      border-bottom: 1px solid var(--danger); color: var(--danger);
      font-size: 0.82rem; display: none; align-items: center; gap: 8px;
    }
    .error-banner.visible { display: flex; }
    .error-banner button {
      margin-left: auto; background: none; border: none;
      color: var(--danger); cursor: pointer; font-size: 1rem; padding: 0 4px;
    }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 64px 24px; text-align: center; color: var(--text-muted);
    }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-state h3 { font-size: 1rem; color: var(--text-secondary); margin-bottom: 6px; }
    .empty-state p { font-size: 0.82rem; margin-bottom: 16px; max-width: 320px; }

    /* ── Spinner ──────────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border-subtle); border-top-color: var(--teal);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay {
      display: flex; align-items: center; justify-content: center;
      padding: 48px; color: var(--text-muted); gap: 10px; font-size: 0.82rem;
    }

    /* ── Confirm dialog ──────────────────────────────────────── */
    .confirm-text { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; }

    /* ── Group color palette ─────────────────────────────────── */
    .group-colors {
      --g1: #579bfc; --g2: #FF5AC4; --g3: #FF642E; --g4: #FDAB3D;
      --g5: #00C875; --g6: #9B59B6; --g7: #CAB641; --g8: #66CCFF;
    }

    /* ── Scrollbar ────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-default); }
  </style>
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────────────── -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="/" class="topbar-brand">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="var(--teal)"/>
          <text x="16" y="22" text-anchor="middle" fill="#0C1017" font-size="18" font-weight="700">M</text>
        </svg>
        <span>Murphy System</span>
      </a>
      <span class="topbar-title">Portfolio</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-status" id="refresh-status"></span>
    </div>
  </div>

  <!-- ── Error banner ────────────────────────────────────────── -->
  <div class="error-banner" id="error-banner" role="alert">
    <span id="error-message"></span>
    <button onclick="dismissError()" title="Dismiss" aria-label="Dismiss error">&times;</button>
  </div>

  <!-- ── App layout ──────────────────────────────────────────── -->
  <div class="app-layout">
    <murphy-sidebar active="PORTFOLIO"></murphy-sidebar>

    <!-- Portfolio sidebar -->
    <div class="portfolio-sidebar">
      <!-- Board filter -->
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <h2>Board Filter</h2>
        </div>
        <div class="sidebar-section-body">
          <input class="form-input" id="board-id-input" placeholder="Enter Board ID…" aria-label="Board ID filter">
          <button class="btn btn-primary btn-sm" id="btn-load-board" style="margin-top:8px;width:100%;">Load Gantt</button>
        </div>
      </div>

      <!-- Baselines -->
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <h2>Baselines</h2>
          <button class="btn btn-primary btn-sm" id="btn-new-baseline" title="Create baseline" aria-label="Create baseline">+ New</button>
        </div>
        <div id="baselines-loading" class="loading-overlay" style="display:none;padding:16px;">
          <span class="spinner"></span> Loading…
        </div>
        <div class="sidebar-list" id="baselines-list" role="list" aria-label="Baselines list"></div>
      </div>

      <!-- Milestones -->
      <div class="sidebar-section" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div class="sidebar-section-header">
          <h2>Milestones</h2>
          <button class="btn btn-primary btn-sm" id="btn-new-milestone" title="Add milestone" aria-label="Add milestone">+ New</button>
        </div>
        <div id="milestones-loading" class="loading-overlay" style="display:none;padding:16px;">
          <span class="spinner"></span> Loading…
        </div>
        <div class="sidebar-list" id="milestones-list" role="list" aria-label="Milestones list" style="flex:1;overflow-y:auto;padding:0 8px 8px;"></div>
      </div>
    </div>

    <!-- Main area -->
    <div class="main-area">
      <!-- No board state -->
      <div id="no-board-state" class="empty-state" style="flex:1;">
        <div class="empty-state-icon" aria-hidden="true">📊</div>
        <h3>Portfolio Gantt View</h3>
        <p>Enter a Board ID in the sidebar and click "Load Gantt" to visualize your project timeline.</p>
      </div>

      <!-- Gantt detail -->
      <div id="gantt-detail" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
        <!-- Toolbar -->
        <div class="gantt-toolbar">
          <div class="gantt-toolbar-left">
            <h1 id="gantt-title">Gantt Chart</h1>
            <span style="font-size:0.8rem;color:var(--text-muted);" id="gantt-bar-count"></span>
          </div>
          <div class="gantt-toolbar-right">
            <button class="btn btn-ghost btn-sm" id="btn-add-bar" title="Add bar">+ Bar</button>
            <button class="btn btn-ghost btn-sm" id="btn-add-dep" title="Add dependency">🔗 Dependency</button>
            <button class="btn btn-ghost btn-sm" id="btn-critical-path" title="Show critical path">⚡ Critical Path</button>
          </div>
        </div>

        <!-- Gantt chart -->
        <div class="gantt-wrapper" id="gantt-wrapper">
          <div id="gantt-loading" class="loading-overlay">
            <span class="spinner"></span> Loading Gantt data…
          </div>
          <div class="gantt-chart" id="gantt-chart" style="display:none;">
            <div class="gantt-labels" id="gantt-labels">
              <div class="gantt-labels-header">Task</div>
              <div id="gantt-label-rows"></div>
            </div>
            <div class="gantt-timeline" id="gantt-timeline">
              <div class="gantt-timeline-header" id="gantt-header-dates"></div>
              <div class="gantt-timeline-body" id="gantt-body">
                <svg class="gantt-dependencies" id="gantt-deps-svg">
                  <defs>
                    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                      <polygon points="0 0, 8 3, 0 6" fill="var(--text-muted)"/>
                    </marker>
                    <marker id="arrowhead-critical" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                      <polygon points="0 0, 8 3, 0 6" fill="var(--critical)"/>
                    </marker>
                  </defs>
                </svg>
              </div>
            </div>
          </div>
          <div id="gantt-empty" class="empty-state" style="display:none;">
            <div class="empty-state-icon" aria-hidden="true">📅</div>
            <h3>No tasks yet</h3>
            <p>Add a bar to start building your Gantt chart.</p>
            <button class="btn btn-primary" id="btn-add-bar-empty">+ Add Bar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal backdrop ──────────────────────────────────────── -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="btn-icon" onclick="closeModal()" aria-label="Close modal">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="static/murphy-components.js"></script>
  <script>
  (function () {
    'use strict';

    /* ── API helper ────────────────────────────────────────────── */
    var API = function (path, opts) {
      opts = opts || {};
      return fetch(path, {
        method: opts.method || 'GET',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: opts.body ? (typeof opts.body === 'string' ? opts.body : JSON.stringify(opts.body)) : undefined,
      }).then(function (r) {
        if (!r.ok) {
          return r.json().then(function (d) {
            throw new Error(d.detail || d.error || 'Request failed (' + r.status + ')');
          }).catch(function (e) {
            if (e.message) throw e;
            throw new Error('Request failed (' + r.status + ')');
          });
        }
        return r.json();
      }).catch(function (e) {
        showError(e.message);
        throw e;
      });
    };

    /* ── State ─────────────────────────────────────────────────── */
    var activeBoardId = null;
    var bars = [];
    var milestones = [];
    var baselines = [];
    var criticalIds = {};
    var showCritical = false;
    var refreshTimer = null;
    var REFRESH_MS = 15000;

    var GROUP_COLORS = ['#579bfc','#FF5AC4','#FF642E','#FDAB3D','#00C875','#9B59B6','#CAB641','#66CCFF'];

    /* ── DOM refs ──────────────────────────────────────────────── */
    var $boardIdInput      = document.getElementById('board-id-input');
    var $noBoardState      = document.getElementById('no-board-state');
    var $ganttDetail       = document.getElementById('gantt-detail');
    var $ganttLoading      = document.getElementById('gantt-loading');
    var $ganttChart        = document.getElementById('gantt-chart');
    var $ganttEmpty        = document.getElementById('gantt-empty');
    var $ganttTitle        = document.getElementById('gantt-title');
    var $ganttBarCount     = document.getElementById('gantt-bar-count');
    var $ganttLabelRows    = document.getElementById('gantt-label-rows');
    var $ganttHeaderDates  = document.getElementById('gantt-header-dates');
    var $ganttBody         = document.getElementById('gantt-body');
    var $ganttDepsSvg      = document.getElementById('gantt-deps-svg');
    var $ganttTimeline     = document.getElementById('gantt-timeline');
    var $baselinesLoading  = document.getElementById('baselines-loading');
    var $baselinesList     = document.getElementById('baselines-list');
    var $milestonesLoading = document.getElementById('milestones-loading');
    var $milestonesList    = document.getElementById('milestones-list');
    var $errorBanner       = document.getElementById('error-banner');
    var $errorMessage      = document.getElementById('error-message');
    var $refreshStatus     = document.getElementById('refresh-status');
    var $modalBackdrop     = document.getElementById('modal-backdrop');
    var $modalTitle        = document.getElementById('modal-title');
    var $modalBody         = document.getElementById('modal-body');
    var $modalFooter       = document.getElementById('modal-footer');

    /* ── Utility ───────────────────────────────────────────────── */
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function escAttr(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatShortDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function daysBetween(a, b) {
      var msDay = 86400000;
      return Math.round((new Date(b).getTime() - new Date(a).getTime()) / msDay);
    }

    function addDays(d, n) {
      var r = new Date(d);
      r.setDate(r.getDate() + n);
      return r;
    }

    function toISO(d) {
      return d.toISOString().split('T')[0];
    }

    function groupColorFor(groupId) {
      if (!groupId) return GROUP_COLORS[0];
      var hash = 0;
      for (var i = 0; i < groupId.length; i++) {
        hash = ((hash << 5) - hash) + groupId.charCodeAt(i);
        hash |= 0;
      }
      return GROUP_COLORS[Math.abs(hash) % GROUP_COLORS.length];
    }

    /* ── Error banner ────────────────────────────────────────── */
    function showError(msg) {
      $errorMessage.textContent = msg;
      $errorBanner.classList.add('visible');
    }
    window.dismissError = function () {
      $errorBanner.classList.remove('visible');
    };

    /* ── Refresh status ──────────────────────────────────────── */
    function updateRefreshStatus(loading) {
      $refreshStatus.textContent = loading
        ? 'Refreshing…'
        : 'Updated ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    /* ── Modal ───────────────────────────────────────────────── */
    function openModal(title, bodyHtml, footerHtml) {
      $modalTitle.textContent = title;
      $modalBody.innerHTML = bodyHtml;
      $modalFooter.innerHTML = footerHtml;
      $modalBackdrop.classList.add('open');
    }
    window.closeModal = function () {
      $modalBackdrop.classList.remove('open');
    };
    $modalBackdrop.addEventListener('click', function (e) {
      if (e.target === $modalBackdrop) closeModal();
    });

    /* ── Load board ──────────────────────────────────────────── */
    function loadBoard() {
      var bid = $boardIdInput.value.trim();
      if (!bid) return;
      activeBoardId = bid;
      $noBoardState.style.display = 'none';
      $ganttDetail.style.display = 'flex';
      loadAll();
      scheduleRefresh();
    }

    document.getElementById('btn-load-board').addEventListener('click', loadBoard);
    $boardIdInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') loadBoard();
    });

    /* ── Load all data ───────────────────────────────────────── */
    function loadAll(silent) {
      if (!activeBoardId) return;
      if (!silent) {
        $ganttLoading.style.display = 'flex';
        $ganttChart.style.display = 'none';
        $ganttEmpty.style.display = 'none';
      }
      updateRefreshStatus(true);

      var q = '?board_id=' + encodeURIComponent(activeBoardId);
      Promise.all([
        API('/api/portfolio/bars' + q),
        API('/api/portfolio/milestones' + q),
        API('/api/portfolio/baselines' + q)
      ]).then(function (results) {
        bars = Array.isArray(results[0]) ? results[0] : [];
        milestones = Array.isArray(results[1]) ? results[1] : [];
        baselines = Array.isArray(results[2]) ? results[2] : [];

        if (showCritical) {
          return API('/api/portfolio/critical-path' + q).then(function (cp) {
            criticalIds = {};
            var items = Array.isArray(cp) ? cp : (cp && cp.items ? cp.items : []);
            for (var i = 0; i < items.length; i++) {
              criticalIds[items[i].item_id || items[i]] = true;
            }
          }).catch(function () { criticalIds = {}; });
        } else {
          criticalIds = {};
        }
      }).then(function () {
        renderGantt();
        renderBaselines();
        renderMilestonesSidebar();
        $ganttLoading.style.display = 'none';
        updateRefreshStatus(false);
      }).catch(function () {
        $ganttLoading.style.display = 'none';
        updateRefreshStatus(false);
      });
    }

    /* ── Compute timeline range ──────────────────────────────── */
    function computeRange() {
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var minDate = new Date(today);
      var maxDate = new Date(today);

      for (var i = 0; i < bars.length; i++) {
        var s = new Date(bars[i].start_date);
        var e = new Date(bars[i].end_date);
        if (s < minDate) minDate = s;
        if (e > maxDate) maxDate = e;
      }
      for (var j = 0; j < milestones.length; j++) {
        var md = new Date(milestones[j].target_date);
        if (md < minDate) minDate = md;
        if (md > maxDate) maxDate = md;
      }

      minDate = addDays(minDate, -3);
      maxDate = addDays(maxDate, 5);

      var totalDays = daysBetween(toISO(minDate), toISO(maxDate));
      if (totalDays < 14) {
        maxDate = addDays(minDate, 14);
        totalDays = 14;
      }

      return { min: minDate, max: maxDate, days: totalDays };
    }

    /* ── Render Gantt ────────────────────────────────────────── */
    function renderGantt() {
      if (bars.length === 0 && milestones.length === 0) {
        $ganttChart.style.display = 'none';
        $ganttEmpty.style.display = 'flex';
        $ganttBarCount.textContent = '';
        return;
      }
      $ganttChart.style.display = 'flex';
      $ganttEmpty.style.display = 'none';
      $ganttTitle.textContent = 'Gantt Chart';
      $ganttBarCount.textContent = bars.length + ' bar' + (bars.length !== 1 ? 's' : '') +
        (milestones.length > 0 ? ', ' + milestones.length + ' milestone' + (milestones.length !== 1 ? 's' : '') : '');

      var range = computeRange();
      var dayWidth = 48;
      var totalWidth = range.days * dayWidth;
      var today = new Date();
      today.setHours(0, 0, 0, 0);

      // Header dates
      var headerHtml = '';
      for (var d = 0; d < range.days; d++) {
        var dt = addDays(range.min, d);
        var isToday = toISO(dt) === toISO(today);
        headerHtml += '<div class="gantt-date-cell' + (isToday ? ' today' : '') + '" style="min-width:' + dayWidth + 'px;max-width:' + dayWidth + 'px;">';
        if (d % 3 === 0 || isToday) {
          headerHtml += formatShortDate(toISO(dt));
        }
        headerHtml += '</div>';
      }
      $ganttHeaderDates.innerHTML = headerHtml;
      $ganttHeaderDates.style.width = totalWidth + 'px';

      // Label rows
      var labelsHtml = '';
      for (var b = 0; b < bars.length; b++) {
        var bar = bars[b];
        var isCrit = criticalIds[bar.item_id];
        labelsHtml += '<div class="gantt-label-row' + (isCrit ? ' critical' : '') + '" data-item-id="' + escAttr(bar.item_id) + '">';
        labelsHtml += '<span class="gantt-label-name" title="' + escAttr(bar.item_name) + '">' + esc(bar.item_name) + '</span>';
        labelsHtml += '<span class="gantt-label-progress">' + (bar.progress || 0) + '%</span>';
        labelsHtml += '<div class="gantt-label-actions">';
        labelsHtml += '<button class="btn-icon btn-edit-bar" data-item-id="' + escAttr(bar.item_id) + '" title="Edit bar">✏️</button>';
        labelsHtml += '<button class="btn-icon btn-delete-bar" data-item-id="' + escAttr(bar.item_id) + '" title="Delete bar">🗑</button>';
        labelsHtml += '</div>';
        labelsHtml += '</div>';
      }
      // Milestone label rows
      for (var m = 0; m < milestones.length; m++) {
        var ms = milestones[m];
        labelsHtml += '<div class="gantt-milestone-label" data-milestone-id="' + escAttr(ms.id || ms.milestone_id) + '">';
        labelsHtml += '<span class="diamond"></span>';
        labelsHtml += '<span class="gantt-label-name" title="' + escAttr(ms.name) + '">' + esc(ms.name) + '</span>';
        labelsHtml += '<div class="gantt-milestone-actions">';
        labelsHtml += '<button class="btn-icon btn-edit-milestone" data-milestone-id="' + escAttr(ms.id || ms.milestone_id) + '" title="Edit milestone">✏️</button>';
        labelsHtml += '</div>';
        labelsHtml += '</div>';
      }
      $ganttLabelRows.innerHTML = labelsHtml;

      // Timeline body
      var bodyHtml = '';
      // Grid lines
      for (var g = 0; g < range.days; g++) {
        bodyHtml += '<div class="gantt-grid-line" style="left:' + (g * dayWidth) + 'px;"></div>';
      }
      // Today line
      var todayOffset = daysBetween(toISO(range.min), toISO(today));
      if (todayOffset >= 0 && todayOffset <= range.days) {
        bodyHtml += '<div class="gantt-today-line" style="left:' + (todayOffset * dayWidth) + 'px;"></div>';
      }

      // Bar rows
      for (var b2 = 0; b2 < bars.length; b2++) {
        var bar2 = bars[b2];
        var startOff = daysBetween(toISO(range.min), bar2.start_date);
        var duration = daysBetween(bar2.start_date, bar2.end_date);
        if (duration < 1) duration = 1;
        var left = startOff * dayWidth;
        var width = duration * dayWidth;
        var color = groupColorFor(bar2.group_id);
        var isCrit2 = criticalIds[bar2.item_id];
        var progress = bar2.progress || 0;

        bodyHtml += '<div class="gantt-row" data-item-id="' + escAttr(bar2.item_id) + '">';
        bodyHtml += '<div class="gantt-bar' + (isCrit2 ? ' critical' : '') + '" ' +
          'style="left:' + left + 'px;width:' + width + 'px;background:' + color + ';" ' +
          'data-item-id="' + escAttr(bar2.item_id) + '" title="' + escAttr(bar2.item_name) + ' (' + progress + '%)">';
        bodyHtml += '<div class="gantt-bar-progress" style="width:' + progress + '%;"></div>';
        bodyHtml += '<span class="gantt-bar-label">' + esc(bar2.item_name) + '</span>';
        bodyHtml += '</div></div>';
      }

      // Milestone rows
      for (var m2 = 0; m2 < milestones.length; m2++) {
        var ms2 = milestones[m2];
        var msOff = daysBetween(toISO(range.min), ms2.target_date);
        var msLeft = msOff * dayWidth - 8;
        bodyHtml += '<div class="gantt-milestone-row">';
        bodyHtml += '<div class="gantt-milestone" style="left:' + msLeft + 'px;" ' +
          'title="' + escAttr(ms2.name) + ' — ' + escAttr(formatDate(ms2.target_date)) + '" ' +
          'data-milestone-id="' + escAttr(ms2.id || ms2.milestone_id) + '"></div>';
        bodyHtml += '</div>';
      }

      // Remove old non-SVG content from body, keep SVG
      var existingChildren = $ganttBody.children;
      var toRemove = [];
      for (var c = 0; c < existingChildren.length; c++) {
        if (existingChildren[c] !== $ganttDepsSvg) toRemove.push(existingChildren[c]);
      }
      for (var r = 0; r < toRemove.length; r++) {
        $ganttBody.removeChild(toRemove[r]);
      }
      var frag = document.createElement('div');
      frag.innerHTML = bodyHtml;
      while (frag.firstChild) {
        $ganttBody.appendChild(frag.firstChild);
      }

      $ganttBody.style.width = totalWidth + 'px';
      $ganttTimeline.style.minWidth = totalWidth + 'px';
      var totalRows = bars.length + milestones.length;
      var totalHeight = totalRows * 40;
      $ganttBody.style.minHeight = totalHeight + 'px';
      $ganttDepsSvg.setAttribute('width', totalWidth);
      $ganttDepsSvg.setAttribute('height', totalHeight);

      renderDependencies(range, dayWidth);
    }

    /* ── Render dependencies ─────────────────────────────────── */
    function renderDependencies(range, dayWidth) {
      // Clear existing lines
      var existing = $ganttDepsSvg.querySelectorAll('.gantt-dep-line');
      for (var i = 0; i < existing.length; i++) {
        existing[i].parentNode.removeChild(existing[i]);
      }

      var barIndex = {};
      for (var b = 0; b < bars.length; b++) {
        barIndex[bars[b].item_id] = b;
      }

      // Fetch dependencies for all bars
      var depPromises = [];
      for (var b2 = 0; b2 < bars.length; b2++) {
        depPromises.push(
          API('/api/portfolio/dependencies/' + encodeURIComponent(bars[b2].item_id))
            .catch(function () { return []; })
        );
      }

      Promise.all(depPromises).then(function (results) {
        for (var i = 0; i < results.length; i++) {
          var deps = Array.isArray(results[i]) ? results[i] : [];
          for (var j = 0; j < deps.length; j++) {
            var dep = deps[j];
            var predIdx = barIndex[dep.predecessor_id];
            var succIdx = barIndex[dep.successor_id];
            if (predIdx === undefined || succIdx === undefined) continue;

            var predBar = bars[predIdx];
            var succBar = bars[succIdx];
            var predEnd = daysBetween(toISO(range.min), predBar.end_date) * dayWidth;
            var succStart = daysBetween(toISO(range.min), succBar.start_date) * dayWidth;
            var y1 = predIdx * 40 + 20;
            var y2 = succIdx * 40 + 20;

            var isCritDep = criticalIds[dep.predecessor_id] && criticalIds[dep.successor_id];
            var markerRef = isCritDep ? 'url(#arrowhead-critical)' : 'url(#arrowhead)';

            var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            var midX = predEnd + (succStart - predEnd) / 2;
            var pathD = 'M ' + predEnd + ' ' + y1 +
              ' C ' + midX + ' ' + y1 + ', ' + midX + ' ' + y2 + ', ' + succStart + ' ' + y2;
            path.setAttribute('d', pathD);
            path.setAttribute('class', 'gantt-dep-line' + (isCritDep ? ' critical' : ''));
            path.setAttribute('marker-end', markerRef);
            $ganttDepsSvg.appendChild(path);
          }
        }
      });
    }

    /* ── Render baselines sidebar ────────────────────────────── */
    function renderBaselines() {
      if (baselines.length === 0) {
        $baselinesList.innerHTML = '<div class="sidebar-empty">No baselines created yet.</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < baselines.length; i++) {
        var bl = baselines[i];
        html += '<div class="sidebar-list-item" role="listitem" data-baseline-id="' + escAttr(bl.id || bl.baseline_id) + '" tabindex="0">';
        html += '<span class="item-label">' + esc(bl.name) + '</span>';
        html += '<span class="item-meta">' + formatShortDate(bl.created_at) + '</span>';
        html += '</div>';
      }
      $baselinesList.innerHTML = html;
    }

    /* ── Render milestones sidebar ───────────────────────────── */
    function renderMilestonesSidebar() {
      if (milestones.length === 0) {
        $milestonesList.innerHTML = '<div class="sidebar-empty">No milestones yet.</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < milestones.length; i++) {
        var ms = milestones[i];
        html += '<div class="sidebar-list-item" role="listitem" data-milestone-id="' + escAttr(ms.id || ms.milestone_id) + '" tabindex="0">';
        html += '<span class="item-label" style="color:var(--warning);">◆ ' + esc(ms.name) + '</span>';
        html += '<span class="item-meta">' + formatShortDate(ms.target_date) + '</span>';
        html += '</div>';
      }
      $milestonesList.innerHTML = html;
    }

    /* ── Event delegation: label rows ────────────────────────── */
    $ganttLabelRows.addEventListener('click', function (e) {
      var editBtn = e.target.closest('.btn-edit-bar');
      if (editBtn) {
        var itemId = editBtn.getAttribute('data-item-id');
        showEditBarModal(itemId);
        return;
      }
      var delBtn = e.target.closest('.btn-delete-bar');
      if (delBtn) {
        var delId = delBtn.getAttribute('data-item-id');
        showConfirm('Delete Bar', 'Are you sure you want to remove this bar from the Gantt chart?', function () {
          API('/api/portfolio/bars/' + encodeURIComponent(delId), { method: 'DELETE' }).then(function () {
            closeModal();
            loadAll();
          });
        });
        return;
      }
      var editMs = e.target.closest('.btn-edit-milestone');
      if (editMs) {
        var msId = editMs.getAttribute('data-milestone-id');
        showEditMilestoneModal(msId);
        return;
      }
    });

    /* ── Baseline click ──────────────────────────────────────── */
    $baselinesList.addEventListener('click', function (e) {
      var item = e.target.closest('.sidebar-list-item');
      if (!item) return;
      var blId = item.getAttribute('data-baseline-id');
      if (blId) showBaselineDetail(blId);
    });

    /* ── Add bar modal ───────────────────────────────────────── */
    function showAddBarModal() {
      if (!activeBoardId) return;
      var todayStr = toISO(new Date());
      var nextWeek = toISO(addDays(new Date(), 7));
      openModal('Add Gantt Bar',
        '<div class="form-group">' +
          '<label class="form-label">Item ID</label>' +
          '<input class="form-input" id="modal-bar-item-id" placeholder="unique-item-id" required autofocus>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Item Name</label>' +
          '<input class="form-input" id="modal-bar-name" placeholder="Task name" required>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Start Date</label>' +
            '<input class="form-input" id="modal-bar-start" type="date" value="' + todayStr + '">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">End Date</label>' +
            '<input class="form-input" id="modal-bar-end" type="date" value="' + nextWeek + '">' +
          '</div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Group ID (optional)</label>' +
            '<input class="form-input" id="modal-bar-group" placeholder="group-id">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Progress (%)</label>' +
            '<input class="form-input" id="modal-bar-progress" type="number" min="0" max="100" value="0">' +
          '</div>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Assignee IDs (comma separated)</label>' +
          '<input class="form-input" id="modal-bar-assignees" placeholder="user1, user2">' +
        '</div>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" id="modal-add-bar-btn">Add Bar</button>'
      );
      document.getElementById('modal-add-bar-btn').addEventListener('click', function () {
        var itemId = document.getElementById('modal-bar-item-id').value.trim();
        var name = document.getElementById('modal-bar-name').value.trim();
        var start = document.getElementById('modal-bar-start').value;
        var end = document.getElementById('modal-bar-end').value;
        if (!itemId || !name || !start || !end) { showError('Item ID, name, start date, and end date are required.'); return; }
        var groupId = document.getElementById('modal-bar-group').value.trim();
        var progress = parseInt(document.getElementById('modal-bar-progress').value, 10) || 0;
        var assigneesRaw = document.getElementById('modal-bar-assignees').value.trim();
        var assignees = assigneesRaw ? assigneesRaw.split(',').map(function (s) { return s.trim(); }).filter(Boolean) : [];

        this.disabled = true;
        this.textContent = 'Adding…';
        API('/api/portfolio/bars', {
          method: 'POST',
          body: {
            item_id: itemId,
            item_name: name,
            start_date: start,
            end_date: end,
            board_id: activeBoardId,
            group_id: groupId || undefined,
            progress: progress,
            assignee_ids: assignees
          }
        }).then(function () {
          closeModal();
          loadAll();
        }).catch(function () {
          var btn = document.getElementById('modal-add-bar-btn');
          if (btn) { btn.disabled = false; btn.textContent = 'Add Bar'; }
        });
      });
    }

    document.getElementById('btn-add-bar').addEventListener('click', showAddBarModal);
    document.getElementById('btn-add-bar-empty').addEventListener('click', showAddBarModal);

    /* ── Edit bar modal ──────────────────────────────────────── */
    function showEditBarModal(itemId) {
      var bar = null;
      for (var i = 0; i < bars.length; i++) {
        if (bars[i].item_id === itemId) { bar = bars[i]; break; }
      }
      if (!bar) return;

      openModal('Edit Bar',
        '<div class="form-group">' +
          '<label class="form-label">Item Name</label>' +
          '<input class="form-input" id="modal-edit-bar-name" value="' + escAttr(bar.item_name) + '">' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Start Date</label>' +
            '<input class="form-input" id="modal-edit-bar-start" type="date" value="' + escAttr(bar.start_date) + '">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">End Date</label>' +
            '<input class="form-input" id="modal-edit-bar-end" type="date" value="' + escAttr(bar.end_date) + '">' +
          '</div>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Group ID</label>' +
            '<input class="form-input" id="modal-edit-bar-group" value="' + escAttr(bar.group_id || '') + '">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Progress (%)</label>' +
            '<input class="form-input" id="modal-edit-bar-progress" type="number" min="0" max="100" value="' + (bar.progress || 0) + '">' +
          '</div>' +
        '</div>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" id="modal-save-bar-btn">Save Changes</button>'
      );
      document.getElementById('modal-save-bar-btn').addEventListener('click', function () {
        var name = document.getElementById('modal-edit-bar-name').value.trim();
        var start = document.getElementById('modal-edit-bar-start').value;
        var end = document.getElementById('modal-edit-bar-end').value;
        var groupId = document.getElementById('modal-edit-bar-group').value.trim();
        var progress = parseInt(document.getElementById('modal-edit-bar-progress').value, 10) || 0;
        if (!name) return;
        this.disabled = true;
        this.textContent = 'Saving…';
        API('/api/portfolio/bars/' + encodeURIComponent(itemId), {
          method: 'PATCH',
          body: { item_name: name, start_date: start, end_date: end, group_id: groupId || undefined, progress: progress }
        }).then(function () {
          closeModal();
          loadAll();
        });
      });
    }

    /* ── Add dependency modal ────────────────────────────────── */
    function showAddDependencyModal() {
      if (!activeBoardId) return;
      openModal('Add Dependency',
        '<div class="form-group">' +
          '<label class="form-label">Predecessor Item ID</label>' +
          '<input class="form-input" id="modal-dep-pred" placeholder="predecessor-item-id" required autofocus>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Successor Item ID</label>' +
          '<input class="form-input" id="modal-dep-succ" placeholder="successor-item-id" required>' +
        '</div>' +
        '<div class="form-row">' +
          '<div class="form-group">' +
            '<label class="form-label">Dependency Type</label>' +
            '<select class="form-input" id="modal-dep-type">' +
              '<option value="finish_to_start">Finish to Start</option>' +
              '<option value="start_to_start">Start to Start</option>' +
              '<option value="finish_to_finish">Finish to Finish</option>' +
              '<option value="start_to_finish">Start to Finish</option>' +
            '</select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Lag (days)</label>' +
            '<input class="form-input" id="modal-dep-lag" type="number" value="0">' +
          '</div>' +
        '</div>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" id="modal-add-dep-btn">Add Dependency</button>'
      );
      document.getElementById('modal-add-dep-btn').addEventListener('click', function () {
        var pred = document.getElementById('modal-dep-pred').value.trim();
        var succ = document.getElementById('modal-dep-succ').value.trim();
        var type = document.getElementById('modal-dep-type').value;
        var lag = parseInt(document.getElementById('modal-dep-lag').value, 10) || 0;
        if (!pred || !succ) { showError('Predecessor and successor IDs are required.'); return; }
        this.disabled = true;
        this.textContent = 'Adding…';
        API('/api/portfolio/dependencies', {
          method: 'POST',
          body: { predecessor_id: pred, successor_id: succ, dependency_type: type, lag_days: lag }
        }).then(function () {
          closeModal();
          loadAll();
        }).catch(function () {
          var btn = document.getElementById('modal-add-dep-btn');
          if (btn) { btn.disabled = false; btn.textContent = 'Add Dependency'; }
        });
      });
    }

    document.getElementById('btn-add-dep').addEventListener('click', showAddDependencyModal);

    /* ── Add milestone modal ─────────────────────────────────── */
    function showAddMilestoneModal() {
      if (!activeBoardId) return;
      var todayStr = toISO(new Date());
      openModal('Add Milestone',
        '<div class="form-group">' +
          '<label class="form-label">Milestone Name</label>' +
          '<input class="form-input" id="modal-ms-name" placeholder="Release v1.0" required autofocus>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Target Date</label>' +
          '<input class="form-input" id="modal-ms-date" type="date" value="' + todayStr + '" required>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Owner ID (optional)</label>' +
          '<input class="form-input" id="modal-ms-owner" placeholder="owner-user-id">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Linked Item IDs (comma separated)</label>' +
          '<input class="form-input" id="modal-ms-items" placeholder="item-1, item-2">' +
        '</div>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" id="modal-add-ms-btn">Add Milestone</button>'
      );
      document.getElementById('modal-add-ms-btn').addEventListener('click', function () {
        var name = document.getElementById('modal-ms-name').value.trim();
        var date = document.getElementById('modal-ms-date').value;
        if (!name || !date) { showError('Milestone name and target date are required.'); return; }
        var owner = document.getElementById('modal-ms-owner').value.trim();
        var linkedRaw = document.getElementById('modal-ms-items').value.trim();
        var linked = linkedRaw ? linkedRaw.split(',').map(function (s) { return s.trim(); }).filter(Boolean) : [];

        this.disabled = true;
        this.textContent = 'Adding…';
        API('/api/portfolio/milestones', {
          method: 'POST',
          body: { name: name, target_date: date, board_id: activeBoardId, owner_id: owner || undefined, linked_item_ids: linked }
        }).then(function () {
          closeModal();
          loadAll();
        }).catch(function () {
          var btn = document.getElementById('modal-add-ms-btn');
          if (btn) { btn.disabled = false; btn.textContent = 'Add Milestone'; }
        });
      });
    }

    document.getElementById('btn-new-milestone').addEventListener('click', showAddMilestoneModal);

    /* ── Edit milestone modal ────────────────────────────────── */
    function showEditMilestoneModal(msId) {
      var ms = null;
      for (var i = 0; i < milestones.length; i++) {
        var id = milestones[i].id || milestones[i].milestone_id;
        if (id === msId) { ms = milestones[i]; break; }
      }
      if (!ms) return;

      openModal('Edit Milestone',
        '<div class="form-group">' +
          '<label class="form-label">Milestone Name</label>' +
          '<input class="form-input" id="modal-edit-ms-name" value="' + escAttr(ms.name) + '">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Target Date</label>' +
          '<input class="form-input" id="modal-edit-ms-date" type="date" value="' + escAttr(ms.target_date) + '">' +
        '</div>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" id="modal-save-ms-btn">Save Changes</button>'
      );
      document.getElementById('modal-save-ms-btn').addEventListener('click', function () {
        var name = document.getElementById('modal-edit-ms-name').value.trim();
        var date = document.getElementById('modal-edit-ms-date').value;
        if (!name) return;
        this.disabled = true;
        this.textContent = 'Saving…';
        API('/api/portfolio/milestones/' + encodeURIComponent(msId), {
          method: 'PATCH',
          body: { name: name, target_date: date }
        }).then(function () {
          closeModal();
          loadAll();
        });
      });
    }

    /* ── Create baseline modal ───────────────────────────────── */
    function showCreateBaselineModal() {
      if (!activeBoardId) return;
      openModal('Create Baseline',
        '<div class="form-group">' +
          '<label class="form-label">Baseline Name</label>' +
          '<input class="form-input" id="modal-bl-name" placeholder="Sprint 1 Baseline" required autofocus>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Created By (user ID)</label>' +
          '<input class="form-input" id="modal-bl-creator" placeholder="your-user-id">' +
        '</div>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" id="modal-add-bl-btn">Create Baseline</button>'
      );
      document.getElementById('modal-add-bl-btn').addEventListener('click', function () {
        var name = document.getElementById('modal-bl-name').value.trim();
        if (!name) { showError('Baseline name is required.'); return; }
        var creator = document.getElementById('modal-bl-creator').value.trim();
        this.disabled = true;
        this.textContent = 'Creating…';
        API('/api/portfolio/baselines', {
          method: 'POST',
          body: { name: name, board_id: activeBoardId, created_by: creator || undefined }
        }).then(function () {
          closeModal();
          loadAll();
        }).catch(function () {
          var btn = document.getElementById('modal-add-bl-btn');
          if (btn) { btn.disabled = false; btn.textContent = 'Create Baseline'; }
        });
      });
    }

    document.getElementById('btn-new-baseline').addEventListener('click', showCreateBaselineModal);

    /* ── Baseline detail modal ───────────────────────────────── */
    function showBaselineDetail(blId) {
      API('/api/portfolio/baselines/' + encodeURIComponent(blId)).then(function (bl) {
        var bodyHtml = '<div style="font-size:0.82rem;color:var(--text-secondary);line-height:1.6;">';
        bodyHtml += '<p><strong>Name:</strong> ' + esc(bl.name) + '</p>';
        bodyHtml += '<p><strong>Board:</strong> ' + esc(bl.board_id) + '</p>';
        bodyHtml += '<p><strong>Created:</strong> ' + esc(formatDate(bl.created_at)) + '</p>';
        if (bl.created_by) bodyHtml += '<p><strong>Created by:</strong> ' + esc(bl.created_by) + '</p>';
        if (bl.snapshot && Array.isArray(bl.snapshot)) {
          bodyHtml += '<p style="margin-top:8px;"><strong>Snapshot (' + bl.snapshot.length + ' bars):</strong></p>';
          bodyHtml += '<div style="max-height:200px;overflow-y:auto;margin-top:6px;">';
          for (var i = 0; i < bl.snapshot.length; i++) {
            var s = bl.snapshot[i];
            bodyHtml += '<div style="padding:4px 0;border-bottom:1px solid var(--border-subtle);">' +
              esc(s.item_name || s.item_id) + ' — ' +
              esc(formatShortDate(s.start_date)) + ' → ' + esc(formatShortDate(s.end_date)) +
              ' (' + (s.progress || 0) + '%)</div>';
          }
          bodyHtml += '</div>';
        }
        bodyHtml += '</div>';
        openModal('Baseline: ' + (bl.name || ''), bodyHtml,
          '<button class="btn btn-ghost" onclick="closeModal()">Close</button>'
        );
      });
    }

    /* ── Critical path toggle ────────────────────────────────── */
    document.getElementById('btn-critical-path').addEventListener('click', function () {
      showCritical = !showCritical;
      this.style.background = showCritical ? 'rgba(255,107,53,0.15)' : '';
      this.style.color = showCritical ? 'var(--critical)' : '';
      this.style.borderColor = showCritical ? 'var(--critical)' : '';
      loadAll();
    });

    /* ── Confirm dialog ──────────────────────────────────────── */
    function showConfirm(title, message, onConfirm) {
      openModal(title,
        '<p class="confirm-text">' + esc(message) + '</p>',
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-danger" id="modal-confirm-btn">Delete</button>'
      );
      document.getElementById('modal-confirm-btn').addEventListener('click', function () {
        this.disabled = true;
        this.textContent = 'Deleting…';
        onConfirm();
      });
    }

    /* ── Auto-refresh ────────────────────────────────────────── */
    function refreshAll() {
      if (activeBoardId) loadAll(true);
    }

    function scheduleRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(refreshAll, REFRESH_MS);
    }

    /* ── Keyboard shortcuts ──────────────────────────────────── */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    /* ── Init ────────────────────────────────────────────────── */
    function init() {
      var params = new URLSearchParams(window.location.search);
      var bid = params.get('board_id');
      if (bid) {
        $boardIdInput.value = bid;
        loadBoard();
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  }());
  </script>
</body>
</html>
