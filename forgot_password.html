<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/static/murphy-app-shell.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Murphy System</title>
<meta name="description" content="Recover access to your Murphy System account.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/murphy-design-system.css">
<style>
  *:focus-visible { outline: 2px solid #00ff41; outline-offset: 2px; }
  .fp-page { min-height: 100vh; background: #0a0a0a; display: flex; flex-direction: column; }
  .fp-topbar { height: 52px; background: var(--bg-surface); border-bottom: 1px solid var(--border-default);
               display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
  .fp-brand { display: flex; align-items: center; gap: 8px; text-decoration: none;
              color: var(--teal); font-weight: 700; font-size: 1rem; letter-spacing: .05em; }
  .fp-content { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 3rem 1rem 4rem; }
  .fp-card { width: 100%; max-width: 460px; background: var(--bg-surface);
             border: 1px solid var(--border-default); border-radius: 12px; padding: 2rem; }
  .fp-card h1 { color: var(--text-primary); margin: 0 0 .5rem; font-size: 1.5rem; }
  .fp-card p.subtitle { color: var(--text-secondary); margin: 0 0 1.75rem; font-size: .9rem; line-height: 1.5; }
  .fp-card label { display: block; color: var(--text-secondary); font-size: .8rem; margin-bottom: .35rem; letter-spacing: .04em; }
  .fp-card input[type="email"] { width: 100%; padding: .65rem .85rem; background: #0a0a0a;
                                 border: 1px solid var(--border-default); border-radius: 6px;
                                 color: var(--text-primary); font-size: .95rem; box-sizing: border-box; }
  .fp-card input[type="email"]:focus { border-color: var(--teal); outline: none; }
  .fp-card button { width: 100%; padding: .75rem; margin-top: 1rem; background: var(--teal);
                    color: #001; border: none; border-radius: 6px; font-weight: 700;
                    cursor: pointer; font-size: .95rem; letter-spacing: .04em; }
  .fp-card button:hover { background: #00d4a8; }
  .fp-card button:disabled { opacity: .55; cursor: not-allowed; }
  .fp-links { margin-top: 1.25rem; text-align: center; font-size: .85rem; }
  .fp-links a { color: var(--teal); text-decoration: none; margin: 0 .5rem; }
  .fp-links a:hover { text-decoration: underline; }
  .fp-status { margin-top: 1rem; padding: .75rem; border-radius: 6px; font-size: .9rem;
               display: none; line-height: 1.45; }
  .fp-status.ok { display: block; background: rgba(0,255,65,.08); border: 1px solid #00ff41; color: #00ff41; }
  .fp-status.err { display: block; background: rgba(255,80,80,.08); border: 1px solid #ff5050; color: #ff8080; }
  .fp-help { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border-default);
             font-size: .8rem; color: var(--text-secondary); line-height: 1.5; }
  .fp-help strong { color: var(--text-primary); }
  .fp-help a { color: var(--teal); }
</style>
</head>
<body>
<div class="fp-page">
  <div class="fp-topbar">
    <a href="/" class="fp-brand">⬡ MURPHY SYSTEMS</a>
  </div>
  <div class="fp-content">
    <div class="fp-card">
      <h1>Forgot your password?</h1>
      <p class="subtitle">Enter the email on your Murphy account. We'll send you a link to reset it.</p>

      <form id="fp-form" onsubmit="return submitForgot(event)">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com" />
        <button type="submit" id="fp-submit">Send reset link</button>
      </form>

      <div id="fp-status" class="fp-status"></div>

      <div class="fp-links">
        <a href="/login">← Back to sign in</a> ·
        <a href="/signup">Create an account</a>
      </div>

      <div class="fp-help">
        <strong>Need a human?</strong> Reach Client Solutions at
        <a href="mailto:clientsolutions@murphy.systems">clientsolutions@murphy.systems</a> —
        we typically reply within one business hour.
      </div>
    </div>
  </div>
</div>

<script>
async function submitForgot(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('fp-submit');
  const status = document.getElementById('fp-status');
  status.className = 'fp-status';
  status.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    const r = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    // Always show the same message regardless of whether the email exists — privacy
    if (r.ok || r.status === 200 || r.status === 202 || r.status === 400) {
      status.className = 'fp-status ok';
      status.textContent = 'If an account exists for ' + email + ', a reset link has been sent. Check your inbox (and spam folder).';
      document.getElementById('fp-form').reset();
    } else {
      const t = await r.text();
      status.className = 'fp-status err';
      status.textContent = 'Something went wrong. Please try again or email clientsolutions@murphy.systems.';
    }
  } catch (err) {
    status.className = 'fp-status err';
    status.textContent = 'Network error. Please try again.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
  return false;
}
</script>
</body>
</html>
