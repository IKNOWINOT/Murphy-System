<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/static/murphy-app-shell.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — Murphy System</title>
<meta name="description" content="Change your Murphy System account password.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/murphy-design-system.css">
<style>
  *:focus-visible { outline: 2px solid #00ff41; outline-offset: 2px; }
  .change-page {
    min-height: 100vh;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
  }
  .change-topbar {
    height: 52px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
  }
  .change-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--teal);
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: .05em;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .change-content {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1rem 4rem;
  }
  .change-card {
    width: 100%;
    max-width: 480px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-xl);
    padding: 2.5rem 2rem;
    box-shadow: var(--shadow-lg), 0 0 40px rgba(0, 212, 170, 0.06);
  }
  .change-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .change-icon {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(0, 212, 170, 0.12);
    border: 1px solid rgba(0, 212, 170, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
  }
  .change-header h1 {
    font-size: var(--text-2xl);
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
    font-family: var(--font-ui);
  }
  .change-header p {
    color: var(--text-muted);
    font-size: var(--text-sm);
  }
  .form-group {
    margin-bottom: 1.25rem;
  }
  .form-label {
    display: block;
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
  }
  .form-input {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 0.625rem 0.75rem;
    color: var(--text-primary);
    font-size: var(--text-sm);
    font-family: var(--font-ui);
    outline: none;
    transition: border-color var(--transition-fast);
  }
  .form-input:focus { border-color: var(--teal); }
  .form-input.error { border-color: #ef4444; }
  .pw-wrap { position: relative; }
  .pw-toggle {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 13px; padding: 2px 4px;
  }
  .pw-toggle:hover { color: var(--text-primary); }
  .strength-bar {
    height: 3px; border-radius: 2px; background: var(--border-default);
    margin-top: 6px; overflow: hidden;
  }
  .strength-fill {
    height: 100%; border-radius: 2px;
    transition: width .3s, background .3s; width: 0%;
  }
  .strength-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .divider {
    height: 1px; background: var(--border-subtle); margin: 1.5rem 0;
  }
  .submit-btn {
    width: 100%;
    padding: 0.75rem;
    background: var(--teal);
    color: #000;
    border: none;
    border-radius: var(--radius-md);
    font-size: var(--text-sm);
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-ui);
    transition: background var(--transition-fast);
    margin-top: 0.5rem;
  }
  .submit-btn:hover  { background: #00b890; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg-box {
    padding: 12px 14px;
    border-radius: var(--radius-md);
    font-size: var(--text-sm);
    margin-bottom: 1.25rem;
    display: none;
  }
  .msg-box.error   { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #ef4444; }
  .msg-box.success { background: rgba(0,212,170,.1); border: 1px solid rgba(0,212,170,.3); color: var(--teal); }
  .back-link {
    display: block;
    text-align: center;
    color: var(--text-muted);
    font-size: var(--text-sm);
    text-decoration: none;
    margin-top: 1.5rem;
  }
  .back-link:hover { color: var(--teal); }
  .forgot-hint {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 0.75rem;
  }
  .forgot-hint a { color: var(--teal); text-decoration: none; }
  .forgot-hint a:hover { text-decoration: underline; }
  /* Done state */
  .done-view { display: none; text-align: center; }
  .done-view.active { display: block; }
  .form-view { display: block; }
  .form-view.hidden { display: none; }
</style>
</head>
<body>
<div class="change-page">

  <!-- Topbar -->
  <header class="change-topbar" role="banner">
    <a href="/ui/landing" class="change-brand" aria-label="Murphy System home">
      <svg width="24" height="24" viewBox="0 0 24 24"><rect width="24" height="24" rx="6" fill="#00D4AA"/><text x="12" y="17" text-anchor="middle" fill="#000" font-size="13" font-weight="700" font-family="Inter,sans-serif">M</text></svg>
      <span>MURPHY</span>
    </a>
    <div class="topbar-right">
      <span id="topbar-email"></span>
      <a href="/ui/dashboard" style="color:var(--teal);text-decoration:none;font-size:13px">Dashboard</a>
    </div>
  </header>

  <!-- Main content -->
  <main class="change-content" id="main-content">
    <div class="change-card">

      <!-- Form view -->
      <div class="form-view" id="form-view">
        <div class="change-header">
          <div class="change-icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00D4AA" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <h1>Change password</h1>
          <p>Enter your current password and choose a new one.</p>
        </div>

        <div class="msg-box" id="change-msg" role="alert"></div>

        <form id="change-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="current-pw">Current password</label>
            <div class="pw-wrap">
              <input class="form-input" id="current-pw" type="password"
                     autocomplete="current-password" placeholder="Your current password" required />
              <button type="button" class="pw-toggle" onclick="togglePw('current-pw',this)" aria-label="Show/hide password">Show</button>
            </div>
          </div>

          <div class="divider"></div>

          <div class="form-group">
            <label class="form-label" for="new-pw">New password</label>
            <div class="pw-wrap">
              <input class="form-input" id="new-pw" type="password"
                     autocomplete="new-password" placeholder="At least 8 characters" required />
              <button type="button" class="pw-toggle" onclick="togglePw('new-pw',this)" aria-label="Show/hide password">Show</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <div class="strength-label" id="strength-label"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-pw">Confirm new password</label>
            <div class="pw-wrap">
              <input class="form-input" id="confirm-pw" type="password"
                     autocomplete="new-password" placeholder="Repeat your new password" required />
              <button type="button" class="pw-toggle" onclick="togglePw('confirm-pw',this)" aria-label="Show/hide password">Show</button>
            </div>
          </div>

          <button class="submit-btn" type="submit" id="change-btn">Update password</button>
        </form>

        <div class="forgot-hint">
          Forgot your current password?
          <a href="/ui/reset-password">Reset via email</a>
        </div>
        <a class="back-link" href="/ui/dashboard">← Back to dashboard</a>
      </div>

      <!-- Done view -->
      <div class="done-view" id="done-view">
        <div class="change-header">
          <div class="change-icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00D4AA" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h1>Password updated!</h1>
          <p>Your password has been changed successfully. All other sessions have been kept active.</p>
        </div>
        <a href="/ui/dashboard" class="submit-btn" style="display:block;text-align:center;text-decoration:none;padding-top:.7rem">Back to dashboard</a>
      </div>

    </div><!-- /.change-card -->
  </main>

</div><!-- /.change-page -->

<script src="murphy_auth.js"></script>
<script>
/* ── helpers ──────────────────────────────────────────────────────────── */
function showMsg(id, text, type) {
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg-box ' + type;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function hideMsg(id) { document.getElementById(id).style.display = 'none'; }

function togglePw(inputId, btn) {
  var inp = document.getElementById(inputId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
}

/* ── password strength ──────────────────────────────────────────────── */
function scorePassword(pw) {
  var score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  return score;
}
document.getElementById('new-pw').addEventListener('input', function() {
  var pw = this.value;
  var score = scorePassword(pw);
  var fill  = document.getElementById('strength-fill');
  var label = document.getElementById('strength-label');
  var colors = ['#ef4444','#ef4444','#f97316','#eab308','#22c55e','#00D4AA'];
  var labels = ['','Too weak','Weak','Fair','Strong','Very strong'];
  fill.style.width      = ((score / 5) * 100) + '%';
  fill.style.background = colors[score] || '#ef4444';
  label.textContent     = labels[score] || '';
  label.style.color     = colors[score] || '#ef4444';
});

/* ── auth check ──────────────────────────────────────────────────────── */
async function init() {
  try {
    var r = await fetch('/api/auth/session-token', {
      headers: typeof MurphyAuth !== 'undefined' ? MurphyAuth.headers() : {},
    });
    if (!r.ok) { location.href = '/ui/login?next=/ui/change-password'; return; }
  } catch (e) {
    location.href = '/ui/login?next=/ui/change-password';
    return;
  }

  try {
    var pr = await fetch('/api/account/profile', {
      headers: typeof MurphyAuth !== 'undefined' ? MurphyAuth.headers() : {},
    });
    var pd = await pr.json();
    document.getElementById('topbar-email').textContent = pd.email || '';
  } catch (e) { console.warn('[Murphy] Profile fetch failed:', e && e.message); }
}

/* ── Change password form ────────────────────────────────────────────── */
document.getElementById('change-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  hideMsg('change-msg');

  var currentPw = document.getElementById('current-pw').value;
  var newPw     = document.getElementById('new-pw').value;
  var confirmPw = document.getElementById('confirm-pw').value;

  if (!currentPw) { showMsg('change-msg', 'Please enter your current password.', 'error'); return; }
  if (newPw.length < 8) { showMsg('change-msg', 'New password must be at least 8 characters.', 'error'); return; }
  if (newPw !== confirmPw) { showMsg('change-msg', 'New passwords do not match.', 'error'); return; }

  var btn = document.getElementById('change-btn');
  btn.disabled = true;
  btn.textContent = 'Updating…';

  try {
    var r = await fetch('/api/auth/change-password', {
      method: 'POST',
      headers: Object.assign(
        { 'Content-Type': 'application/json' },
        typeof MurphyAuth !== 'undefined' ? MurphyAuth.headers() : {}
      ),
      body: JSON.stringify({ current_password: currentPw, new_password: newPw }),
    });
    var d = await r.json();
    if (d.success) {
      document.getElementById('form-view').classList.add('hidden');
      document.getElementById('done-view').classList.add('active');
    } else {
      showMsg('change-msg', d.error || 'Password change failed. Please try again.', 'error');
    }
  } catch (e) {
    showMsg('change-msg', 'Could not connect to the server. Please try again.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Update password';
  }
});

init();
</script>
<script src="/static/murphy-nav.js"></script>
</body>
</html>
