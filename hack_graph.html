<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="murphy-public" content="true">
<title>Murphy — Attack Surface Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #0a0c10;
    --panel: #111318;
    --border: #1e2330;
    --text: #c9d1e0;
    --muted: #5a6480;
    --accent: #00e5ff;
    --red: #ff3b5c;
    --orange: #ff8c42;
    --yellow: #ffd166;
    --green: #06d6a0;
    --purple: #7b2fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 { font-size: 14px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .badge {
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .badge-live { background: var(--red); color: #fff; animation: pulse 1.5s infinite; }
  .badge-idle { background: var(--muted); color: #fff; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  .stats-row {
    display: flex; gap: 20px; margin-left: auto; align-items: center;
  }
  .stat { text-align: center; }
  .stat-val { font-size: 18px; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section {
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  .sidebar-section h2 {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  /* Controls */
  .control-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  label { font-size: 10px; color: var(--muted); }
  input, select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    width: 100%;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .btn {
    padding: 6px 14px;
    border-radius: 4px;
    border: none;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .8; }
  .btn-start { background: var(--green); color: #000; }
  .btn-stop  { background: var(--red);   color: #fff; }
  .btn-reset { background: var(--muted); color: #fff; font-size: 10px; }
  .btn-row { display: flex; gap: 6px; margin-top: 4px; }

  /* Legend */
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Feed log */
  .feed-log {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
  }
  .log-entry {
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    line-height: 1.5;
    color: var(--text);
  }
  .log-entry .ts { color: var(--muted); }
  .log-entry.node_add .tag { color: var(--accent); }
  .log-entry.edge_add .tag { color: var(--purple); }
  .log-entry.finding .tag { color: var(--orange); }
  .log-entry.feed_complete .tag { color: var(--green); }
  .log-entry.error .tag { color: var(--red); }

  /* ── Graph canvas ── */
  .graph-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  svg { width: 100%; height: 100%; }

  /* Severity ring */
  .node-ring { stroke-width: 2; fill: none; }

  /* Tooltip */
  .tooltip {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    pointer-events: none;
    max-width: 280px;
    z-index: 10;
    display: none;
  }
  .tooltip .tt-title { color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .tooltip .tt-row { margin-bottom: 2px; }
  .tooltip .tt-key { color: var(--muted); }

  /* Finding panel */
  .finding-panel {
    position: absolute;
    top: 10px; right: 10px;
    width: 280px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    max-height: 60vh;
    overflow-y: auto;
    display: none;
  }
  .finding-panel h3 { color: var(--accent); font-size: 11px; margin-bottom: 8px; }
  .finding-item {
    padding: 6px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
    font-size: 10px;
    border-left: 3px solid var(--muted);
  }
  .sev-critical { border-color: var(--red);    background: rgba(255,59,92,.08); }
  .sev-high     { border-color: var(--orange); background: rgba(255,140,66,.08); }
  .sev-medium   { border-color: var(--yellow); background: rgba(255,209,102,.08); }
  .sev-low      { border-color: var(--green);  background: rgba(6,214,160,.08); }
  .sev-info     { border-color: var(--muted);  background: rgba(90,100,128,.08); }
  .fi-title { font-weight: 700; margin-bottom: 2px; }
  .fi-detail { color: var(--muted); font-size: 9px; }
</style>
</head>
<body>

<header>
  <h1>⚡ Attack Surface Graph</h1>
  <span id="live-badge" class="badge badge-idle">IDLE</span>
  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="stat-nodes">0</div><div class="stat-lbl">Nodes</div></div>
    <div class="stat"><div class="stat-val" id="stat-edges">0</div><div class="stat-lbl">Edges</div></div>
    <div class="stat"><div class="stat-val" id="stat-scans">0</div><div class="stat-lbl">Scans</div></div>
    <div class="stat"><div class="stat-val" id="stat-findings">0</div><div class="stat-lbl">Findings</div></div>
    <div class="stat"><div class="stat-val" id="stat-depth">—</div><div class="stat-lbl">Queue</div></div>
  </div>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Controls -->
    <div class="sidebar-section">
      <h2>Feed Control</h2>
      <div class="control-group">
        <label>Seed Target</label>
        <input id="inp-target" type="text" value="https://murphy.systems" placeholder="https://example.com">
      </div>
      <div class="control-group">
        <label>Recursion Depth</label>
        <select id="inp-depth">
          <option value="0">0 — seed only</option>
          <option value="1">1 — +1 hop</option>
          <option value="2" selected>2 — +2 hops</option>
          <option value="3">3 — +3 hops (slow)</option>
        </select>
      </div>
      <div class="control-group">
        <label>Transport Mode</label>
        <select id="inp-transport">
          <option value="direct">Direct</option>
          <option value="tor">Tor (anonymized)</option>
          <option value="rotate">Rotating nodes</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-start" onclick="startFeed()">▶ START</button>
        <button class="btn btn-stop"  onclick="stopFeed()">■ STOP</button>
        <button class="btn btn-reset" onclick="resetGraph()">↺</button>
      </div>
    </div>

    <!-- Legend -->
    <div class="sidebar-section">
      <h2>Legend</h2>
      <div class="legend-item"><div class="legend-dot" style="background:#00e5ff"></div>Target / Host</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff3b5c"></div>Critical Finding</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff8c42"></div>High Finding</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffd166"></div>Medium Finding</div>
      <div class="legend-item"><div class="legend-dot" style="background:#06d6a0"></div>Low / Info Finding</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7b2fff"></div>Open Port</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5a6480"></div>Service / TLS</div>
    </div>

    <!-- Live event log -->
    <div class="sidebar-section" style="padding-bottom:6px">
      <h2>Live Feed Log</h2>
    </div>
    <div class="feed-log" id="feed-log"></div>
  </div>

  <!-- Graph -->
  <div class="graph-area" id="graph-area">
    <svg id="graph-svg"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div class="finding-panel" id="finding-panel">
      <h3>📋 Node Findings</h3>
      <div id="finding-list"></div>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────

const NODE_COLOR = {
  target:  '#00e5ff',
  port:    '#7b2fff',
  service: '#5a6480',
  ip:      '#00b4d8',
};
const SEV_COLOR = {
  critical: '#ff3b5c',
  high:     '#ff8c42',
  medium:   '#ffd166',
  low:      '#06d6a0',
  info:     '#5a6480',
};
const NODE_RADIUS = { target: 18, finding: 10, port: 12, service: 10, ip: 14 };

// ── State ──────────────────────────────────────────────────────────────────

let nodes = [], links = [];
let nodeMap = {}, linkSet = new Set();
let simulation, svg, g, linkSel, nodeSel;
let statsInterval;
let evtSource = null;
let findingsByTarget = {};  // target node id → array of finding nodes

// ── D3 setup ──────────────────────────────────────────────────────────────

function initGraph() {
  svg = d3.select('#graph-svg');
  const W = document.getElementById('graph-area').clientWidth;
  const H = document.getElementById('graph-area').clientHeight;

  svg.selectAll('*').remove();

  // Arrow marker
  svg.append('defs').append('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 20).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L8,0L0,4')
    .attr('fill', '#1e2330');

  g = svg.append('g');

  // Zoom
  svg.call(d3.zoom()
    .scaleExtent([0.1, 4])
    .on('zoom', e => g.attr('transform', e.transform)));

  // Link + node groups
  g.append('g').attr('class', 'links');
  g.append('g').attr('class', 'nodes');

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
      if (d.rel === 'has_finding') return 80;
      if (d.rel === 'discovered_via') return 160;
      return 100;
    }).strength(0.6))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide().radius(d => (NODE_RADIUS[d.type] || 10) + 8))
    .on('tick', ticked);
}

function ticked() {
  g.select('.links').selectAll('line')
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

  g.select('.nodes').selectAll('.node-group')
    .attr('transform', d => `translate(${d.x},${d.y})`);
}

function nodeColor(d) {
  if (d.type === 'finding') return SEV_COLOR[d.severity] || SEV_COLOR.info;
  return NODE_COLOR[d.type] || '#c9d1e0';
}

function addNodeToGraph(nodeData) {
  if (nodeMap[nodeData.id]) return;
  const n = { ...nodeData };
  nodes.push(n);
  nodeMap[n.id] = n;

  // Track findings per target
  if (n.type === 'finding' && n.endpoint) {
    const tk = 'target:' + n.endpoint.replace(/https?:\/\//, '').split('/')[0].split(':')[0];
    if (!findingsByTarget[tk]) findingsByTarget[tk] = [];
    findingsByTarget[tk].push(n);
  }

  const ng = g.select('.nodes').append('g')
    .attr('class', 'node-group')
    .attr('data-id', n.id)
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e, d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('mouseover', (e, d) => showTooltip(e, d))
    .on('mousemove', (e) => moveTooltip(e))
    .on('mouseout', hideTooltip)
    .on('click', (e, d) => showFindings(d));

  const r = NODE_RADIUS[n.type] || 10;

  // Outer glow ring for targets
  if (n.type === 'target') {
    ng.append('circle')
      .attr('r', r + 5)
      .attr('fill', 'none')
      .attr('stroke', nodeColor(n))
      .attr('stroke-width', 1)
      .attr('opacity', 0.25);
  }

  ng.append('circle')
    .attr('r', r)
    .attr('fill', nodeColor(n))
    .attr('fill-opacity', 0.85)
    .attr('stroke', '#0a0c10')
    .attr('stroke-width', 1.5);

  // Label
  if (n.type === 'target' || n.type === 'port') {
    const lbl = n.type === 'target'
      ? (n.url || n.id).replace(/https?:\/\//, '').slice(0, 22)
      : (n.endpoint || '').split(':').pop();
    ng.append('text')
      .attr('y', r + 12)
      .attr('text-anchor', 'middle')
      .attr('font-size', '9px')
      .attr('fill', '#c9d1e0')
      .text(lbl);
  }

  // Severity badge for findings
  if (n.type === 'finding') {
    ng.append('text')
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('font-size', '7px')
      .attr('fill', '#000')
      .attr('font-weight', '700')
      .text(n.severity?.slice(0,1).toUpperCase() || '?');
  }

  simulation.nodes(nodes);
  simulation.alpha(0.5).restart();
}

function addEdgeToGraph(edgeData) {
  const key = `${edgeData.src}→${edgeData.dst}`;
  if (linkSet.has(key)) return;
  linkSet.add(key);

  const src = nodeMap[edgeData.src];
  const dst = nodeMap[edgeData.dst];
  if (!src || !dst) return;

  const link = { source: edgeData.src, target: edgeData.dst, rel: edgeData.rel };
  links.push(link);

  g.select('.links').append('line')
    .attr('stroke', edgeData.rel === 'has_finding' ? '#2a2f40' : '#1e2330')
    .attr('stroke-width', edgeData.rel === 'discovered_via' ? 1.5 : 0.8)
    .attr('stroke-dasharray', edgeData.rel === 'discovered_via' ? '4,3' : null)
    .attr('marker-end', 'url(#arrow)')
    .datum(link);

  simulation.force('link').links(links);
  simulation.alpha(0.3).restart();
}

function fullRedraw(graphData) {
  nodes = []; links = []; nodeMap = {}; linkSet = {}; linkSet = new Set();
  findingsByTarget = {};
  initGraph();
  graphData.nodes.forEach(n => addNodeToGraph(n));
  graphData.edges.forEach(e => addEdgeToGraph(e));
  updateStats(graphData.stats);
}

// ── Tooltip ────────────────────────────────────────────────────────────────

const tooltip = document.getElementById('tooltip');
function showTooltip(e, d) {
  let html = `<div class="tt-title">${d.type?.toUpperCase()}</div>`;
  if (d.url)      html += `<div class="tt-row"><span class="tt-key">URL: </span>${d.url}</div>`;
  if (d.title)    html += `<div class="tt-row"><span class="tt-key">Finding: </span>${d.title}</div>`;
  if (d.severity) html += `<div class="tt-row"><span class="tt-key">Severity: </span><span style="color:${SEV_COLOR[d.severity]}">${d.severity}</span></div>`;
  if (d.cvss)     html += `<div class="tt-row"><span class="tt-key">CVSS: </span>${d.cvss}</div>`;
  if (d.endpoint) html += `<div class="tt-row"><span class="tt-key">Endpoint: </span>${d.endpoint}</div>`;
  if (d.depth !== undefined) html += `<div class="tt-row"><span class="tt-key">Depth: </span>${d.depth}</div>`;
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  tooltip.style.left = (e.offsetX + 16) + 'px';
  tooltip.style.top  = (e.offsetY + 16) + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ── Finding panel ──────────────────────────────────────────────────────────

const findingPanel = document.getElementById('finding-panel');
const findingList  = document.getElementById('finding-list');

function showFindings(d) {
  if (d.type !== 'target') { findingPanel.style.display = 'none'; return; }
  const findings = findingsByTarget[d.id] || [];
  if (!findings.length) { findingPanel.style.display = 'none'; return; }
  findingList.innerHTML = findings.map(f => `
    <div class="finding-item sev-${f.severity}">
      <div class="fi-title" style="color:${SEV_COLOR[f.severity]}">${f.title}</div>
      <div class="fi-detail">${f.category || ''}</div>
    </div>
  `).join('');
  findingPanel.style.display = 'block';
}

// ── SSE connection ─────────────────────────────────────────────────────────

let scanCount = 0, findingCount = 0;

function connectSSE() {
  if (evtSource) { evtSource.close(); evtSource = null; }
  evtSource = new EventSource('/api/hack/graph/stream');

  evtSource.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    handleEvent(ev);
  };
  evtSource.onerror = () => {
    logEntry('error', 'SSE disconnected — reconnecting in 5s...');
    setTimeout(connectSSE, 5000);
  };
}

function handleEvent(ev) {
  switch (ev.event) {
    case 'snapshot':
      fullRedraw(ev.graph);
      logEntry('info', `Graph snapshot: ${ev.graph.nodes.length} nodes, ${ev.graph.edges.length} edges`);
      break;

    case 'node_add':
      addNodeToGraph({ id: ev.id, type: ev.type, ...ev.attrs });
      updateStatCounters();
      if (ev.type === 'finding') {
        findingCount++;
        document.getElementById('stat-findings').textContent = findingCount;
        logEntry('finding', `⚠ Finding [${ev.attrs?.severity || '?'}]: ${ev.attrs?.title || ev.id}`);
      } else if (ev.type === 'target') {
        logEntry('node_add', `◉ Target: ${ev.attrs?.url || ev.id}`);
      }
      break;

    case 'edge_add':
      addEdgeToGraph(ev);
      if (ev.rel === 'discovered_via') {
        logEntry('node_add', `→ Discovered via ${ev.rel}: ${ev.dst}`);
      }
      break;

    case 'feed_complete':
      scanCount = ev.scans_run || scanCount;
      document.getElementById('stat-scans').textContent = scanCount;
      document.getElementById('live-badge').className = 'badge badge-idle';
      document.getElementById('live-badge').textContent = 'IDLE';
      logEntry('feed_complete', `✓ Feed complete — ${ev.scans_run} scans, ${ev.nodes_discovered} discovered`);
      break;

    case 'graph_reset':
      nodes=[]; links=[]; nodeMap={}; linkSet=new Set(); findingCount=0;
      initGraph();
      updateStatCounters();
      logEntry('info', '↺ Graph reset');
      break;
  }
}

// ── Stats ──────────────────────────────────────────────────────────────────

function updateStatCounters() {
  document.getElementById('stat-nodes').textContent = nodes.length;
  document.getElementById('stat-edges').textContent = links.length;
}

function updateStats(s) {
  if (!s) return;
  document.getElementById('stat-nodes').textContent = s.nodes;
  document.getElementById('stat-edges').textContent = s.edges;
}

function pollFeedStatus() {
  fetch('/api/hack/feed/status', { credentials: 'include' })
    .then(r => r.json())
    .then(d => {
      document.getElementById('stat-scans').textContent = d.scans_run || 0;
      document.getElementById('stat-depth').textContent = d.queue_depth ?? '—';
      const badge = document.getElementById('live-badge');
      if (d.running) {
        badge.className = 'badge badge-live';
        badge.textContent = 'LIVE';
      } else {
        badge.className = 'badge badge-idle';
        badge.textContent = 'IDLE';
      }
    }).catch(() => {});
}

// ── Log ───────────────────────────────────────────────────────────────────

function logEntry(type, msg) {
  const log = document.getElementById('feed-log');
  const ts = new Date().toTimeString().slice(0,8);
  const el = document.createElement('div');
  el.className = `log-entry ${type}`;
  el.innerHTML = `<span class="ts">${ts}</span> <span class="tag">[${type}]</span> ${msg}`;
  log.prepend(el);
  // cap log at 200 entries
  while (log.children.length > 200) log.removeChild(log.lastChild);
}

// ── Control actions ────────────────────────────────────────────────────────

function startFeed() {
  const target = document.getElementById('inp-target').value.trim();
  const depth  = parseInt(document.getElementById('inp-depth').value);
  const tmode  = document.getElementById('inp-transport').value;
  if (!target) return alert('Enter a seed target URL');

  fetch('/api/hack/feed/start', {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ seed_target: target, depth_limit: depth, transport_mode: tmode }),
  })
  .then(r => r.json())
  .then(d => {
    if (d.error) { logEntry('error', d.error); return; }
    logEntry('node_add', `Feed started → ${target} (depth:${depth}, transport:${tmode})`);
    document.getElementById('live-badge').className = 'badge badge-live';
    document.getElementById('live-badge').textContent = 'LIVE';
  });
}

function stopFeed() {
  fetch('/api/hack/feed/stop', { method: 'POST', credentials: 'include' })
    .then(r => r.json())
    .then(d => logEntry('info', `Feed stopped — ${d.scans_run} scans completed`));
}

function resetGraph() {
  fetch('/api/hack/graph', { method: 'DELETE', credentials: 'include' })
    .then(() => logEntry('info', 'Graph cleared'));
}

// ── Init ──────────────────────────────────────────────────────────────────

window.addEventListener('load', () => {
  initGraph();
  connectSSE();
  statsInterval = setInterval(pollFeedStatus, 3000);
  logEntry('info', 'Attack Surface Graph initialized — connect SSE stream');
});

window.addEventListener('resize', () => {
  initGraph();
});
</script>
